# yaml-language-server: $schema=../schemas/orchestration.schema.json
name: cleanup-ephemeral
description: |
  Sweeps the workspace `Ephemeral/` orchestrations folder and deletes
  ephemeral orchestration YAML files older than the configured retention
  window (default: 7 days).

  A file is eligible for deletion only when ALL of the following hold:
    1. It lives directly under the Ephemeral directory (no recursion).
    2. Its top-level `metadata.ephemeral` field equals the literal boolean
       `true` (parsed via regex from the YAML source).
    3. Its `metadata.createdAt` ISO-8601 timestamp parses cleanly and is
       older than `retentionDays` ago (UTC comparison).

  Files without the marker, files whose metadata cannot be parsed, and any
  orchestration outside the Ephemeral directory are LEFT UNTOUCHED. A
  dry-run mode is available for inspection.
version: 1.0.0
tags: ["ephemeral", "system"]
defaultModel: gpt-5.4

variables:
  ephemeralDir: "{{orchestration.sourceDirectory}}/../Ephemeral"

inputs:
  retentionDays:
    type: number
    description: |
      Maximum age (in days) for ephemeral orchestrations. Files whose
      `metadata.createdAt` is older than this threshold are deleted.
      Use `0` to purge every ephemeral regardless of age (use with care).
    required: false
    default: "7"
  dryRun:
    type: boolean
    description: |
      When `true`, the orchestration only reports what it WOULD delete
      without actually removing any files. Useful for inspection or CI.
    required: false
    default: "false"

steps:
  # ── Step 1: Sweep the Ephemeral directory ───────────────────────────────
  # Lists *.yaml files (top-level only, no recursion), inspects each one's
  # top-level `metadata:` block via regex, classifies it, and either
  # deletes (or, in dry-run, records "would-delete"). Emits a JSON report
  # on stdout for the next step to render.
  - name: sweep-ephemeral-dir
    type: Script
    shell: pwsh
    timeoutSeconds: 300
    script: |
      $ErrorActionPreference = 'Stop'

      $ephemeralDir   = '{{vars.ephemeralDir}}'
      $retentionDays = [double]'{{param.retentionDays}}'
      $dryRun        = ('{{param.dryRun}}' -ieq 'true')
      $nowUtc        = (Get-Date).ToUniversalTime()
      $cutoffUtc     = $nowUtc.AddDays(-1 * $retentionDays)

      $report = [ordered]@{
        summary        = $null
        ephemeralDir    = $ephemeralDir
        retentionDays  = $retentionDays
        dryRun         = $dryRun
        cutoffUtc      = $cutoffUtc.ToString('o')
        scannedAt      = $nowUtc.ToString('o')
        scanned        = 0
        deleted        = @()
        keptYoung      = @()
        skippedNoFlag  = @()
        skippedParse   = @()
        errors         = @()
      }

      # Tracks files that pass every guard (i.e., were old enough to remove).
      # `deleted.Count` alone can't be reused for this in LIVE mode because a
      # Remove-Item failure would route the entry to `errors` instead.
      $oldCount = 0

      if (-not (Test-Path -LiteralPath $ephemeralDir -PathType Container)) {
        $report.errors += @{ message = "Ephemeral directory does not exist: $ephemeralDir" }
        $report.summary = [ordered]@{
          mode             = if ($dryRun) { 'DRY RUN' } else { 'LIVE' }
          filesExisting    = 0
          old              = 0
          removed          = 0
          wouldRemove      = 0
          kept             = 0
          skippedNoFlag    = 0
          skippedParse     = 0
          errors           = $report.errors.Count
        }
        $banner = "**MODE: $($report.summary.mode)** — ephemeral directory not found; no work performed."
        $lines = @()
        $lines += $banner
        $lines += ''
        $lines += '```json'
        $lines += ($report | ConvertTo-Json -Depth 10)
        $lines += '```'
        ($lines -join "`n")
        return
      }

      $files = @(Get-ChildItem -LiteralPath $ephemeralDir -Filter '*.yaml' -File -ErrorAction SilentlyContinue)
      $report.scanned = $files.Count

      foreach ($f in $files) {
        try {
          $raw = Get-Content -LiteralPath $f.FullName -Raw

          # --- Extract the top-level `metadata:` block ---------------------
          # The generator we control emits `metadata:` at column 0 with its
          # children indented by spaces. Capture from `metadata:` up to the
          # next non-indented (column-0) line. Multiline mode only, so `.`
          # never crosses a newline.
          $metaMatch = [regex]::Match(
            $raw,
            '(?m)^metadata:\s*\r?\n((?:[ \t]+[^\r\n]*\r?\n?)+)'
          )
          if (-not $metaMatch.Success) {
            $report.skippedNoFlag += @{ file = $f.Name; reason = 'no top-level metadata: block' }
            continue
          }
          $block = $metaMatch.Groups[1].Value

          # --- Guard 1: metadata.ephemeral must be literal `true` ----------
          $flagMatch = [regex]::Match(
            $block,
            '(?im)^\s+ephemeral\s*:\s*(true|false)\s*$'
          )
          $isEphemeral = $flagMatch.Success -and $flagMatch.Groups[1].Value.ToLowerInvariant() -eq 'true'
          if (-not $isEphemeral) {
            $report.skippedNoFlag += @{ file = $f.Name; reason = 'metadata.ephemeral != true' }
            continue
          }

          # --- Guard 2: metadata.createdAt must be a parseable ISO-8601 ---
          $tsMatch = [regex]::Match(
            $block,
            '(?m)^\s+createdAt\s*:\s*"?([^"\r\n]+?)"?\s*$'
          )
          if (-not $tsMatch.Success) {
            $report.skippedParse += @{ file = $f.Name; reason = 'metadata.createdAt missing' }
            continue
          }
          $tsRaw = $tsMatch.Groups[1].Value.Trim()
          try {
            $createdAt = [DateTimeOffset]::Parse(
              $tsRaw,
              [System.Globalization.CultureInfo]::InvariantCulture,
              [System.Globalization.DateTimeStyles]::AssumeUniversal -bor [System.Globalization.DateTimeStyles]::AdjustToUniversal
            )
          } catch {
            $report.skippedParse += @{ file = $f.Name; reason = "metadata.createdAt unparseable: '$tsRaw'" }
            continue
          }
          $createdAtUtc = $createdAt.UtcDateTime
          $ageDays = [Math]::Round(($nowUtc - $createdAtUtc).TotalDays, 2)

          # --- Guard 3: must be older than the cutoff ---------------------
          if ($createdAtUtc -gt $cutoffUtc) {
            $report.keptYoung += @{
              file      = $f.Name
              createdAt = $createdAtUtc.ToString('o')
              ageDays   = $ageDays
            }
            continue
          }

          # --- Eligible: delete (or pretend to) ---------------------------
          $oldCount++
          if ($dryRun) {
            $report.deleted += @{
              file      = $f.Name
              createdAt = $createdAtUtc.ToString('o')
              ageDays   = $ageDays
              action    = 'would-delete'
            }
          } else {
            Remove-Item -LiteralPath $f.FullName -Force
            $report.deleted += @{
              file      = $f.Name
              createdAt = $createdAtUtc.ToString('o')
              ageDays   = $ageDays
              action    = 'deleted'
            }
          }
        } catch {
          $report.errors += @{ file = $f.Name; error = $_.Exception.Message }
        }
      }

      # ── Build summary (so machine consumers don't have to count arrays) ──
      $mode             = if ($dryRun) { 'DRY RUN' } else { 'LIVE' }
      $removedCount     = if ($dryRun) { 0 } else { $report.deleted.Count }
      $wouldRemoveCount = if ($dryRun) { $report.deleted.Count } else { 0 }

      $report.summary = [ordered]@{
        mode             = $mode
        filesExisting    = $report.scanned
        old              = $oldCount
        removed          = $removedCount
        wouldRemove      = $wouldRemoveCount
        kept             = $report.keptYoung.Count
        skippedNoFlag    = $report.skippedNoFlag.Count
        skippedParse     = $report.skippedParse.Count
        errors           = $report.errors.Count
      }

      # ── Build the banner (clearly distinguishes DRY RUN vs LIVE) ─────────
      if ($dryRun) {
        $banner = "**MODE: DRY RUN** — no files were modified. " +
                  "$wouldRemoveCount file(s) would be deleted " +
                  "(of $oldCount eligible, $($report.scanned) scanned)."
      } else {
        $errorSuffix = if ($report.errors.Count -gt 0) {
          " ($($report.errors.Count) error(s) — see below)"
        } else { '' }
        $banner = "**MODE: LIVE** — $removedCount file(s) deleted " +
                  "(of $oldCount eligible, $($report.scanned) scanned)$errorSuffix."
      }

      # ── Render Markdown: banner -> stats table -> JSON code fence ────────
      $removedLabel = if ($dryRun) {
        "$removedCount (dry run — $wouldRemoveCount would be removed)"
      } else {
        "$removedCount"
      }

      $lines = @()
      $lines += $banner
      $lines += ''
      $lines += '## Statistics'
      $lines += ''
      $lines += '| Metric                                       | Count |'
      $lines += '|----------------------------------------------|------:|'
      $lines += "| Files scanned                                | $($report.scanned) |"
      $lines += "| Old (older than retention window)            | $oldCount |"
      $lines += "| Removed                                      | $removedLabel |"
      $lines += "| Kept (within retention window)               | $($report.keptYoung.Count) |"
      $lines += "| Skipped (no ephemeral marker)                 | $($report.skippedNoFlag.Count) |"
      $lines += "| Skipped (createdAt parse error)              | $($report.skippedParse.Count) |"
      $lines += "| Errors                                       | $($report.errors.Count) |"
      $lines += ''
      $lines += '## Sweep Report'
      $lines += ''
      $lines += '```json'
      $lines += ($report | ConvertTo-Json -Depth 10)
      $lines += '```'

      ($lines -join "`n")

  # ── Step 2: Render a human-friendly summary ────────────────────────────
  - name: format-summary
    type: Transform
    dependsOn: [sweep-ephemeral-dir]
    template: |
      # Ephemeral Cleanup — Summary

      **Run ID:**     {{orchestration.runId}}
      **Started at:** {{orchestration.startedAt}}
      **Retention:**  {{param.retentionDays}} day(s)
      **Dry run:**    {{param.dryRun}}

      {{sweep-ephemeral-dir.output}}

      Files listed under `deleted` were removed (or, when `dryRun` was true,
      flagged as `would-delete`). Files under `keptYoung` are still within
      the retention window. `skippedNoFlag` and `skippedParse` were left
      untouched because they failed the metadata guards. `errors` lists any
      unexpected failures during the sweep.

trigger:
  type: scheduler
  enabled: true
  intervalSeconds: 172800
