# yaml-language-server: $schema=https://raw.githubusercontent.com/MoaidHathot/orchestra/main/schemas/orchestration.schema.json
name: diagnose-failed-orchestration-run
description: |
  Companion child of `failed-orchestration-diagnoser`. Diagnoses a SINGLE failed
  orchestration run in isolation, then posts an ActionView entry containing the
  root-cause diagnosis, a concrete suggested fix, and (when the fix targets the
  orchestration YAML) an "Apply Fix" button.

  The button does NOT auto-apply. It launches `apply-orchestration-fix` through
  the Orchestra CLI only when the human clicks it, and a "re-run" checkbox on the
  button lets the user optionally re-run the fixed orchestration afterwards.

  Evidence is read from the failed run's on-disk artifacts under
  %LOCALAPPDATA%/OrchestraHost/executions/<name>/<name>_..._<executionId>/
  (run.json + result.md + per-step *-result.json). The failed orchestration's
  source YAML in this repo is resolved by matching its `name:` field under
  `orchestrationsRoot`.
version: 1.0.0
tags: ["system", "diagnostics", "self-healing", "orchestra"]
defaultModel: claude-opus-4.8

inputs:
  failedRun:
    type: string
    description: |
      JSON object for one failed run, provided by the parent forEach via
      `itemParameter: failedRun`. Shape:
      { executionId, orchestrationName, runStatus, startedAt, completedAt, errorMessage }.
    required: true
    multiline: true
  runsRoot:
    type: string
    description: |
      Root of on-disk run artifacts. Expected %LOCALAPPDATA%/OrchestraHost/executions.
      Falls back to that path automatically when the provided value does not exist.
    required: false
    default: ""
  sourceRoot:
    type: string
    description: Optional read-only path to the Orchestra product source tree (engine-level diagnosis context).
    required: false
    default: ""
  orchestrationsRoot:
    type: string
    description: Root directory of orchestration YAMLs in this repo, used to resolve the failed orchestration's source file by its `name:` field.
    required: true

defaultRetryPolicy:
  maxRetries: 1
  backoffSeconds: 5
  backoffMultiplier: 2.0
  retryOnTimeout: true

defaultStepTimeoutSeconds: 300
timeoutSeconds: 1800

steps:
  - name: locate-run
    type: Script
    shell: pwsh
    timeoutSeconds: 120
    script: |
      $ErrorActionPreference = 'Stop'

      $failedRunRaw     = [string]$args[0]
      $runsRoot         = [string]$args[1]
      $sourceRoot       = [string]$args[2]
      $orchestrationsRoot = [string]$args[3]

      $fr = $failedRunRaw | ConvertFrom-Json -Depth 20
      $executionId       = [string]$fr.executionId
      $orchestrationName = [string]$fr.orchestrationName
      if ([string]::IsNullOrWhiteSpace($executionId)) { throw "failedRun.executionId is empty." }

      # Resolve the executions root. The legacy parent variable pointed at a
      # non-existent %LOCALAPPDATA%/Orchestra/runs; fall back to the real path.
      $execRoot = $runsRoot
      if ([string]::IsNullOrWhiteSpace($execRoot) -or -not (Test-Path -LiteralPath $execRoot)) {
        $fallback = Join-Path $env:LOCALAPPDATA 'OrchestraHost/executions'
        if (Test-Path -LiteralPath $fallback) { $execRoot = $fallback }
      }
      if ([string]::IsNullOrWhiteSpace($execRoot) -or -not (Test-Path -LiteralPath $execRoot)) {
        throw "Executions root not found (tried '$runsRoot' and the LOCALAPPDATA fallback)."
      }

      # Find the run folder whose name ends with _<executionId>.
      $folder = $null
      if (-not [string]::IsNullOrWhiteSpace($orchestrationName)) {
        $byName = Join-Path $execRoot $orchestrationName
        if (Test-Path -LiteralPath $byName) {
          $folder = Get-ChildItem -LiteralPath $byName -Directory -Filter "*_$executionId" -ErrorAction SilentlyContinue | Select-Object -First 1
        }
      }
      if (-not $folder) {
        $folder = Get-ChildItem -LiteralPath $execRoot -Recurse -Directory -Filter "*_$executionId" -ErrorAction SilentlyContinue | Select-Object -First 1
      }
      if (-not $folder) { throw "Could not locate a run folder for executionId '$executionId' under '$execRoot'." }
      $failedRunPath = $folder.FullName

      # Extract failure evidence from run.json (authoritative) with result.md context.
      $overallStatus = [string]$fr.runStatus
      $failingSteps  = @()
      $resultMd      = ''
      $paramsJson    = '{}'

      $runJsonPath = Join-Path $failedRunPath 'run.json'
      if (Test-Path -LiteralPath $runJsonPath) {
        $run = Get-Content -LiteralPath $runJsonPath -Raw | ConvertFrom-Json -Depth 100
        if ($run.status) { $overallStatus = [string]$run.status }
        if ($run.parameters) { $paramsJson = ($run.parameters | ConvertTo-Json -Depth 20 -Compress) }
        if ($run.stepRecords) {
          foreach ($prop in $run.stepRecords.PSObject.Properties) {
            $s = $prop.Value
            $st = [string]$s.status
            if ($st -and $st.ToLowerInvariant().Contains('fail')) {
              $err = [string]$s.errorMessage
              if ($err.Length -gt 4000) { $err = $err.Substring(0,4000) + ' [truncated]' }
              $failingSteps += [pscustomobject]@{
                name          = [string]$prop.Name
                status        = $st
                errorCategory = [string]$s.errorCategory
                error         = $err
              }
            }
          }
        }
      }

      $resultMdPath = Join-Path $failedRunPath 'result.md'
      if (Test-Path -LiteralPath $resultMdPath) {
        $resultMd = Get-Content -LiteralPath $resultMdPath -Raw
        if ($resultMd.Length -gt 6000) { $resultMd = $resultMd.Substring(0,6000) + "`n[truncated]" }
      }

      # Fallback: scan per-step *-result.json when run.json yielded nothing.
      if ($failingSteps.Count -eq 0) {
        foreach ($rf in (Get-ChildItem -LiteralPath $failedRunPath -Filter '*-result.json' -ErrorAction SilentlyContinue)) {
          try {
            $r = Get-Content -LiteralPath $rf.FullName -Raw | ConvertFrom-Json
            if (([string]$r.status).ToLowerInvariant().Contains('fail')) {
              $err = [string]$r.errorMessage
              if ($err.Length -gt 4000) { $err = $err.Substring(0,4000) + ' [truncated]' }
              $failingSteps += [pscustomobject]@{
                name          = ($rf.Name -replace '-result\.json$','')
                status        = [string]$r.status
                errorCategory = ''
                error         = $err
              }
            }
          } catch { }
        }
      }

      # Resolve the failed orchestration's source YAML in this repo by `name:`.
      # Filename != name (e.g. diagnose-auto-failed-orchestrations.yaml is named
      # 'failed-orchestration-diagnoser'), so match the declared name, not the file.
      $orchestrationPath  = ''
      $orchestrationFound = $false
      if (-not [string]::IsNullOrWhiteSpace($orchestrationName) -and (Test-Path -LiteralPath $orchestrationsRoot)) {
        $rootResolved = (Resolve-Path -LiteralPath $orchestrationsRoot).Path
        $pattern = "^\s*name:\s*$([regex]::Escape($orchestrationName))\s*$"
        $cand = Get-ChildItem -LiteralPath $rootResolved -Recurse -File -Include *.yaml,*.yml -ErrorAction SilentlyContinue |
          Where-Object { $_.FullName -notmatch '[\\/]Ephemeral[\\/]' }
        foreach ($c in $cand) {
          $head = Get-Content -LiteralPath $c.FullName -TotalCount 60 -ErrorAction SilentlyContinue
          if ($head -and ($head | Where-Object { $_ -match $pattern })) {
            $orchestrationPath  = $c.FullName
            $orchestrationFound = $true
            break
          }
        }
      }

      [ordered]@{
        executionId        = $executionId
        orchestrationName  = $orchestrationName
        orchestrationPath  = $orchestrationPath
        orchestrationFound = $orchestrationFound
        failedRunPath      = $failedRunPath
        overallStatus      = $overallStatus
        paramsJson         = $paramsJson
        failingSteps       = $failingSteps
        resultMd           = $resultMd
        sourceRoot         = $sourceRoot
      } | ConvertTo-Json -Depth 50 -Compress
    arguments:
      - "{{param.failedRun}}"
      - "{{param.runsRoot}}"
      - "{{param.sourceRoot}}"
      - "{{param.orchestrationsRoot}}"

  - name: read-failed-yaml
    type: Script
    shell: pwsh
    dependsOn: [locate-run]
    timeoutSeconds: 60
    script: |
      $ErrorActionPreference = 'Stop'
      $meta = $args[0] | ConvertFrom-Json -Depth 50
      $p = [string]$meta.orchestrationPath
      if (-not [string]::IsNullOrWhiteSpace($p) -and (Test-Path -LiteralPath $p)) {
        Get-Content -LiteralPath $p -Raw
      } else {
        'ORCHESTRATION_SOURCE_NOT_FOUND'
      }
    arguments:
      - "{{locate-run.output}}"

  - name: diagnose
    type: Prompt
    dependsOn: [locate-run, read-failed-yaml]
    timeoutSeconds: 300
    systemPrompt: |
      You are an expert Orchestra orchestration diagnostician. You are given
      evidence about a SINGLE failed orchestration run: the failing step names,
      their error messages and categories, the run's result.md, and the full
      current source YAML of the failed orchestration.

      Determine the ROOT CAUSE and a concrete FIX, and classify `fixTarget`:
        - "orchestration-yaml": the fix is an edit to the orchestration YAML shown.
        - "orchestra-source": the fix requires a change to the Orchestra engine or
          product source (not the YAML) - e.g. an engine bug, or an environmental
          issue such as a required MCP server not being connected.
        - "unknown": insufficient evidence to be confident.

      When `fixTarget` is "orchestration-yaml", `suggestedFix` MUST be specific and
      actionable: name the exact step(s) and field(s) to change and include a
      minimal before/after YAML snippet. Do NOT rewrite the whole file inside
      `suggestedFix`.

      OUTPUT CONTRACT: Output ONLY a raw JSON object - no markdown, no code
      fences, no commentary - with EXACTLY these fields:
        {
          "rootCause": "one or two sentences",
          "explanation": "detailed reasoning that cites the specific error(s)",
          "fixTarget": "orchestration-yaml | orchestra-source | unknown",
          "suggestedFix": "actionable fix, with a minimal before/after snippet when fixTarget is orchestration-yaml",
          "confidence": "high | medium | low"
        }
    userPrompt: |
      Failed orchestration evidence (JSON):
      {{locate-run.output}}

      Full current source YAML of the failed orchestration:
      {{read-failed-yaml.output}}

      Diagnose the failure and return the JSON object per the output contract.

  - name: persist-diagnosis
    type: Script
    shell: pwsh
    dependsOn: [diagnose, locate-run]
    timeoutSeconds: 60
    script: |
      $ErrorActionPreference = 'Stop'

      $diagRaw = [string]$args[0]
      $meta    = $args[1] | ConvertFrom-Json -Depth 50

      # Strip an optional ```lang ... ``` fence the model may have added.
      $clean = $diagRaw.Trim()
      if ($clean.StartsWith('```')) {
        $clean = [regex]::Replace($clean, '^```[a-zA-Z0-9]*\s*\r?\n', '')
        $clean = [regex]::Replace($clean, '\r?\n```\s*$', '')
      }

      try {
        $diagObj = $clean | ConvertFrom-Json -Depth 50
      } catch {
        $diagObj = [pscustomobject]@{
          rootCause    = '(model did not return valid JSON)'
          explanation  = $diagRaw
          fixTarget    = 'unknown'
          suggestedFix = ''
          confidence   = 'low'
        }
      }

      $out = [ordered]@{
        executionId        = [string]$meta.executionId
        orchestrationName  = [string]$meta.orchestrationName
        orchestrationPath  = [string]$meta.orchestrationPath
        orchestrationFound = [bool]$meta.orchestrationFound
        failedRunPath      = [string]$meta.failedRunPath
        overallStatus      = [string]$meta.overallStatus
        failingSteps       = $meta.failingSteps
        rootCause          = [string]$diagObj.rootCause
        explanation        = [string]$diagObj.explanation
        fixTarget          = [string]$diagObj.fixTarget
        suggestedFix       = [string]$diagObj.suggestedFix
        confidence         = [string]$diagObj.confidence
        createdAt          = (Get-Date).ToString('o')
      }

      $dir = Join-Path $env:LOCALAPPDATA ('OrchestraHost/diagnoses/' + $out.executionId)
      New-Item -ItemType Directory -Path $dir -Force | Out-Null
      $diagnosisPath = Join-Path $dir 'diagnosis.json'
      $enc = New-Object System.Text.UTF8Encoding($false)
      [System.IO.File]::WriteAllText($diagnosisPath, ($out | ConvertTo-Json -Depth 50), $enc)

      [ordered]@{ diagnosisPath = $diagnosisPath; diagnosis = $out } | ConvertTo-Json -Depth 50 -Compress
    arguments:
      - "{{diagnose.output}}"
      - "{{locate-run.output}}"

  - name: build-actionview-entry
    type: Script
    shell: pwsh
    dependsOn: [persist-diagnosis]
    timeoutSeconds: 60
    script: |
      $ErrorActionPreference = 'Stop'

      $pd   = $args[0] | ConvertFrom-Json -Depth 50
      $diag = $pd.diagnosis
      $diagnosisPath = [string]$pd.diagnosisPath

      $orchestrationName  = [string]$diag.orchestrationName
      $orchestrationPath  = [string]$diag.orchestrationPath
      $executionId        = [string]$diag.executionId
      $failedRunPath      = [string]$diag.failedRunPath
      $fixTarget          = [string]$diag.fixTarget
      $orchestrationFound = [bool]$diag.orchestrationFound

      $bt    = [string][char]96
      $fence = $bt * 3
      $md = New-Object System.Collections.Generic.List[string]
      $md.Add("## Diagnosis: $orchestrationName failed")
      $md.Add("")
      $md.Add("- Failed run: $executionId")
      $md.Add("- Status: $([string]$diag.overallStatus)")
      $md.Add("- Source file: $orchestrationPath")
      $md.Add("- Fix target: $fixTarget  |  Confidence: $([string]$diag.confidence)")
      $md.Add("")
      $md.Add("### Failing steps")
      $md.Add("")
      $md.Add("| Step | Category | Error |")
      $md.Add("|---|---|---|")
      foreach ($fs in @($diag.failingSteps)) {
        $e = ([string]$fs.error) -replace "\r?\n", ' '
        $e = $e -replace '\|', '\|'
        if ($e.Length -gt 300) { $e = $e.Substring(0,300) + ' [more]' }
        $md.Add("| $([string]$fs.name) | $([string]$fs.errorCategory) | $e |")
      }
      $md.Add("")
      $md.Add("### Root cause")
      $md.Add([string]$diag.rootCause)
      $md.Add("")
      $md.Add("### Explanation")
      $md.Add([string]$diag.explanation)
      $md.Add("")
      $md.Add("### Suggested fix")
      $md.Add($fence + "yaml")
      $md.Add([string]$diag.suggestedFix)
      $md.Add($fence)
      $md.Add("")
      $md.Add("Diagnosis artifact: $diagnosisPath")
      $body = ($md -join "`n")

      $actions = New-Object System.Collections.Generic.List[object]
      if ($orchestrationFound -and $fixTarget -eq 'orchestration-yaml') {
        # Build the ActionView '{{param.rerun}}' placeholder WITHOUT literal
        # double-braces so Orchestra's own templater does not touch this script.
        $open  = [string][char]123 + [string][char]123
        $close = [string][char]125 + [string][char]125
        $rerunPh = $open + 'param.rerun' + $close
        $applyArgs = @(
          'run', 'apply-orchestration-fix',
          '--param', ('diagnosisPath=' + $diagnosisPath),
          '--param', ('orchestrationName=' + $orchestrationName),
          '--param', ('orchestrationPath=' + $orchestrationPath),
          '--param', ('executionId=' + $executionId),
          '--param', ('failedRunPath=' + $failedRunPath),
          '--param', ('rerunAfterApply=' + $rerunPh),
          '--by', 'actionview-apply-fix'
        )
        $applyAction = [ordered]@{
          label          = 'Apply Fix'
          style          = 'primary'
          confirmMessage = "Launch apply-orchestration-fix to patch $orchestrationName. This edits the YAML in your working tree (no git commit)."
          parameters     = @(
            [ordered]@{
              name     = 'rerun'
              label    = "Also re-run $orchestrationName after applying the fix"
              type     = 'boolean'
              default  = 'false'
              helpText = 'Kicks off a background re-run of the fixed orchestration once the patch is written.'
            }
          )
          command   = [ordered]@{ type = 'cli'; program = 'orchestra'; args = $applyArgs }
          onSuccess = 'archive'
        }
        [void]$actions.Add($applyAction)
      }
      $dismiss = [ordered]@{
        label     = 'Dismiss'
        style     = 'default'
        command   = [ordered]@{ type = 'cli'; program = 'cmd'; args = @('/c', 'exit', '0') }
        onSuccess = 'archive'
      }
      [void]$actions.Add($dismiss)

      $entry = [ordered]@{
        schemaVersion = '1'
        type          = 'failed-orchestration-diagnosis'
        source        = 'diagnose-failed-orchestration-run'
        title         = "Diagnosis: $orchestrationName failed"
        subtitle      = "Run $executionId - $fixTarget fix ($([string]$diag.confidence) confidence)"
        severity      = 'high'
        icon          = 'stethoscope'
        tags          = @('diagnostics', 'self-healing', 'orchestra', $orchestrationName)
        groupId       = "diagnosis-$executionId"
        content       = @(
          [ordered]@{ type = 'markdown'; body = $body }
        )
        actions       = $actions.ToArray()
      }

      $dir = Split-Path -Parent $diagnosisPath
      $entryPath = Join-Path $dir 'actionview-entry.json'
      $enc = New-Object System.Text.UTF8Encoding($false)
      [System.IO.File]::WriteAllText($entryPath, ($entry | ConvertTo-Json -Depth 60), $enc)
      Write-Output $entryPath
    arguments:
      - "{{persist-diagnosis.output}}"

  - name: submit-actionview-entry
    type: Script
    shell: pwsh
    dependsOn: [build-actionview-entry]
    timeoutSeconds: 120
    script: |
      $ErrorActionPreference = 'Stop'
      $file = ([string]$args[0]).Trim()
      if ([string]::IsNullOrWhiteSpace($file) -or -not (Test-Path -LiteralPath $file)) {
        throw "ActionView entry file not found: '$file'"
      }
      & dnx ActionView.Cli --yes -- add --file $file
      if ($LASTEXITCODE -ne 0) { throw "ActionView.Cli add failed with exit code $LASTEXITCODE." }
      Write-Output "Submitted ActionView entry: $file"
    arguments:
      - "{{build-actionview-entry.output}}"

  - name: final-report
    type: Transform
    dependsOn: [persist-diagnosis, submit-actionview-entry]
    template: |
      # Failed Orchestration Diagnosis

      Diagnosis record:
      {{persist-diagnosis.output}}

      ActionView submission:
      {{submit-actionview-entry.output}}
