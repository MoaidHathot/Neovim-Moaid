# yaml-language-server: $schema=../schemas/orchestration.schema.json
name: run-self-healing
description: |
  Generic self-healing ephemeral orchestration runner.

  Given a natural-language task, this orchestration uses the existing
  `generate-orchestration-fast` meta-generator to create per-attempt ephemeral
  orchestrations under the watched workspace `Ephemeral/` directory, waits for
  filesystem-watcher discovery, invokes each attempt through the Orchestra
  data-plane MCP, and uses the Prompt agent loop to repair and retry failed
  attempts.

  This intentionally does not use the control-plane MCP. Registration is via
  the watched workspace directory only.
version: 1.0.0
tags: ["meta", "ephemeral", "self-healing", "system", "manual", "favorite"]
defaultModel: claude-opus-4.7-1m-internal
# Orchestration-level cap. Must hold the self-healing-controller step's
# timeoutSeconds (130000) plus a small buffer for validate-inputs (~60s)
# and format-output (Transform, ~ms). 132000 = 130000 + 2000s headroom.
# timeoutSeconds: 132000
timeoutSeconds: 0

variables:
  ephemeralDir: "{{orchestration.sourceDirectory}}/../Ephemeral"
  attemptNamePrefix: "ephemeral-{{orchestration.runId}}-attempt"

inputs:
  task:
    type: string
    description: |
      Natural-language description of the work to perform. The controller will
      generate an ephemeral child orchestration for this task, run it, and repair
      the generated orchestration if execution fails or misses the success
      criteria.
    required: true
    multiline: true
  parametersJson:
    type: string
    description: |
      JSON object of parameters to pass to each generated child orchestration.
      Example: {"projectPath":"P:/repo/app","dryRun":"true"}. Values should
      be strings because Orchestra passes child parameters as strings.
    required: false
    default: "{}"
    multiline: true
  successCriteria:
    type: string
    description: |
      Optional criteria the child output must satisfy even when the child
      orchestration reports success. If omitted, a successful child run is
      accepted as the final result.
    required: false
    multiline: true
  maxAttempts:
    type: number
    description: |
      Maximum generated-child attempts before returning a failed result.
      Keep this small; each attempt can launch long-running agents.
    required: false
    default: "3"
  childTimeoutSeconds:
    type: number
    description: |
      The top-level `timeoutSeconds:` value baked into each generated child
      orchestration (the child's own hard abort cap, enforced by its engine).

      The controller's wait window for `invoke_orchestration` sync calls is
      derived internally as `childTimeoutSeconds + 60s`. The 60s gap is the
      cleanup margin that lets the child finalize its run.json BEFORE the
      parent stops waiting — without it, the parent could time out first and
      kill the child mid-cleanup, producing ambiguous "cancelled by caller"
      records instead of clean `OrchestrationTimeout` cancellations.

      Total budget consumed per attempt is roughly:
        childTimeoutSeconds + 60 (wait buffer) + 600 (per-attempt overhead).
      Cross-check 2 in the validate-inputs script ensures
        maxAttempts * (childTimeoutSeconds + 660) <= self-healing-controller.timeoutSeconds.
    required: false
    default: "21600"

mcps:
  - name: orchestra
    type: remote
    endpoint: "{{server.url}}/mcp/data"
    # Resolved at execution time from validate-inputs.output.controllerMcpTimeoutSeconds.
    # The validate-inputs script emits this value as childWaitTimeoutSeconds + 300s slack,
    # so the Copilot MCP SDK's built-in ~3-minute request timeout (the "180-second cliff")
    # cannot prematurely abort the controller's sync invoke_orchestration call. The 300s
    # slack also keeps us under the host's mcpServer.defaultOrchestraInvokeTimeoutSeconds
    # cap (86400s in orchestra.json), so the server-side timeout-mismatch guardrail in
    # DataPlaneTools won't fire either.
    timeoutSeconds: "{{validate-inputs.output.controllerMcpTimeoutSeconds}}"

steps:
  - name: validate-inputs
    type: Script
    shell: pwsh
    parameters:
      - parametersJson
      - maxAttempts
      - childTimeoutSeconds
    timeoutSeconds: 60
    stdin: "{{param.parametersJson}}"
    script: |
      $ErrorActionPreference = 'Stop'

      $parametersRaw = [Console]::In.ReadToEnd()
      if ([string]::IsNullOrWhiteSpace($parametersRaw)) {
        $parametersRaw = '{}'
      }

      try {
        $parsedParameters = ConvertFrom-Json -InputObject $parametersRaw -NoEnumerate -ErrorAction Stop
      } catch {
        Write-Error "parametersJson must be a valid JSON object. $($_.Exception.Message)"
        exit 1
      }

      if ($null -eq $parsedParameters) {
        $parsedParameters = [pscustomobject]@{}
      }

      if ($parsedParameters -isnot [pscustomobject]) {
        Write-Error 'parametersJson must be a JSON object, not an array or scalar value.'
        exit 1
      }

      $maxAttempts = 0
      if (-not [int]::TryParse('{{param.maxAttempts}}', [ref]$maxAttempts)) {
        Write-Error "maxAttempts must be an integer. Received: {{param.maxAttempts}}"
        exit 1
      }
      if ($maxAttempts -lt 1 -or $maxAttempts -gt 10) {
        Write-Error "maxAttempts must be between 1 and 10. Received: $maxAttempts"
        exit 1
      }

      # Single user-facing timeout input: the child orchestration's own internal
      # abort cap. The parent's wait window for invoke_orchestration is derived
      # from this value by adding a fixed cleanup buffer below (see $waitBuffer).
      $childTimeoutSeconds = 0
      if (-not [int]::TryParse('{{param.childTimeoutSeconds}}', [ref]$childTimeoutSeconds)) {
        Write-Error "childTimeoutSeconds must be an integer. Received: {{param.childTimeoutSeconds}}"
        exit 1
      }
      if ($childTimeoutSeconds -lt 60 -or $childTimeoutSeconds -gt 86400) {
        Write-Error "childTimeoutSeconds must be between 60 and 86400 seconds (1 minute to 24 hours). Received: $childTimeoutSeconds"
        exit 1
      }

      # The parent's wait window for invoke_orchestration sync calls. Derived as
      # childTimeoutSeconds + cleanup buffer so that the child's own internal
      # timeout always fires FIRST, producing a clean OrchestrationTimeout
      # cancellation that the parent observes as a normal sync response. Without
      # this gap, the parent could time out first and produce ambiguous
      # "cancelled by caller" records while the child is still cleaning up.
      $waitBuffer = 60
      $childWaitTimeoutSeconds = $childTimeoutSeconds + $waitBuffer

      # The controller's outbound MCP transport timeout for /mcp/data. This is the
      # value the orchestra MCP entry's `timeoutSeconds` template resolves to.
      # We add a 300s slack on top of childWaitTimeoutSeconds so:
      #   - The Copilot MCP SDK's built-in ~3-minute request timeout never fires
      #     before the engine's own sync-invoke timeout (the well-known "180-second
      #     cliff" that caused parent run 51e217979157 to silently fail).
      #   - The DataPlaneTools server-side guardrail does not refuse the request
      #     with "timeout-mismatch" because (childWaitTimeoutSeconds + 60) <=
      #     controllerMcpTimeoutSeconds.
      $mcpTransportSlack = 300
      $controllerMcpTimeoutSeconds = $childWaitTimeoutSeconds + $mcpTransportSlack

      # Cross-check: keep the controller MCP timeout under the host's documented
      # mcpServer.defaultOrchestraInvokeTimeoutSeconds upper bound (currently 86400s
      # in orchestra.json) minus a 60s safety margin to satisfy the server-side
      # guardrail in DataPlaneTools.cs:140-170. We can't read the host config from
      # here, so the value is hard-coded; if you bump the host default, bump this
      # constant too.
      $hostDefaultInvokeTimeoutSeconds = 86400
      $hostMarginSeconds = 60
      $maxAllowedControllerMcpTimeoutSeconds = $hostDefaultInvokeTimeoutSeconds - $hostMarginSeconds
      if ($controllerMcpTimeoutSeconds -gt $maxAllowedControllerMcpTimeoutSeconds) {
        Write-Error ("Derived controllerMcpTimeoutSeconds ($controllerMcpTimeoutSeconds = " +
          "childTimeoutSeconds $childTimeoutSeconds + waitBuffer $waitBuffer + " +
          "mcpTransportSlack $mcpTransportSlack) exceeds the host's documented " +
          "mcpServer.defaultOrchestraInvokeTimeoutSeconds upper bound ($hostDefaultInvokeTimeoutSeconds) " +
          "minus the $hostMarginSeconds s safety margin. Lower childTimeoutSeconds, or raise " +
          "mcpServer.defaultOrchestraInvokeTimeoutSeconds in orchestra.json AND the " +
          "`\$hostDefaultInvokeTimeoutSeconds` constant in this script.")
        exit 1
      }

      # Cross-check: the full repair loop must fit inside the
      # self-healing-controller step's timeout.
      #
      # HAND-SYNC POINT: $controllerTimeoutSeconds below MUST equal the
      # self-healing-controller step's `timeoutSeconds:` value later in this
      # file. Orchestra's step-level timeoutSeconds is parsed as an int and
      # does NOT accept template expressions, so we can't reference this from
      # vars / param. If you change one, change the other.
      $controllerTimeoutSeconds = 130000
      $perAttemptOverheadSeconds = 600
      $totalBudget = $maxAttempts * ($childWaitTimeoutSeconds + $perAttemptOverheadSeconds)
      if ($totalBudget -gt $controllerTimeoutSeconds) {
        Write-Error ("Configuration exceeds the self-healing-controller step's budget: maxAttempts " +
          "($maxAttempts) * (childWaitTimeoutSeconds ($childWaitTimeoutSeconds = childTimeoutSeconds " +
          "$childTimeoutSeconds + ${waitBuffer}s buffer) + per-attempt overhead " +
          "($perAttemptOverheadSeconds)) = $totalBudget s, but the controller step is capped at " +
          "$controllerTimeoutSeconds s. Reduce maxAttempts, reduce childTimeoutSeconds, or raise " +
          "the controller step's timeoutSeconds in this file (and update the " +
          "`$controllerTimeoutSeconds` constant in this script to match).")
        exit 1
      }

      $normalizedParametersJson = $parsedParameters | ConvertTo-Json -Depth 50 -Compress
      if ([string]::IsNullOrWhiteSpace($normalizedParametersJson)) {
        $normalizedParametersJson = '{}'
      }

      # Emit BOTH the user-facing input (childTimeoutSeconds) and the derived
      # values (childWaitTimeoutSeconds, childOrchestrationTimeoutSeconds,
      # controllerMcpTimeoutSeconds) so the controller's system prompt can continue
      # to reference them by name at runtime without re-deriving the wait/orch split,
      # and so the `mcps[].timeoutSeconds` template on the orchestra MCP can resolve.
      #
      # childOrchestrationTimeoutSeconds is an alias for childTimeoutSeconds —
      # they're the same number under the new single-input shape, but the
      # alias preserves the semantic distinction ("the value baked into the
      # child YAML's top-level timeoutSeconds") for the system prompt.
      #
      # controllerMcpTimeoutSeconds is consumed by the orchestra MCP entry's
      # `timeoutSeconds` template at the top of this orchestration; it MUST
      # equal childWaitTimeoutSeconds + 300s slack so the Copilot SDK's built-in
      # ~3-minute MCP request timeout cannot fire before the engine's own
      # sync-invoke deadline (the cause of run 51e217979157's silent failure).
      [ordered]@{
        parametersJson                   = $normalizedParametersJson
        maxAttempts                      = $maxAttempts
        childTimeoutSeconds              = $childTimeoutSeconds
        childWaitTimeoutSeconds          = $childWaitTimeoutSeconds
        childOrchestrationTimeoutSeconds = $childTimeoutSeconds
        controllerMcpTimeoutSeconds      = $controllerMcpTimeoutSeconds
        ephemeralDir                      = '{{vars.ephemeralDir}}'
        attemptNamePrefix                = '{{vars.attemptNamePrefix}}'
        parentRunId                      = '{{orchestration.runId}}'
        startedAt                        = '{{orchestration.startedAt}}'
      } | ConvertTo-Json -Depth 5 -Compress

  - name: self-healing-controller
    type: Prompt
    dependsOn: [validate-inputs]
    mcps: [orchestra]
    skillDirectories:
      - ../../skills/authoring-orchestrations
    # HAND-SYNC POINT: this value MUST equal the $controllerTimeoutSeconds
    # constant inside the validate-inputs script body. Orchestra's step-level
    # timeoutSeconds is parsed as a plain int and does NOT accept template
    # expressions, so we can't extract this to a vars entry today. If you
    # change one, change the other.
    timeoutSeconds: 130000
    infiniteSessions:
      enabled: true
      backgroundCompactionThreshold: 0.85
      bufferExhaustionThreshold: 0.97
    systemPrompt: |
      You are a self-healing Orchestra meta-runner.

      You have access to the Orchestra data-plane MCP only. Do not use or rely
      on the control-plane MCP. Registration happens by saving YAML files under
      the watched workspace Ephemeral directory and waiting for discovery.

      Your job is to run a closed repair loop using the Prompt agent loop:

      1. For attempt N, derive:
         - orchestrationName = "<attemptNamePrefix>-N"
         - outputPath = "<ephemeralDir>/<orchestrationName>.yaml"
      2. Invoke `generate-orchestration-fast` through `invoke_orchestration` in
         synchronous mode. Pass:
         - description: a complete generation request for the current attempt
         - outputPath: the exact outputPath for this attempt
      3. The generation request MUST require the generated YAML to include:
         - `name:` exactly equal to orchestrationName
         - `tags:` exactly ["ephemeral", "temp", "self-healing"]
         - top-level `metadata:` with at least:
           metadata:
             ephemeral: true
             selfHealing: true
             parentRunId: "<parentRunId>"
             attempt: N
             createdAt: "<startedAt>"
         - no top-level scheduler, webhook, or loop trigger
         - no dependency on other orchestrations unless the task explicitly
           requires it
         - an orchestration-level `timeoutSeconds:` at the top level set
           to EXACTLY the integer value of `childOrchestrationTimeoutSeconds`
           from the validated runtime configuration (which is the same value
           the user passed as the `childTimeoutSeconds` input — the script
           emits both names for clarity). Do not pick your own value, do not
           round it, and do not change it between attempts. This is the
           child's own internal abort cap and is distinct from the parent's
           wait window.
      4. The generated child should declare and use typed inputs that match any
         keys in parametersJson when those values are relevant to the task.
      5. After generation, use `list_orchestrations` to verify the generated
         orchestration name is discoverable. If it is not yet listed, poll
         `list_orchestrations` a few times to absorb filesystem watcher latency.
         Do not invoke the generated attempt until it appears in the list.
      6. Invoke the generated orchestration through `invoke_orchestration` in
         synchronous mode with timeoutSeconds = childWaitTimeoutSeconds (the
         derived field on the validated runtime configuration; it equals
         childTimeoutSeconds + 60 internally) and parameters = parametersJson.

         The sync response's `stepResults` map carries per-step `status`,
         `content` (truncated to ~8000 chars by default), `errorMessage`,
         `savedFiles`, plus the `contentLength` / `truncated` / `hasRawContent`
         metadata flags. Read these directly — there is no need to follow up
         with another tool call just to see per-step error messages.

         If a step's content was truncated (`truncated: true`) and you need
         the full body, call `get_orchestration_step(executionId, stepName,
         length: -1)`. For very large outputs you can page with `offset`
         and `length`.
      7. If the child succeeds and the output satisfies successCriteria, stop
         and return a final JSON object with status "succeeded".
      8. If generation fails, child invocation fails, or the child succeeds but
         misses successCriteria, build a failureSummary from the data already
         present in the sync response:

           - `executionId`, `status`, top-level `error` / `errorMessage`,
             `completionReason`, and `cancellation` come straight from the
             response root.
           - Per-step failure detail is in `stepResults[<stepName>].errorMessage`.
             Use this directly; do not try to re-derive it by scanning the
             child's generated YAML or its final content.
           - If a specific failing step's `content` was truncated and you need
             the full body to diagnose, fetch it once with
             `get_orchestration_step(executionId, stepName, length: -1)`.

         When the failure is a cancellation, ALWAYS read the run's
         `cancellation` object (from `get_orchestration_status` or the
         `invoke_orchestration` sync response). Use it to classify the failure
         BEFORE deciding how to repair:
           - `kind == "McpRequestAborted"` (or response `error == "timeout-mismatch"`):
             this is a STRUCTURAL host/transport mismatch, not a child-design
             problem. The child orchestration itself was NOT necessarily wrong
             and may have been "almost done" (check `cancellation.progress`).
             DO NOT redesign the child to be smaller or faster — that is unlikely
             to fix it. Instead either lower `childTimeoutSeconds` for the next
             attempt, or report the structural mismatch in the failureSummary
             so the user can raise `mcps[].timeoutSeconds` on this controller's
             own MCP entry (or the host's `mcpServer.defaultOrchestraInvokeTimeoutSeconds`).
           - `kind == "External"` with `detail` containing "REST" or
             "cli" or "mcp:cancel_orchestration": user-driven cancel. Do not
             retry — return status "failed" immediately and surface the detail.
           - `kind == "External"` with `detail` containing "propagated from parent":
             your own controller was cancelled, which propagated to the child.
             Do not retry — the user wants you to stop.
           - `kind == "SyncInvokeTimeout"`: server-side wrapper timeout fired.
             The child design IS too slow for the requested wait window — either
             redesign the child to fit, or raise `childTimeoutSeconds`.
           - `kind == "OrchestrationTimeout"`: the child's own internal abort
             cap fired. Redesign the child to fit `childTimeoutSeconds`, or
             raise it for the next attempt.
           - Any other `kind`: treat as a child-design problem and continue
             with the normal repair loop.

         Always include `cancellation.kind`, `cancellation.detail`, and
         `cancellation.progress` (if present) in `failureSummary` so the next
         attempt's generation request and the final report carry full evidence.
         Populate `failureSummary` from the per-step `errorMessage` values
         directly; do not synthesize errors from heuristic content parsing.
      9. Build the next attempt's generation request from the original task,
         previous YAML, and failure evidence. State exactly what must be fixed.
      10. Repeat until success or maxAttempts is exhausted.
      11. RECOVERY — if your conversation has been compacted and your
          `attempts` history is incomplete (e.g., you cannot recall which
          ephemeral orchestrations you already spawned, or what their
          executionIds were), call `list_child_runs` with NO arguments. The
          data-plane MCP auto-scopes the response to YOUR own execution
          subtree via headers the engine stamps automatically on every
          outbound MCP request — you do not need to pass `parentExecutionId`
          or `rootExecutionId`. The response includes both active in-flight
          children (source: "active", with totalSteps / completedSteps /
          currentStep) and persisted terminal children (source: "persisted",
          with durationSeconds / failedStepName / errorMessage). Rebuild your
          `attempts[]` array from this before deciding whether to launch
          the next attempt.

      Use normal child-orchestration retry/loop mechanisms inside generated
      YAML when they are helpful for transient failures or local Prompt
      refinement. The outer repair loop is for changing the generated
      orchestration itself between attempts.

      Output only one JSON object, with this shape:
      {
        "status": "succeeded" | "failed",
        "parentRunId": "...",
        "finalAttempt": 1,
        "orchestrationName": "...",
        "executionId": "...",
        "result": "...",
        "attempts": [
          {
            "attempt": 1,
            "orchestrationName": "...",
            "outputPath": "...",
            "generationExecutionId": "...",
            "executionId": "...",
            "status": "succeeded|failed|criteria_failed|generation_failed|not_discovered",
            "failureSummary": null,
            "repairApplied": null
          }
        ]
      }

      MANDATORY status surfacing — read this carefully.
      Orchestra's engine does NOT inspect the content of your final JSON to determine
      whether this step succeeded or failed. By default it considers the step Succeeded
      as long as you produced a final assistant message. That means if you emit
      `"status": "failed"` in the JSON but do nothing else, the engine will record the
      WHOLE self-healing run as Succeeded — exactly the silent-failure mode that bit
      parent run 51e217979157.

      To prevent that:
      - Immediately BEFORE you emit your final JSON, when (and only when) your reported
        `"status"` is `"failed"`, you MUST call the `orchestra_set_status` engine tool
        with `status: "failed"` and a one-line `reason` that quotes the top-level
        `result` field. This is what flips the engine-level step status to Failed so
        the outer orchestration also reports Failed.
      - Do NOT call `orchestra_set_status` when your reported `"status"` is `"succeeded"`.
        The default Succeeded behavior is correct in that case and an explicit success
        call would be redundant.
      - Do NOT call `orchestra_set_status("no_action", ...)`. NoAction is a non-failure
        terminal that SKIPS downstream steps; for this controller, the only valid final
        states are succeeded (continue to format-output) and failed (also continue to
        format-output, but with the outer run marked Failed).
      - Call `orchestra_set_status` exactly once per run. After it returns, emit the
        final JSON object as your concluding assistant message.

      If all attempts fail, do not invent success. Return status "failed" with
      the complete attempt history and the best available final error summary,
      and remember to call `orchestra_set_status("failed", "<one-line summary>")`
      first.
    userPrompt: |
      Run this task through the self-healing ephemeral orchestration loop.

      Task:
      {{param.task}}

      Optional success criteria:
      {{param.successCriteria}}

      Validated runtime configuration:
      {{validate-inputs.output}}

      Pass the `parametersJson` object from the validated runtime configuration
      as parameters to each generated child invocation.

  - name: format-output
    type: Transform
    dependsOn: [self-healing-controller]
    template: |
      # Self-Healing Run Summary

      **Parent run ID:** {{orchestration.runId}}
      **Attempt prefix:** {{vars.attemptNamePrefix}}
      **Ephemeral directory:** {{vars.ephemeralDir}}

      ## Result

      ```json
      {{self-healing-controller.output}}
      ```
