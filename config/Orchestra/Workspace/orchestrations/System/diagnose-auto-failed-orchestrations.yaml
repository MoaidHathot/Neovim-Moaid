# yaml-language-server: $schema=https://raw.githubusercontent.com/MoaidHathot/orchestra/main/schemas/orchestration.schema.json
name: failed-orchestration-diagnoser
description: |
  Runs hourly. Queries the Orchestra host's /api/history endpoint for orchestration runs
  that failed in the last hour, GROUPS them by orchestration, then fans out to the
  companion child orchestration `diagnose-orchestration-failures` (one child per
  DISTINCT orchestration, not per run) so each orchestration's failures are diagnosed
  and rolled up into a single per-orchestration ActionView card instead of a fresh card
  per failed run.

  Each child fans out again to `diagnose-single-run` (one grandchild per failed run, so
  every failure is diagnosed in isolation), then dedupes the per-run diagnoses by a
  deterministic failure signature and merges them into the per-orchestration diagnosis
  LEDGER in Zakira.Exchange (category 'orchestration-diagnoses', key = orchestration
  name). The ActionView card is a pure projection of that ledger with per-failure
  Apply Fix / Mark fixed / Dismiss / Re-run / Revert buttons.

  Pattern mirrors PullRequests/pr-auto-reviewer.yaml (parent enumerates work items,
  dispatches one child per item via a forEach Orchestration step).

  # Companion orchestrations (all live in this System/ folder and register via the
  # workspace watcher):
  #   * `diagnose-orchestration-failures` - the per-orchestration child dispatched below.
  #     Receives { orchestrationName, failedRuns[] } plus { runsRoot, sourceRoot,
  #     orchestrationsRoot, dbPath }; produces the ledger merge + ActionView card.
  #   * `diagnose-single-run` - the per-run grandchild fanned out by that child.
  #   * `apply-orchestration-fix` - the human-approved target of the ActionView
  #     "Apply Fix" button (never auto-dispatched).

version: 1.1.0
tags: ["system", "diagnostics", "self-healing", "scheduled", "orchestra"]
defaultModel: claude-opus-4.8

variables:
  # Real on-disk run artifacts live under OrchestraHost/executions (NOT
  # Orchestra/runs, which does not exist on disk). The grandchild self-corrects
  # too, but keep this pointing at the correct location.
  runsRoot: "{{env.LOCALAPPDATA}}/OrchestraHost/executions"
  sourceRoot: "P:/github/Orchestra"
  # Root of orchestration YAMLs in the WATCHED DOTFILES workspace. Pinned to
  # XDG_CONFIG_HOME (never {{orchestration.sourceDirectory}}, which could point
  # at Orchestra's compiled internal copy) so any fix edits the dotfile source
  # and lets the watcher recompile the internal copy.
  orchestrationsRoot: "{{env.XDG_CONFIG_HOME}}/Orchestra/workspace/orchestrations"
  dbPath: "{{env.XDG_CONFIG_HOME}}/orchestra/zakira.db"
  lookbackMinutes: "70"

defaultRetryPolicy:
  maxRetries: 2
  backoffSeconds: 5
  backoffMultiplier: 2.0
  retryOnTimeout: true

defaultStepTimeoutSeconds: 900
timeoutSeconds: 17200

trigger:
  type: scheduler
  enabled: true
  intervalSeconds: 3600

steps:
  - name: fetch-failed-runs
    type: Script
    shell: pwsh
    timeoutSeconds: 60
    script: |
      # Pull recent failed runs from the Orchestra host's history API.
      # /api/history supports server-side status filtering via `statuses=failed`.
      # We then narrow to the last N minutes (lookback window slightly larger than
      # the hourly schedule interval so we never miss a failure that landed right
      # between two ticks).
      $ErrorActionPreference = 'Stop'

      $serverUrl = '{{server.url}}'.TrimEnd('/')
      $lookbackMinutes = [int]'{{vars.lookbackMinutes}}'
      $cutoff = (Get-Date).ToUniversalTime().AddMinutes(-1 * $lookbackMinutes)

      $uri = "$serverUrl/api/history?statuses=failed&limit=200"
      $resp = Invoke-RestMethod -Uri $uri -Method Get -TimeoutSec 30

      $runs = @()
      foreach ($r in @($resp.runs)) {
        if ($null -eq $r) { continue }
        $status = [string]$r.status
        if (-not $status.ToLowerInvariant().Contains('fail')) { continue }

        $tsRaw = $r.completedAt
        if ([string]::IsNullOrWhiteSpace([string]$tsRaw)) { $tsRaw = $r.startedAt }
        $ts = $null
        try { $ts = [datetimeoffset]::Parse([string]$tsRaw).UtcDateTime } catch { }
        if ($null -ne $ts -and $ts -lt $cutoff) { continue }

        $runs += [pscustomobject]@{
          executionId       = [string]$r.runId
          orchestrationName = [string]$r.orchestrationName
          runStatus         = $status
          startedAt         = [string]$r.startedAt
          completedAt       = [string]$r.completedAt
          errorMessage      = [string]$r.errorMessage
        }
      }

      # GROUP the failed runs by orchestration so each orchestration gets ONE
      # child (and therefore one aggregated ActionView card), not one child per
      # failed run. Each group carries its runs pre-serialized as a JSON array
      # string (failedRunsJson) so the child can feed them straight into its own
      # forEach without re-serialization ambiguity.
      #
      # ConvertTo-JsonArrayString ALWAYS yields a single-level JSON array string
      # for 0/1/N elements. We must NOT use `ConvertTo-Json -AsArray` here: with
      # -InputObject on an existing array it double-wraps to "[[...]]", which
      # would make the downstream forEach see a 1-element outer array and pass the
      # entire inner array as a single item (the classic bug this guards against).
      function ConvertTo-JsonArrayString {
        param($Items)
        $arr = @($Items)
        if ($arr.Count -eq 0) { return '[]' }
        return '[' + (($arr | ForEach-Object { ConvertTo-Json -InputObject $_ -Depth 50 -Compress }) -join ',') + ']'
      }

      $groups = @()
      foreach ($grp in ($runs | Group-Object -Property orchestrationName)) {
        $items = @($grp.Group)
        $groups += [pscustomobject]@{
          orchestrationName = [string]$grp.Name
          count             = $items.Count
          failedRunsJson    = (ConvertTo-JsonArrayString -Items $items)
        }
      }

      # Emit a JSON array STRING of GROUPS for the downstream gate + forEach.
      #   * EMPTY    -> literal "[]" (no failures in the window: the gate
      #                 calls orchestra_complete and the forEach is a no-op).
      #   * 1+ groups -> "[{orchestrationName,count,failedRunsJson},...]".
      ConvertTo-JsonArrayString -Items $groups

  - name: gate-any-failures
    type: Prompt
    dependsOn: [fetch-failed-runs]
    systemPrompt: |
      You are a gate for the failed-orchestration-diagnoser. Inspect the JSON array of
      failed-orchestration GROUPS from the previous step (each element is
      { orchestrationName, count, failedRunsJson }).

      If the array is empty (no failures in the lookback window), call orchestra_complete
      with status 'success' and a reason like 'No failed orchestration runs in the last
      {{vars.lookbackMinutes}} minutes. Nothing to diagnose.' This halts the run cleanly
      so no child orchestrations are dispatched and no summary is generated.

      Otherwise, output the JSON array UNCHANGED (no prose, no markdown, no fences) so
      the forEach dispatcher consumes it verbatim.

      Do not call any other tools. Do not write commentary in either branch.
    userPrompt: |
      Failed-orchestration groups:
      {{fetch-failed-runs.output}}

  - name: dispatch-diagnoses
    type: Orchestration
    dependsOn: [gate-any-failures]
    orchestration: diagnose-orchestration-failures
    forEach: "{{gate-any-failures.output}}"
    itemParameter: group
    parameters:
      runsRoot: "{{vars.runsRoot}}"
      sourceRoot: "{{vars.sourceRoot}}"
      orchestrationsRoot: "{{vars.orchestrationsRoot}}"
      dbPath: "{{vars.dbPath}}"
    mode: sync
    maxConcurrency: 3
    continueOnItemFailure: true
    timeoutSeconds: 6000

  - name: aggregate-diagnoses
    type: Script
    dependsOn: [dispatch-diagnoses]
    shell: pwsh
    script: |
      # Roll up the forEach rollup into a compact summary. The engine emits
      # { totalDispatched, succeeded, failed, results:[{ index, executionId, status,
      # errorMessage, finalContent, input, ... }] }. Each result is now ONE
      # orchestration group (not one run). We surface the per-orchestration
      # child's finalContent summary (which reports how many failures it merged
      # and whether it published/updated/cleared the card) plus its status.
      $ErrorActionPreference = 'Stop'

      $raw = $args[0]
      if ([string]::IsNullOrWhiteSpace($raw)) {
        '{"totalDispatched":0,"succeeded":0,"failed":0,"results":[]}'
        return
      }
      $rollup = ConvertFrom-Json -InputObject $raw -Depth 100

      $results = @()
      foreach ($r in @($rollup.results)) {
        $group = $null
        if ($r.input) {
          try {
            $group = if ($r.input -is [string]) { ConvertFrom-Json -InputObject $r.input -Depth 50 } else { $r.input }
          } catch { }
        }
        $childSummary = $null
        if ($r.finalContent) {
          try {
            $fc = if ($r.finalContent -is [string]) { ConvertFrom-Json -InputObject $r.finalContent -Depth 50 } else { $r.finalContent }
            $childSummary = $fc
          } catch { }
        }
        $results += [pscustomobject]@{
          orchestration      = if ($group) { [string]$group.orchestrationName } elseif ($childSummary) { [string]$childSummary.orchestrationName } else { $null }
          failedRunCount     = if ($group) { [int]$group.count } else { $null }
          diagnosisExecution = [string]$r.executionId
          diagnosisStatus    = [string]$r.status
          diagnosisError     = [string]$r.errorMessage
          cardAction         = if ($childSummary) { [string]$childSummary.action } else { $null }
          visibleFailures    = if ($childSummary) { [int]$childSummary.visibleFailures } else { $null }
          entryId            = if ($childSummary) { [string]$childSummary.entryId } else { $null }
        }
      }

      [pscustomobject]@{
        totalDispatched = [int]$rollup.totalDispatched
        succeeded       = [int]$rollup.succeeded
        failed          = [int]$rollup.failed
        results         = $results
      } | ConvertTo-Json -Depth 50 -Compress
    arguments:
      - "{{dispatch-diagnoses.output}}"

  - name: generate-summary
    type: Prompt
    dependsOn: [aggregate-diagnoses]
    systemPrompt: |
      You are a reporting assistant. Produce a concise markdown summary of this
      hourly failed-orchestration-diagnoser run for the operator's log.
    userPrompt: |
      Compose a final markdown report from the rollup below.

      Failed-orchestration groups detected:
      {{fetch-failed-runs.output}}

      Diagnosis dispatch rollup (one entry per orchestration):
      {{aggregate-diagnoses.output}}

      The report should include:
      1. Header `## Failed Orchestration Diagnoser Run` with current time.
      2. How many distinct orchestrations failed (and total failed runs) in the last
         {{vars.lookbackMinutes}} minutes.
      3. Per orchestration: its name, how many failed runs it had, the diagnosis child's
         executionId and status, the card action taken (published / updated / unchanged /
         cleared), and any diagnosis-child error.
       4. A note that there is now ONE ActionView card per orchestration (a stable,
          in-place-updated card listing that orchestration's distinct failures), and the
          user can review, Apply Fix, Mark fixed or Dismiss individual failures from it.
       5. Any dispatch failures and what to do about them.

  - name: enforce-run-status
    type: Script
    dependsOn: [generate-summary, aggregate-diagnoses]
    shell: pwsh
    # Hardening: dispatch-diagnoses uses continueOnItemFailure, so a child that
    # fails to dispatch (e.g. the companion orchestration is missing) or fails its
    # own diagnosis would otherwise leave this whole run reporting Succeeded -- the
    # exact "succeeded but nothing was diagnosed" symptom. This terminal gate fails
    # the run when any diagnosis child failed, AFTER the human summary + ActionView
    # entries have already been produced, so failures are surfaced not swallowed.
    script: |
      $ErrorActionPreference = 'Stop'
      $raw = [string]$args[0]
      if ([string]::IsNullOrWhiteSpace($raw)) {
        Write-Output 'No aggregate rollup to enforce.'
        return
      }
      $rollup = ConvertFrom-Json -InputObject $raw -Depth 100
      $failed = [int]$rollup.failed
      $total  = [int]$rollup.totalDispatched
      if ($failed -gt 0) {
        throw "failed-orchestration-diagnoser: $failed of $total diagnosis child run(s) failed (dispatch or diagnosis). See the run summary and ActionView. Failing the run so this is not silently swallowed."
      }
      Write-Output "All $total diagnosis child run(s) succeeded."
    arguments:
      - "{{aggregate-diagnoses.output}}"
