name: skill-sync
description: Runs the Zakira Conduit skill sync once per day at 14:00.
defaultModel: claude-opus-4.7-1m-internal
tags:
  - skill
  - system
trigger:
  type: scheduler
  cron: "0 14 * * *"
steps:
  - name: sync-skills
    type: Command
    command: dnx
    arguments:
      - Zakira.Conduit
      - "--yes"
      - "--"
      - sync