name: meeting-action-items-extractor
description: |
  Processes recent meetings to extract action items, decisions, follow-ups,
  and other trackable items. Uses the shared Calendar MCP to discover recent
  meetings, gathers meeting context from WorkIQ and the shared m365-copilot MCP,
  analyzes transcripts and other meeting-related evidence, deduplicates
  against previously extracted items via Zakira.Exchange, and saves results as
  structured markdown files plus ActionView notifications.
version: 1.1.0
tags: ["productivity", "meetings", "action-items", "WorkIQ", "MSFT", "auto", "ZTS"]
defaultModel: gpt-5.4

variables:
  lookBackHours: "8"
  actionItemsDir: '{{env.USERPROFILE}}\OneDrive - Microsoft\Notes\Obsidian\Work\OrcStra\Meeting Action Items'
  zakiraCategory: meeting-action-items-state
  myName: Moaid Hathot
  myAlias: moaid

defaultRetryPolicy:
  maxRetries: 2
  backoffSeconds: 5
  backoffMultiplier: 2.0
  retryOnTimeout: true

defaultStepTimeoutSeconds: 1200
timeoutSeconds: 10600

mcps:
  - name: workiq
    type: local
    command: npx
    arguments:
      - "-y"
      - "@microsoft/workiq"
      - mcp

  - name: zakira
    type: local
    command: dnx
    arguments:
      - Zakira.Exchange
      - "--yes"
      - "--"
      - mcp
      - "--category"
      - "{{vars.zakiraCategory}}"

trigger:
  type: scheduler
  enabled: true
  intervalSeconds: 28800

steps:
  - name: get-timezone
    type: Prompt
    systemPrompt: |
      You are a timezone resolution agent. Call the Calendar MCP tool
      GetUserDateAndTimeZoneSettings to resolve the user's current date,
      time, and IANA timezone. Do not call any other tools.
    userPrompt: |
      Use GetUserDateAndTimeZoneSettings to fetch the user's timezone settings.

      Then output ONLY a JSON object with these fields:
      {
        "currentDateTime": "<ISO-8601 in the user's local timezone>",
        "windowStartDateTime": "<currentDateTime - {{vars.lookBackHours}} hours, same format>",
        "timeZone": "<IANA name>"
      }

      Do not include any other text. Just the JSON object.
    mcps: [calendar]

  - name: discover-recent-meetings
    type: Prompt
    dependsOn: [get-timezone]
    systemPrompt: |
      You are a meeting discovery agent. Your job is to find all meetings from
      the last {{vars.lookBackHours}} hours using the shared Calendar MCP.

      Rules:
      1. Call ListCalendarView with the start and end times provided by the
         previous step (windowStartDateTime and currentDateTime in the user's
         IANA timezone)
      2. Include meetings I organized or attended: 1:1s, standups, reviews,
         design sessions, syncs, interviews, and ad hoc calls
      3. Exclude: cancelled meetings, focus time blocks, OOF blocks, and
         placeholder all-day events
      4. For each meeting, extract as much metadata as available:
         title, start time, end time, organizer, attendees, body/agenda,
         meeting link, recurrence info, and event id if available
      5. If there are ZERO meetings in the window, call orchestra_complete
         with status 'success' and reason 'No meetings in the last {{vars.lookBackHours}} hours'
      6. Output a JSON array of meeting objects
    userPrompt: |
      Timezone and window:
      {{get-timezone.output}}

      Use ListCalendarView from the shared Calendar MCP to query my calendar
      for the recent window above. Return each meeting with all available
      details.

      If no meetings are found, call orchestra_complete to end early.
    mcps: [calendar]

  - name: check-already-processed
    type: Prompt
    dependsOn: [discover-recent-meetings]
    systemPrompt: |
      You are a deduplication agent. Check which meetings have already been
      processed using Zakira.Exchange.

      Rules:
      1. For each meeting, generate a key: 'meeting-<date>-<normalized-title>'
         where date is YYYY-MM-DD-HHmm and normalized-title is lowercase with
         spaces replaced by hyphens, truncated to 50 chars
      2. Check Zakira.Exchange using get_memory for each key
      3. If a record exists with status 'processed', mark the meeting as 'skip'
      4. If no record exists or status is 'failed', mark as 'needs-processing'
      5. If ALL meetings are 'skip', call orchestra_complete with status
         'success' and reason 'All recent meetings already processed'
      6. Output JSON with: meetingsToProcess and meetingsSkipped arrays
    userPrompt: |
      Discovered recent meetings:
      {{discover-recent-meetings.output}}

      Check Zakira.Exchange to see which meetings have already been processed.
    mcps: [zakira]

  - name: gather-workiq-meeting-context
    type: Prompt
    dependsOn: [check-already-processed]
    systemPrompt: |
      You are a meeting context research agent using ONLY the WorkIQ MCP.

      For each meeting that needs processing, gather all useful evidence that
      can help identify action items or trackable outcomes.

      Search across:
      1. Meeting transcripts or transcript snippets if available
      2. Meeting recordings, recaps, or summaries if WorkIQ can surface them
      3. Follow-up emails related to the meeting
      4. Teams chats or channel threads related to the meeting
      5. Meeting notes or documents related to the discussed topic
      6. Previous occurrences of recurring meetings in the last 30 days

      For each meeting, capture:
      - transcript availability status: full|partial|none|unknown
      - transcript or recap content if available
      - supporting artifacts from email/chat/docs/past meetings
      - short notes on likely action items, decisions, follow-ups, blockers,
        or open questions suggested by the evidence

      Output JSON keyed by meeting identifier.
    userPrompt: |
      Meetings needing processing:
      {{check-already-processed.output}}

      I am {{vars.myName}} ({{vars.myAlias}}).

      Use WorkIQ to gather meeting transcripts when available, plus any other
      meeting-related evidence that can help identify action items or outcomes.
      Do not limit yourself to transcript-only evidence.
    mcps: [workiq]

  - name: gather-m365-copilot-meeting-context
    type: Prompt
    dependsOn: [check-already-processed]
    systemPrompt: |
      You are a meeting context research agent using ONLY the shared
      m365-copilot MCP.

      For each meeting that needs processing, gather all relevant meeting
      evidence, not just transcript text.

      Search across:
      1. Meeting transcript, recording recap, or AI-generated meeting summary
      2. Emails, Teams chats, documents, and shared files related to the meeting
      3. Follow-up messages after the meeting
      4. Previous occurrences or earlier notes for recurring meetings

      Prioritize content containing:
      - explicit or implicit action items
      - decisions made
      - unresolved questions
      - blockers, risks, or commitments

      Output JSON keyed by meeting identifier, including transcript/recap
      availability and the most relevant evidence per meeting.
    userPrompt: |
      Meetings needing processing:
      {{check-already-processed.output}}

      Use m365-copilot to gather meeting transcripts/recaps if available and
      any other relevant context that may contain action items or meeting
      outcomes. Do not rely on transcript-only evidence.
    mcps: [m365-copilot]

  - name: merge-meeting-context
    type: Prompt
    dependsOn:
      - check-already-processed
      - gather-workiq-meeting-context
      - gather-m365-copilot-meeting-context
    systemPrompt: |
      You are a context-merging agent. Merge WorkIQ and m365-copilot meeting
      evidence into one normalized context object per meeting for downstream
      extraction.

      Rules:
      1. For each meeting, merge and deduplicate evidence from both sources
      2. Prefer richer transcript/recap content when both sources provide the
         same artifact
      3. Keep source attribution on every merged item using a sources array
      4. Organize each meeting into these sections when present:
         - transcriptOrRecap
         - followUpEmails
         - teamsMessages
         - documentsAndNotes
         - priorMeetings
         - contextualSignals
      5. If the sources disagree materially, add a conflict note
      6. Output JSON keyed by meeting identifier with one merged object per meeting
    userPrompt: |
      Meetings needing processing:
      {{check-already-processed.output}}

      WorkIQ meeting context:
      {{gather-workiq-meeting-context.output}}

      m365-copilot meeting context:
      {{gather-m365-copilot-meeting-context.output}}

      Merge into a single deduplicated meeting context object per meeting.

  - name: extract-action-items
    type: Prompt
    dependsOn: [check-already-processed, merge-meeting-context]
    systemPrompt: |
      You are an expert meeting analyzer. Your job is to extract ALL
      actionable items, decisions, follow-ups, and trackable outcomes from the
      available meeting evidence.

      Important:
      - Use transcript or recap content when available
      - Also use related evidence such as follow-up emails, Teams chats,
        meeting notes, and prior-meeting context
      - Do NOT restrict the analysis to transcript-only findings
      - Every extracted item should be grounded in evidence from the provided context

      Extract the following categories:

      1. ACTION ITEMS
         - owner (name/alias or 'unassigned')
         - action description
         - deadline if mentioned
         - priority: high|medium|low
         - evidence snippet and source type
         - flag items assigned to ME ({{vars.myName}}/{{vars.myAlias}})

      2. DECISIONS MADE
         - decision
         - context/reasoning
         - who made or approved it if clear
         - evidence snippet and source type

      3. FOLLOW-UPS NEEDED
         - follow-up needed
         - owner if clear
         - why it is needed
         - timeframe if mentioned
         - evidence snippet and source type

      4. QUESTIONS & OPEN ITEMS
         - unresolved question or open issue
         - who raised it if clear
         - who might answer it if clear
         - urgency
         - evidence snippet and source type

      5. RISKS & CONCERNS
         - risk or concern
         - who raised it if clear
         - potential impact
         - mitigation if mentioned
         - evidence snippet and source type

      6. INFORMATION SHARED
         - key fact/update/announcement
         - relevance
         - evidence snippet and source type

      Rules:
      1. Process each meeting independently
      2. Be thorough -- implicit commitments count when they are grounded in evidence
      3. Distinguish my items vs others' items clearly
      4. Prefer exact wording from the evidence when possible
      5. If transcript content is missing, still extract from other reliable
         meeting-related context when supported
      6. For each meeting, save a structured JSON result using orchestra_save_file
         with extension 'json'
      7. Output a summary:
         {
           "meetings": [
             {
               "title": "...",
               "date": "...",
               "transcriptAvailability": "full|partial|none|unknown",
               "actionItemsCount": 0,
               "decisionsCount": 0,
               "followUpsCount": 0,
               "questionsCount": 0,
               "risksCount": 0,
               "myActionItemsCount": 0
             }
           ]
         }
    userPrompt: |
      Meetings to process:
      {{check-already-processed.output}}

      Merged meeting context:
      {{merge-meeting-context.output}}

      I am {{vars.myName}} (alias: {{vars.myAlias}}). Extract all action
      items, decisions, follow-ups, questions, risks, and key information.
      Pay special attention to items assigned to me or commitments I made.
    reasoningLevel: High

  - name: generate-markdown-reports
    type: Prompt
    dependsOn: [extract-action-items]
    systemPrompt: |
      You are a markdown report generator for meeting action items. Convert
      the extracted meeting results into well-formatted markdown files.

      For each meeting, generate a markdown file with this structure:

      # Meeting Notes: <Title>

      **Date:** <date/time>
      **Duration:** <duration if known>
      **Organizer:** <name if known>
      **Attendees:** <list if known>
      **Transcript/Recap Availability:** <full|partial|none|unknown>

      ---

      ## My Action Items
      <Items assigned to me, sorted by priority>
      - [ ] **[HIGH]** <description> *(deadline if any)*
      - [ ] **[MEDIUM]** <description>
      - [ ] **[LOW]** <description>

      ## All Action Items
      | Owner | Action | Priority | Deadline | Source |
      |-------|--------|----------|----------|--------|
      | ... | ... | ... | ... | ... |

      ## Decisions Made
      1. **<Decision>** - <context> *(source: <source type>)*

      ## Follow-Ups Needed
      - [ ] <follow-up> - *<owner>* *(source: <source type>)*

      ## Open Questions
      - <question> *(source: <source type>)*

      ## Risks & Concerns
      - **<risk>** - <impact> *(source: <source type>)*

      ## Key Information
      - <info point> *(source: <source type>)*

      ---
      *Extracted by meeting-action-items-extractor on <timestamp>*

      Rules:
      1. Use checkbox syntax (- [ ]) for action items and follow-ups so they're trackable in Obsidian
      2. Prioritize MY action items at the top, clearly separated
      3. Save each meeting's markdown file using orchestra_save_file with extension 'md'
      4. If a meeting had no significant items, still create a minimal file noting 'No action items identified'
      5. Output the list of saved files and a summary
    userPrompt: |
      Extracted action items data:
      {{extract-action-items.output}}

      Extracted files:
      {{extract-action-items.files}}

      I am {{vars.myName}}. Generate a markdown report for each meeting. Read
      the JSON files if needed using orchestra_read_file.

  - name: save-reports-to-disk
    type: Prompt
    dependsOn: [generate-markdown-reports]
    systemPrompt: |
      You are a file management agent. Copy the generated markdown reports to the designated directory.

      Rules:
      1. For each markdown file saved by generate-markdown-reports, read it using orchestra_read_file
      2. Save to the action items directory with filename: YYYY-MM-DD-<meeting-title-slug>.md
      3. The slug should be lowercase, spaces to hyphens, special chars removed, max 50 chars
      4. Ensure the target directory exists (create if needed using PowerShell)
      5. Report all saved file paths
    userPrompt: |
      Markdown report files:
      {{generate-markdown-reports.files}}

      Report summary:
      {{generate-markdown-reports.output}}

      Action items directory: {{vars.actionItemsDir}}

      Copy each report to the action items directory.

  - name: mark-meetings-processed
    type: Prompt
    dependsOn: [extract-action-items]
    systemPrompt: |
      You are a state management agent. Mark each processed meeting in
      Zakira.Exchange so we don't reprocess it.

      Rules:
      1. For each meeting that was processed, use Zakira.Exchange create_memory
      2. Key format: 'meeting-<date>-<normalized-title>'
      3. Data: { status: 'processed', processedAt: '<ISO timestamp>', meetingTitle: '<title>', meetingDate: '<date>', actionItemsCount: <N>, myActionItemsCount: <M>, orchestrationRunId: '{{orchestration.runId}}' }
      4. Report how many meetings were marked as processed
    userPrompt: |
      Extraction summary:
      {{extract-action-items.output}}

      Meetings processed:
      {{check-already-processed.output}}

      Mark each processed meeting in Zakira.Exchange.
    mcps: [zakira]

  - name: create-actionview-entry
    type: Prompt
    dependsOn: [extract-action-items, save-reports-to-disk]
    systemPrompt: |
      You are an ActionView entry generator. Create an ActionView entry
      summarizing the action items extracted from recent meetings.

      Entry requirements:
      - type: 'meeting-action-items'
      - source: 'meeting-action-items-extractor'
      - title: '<N> action items from <M> meetings' (focus on MY items count)
      - subtitle: 'You have <X> action items assigned to you'
      - severity: 'high' if I have high-priority action items, 'medium' otherwise
      - icon: 'list-checks'
      - tags: ['meetings', 'action-items', 'productivity']
      - pinned: true if I have high-priority action items
      - content:
        - An alert block (level: 'warning') listing my high-priority action items if any
        - A keyValue block: Total Meetings Processed, Total Action Items, My Action Items, Decisions Made, Open Questions
        - For each meeting, a section (type: 'section') with:
          - Meeting title as section title
          - A table of action items (Owner, Action, Priority, Source)
          - A markdown block with key decisions (if any)
        - A markdown block listing all follow-ups needed
      - groupId: Use current date YYYY-MM-DD
      - actions: Include a CLI action to open the action items directory

      Save the entry JSON using orchestra_save_file with extension 'json'.
    userPrompt: |
      Extraction summary:
      {{extract-action-items.output}}

      Extraction files:
      {{extract-action-items.files}}

      Saved report paths:
      {{save-reports-to-disk.output}}

      I am {{vars.myName}}. Create the ActionView entry. Highlight MY action
      items prominently. Save as JSON.

  - name: read-actionview-entry-file
    type: Script
    dependsOn: [create-actionview-entry]
    shell: pwsh
    script: |
      Get-Content -LiteralPath '{{create-actionview-entry.files[0]}}' -Raw
    timeoutSeconds: 60

  # First-class Orchestration step: launches actionview-submit in-process via the engine's
  # IChildOrchestrationLauncher. No MCP transport is involved, so the 3-minute MCP request
  # timeout does not apply. The step blocks until the child reaches a terminal state and
  # propagates failures as native step failures.
  - name: submit-actionview-entry
    type: Orchestration
    dependsOn: [read-actionview-entry-file]
    orchestration: actionview-submit
    parameters:
      entryJson: "{{read-actionview-entry-file.output}}"
    mode: sync
    timeoutSeconds: 600

  - name: generate-summary
    type: Prompt
    dependsOn: [discover-recent-meetings, check-already-processed, extract-action-items, save-reports-to-disk, mark-meetings-processed, submit-actionview-entry]
    systemPrompt: |
      You are a summary generator. Create a concise markdown summary of this extraction run.

      Include:
      1. How many meetings were discovered vs processed vs skipped
      2. Total action items extracted (total and mine)
      3. Total decisions, follow-ups, open questions found
      4. Whether transcripts/recaps were available broadly or extraction relied on other evidence
      5. File paths where reports were saved
      6. ActionView submission status
      7. Highlight my most important/urgent action items at the end
    userPrompt: |
      Meetings discovered:
      {{discover-recent-meetings.output}}

      Meetings to process / skip:
      {{check-already-processed.output}}

      Extraction summary:
      {{extract-action-items.output}}

      Saved reports:
      {{save-reports-to-disk.output}}

      Zakira state:
      {{mark-meetings-processed.output}}

      ActionView:
      {{submit-actionview-entry.output}}

      Generate a concise run summary. Emphasize what I need to act on.
