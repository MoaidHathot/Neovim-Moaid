# yaml-language-server: $schema=https://raw.githubusercontent.com/MoaidHathot/orchestra/main/schemas/orchestration.schema.json
name: meeting-action-items-extractor
description: |
  Scheduler + dispatcher for meeting action-items extraction. Every 8 hours
  it discovers recent meetings in the last 8 hours via the Calendar MCP,
  filters out ones whose canonical Zakira key already has a 'processed'
  record, then dispatches one synchronous `meeting-action-items-processor`
  child per remaining meeting via the Orchestra data-plane MCP. The child
  owns context gathering, action-items extraction, markdown rendering,
  disk write, and Zakira state. After all children complete, this parent
  aggregates counts and transcript availability, posts a single
  ActionView entry of type `meeting-action-items` (one entry per run)
  with severity based on failure and "my" high-priority counts, and
  emits a deterministic markdown summary.
version: 2.0.0
tags: ["productivity", "meetings", "action-items", "WorkIQ", "MSFT", "auto", "ZTS"]
defaultModel: claude-opus-4.7-1m-internal

metadata:
  owner: Moaid Hathot
  ownerAlias: moaid
  domain: productivity
  sla: best-effort
  schedule: "every 8h, 8h look-back"
  documentation: |
    Sibling per-meeting child orchestration:
    `meeting-action-items-processor.yaml`.
    ActionView template:
    `config/ActionView/templates/meeting-action-items.json`.
    Reusable submitter: `ActionView/actionview-submit.yaml`.

inputs:
  lookBackHours:
    type: string
    description: |
      Look-back window in hours from now. Default matches the scheduler
      cadence so every recently-finished meeting is seen exactly once.
    required: false
    default: "8"
  meetingFilter:
    type: string
    description: |
      Optional case-insensitive substring filter on the meeting title.
      When non-empty, only matching meetings are dispatched. Useful for
      manual reruns scoped to a specific meeting.
    required: false
    default: ""
  forceReprocess:
    type: boolean
    description: |
      When true, bypass the Zakira short-circuit for every dispatched
      meeting and re-extract action items even if a recent record
      exists.
    required: false
    default: "false"
  dryRun:
    type: boolean
    description: |
      When true, extract and render reports but skip disk saves, Zakira
      writes, and the ActionView submission. Useful for verifying the
      gather+extract logic without producing side effects.
    required: false
    default: "false"

variables:
  actionItemsDir: "{{env.USERPROFILE}}\\OneDrive - Microsoft\\Notes\\Obsidian\\Work\\OrcStra\\Meeting Action Items"
  zakiraCategory: meeting-action-items-state
  myName: Moaid Hathot
  myAlias: moaid
  organization: msazure
  project: One
  repository: ZTS
  actionViewGroupId: "action-items-{{orchestration.runId}}"

defaultRetryPolicy:
  maxRetries: 2
  backoffSeconds: 10
  backoffMultiplier: 2.0
  retryOnTimeout: true

defaultStepTimeoutSeconds: 1200
timeoutSeconds: 25200

mcps:
  - name: orchestra
    type: remote
    endpoint: "{{server.url}}/mcp/data"

  - name: zakira
    type: local
    command: dnx
    arguments:
      - Zakira.Exchange
      - "--yes"
      - "--"
      - "--db"
      - "{{env.XDG_CONFIG_HOME}}/orchestra/zakira.db"
      - mcp
      - "--category"
      - "{{vars.zakiraCategory}}"

trigger:
  type: scheduler
  enabled: true
  intervalSeconds: 28800

steps:
  - name: get-timezone
    type: Prompt
    systemPrompt: |
      You are a timezone resolution agent. Use the Calendar MCP tool
      `GetUserDateAndTimeZoneSettings` to resolve the user's current
      date, time, and configured time zone. Pass the value through
      verbatim — do not convert it to IANA, do not transform it in any
      way.
    userPrompt: |
      Use GetUserDateAndTimeZoneSettings to fetch the user's current
      timezone settings.

      Then output ONLY a JSON object with these fields:
      {
        "currentDateTime": "<ISO-8601 timestamp in the user's local timezone>",
        "windowStartDateTime": "<currentDateTime - {{param.lookBackHours}} hours, same format>",
        "timeZone": "<exact value of the timezone returned by the MCP (e.g. 'Pacific Standard Time')>"
      }

      Do not include any other text. Just the JSON object.
    outputHandlerPrompt: |
      Extract one valid JSON object only with the fields currentDateTime,
      windowStartDateTime, and timeZone. Strip markdown fences, prose,
      and trailing whitespace. Output only the JSON object.
    mcps: [calendar]

  - name: discover-recent-meetings
    type: Prompt
    dependsOn: [get-timezone]
    systemPrompt: |
      You are a meeting discovery agent. Use the Calendar MCP to find all
      meetings from the recent look-back window provided by the previous
      step.

      Rules:
      1. Call `ListCalendarView` with `windowStartDateTime` (start) and
         `currentDateTime` (end) from the timezone step, expressed in the
         user's configured timezone (passed through verbatim).
      2. Include meetings I organized or attended: 1:1s, standups,
         reviews, design sessions, syncs, interviews, ad-hoc calls.
      3. Exclude cancelled events, focus-time blocks, OOF blocks, and
         all-day placeholder events.
      4. For EVERY meeting, capture all of the following fields. The
         downstream Script step REQUIRES at least one of (eventId,
         iCalUId+occurrenceStart, startTime+title) per meeting in order
         to compute a canonical Zakira key. Capture as many as the API
         exposes:
         - `eventId`        : the calendar event id (Graph `id`).
         - `iCalUId`        : the iCalendar UID (Graph `iCalUId`).
         - `occurrenceStart`: ISO-8601 start of this instance (use start.dateTime).
         - `title`          : the event subject.
         - `startTime`      : ISO-8601 start.
         - `endTime`        : ISO-8601 end.
         - `timeZone`       : start.timeZone if exposed, else inherit the user's TZ.
         - `organizer`      : organizer display name.
         - `attendees`      : array of attendee display names.
         - `description`    : bodyPreview or first ~500 chars of body.
         - `webLink`        : canonical event URL.
         - `recurrence`     : recurrence object if present, else null.
      5. Apply the meetingFilter (case-insensitive substring match on
         title) when non-empty. Otherwise keep every meeting.
      6. If zero meetings remain after filtering, call
         orchestra_complete with status 'success' and reason 'No
         meetings in the last {{param.lookBackHours}} hours' (substitute
         the filter clause when relevant).
      7. Output a single JSON array of meeting objects. No prose, no
         fences.
    userPrompt: |
      Timezone and window:
      {{get-timezone.output}}

      Look-back hours: {{param.lookBackHours}}
      Meeting filter (substring, empty = no filter): "{{param.meetingFilter}}"

      Enumerate calendar events in the look-back window with every field
      listed in your system prompt. Return a JSON array.
    outputHandlerPrompt: |
      Extract one valid JSON array only. Strip markdown fences, prose,
      and trailing whitespace. Preserve every field returned by the
      calendar MCP. Output only the JSON array.
    mcps: [calendar]

  - name: normalize-meetings-array
    type: Script
    dependsOn: [discover-recent-meetings]
    shell: pwsh
    script: |
      $ErrorActionPreference = 'Stop'

      function Get-OptionalProperty {
        param($Object, [Parameter(Mandatory)][string]$Name)
        if ($null -eq $Object) { return $null }
        $prop = $Object.PSObject.Properties[$Name]
        if ($null -eq $prop) { return $null }
        return $prop.Value
      }

      function Get-JsonCandidate {
        param([Parameter(Mandatory)][string]$Text)
        $trimmed = $Text.Trim()
        if ($trimmed.StartsWith('```')) {
          $lines = @($trimmed -split "`r?`n")
          if ($lines.Count -gt 1) {
            $trimmed = ($lines[1..($lines.Count - 1)] -join "`n").Trim()
            if ($trimmed.EndsWith('```')) {
              $trimmed = $trimmed.Substring(0, $trimmed.Length - 3).Trim()
            }
          }
        }
        $start = -1
        for ($i = 0; $i -lt $trimmed.Length; $i++) {
          if ($trimmed[$i] -eq '{' -or $trimmed[$i] -eq '[') { $start = $i; break }
        }
        if ($start -lt 0) { throw 'No JSON object or array was found in discover-recent-meetings output.' }
        return $trimmed.Substring($start)
      }

      function Get-Slug {
        param([string]$Value, [int]$MaxLength = 50)
        if ([string]::IsNullOrWhiteSpace($Value)) { return '' }
        $lower = $Value.ToLowerInvariant()
        $cleaned = [regex]::Replace($lower, '[^a-z0-9]+', '-').Trim('-')
        if ($cleaned.Length -gt $MaxLength) {
          $cleaned = $cleaned.Substring(0, $MaxLength).TrimEnd('-')
        }
        return $cleaned
      }

      function Get-ShortHash {
        param([Parameter(Mandatory)][string]$Value, [int]$Length = 8)
        $bytes = [System.Text.Encoding]::UTF8.GetBytes($Value)
        $sha = [System.Security.Cryptography.SHA1]::Create()
        try {
          $hashBytes = $sha.ComputeHash($bytes)
        } finally {
          $sha.Dispose()
        }
        $hex = ($hashBytes | ForEach-Object { $_.ToString('x2') }) -join ''
        if ($Length -gt $hex.Length) { return $hex }
        return $hex.Substring(0, $Length)
      }

      function ConvertTo-UtcTimestampString {
        param($Value)
        if ($null -eq $Value) { return $null }
        $text = [string]$Value
        if ([string]::IsNullOrWhiteSpace($text)) { return $null }
        try {
          $parsed = [datetimeoffset]::Parse($text, [System.Globalization.CultureInfo]::InvariantCulture)
          return $parsed.UtcDateTime.ToString('yyyyMMddHHmm', [System.Globalization.CultureInfo]::InvariantCulture)
        } catch {
          return $null
        }
      }

      $raw = $args[0]
      if ([string]::IsNullOrWhiteSpace($raw)) {
        throw 'discover-recent-meetings output is empty.'
      }

      $candidate = Get-JsonCandidate -Text $raw
      $list = ConvertFrom-Json -InputObject $candidate -NoEnumerate -ErrorAction Stop

      $enriched = New-Object System.Collections.Generic.List[object]
      foreach ($m in @($list)) {
        if ($null -eq $m) { continue }

        $eventId         = [string](Get-OptionalProperty $m 'eventId')
        $iCalUId         = [string](Get-OptionalProperty $m 'iCalUId')
        $occurrenceStart = Get-OptionalProperty $m 'occurrenceStart'
        $title           = [string](Get-OptionalProperty $m 'title')
        $startTime       = Get-OptionalProperty $m 'startTime'
        $organizer       = [string](Get-OptionalProperty $m 'organizer')
        $attendeesRaw    = Get-OptionalProperty $m 'attendees'

        $attendees = @()
        if ($null -ne $attendeesRaw) {
          $attendees = @(@($attendeesRaw) | ForEach-Object { [string]$_ })
        }

        $occurrenceStamp = ConvertTo-UtcTimestampString $occurrenceStart
        if (-not $occurrenceStamp) { $occurrenceStamp = ConvertTo-UtcTimestampString $startTime }
        $titleSlug = Get-Slug -Value $title -MaxLength 50

        $zakiraKey = $null
        $zakiraKeyStrategy = $null

        if (-not [string]::IsNullOrWhiteSpace($eventId)) {
          $zakiraKey = "meeting-$eventId"
          $zakiraKeyStrategy = 'eventId'
        } elseif (-not [string]::IsNullOrWhiteSpace($iCalUId) -and $occurrenceStamp) {
          $zakiraKey = "meeting-icaluid-$iCalUId-$occurrenceStamp"
          $zakiraKeyStrategy = 'iCalUId+occurrenceStart'
        } elseif ($occurrenceStamp) {
          $hashInput = ($title + '|' + $organizer + '|' + ($attendees -join ','))
          $shortHash = Get-ShortHash -Value $hashInput -Length 8
          $slugForKey = if ([string]::IsNullOrWhiteSpace($titleSlug)) { 'untitled' } else { $titleSlug }
          $zakiraKey = "meeting-$occurrenceStamp-$slugForKey-$shortHash"
          $zakiraKeyStrategy = 'timestamp+slug+hash'
        } else {
          # Skip meetings we cannot uniquely key.
          continue
        }

        $enrichedObj = [ordered]@{}
        foreach ($p in $m.PSObject.Properties) {
          $enrichedObj[$p.Name] = $p.Value
        }
        $enrichedObj['zakiraKey'] = $zakiraKey
        $enrichedObj['zakiraKeyStrategy'] = $zakiraKeyStrategy
        $enrichedObj['titleSlug'] = $titleSlug
        [void]$enriched.Add([pscustomobject]$enrichedObj)
      }

      $arr = $enriched.ToArray()
      $arr | ConvertTo-Json -Depth 50 -Compress -AsArray
    arguments:
      - "{{discover-recent-meetings.output}}"
    timeoutSeconds: 120

  - name: filter-already-processed
    type: Prompt
    dependsOn: [normalize-meetings-array]
    systemPrompt: |
      You are a state checker for meeting action-items extraction. Use
      Zakira.Exchange to decide which of the enriched meetings still
      need processing.

      Rules:
      1. The canonical Zakira key is already computed on each meeting as
         `zakiraKey`. Use it verbatim — do not invent or transform keys.
      2. For each meeting, call Zakira.Exchange `get_memory` with the
         exact `zakiraKey`.
      3. If `forceReprocess` (passed via the user prompt) is the string
         'true', mark every meeting as `needs-processing` regardless of
         stored state.
      4. Otherwise:
         - If a memory exists with status 'processed', mark the meeting
           as `skip` and include the stored processedAt in the result.
         - Otherwise mark as `needs-processing`.
      5. If ALL meetings are `skip`, call orchestra_complete with status
         'success' and reason 'All recent meetings already processed.'
      6. Output a single JSON object:
         {
           "meetingsToProcess": [ <enriched meeting object>, ... ],
           "meetingsSkipped": [
             { "zakiraKey": "...", "title": "...", "startTime": "...", "processedAt": "..." },
             ...
           ]
         }
      7. Preserve every original field on each meeting object you pass
         through into `meetingsToProcess`. The downstream dispatcher
         needs the full payload.
    userPrompt: |
      Enriched meetings (each has a canonical `zakiraKey`):
      {{normalize-meetings-array.output}}

      forceReprocess flag: {{param.forceReprocess}}

      Look up Zakira.Exchange for each `zakiraKey` and produce the
      split JSON object described above.
    outputHandlerPrompt: |
      Extract one valid JSON object only with the keys
      `meetingsToProcess` and `meetingsSkipped`. Strip markdown fences,
      prose, and trailing whitespace. Output only the JSON object.
    mcps: [zakira]

  - name: dispatch-processor
    type: Orchestration
    dependsOn: [filter-already-processed]
    orchestration: meeting-action-items-processor
    forEach: "{{filter-already-processed.output}}"
    forEachPath: meetingsToProcess
    itemParameter: meetingData
    parameters:
      actionItemsDir: "{{vars.actionItemsDir}}"
      forceReprocess: "{{param.forceReprocess}}"
      dryRun: "{{param.dryRun}}"
      zakiraCategory: "{{vars.zakiraCategory}}"
      myName: "{{vars.myName}}"
      myAlias: "{{vars.myAlias}}"
      organization: "{{vars.organization}}"
      project: "{{vars.project}}"
      repository: "{{vars.repository}}"
    mode: sync
    maxConcurrency: 4
    continueOnItemFailure: true
    timeoutSeconds: 3000

  - name: aggregate-dispatch
    type: Script
    dependsOn: [dispatch-processor]
    shell: pwsh
    script: |
      # Deterministic aggregator over the engine forEach rollup. The engine emits
      # {totalDispatched, succeeded, failed, results:[{index, executionId, status,
      # errorMessage, finalContent, input, ...}]}. Each successful child's
      # finalContent is the JSON object emitted by the child's emit-child-result
      # Transform step (status, dryRun, runId, meeting, extracted, report, save, zakira).
      # We aggregate counts and surface transcript buckets so downstream steps stay
      # off the LLM path.
      $ErrorActionPreference = 'Stop'

      $raw = $args[0]
      if ([string]::IsNullOrWhiteSpace($raw)) {
        throw 'dispatch-processor output is empty.'
      }
      $rollup = ConvertFrom-Json -InputObject $raw -Depth 100 -ErrorAction Stop

      $results = @()
      $transcripts = @{ full = 0; partial = 0; none = 0; unknown = 0 }
      $counts = [ordered]@{
        actionItems = 0; myActionItems = 0; myHighPriority = 0;
        decisions = 0; followUps = 0; questions = 0; risks = 0; information = 0;
      }
      # Snapshot the canonical key list once so per-iteration enumeration cannot
      # collapse to a scalar string (which previously caused
      # `Keys.ToArray()` to be invoked on a System.String).
      $countKeys = @('actionItems','myActionItems','myHighPriority','decisions','followUps','questions','risks','information')

      foreach ($r in @($rollup.results)) {
        $title = $null; $startTime = $null; $organizer = $null; $attendeesCount = 0
        $filePath = ''; $webLink = ''; $transcriptAvailability = 'unknown'
        $itemCounts = [ordered]@{
          actionItems = 0; myActionItems = 0; myHighPriority = 0;
          decisions = 0; followUps = 0; questions = 0; risks = 0; information = 0;
        }
        $summary = ''
        $errorMsg = $r.errorMessage

        # Decode the per-item input (the meeting object the parent passed in).
        if ($r.input) {
          try {
            $inputObj = if ($r.input -is [string]) { ConvertFrom-Json -InputObject $r.input -Depth 50 } else { $r.input }
            $title = $inputObj.title
            $startTime = $inputObj.startTime
            $organizer = $inputObj.organizer
            if ($inputObj.attendees) { $attendeesCount = @($inputObj.attendees).Count }
            if ($inputObj.webLink) { $webLink = $inputObj.webLink }
          } catch { }
        }

        # Decode the child's finalContent. The launcher wraps each terminal step
        # as `[<stepName>]\n<content>` joined by `\n---\n` (historical shape). We
        # strip that wrapper for the `emit-child-result` segment before parsing.
        if ($r.status -eq 'succeeded' -and $r.finalContent) {
          try {
            $rawFc = [string]$r.finalContent
            $segments = $rawFc -split "`n---`n"
            $emitJson = $null
            foreach ($seg in $segments) {
              if ($seg.StartsWith('[emit-child-result]')) {
                $nl = $seg.IndexOf("`n")
                if ($nl -ge 0) { $emitJson = $seg.Substring($nl + 1) }
                break
              }
            }
            if (-not $emitJson) {
              # Fallback: try to parse the whole finalContent verbatim, then the
              # first segment. Some callers may have already stripped the wrapper.
              if ($rawFc.TrimStart().StartsWith('{')) { $emitJson = $rawFc }
              elseif ($segments.Count -gt 0) {
                $first = $segments[0]
                $nl = $first.IndexOf("`n")
                if ($nl -ge 0 -and $first.StartsWith('[')) { $emitJson = $first.Substring($nl + 1) }
                else { $emitJson = $first }
              }
            }

            $childObj = ConvertFrom-Json -InputObject $emitJson -Depth 100 -ErrorAction Stop
            if ($childObj.extracted) {
              $extracted = $childObj.extracted
              if ($extracted.transcriptAvailability) { $transcriptAvailability = [string]$extracted.transcriptAvailability }
              if ($extracted.counts) {
                foreach ($k in $countKeys) {
                  $v = $extracted.counts.$k
                  if ($null -ne $v) { $itemCounts[$k] = [int]$v }
                }
              }
            }
            if ($childObj.save -and $childObj.save.filePath) { $filePath = [string]$childObj.save.filePath }
          } catch {
            $errorMsg = "Failed to parse child finalContent: $_"
          }
        }

        # Roll up totals only for successful children — failed ones get zero counts
        # so the parent's downstream summary is not skewed by partial extractions.
        if ($r.status -eq 'succeeded') {
          foreach ($k in $countKeys) { $counts[$k] += [int]$itemCounts[$k] }
          switch ($transcriptAvailability) {
            'full'    { $transcripts['full']    += 1 }
            'partial' { $transcripts['partial'] += 1 }
            'none'    { $transcripts['none']    += 1 }
            default   { $transcripts['unknown'] += 1 }
          }
        }

        $results += [pscustomobject]@{
          title                  = $title
          startTime              = $startTime
          organizer              = $organizer
          attendeesCount         = $attendeesCount
          executionId            = $r.executionId
          status                 = $r.status
          filePath               = $filePath
          webLink                = $webLink
          transcriptAvailability = $transcriptAvailability
          counts                 = $itemCounts
          summary                = $summary
          error                  = $errorMsg
        }
      }

      [pscustomobject]@{
        totalDispatched = [int]$rollup.totalDispatched
        succeeded       = [int]$rollup.succeeded
        failed          = [int]$rollup.failed
        results         = $results
        rollup          = $counts
        transcripts     = $transcripts
      } | ConvertTo-Json -Depth 50 -Compress
    arguments:
      - "{{dispatch-processor.output}}"
    timeoutSeconds: 120

  - name: gate-noteworthy-activity
    type: Prompt
    dependsOn: [aggregate-dispatch]
    systemPrompt: |
      You are a noise filter for the meeting-action-items run. Decide
      whether this scheduler tick produced anything worth surfacing to
      ActionView.

      Read the dispatcher summary JSON. The run is "noteworthy" only if
      at least one child processor succeeded (`succeeded > 0`) OR at
      least one child failed (`failed > 0`). Both signal real activity
      that warrants a notification.

      If the run is NOT noteworthy (every dispatched processor was a
      no-op or the dispatcher itself early-completed), call
      orchestra_complete with status 'success' and a reason like 'All
      <N> dispatched processors reported no actionable activity;
      skipping ActionView entry.'

      If the run IS noteworthy, output the dispatcher summary JSON
      verbatim (no prose, no markdown fences) so the downstream entry
      generator can consume it.

      Do not call any other tools.
    userPrompt: |
      Decide whether this meeting-action-items run is noteworthy enough
      to surface in ActionView.

      Dispatcher summary:
      {{aggregate-dispatch.output}}
    outputHandlerPrompt: |
      When continuing, output the dispatcher summary JSON object
      verbatim with no prose or fences. Otherwise (early-completion
      path), preserve the orchestra_complete reason text. Output only
      the relevant content.

  - name: create-actionview-entry
    type: Prompt
    dependsOn: [gate-noteworthy-activity, filter-already-processed, discover-recent-meetings]
    systemPrompt: |
      You generate ActionView entries for the meeting-action-items
      orchestration. The actionview skill (`skills/actionview`) has been
      loaded — consult it for the entry schema and content-block
      reference. The entry `type` must be exactly `meeting-action-items`
      so the ActionView template with the same name normalises it;
      `source` must be `{{orchestration.name}}`.

      Required entry shape (the `meeting-action-items` template
      documents the expected content blocks):

      - type: `meeting-action-items`
      - source: `{{orchestration.name}}`
      - title: `<succeeded> meeting(s), <rollup.myActionItems> action item(s) for me`
      - subtitle: `<rollup.actionItems> total / <rollup.decisions> decisions / <rollup.followUps> follow-ups`
      - severity: 'high' if `failed > 0` OR `rollup.myHighPriority > 0`; otherwise 'medium'
      - icon: `list-checks`
      - tags: ['meetings', 'action-items', 'productivity']
      - pinned: true when `rollup.myHighPriority > 0`
      - content (ordered):
        1. Optional `alert` block (level 'warning') labelled
           'My High-Priority Items' when `rollup.myHighPriority > 0`,
           listing those items.
        2. `keyValue` block labelled 'Run Overview' with keys: Window
           (e.g. '8h'), Discovered (count from discover step), Processed
           (succeeded), Skipped (from filter step), Failed (failed
           count), Transcripts (e.g. '3 full / 1 partial / 2 none / 0
           unknown').
        3. `keyValue` block labelled 'Action Items Rollup' with keys:
           Total Action Items, My Action Items, Decisions, Follow-Ups,
           Open Questions.
        4. `table` block labelled 'Meetings' with columns: Time, Title,
           Organizer, My Items, Action Items, Decisions, Transcript,
           Report File. One row per succeeded meeting.
        5. A `section` titled 'Per-Meeting Details' containing one
           nested section per succeeded meeting:
             - `keyValue` 'Meeting' with Time, Organizer, Attendees
               (count), Transcript (availability).
             - `markdown` 'My Action Items' with up to 3 bulleted points
               (priority + action + deadline) when the meeting has my
               items; omit otherwise.
             - `table` 'All Action Items' with columns Owner, Action,
               Priority, Deadline, Source — only when the meeting has
               action items.
             - `markdown` 'Decisions' / 'Follow-Ups' / 'Open Questions'
               when present (omit empty ones).
             - `link` 'Open Report' to `filePath` (use a `file://` URL).
             - `link` 'Meeting Link' to the meeting's `webLink` when
               present.
        6. A `section` titled 'Failed Dispatches' when `failed > 0`,
           listing failed meetings with their error messages.
        7. Optional `markdown` 'Run Notes' summarising anything else
           (e.g. transcripts missing on most meetings).
      - actions: leave empty (the template documents 'Open Action Items
        Folder' and 'Dismiss' as expected actions; commands are not
        required for those at submission time).

      Rules:
      1. Save the complete entry JSON using orchestra_save_file with
         extension 'json'. The downstream Script reads that file.
      2. Output only the JSON entry (no prose, no fences). The saved
         file content and the step output must match.
      3. Use canonical URLs from the dispatcher results. Do not invent
         URLs. If a report file path is empty (dry-run), omit the
         'Open Report' link for that meeting.
    userPrompt: |
      Dispatcher summary (post-gate, includes rollup and transcripts):
      {{gate-noteworthy-activity.output}}

      Filter summary (for skipped counts):
      {{filter-already-processed.output}}

      Discovery output (total discovered count):
      {{discover-recent-meetings.output}}

      Run parameters:
        Window          : {{param.lookBackHours}} hours
        forceReprocess  : {{param.forceReprocess}}
        dryRun          : {{param.dryRun}}

      Build the ActionView entry per your system prompt and save it via
      orchestra_save_file.
    outputHandlerPrompt: |
      Output one valid JSON object only — the ActionView entry. Strip
      markdown fences, prose, and trailing whitespace. The output must
      match the file you saved via orchestra_save_file.
    skillDirectories:
      - "{{orchestration.sourceDirectory}}/../../skills/actionview"

  - name: read-actionview-entry-file
    type: Script
    dependsOn: [create-actionview-entry]
    shell: pwsh
    script: |
      Get-Content -LiteralPath '{{create-actionview-entry.files[0]}}' -Raw
    timeoutSeconds: 60

  # First-class Orchestration step: launches actionview-submit in-process
  # via the engine's IChildOrchestrationLauncher. No MCP transport is
  # involved, so the 3-minute MCP request timeout does not apply. The
  # step blocks until the child reaches a terminal state and propagates
  # failures as native step failures.
  - name: submit-actionview-entry
    type: Orchestration
    dependsOn: [read-actionview-entry-file]
    orchestration: actionview-submit
    parameters:
      entryJson: "{{read-actionview-entry-file.output}}"
      template: meeting-action-items
      groupId: "{{vars.actionViewGroupId}}"
    mode: sync
    timeoutSeconds: 600

  - name: generate-summary
    type: Transform
    dependsOn:
      - discover-recent-meetings
      - filter-already-processed
      - aggregate-dispatch
      - submit-actionview-entry
    template: |
      # Meeting Action Items Run Summary

      **Run ID:** {{orchestration.runId}}
      **Started:** {{orchestration.startedAt}}
      **Window:** {{param.lookBackHours}}h look-back
      **Filter:** "{{param.meetingFilter}}"
      **forceReprocess:** {{param.forceReprocess}}
      **dryRun:** {{param.dryRun}}

      ## Discovery
      ```json
      {{discover-recent-meetings.output}}
      ```

      ## Filter (already-processed gate)
      ```json
      {{filter-already-processed.output}}
      ```

      ## Dispatch Results
      ```json
      {{aggregate-dispatch.output}}
      ```

      ## ActionView Submission
      ```text
      {{submit-actionview-entry.output}}
      ```
    contentType: text/markdown
