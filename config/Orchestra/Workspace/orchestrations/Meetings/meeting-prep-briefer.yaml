# yaml-language-server: $schema=https://raw.githubusercontent.com/MoaidHathot/orchestra/main/schemas/orchestration.schema.json
name: meeting-prep-briefer
description: |
  Per-meeting child orchestration for meeting-prep-brief. Takes a single meeting
  (eventId/iCalUId + metadata), gathers context in parallel from WorkIQ,
  Microsoft 365 Copilot, Outlook mail, the calendar history, and Azure DevOps,
  deduplicates the context, generates a markdown brief, writes it
  deterministically to the briefings directory, and records 'briefed' state in
  Zakira.Exchange under a stable per-meeting key. Designed to be dispatched
  once per meeting by meeting-prep-brief and to be the unit of failure
  isolation: a failed brief for one meeting does not contaminate sibling
  meetings or the parent's Zakira state.
version: 2.0.0
tags: ["productivity", "meetings", "WorkIQ", "MSFT", "ZTS", "child", "auto"]
defaultModel: claude-opus-4.7-1m-internal

metadata:
  owner: Moaid Hathot
  ownerAlias: moaid
  domain: productivity
  sla: best-effort
  schedule: child-of-meeting-prep-brief
  documentation: |
    See sibling parent orchestration `meeting-prep-brief.yaml` for the
    discovery + dispatch flow. This child is responsible for everything
    scoped to a single meeting.

inputs:
  meetingData:
    type: string
    description: |
      Canonical meeting JSON for a single meeting, serialized as a string.
      Required fields the normalize step understands: eventId, iCalUId,
      occurrenceStart, title, startTime, endTime, organizer, attendees,
      description, webLink, timeZone. At least one of eventId,
      iCalUId+occurrenceStart, or startTime+title must be present so a
      canonical Zakira key can be computed.
    required: true
    multiline: true
  briefingsDir:
    type: string
    description: |
      Output directory for the generated markdown brief.
    required: false
    default: "{{env.USERPROFILE}}\\OneDrive - Microsoft\\Notes\\Obsidian\\Work\\OrcStra\\Meeting Briefs"
  forceRebrief:
    type: boolean
    description: |
      When true, bypass the Zakira short-circuit and regenerate the brief
      even if a recent one exists.
    required: false
    default: "false"
  dryRun:
    type: boolean
    description: |
      When true, generate the brief content but skip disk write and Zakira
      'briefed' marking. The orchestration output still contains the brief
      manifest so callers can inspect it.
    required: false
    default: "false"
  zakiraCategory:
    type: string
    description: |
      Zakira.Exchange category for brief state. Override only for testing
      isolation; in production this must match the parent.
    required: false
    default: "meeting-prep-state"
  reviewerName:
    type: string
    description: |
      Display name of the user the brief is written for. Used to highlight
      'my' items in the brief.
    required: false
    default: "Moaid Hathot"
  organization:
    type: string
    description: Azure DevOps organization name (used by the AzDO gather step).
    required: false
    default: "msazure"
  project:
    type: string
    description: Azure DevOps project name.
    required: false
    default: "One"
  repository:
    type: string
    description: Azure DevOps repository name.
    required: false
    default: "ZTS"

defaultRetryPolicy:
  maxRetries: 2
  backoffSeconds: 10
  backoffMultiplier: 2.0
  retryOnTimeout: true

defaultStepTimeoutSeconds: 1200
timeoutSeconds: 2400

mcps:
  - name: workiq
    type: local
    command: npx
    arguments:
      - "-y"
      - "@microsoft/workiq"
      - mcp

  - name: zakira
    type: local
    command: dnx
    arguments:
      - Zakira.Exchange
      - "--yes"
      - "--"
      - "--db"
      - "{{env.XDG_CONFIG_HOME}}/orchestra/zakira.db"
      - mcp
      - "--category"
      - "{{param.zakiraCategory}}"

steps:
  - name: normalize-meeting
    type: Script
    shell: pwsh
    script: |
      $ErrorActionPreference = 'Stop'

      function Get-OptionalProperty {
        param($Object, [Parameter(Mandatory)][string]$Name)
        if ($null -eq $Object) { return $null }
        $prop = $Object.PSObject.Properties[$Name]
        if ($null -eq $prop) { return $null }
        return $prop.Value
      }

      function Get-JsonCandidate {
        param([Parameter(Mandatory)][string]$Text)
        $trimmed = $Text.Trim()
        if ($trimmed.StartsWith('```')) {
          $lines = @($trimmed -split "`r?`n")
          if ($lines.Count -gt 1) {
            $trimmed = ($lines[1..($lines.Count - 1)] -join "`n").Trim()
            if ($trimmed.EndsWith('```')) {
              $trimmed = $trimmed.Substring(0, $trimmed.Length - 3).Trim()
            }
          }
        }
        $start = -1
        for ($i = 0; $i -lt $trimmed.Length; $i++) {
          if ($trimmed[$i] -eq '{' -or $trimmed[$i] -eq '[') { $start = $i; break }
        }
        if ($start -lt 0) { throw 'No JSON object or array was found in meetingData.' }
        return $trimmed.Substring($start)
      }

      function Get-Slug {
        param([string]$Value, [int]$MaxLength = 50)
        if ([string]::IsNullOrWhiteSpace($Value)) { return '' }
        $lower = $Value.ToLowerInvariant()
        $cleaned = [regex]::Replace($lower, '[^a-z0-9]+', '-').Trim('-')
        if ($cleaned.Length -gt $MaxLength) {
          $cleaned = $cleaned.Substring(0, $MaxLength).TrimEnd('-')
        }
        return $cleaned
      }

      function Get-ShortHash {
        param([Parameter(Mandatory)][string]$Value, [int]$Length = 8)
        $bytes = [System.Text.Encoding]::UTF8.GetBytes($Value)
        $sha = [System.Security.Cryptography.SHA1]::Create()
        try {
          $hashBytes = $sha.ComputeHash($bytes)
        } finally {
          $sha.Dispose()
        }
        $hex = ($hashBytes | ForEach-Object { $_.ToString('x2') }) -join ''
        if ($Length -gt $hex.Length) { return $hex }
        return $hex.Substring(0, $Length)
      }

      function ConvertTo-UtcTimestampString {
        param($Value)
        if ($null -eq $Value) { return $null }
        $text = [string]$Value
        if ([string]::IsNullOrWhiteSpace($text)) { return $null }
        try {
          $parsed = [datetimeoffset]::Parse($text, [System.Globalization.CultureInfo]::InvariantCulture)
          return $parsed.UtcDateTime.ToString('yyyyMMddHHmm', [System.Globalization.CultureInfo]::InvariantCulture)
        } catch {
          return $null
        }
      }

      $meetingDataRaw = $args[0]
      if ([string]::IsNullOrWhiteSpace($meetingDataRaw)) {
        throw 'meetingData input is required.'
      }

      $candidate = Get-JsonCandidate -Text $meetingDataRaw
      $meeting = ConvertFrom-Json -InputObject $candidate -NoEnumerate -ErrorAction Stop

      $eventId          = [string](Get-OptionalProperty $meeting 'eventId')
      $iCalUId          = [string](Get-OptionalProperty $meeting 'iCalUId')
      $occurrenceStart  = Get-OptionalProperty $meeting 'occurrenceStart'
      $title            = [string](Get-OptionalProperty $meeting 'title')
      $startTime        = Get-OptionalProperty $meeting 'startTime'
      $endTime          = Get-OptionalProperty $meeting 'endTime'
      $organizer        = [string](Get-OptionalProperty $meeting 'organizer')
      $attendeesRaw     = Get-OptionalProperty $meeting 'attendees'
      $description      = [string](Get-OptionalProperty $meeting 'description')
      $webLink          = [string](Get-OptionalProperty $meeting 'webLink')
      $timeZone         = [string](Get-OptionalProperty $meeting 'timeZone')
      $recurrence       = Get-OptionalProperty $meeting 'recurrence'

      $attendees = @()
      if ($null -ne $attendeesRaw) {
        $attendees = @(@($attendeesRaw) | ForEach-Object { [string]$_ })
      }

      # Compute the canonical Zakira key using a three-tier fallback so each
      # meeting (including different instances of a recurring series) maps to
      # a stable, unique key.
      $occurrenceStamp = ConvertTo-UtcTimestampString $occurrenceStart
      if (-not $occurrenceStamp) { $occurrenceStamp = ConvertTo-UtcTimestampString $startTime }

      $titleSlug = Get-Slug -Value $title -MaxLength 50

      $zakiraKey = $null
      $zakiraKeyStrategy = $null

      if (-not [string]::IsNullOrWhiteSpace($eventId)) {
        $zakiraKey = "meeting-$eventId"
        $zakiraKeyStrategy = 'eventId'
      } elseif (-not [string]::IsNullOrWhiteSpace($iCalUId) -and $occurrenceStamp) {
        $zakiraKey = "meeting-icaluid-$iCalUId-$occurrenceStamp"
        $zakiraKeyStrategy = 'iCalUId+occurrenceStart'
      } elseif ($occurrenceStamp) {
        $hashInput = ($title + '|' + $organizer + '|' + ($attendees -join ','))
        $shortHash = Get-ShortHash -Value $hashInput -Length 8
        $slugForKey = if ([string]::IsNullOrWhiteSpace($titleSlug)) { 'untitled' } else { $titleSlug }
        $zakiraKey = "meeting-$occurrenceStamp-$slugForKey-$shortHash"
        $zakiraKeyStrategy = 'timestamp+slug+hash'
      } else {
        throw 'meetingData must contain at least one of: eventId, iCalUId+occurrenceStart, or startTime+title (to compute a stable Zakira key).'
      }

      [pscustomobject]@{
        eventId           = $eventId
        iCalUId           = $iCalUId
        occurrenceStart   = $occurrenceStart
        title             = $title
        titleSlug         = $titleSlug
        startTime         = $startTime
        endTime           = $endTime
        organizer         = $organizer
        attendees         = $attendees
        description       = $description
        webLink           = $webLink
        timeZone          = $timeZone
        recurrence        = $recurrence
        zakiraKey         = $zakiraKey
        zakiraKeyStrategy = $zakiraKeyStrategy
      } | ConvertTo-Json -Compress -Depth 20
    arguments:
      - "{{param.meetingData}}"
    timeoutSeconds: 120

  - name: check-already-briefed
    type: Prompt
    dependsOn: [normalize-meeting]
    systemPrompt: |
      You are a state checker for meeting briefs. You decide whether this
      single meeting needs a new brief, using Zakira.Exchange as the source
      of truth.

      Rules:
      1. The canonical Zakira key is in the normalized meeting payload as
         `zakiraKey`. Do not invent a key, do not modify it.
      2. Call Zakira.Exchange `get_memory` with that exact key.
      3. If `forceRebrief` is the string 'true', emit status 'needs-brief'
         regardless of the stored state, and do NOT call orchestra_complete.
      4. If a memory exists with status 'briefed' AND `briefedAt` is less
         than 12 hours old (relative to now), the brief is fresh: call
         `orchestra_complete` with status 'success' and reason
         'Meeting already briefed within the last 12 hours.'
      5. Otherwise (no memory, expired memory, or non-briefed status), emit
         a single-line JSON object: {"decision":"needs-brief","zakiraKey":"<key>","priorState":<stored memory JSON or null>}
      6. Do not call any other tools. Output ONLY the JSON object when
         continuing; do not include prose, fences, or comments.
    userPrompt: |
      Normalized meeting payload:
      {{normalize-meeting.output}}

      forceRebrief flag: {{param.forceRebrief}}

      Check Zakira.Exchange and decide.
    outputHandlerPrompt: |
      If the content is the freshness short-circuit message (orchestra_complete
      was invoked), preserve it verbatim. Otherwise, extract exactly one valid
      JSON object with the fields `decision`, `zakiraKey`, and `priorState`.
      Strip markdown fences, prose, and trailing whitespace. Output only the
      JSON object.
    mcps: [zakira]

  - name: gather-workiq-context
    type: Prompt
    dependsOn: [check-already-briefed]
    systemPrompt: |
      You are a meeting research agent using ONLY the WorkIQ MCP.

      Goal: surface the most useful preparation context for this single
      meeting across emails, Teams messages, and prior occurrences.

      Rules:
      1. Search the last 14 days (and last 30 days for recurring/prior
         occurrences) using the meeting title, organizer, key attendees,
         and any feature/project keywords from the description.
      2. Capture items in these categories: emails, teamsMessages,
         pastMeetings, otherArtifacts.
      3. For EVERY item, you MUST include a canonical URL or link
         (Outlook web link, Teams deep-link, calendar webLink, SharePoint
         URL, etc.). Items without a URL must be dropped.
      4. Prioritize items containing decisions, action items, blockers,
         status updates, or unresolved questions.
      5. Cap at 8 items per category. If a category is empty, return an
         empty array for it.
      6. Output a single JSON object with keys: emails, teamsMessages,
         pastMeetings, otherArtifacts. Each item: {title, source, date,
         url, summary, priority?}.
    userPrompt: |
      Meeting:
      {{normalize-meeting.output}}

      I am {{param.reviewerName}}. Gather preparation context for this
      meeting via WorkIQ only.
    outputHandlerPrompt: |
      Extract the gathered context as one valid JSON object only. Remove
      markdown fences, prose, and trailing whitespace. Preserve all keys
      and nested arrays. Output only the JSON object.
    mcps: [workiq]
    retry:
      maxRetries: 3
      backoffSeconds: 15
      backoffMultiplier: 2.0
      retryOnTimeout: true

  - name: gather-m365-copilot-context
    type: Prompt
    dependsOn: [check-already-briefed]
    systemPrompt: |
      You are a meeting research agent using ONLY the m365-copilot MCP.

      Goal: surface preparation context for this single meeting that
      m365-copilot can find across emails, Teams chats, documents, and
      meeting notes.

      Rules:
      1. Search the last 14 days (and last 30 days for recurring/prior
         occurrences) using the meeting title, organizer, key attendees,
         and any feature/project keywords from the description.
      2. For EVERY item, you MUST include a canonical URL or link. Items
         without a URL must be dropped.
      3. Prioritize decisions, action items, blockers, status updates,
         unresolved questions.
      4. Cap at 8 items total. Tag each item with its underlying source
         (email, teams, doc, meeting-note, other).
      5. Output a single JSON object: {items: [{type, title, source, date,
         url, summary, priority?}], notes?: "..."}.
    userPrompt: |
      Meeting:
      {{normalize-meeting.output}}

      I am {{param.reviewerName}}. Gather preparation context for this
      meeting via m365-copilot only.
    outputHandlerPrompt: |
      Extract the gathered context as one valid JSON object only. Remove
      markdown fences, prose, and trailing whitespace. Output only the
      JSON object.
    mcps: [m365-copilot]
    retry:
      maxRetries: 3
      backoffSeconds: 15
      backoffMultiplier: 2.0
      retryOnTimeout: true

  - name: gather-mail-focused
    type: Prompt
    dependsOn: [check-already-briefed]
    systemPrompt: |
      You are a focused Outlook mail research agent using ONLY the mail MCP.

      Goal: find the most relevant recent email threads for this single
      meeting using targeted attendee + subject keyword searches.

      Rules:
      1. Search the last 14 days. Form queries from: the meeting title,
         organizer, top 3 attendees, and any project/feature keywords from
         the description.
      2. For each result, capture: subject, sender, date, threadId,
         webLink (must be a canonical Outlook URL), and a one-sentence
         summary. Items without a webLink must be dropped.
      3. Prefer threads containing decisions, action items, or status
         updates. Cap at 6 threads.
      4. Output a single JSON object: {threads: [{subject, sender, date,
         threadId, webLink, summary}], notes?: "..."}.
    userPrompt: |
      Meeting:
      {{normalize-meeting.output}}

      I am {{param.reviewerName}}. Use the focused mail MCP only; do not
      query WorkIQ or m365-copilot.
    outputHandlerPrompt: |
      Extract the gathered mail context as one valid JSON object only.
      Remove markdown fences, prose, and trailing whitespace. Output only
      the JSON object.
    mcps: [mail]
    retry:
      maxRetries: 3
      backoffSeconds: 15
      backoffMultiplier: 2.0
      retryOnTimeout: true

  - name: gather-calendar-history
    type: Prompt
    dependsOn: [check-already-briefed]
    systemPrompt: |
      You are a calendar history research agent using ONLY the calendar MCP.

      Goal: find prior occurrences of this meeting (recurring series) or
      closely related past meetings with the same organizer/attendee
      combination so the brief can establish continuity.

      Rules:
      1. Search the last 30 days for events whose title or organizer
         matches, or whose attendee set has strong overlap.
      2. For each occurrence, capture: title, startTime, endTime,
         organizer, webLink (must be a canonical calendar URL), and a
         one-line note about what is likely relevant (e.g., previously
         deferred topics, acceptance status of key attendees).
      3. Items without a webLink must be dropped.
      4. Cap at 6 occurrences.
      5. Output a single JSON object: {occurrences: [{title, startTime,
         endTime, organizer, webLink, note}], notes?: "..."}.
    userPrompt: |
      Meeting:
      {{normalize-meeting.output}}

      Use the focused calendar MCP only; do not call workiq.
    outputHandlerPrompt: |
      Extract the calendar history as one valid JSON object only. Remove
      markdown fences, prose, and trailing whitespace. Output only the
      JSON object.
    mcps: [calendar]
    retry:
      maxRetries: 3
      backoffSeconds: 15
      backoffMultiplier: 2.0
      retryOnTimeout: true

  - name: gather-azdo-context
    type: Prompt
    dependsOn: [check-already-briefed]
    systemPrompt: |
      You are a development activity research agent using ONLY the azdo MCP.

      Goal: find recent PRs and active work items related to this meeting
      and its attendees, so the brief can list discussion-likely items.

      Rules:
      1. Search the last 14 days. Look for:
         - PRs authored by meeting attendees that the reviewer
           ({{param.reviewerName}}) is reviewing or has reviewed.
         - PRs and work items whose title/description matches the meeting
           topic.
         - Active work items assigned to attendees.
      2. For each PR: capture id, title, author, status, iteration count,
         reviewer votes, and a canonical PR URL. Items without a URL must
         be dropped.
      3. For each work item: capture id, title, state, assignedTo, type,
         and a canonical work-item URL. Items without a URL must be
         dropped.
      4. Cap at 6 PRs and 6 work items.
      5. Output a single JSON object: {pullRequests: [...], workItems: [...]}.
    userPrompt: |
      Meeting:
      {{normalize-meeting.output}}

      My name is {{param.reviewerName}}. Azure DevOps organization:
      {{param.organization}}, project: {{param.project}}, repository:
      {{param.repository}}. Gather only AzDO context.
    outputHandlerPrompt: |
      Extract the AzDO context as one valid JSON object only. Remove
      markdown fences, prose, and trailing whitespace. Output only the
      JSON object.
    mcps: [azdo]
    retry:
      maxRetries: 3
      backoffSeconds: 15
      backoffMultiplier: 2.0
      retryOnTimeout: true

  - name: merge-context
    type: Prompt
    dependsOn:
      - check-already-briefed
      - gather-workiq-context
      - gather-m365-copilot-context
      - gather-mail-focused
      - gather-calendar-history
      - gather-azdo-context
    systemPrompt: |
      You are a context-merging agent. You receive five parallel context
      payloads gathered for a single meeting from WorkIQ, m365-copilot,
      the mail proxy, the calendar proxy, and Azure DevOps. Merge them
      into one normalized, deduplicated context object for downstream
      brief generation.

      Rules:
      1. Categorize merged items into: emails, teamsMessages, pastMeetings,
         pullRequests, workItems, otherArtifacts.
      2. Deduplicate items that clearly refer to the same artifact (same
         email threadId or subject+sender+date, same Teams thread, same
         calendar event id, same PR id, same work item id). Prefer the
         richer description; record all source tags (e.g. ['workiq',
         'm365-copilot', 'mail']) in a 'sources' array on each merged
         item.
      3. EVERY item MUST keep its canonical URL. Drop any item without a
         URL.
      4. Within each category, keep at most 8 items, ranked by relevance
         (decisions and action items first, then blockers, then status
         updates, then general background).
      5. Note disagreements: if two sources return materially different
         facts about the same item, surface a `conflict` field on that
         merged item.
      6. Output a single JSON object with the categories above and a
         top-level `mergedItemCount` integer.
    userPrompt: |
      Meeting:
      {{normalize-meeting.output}}

      WorkIQ context:
      {{gather-workiq-context.output}}

      m365-copilot context:
      {{gather-m365-copilot-context.output}}

      Mail focused context:
      {{gather-mail-focused.output}}

      Calendar history context:
      {{gather-calendar-history.output}}

      AzDO context:
      {{gather-azdo-context.output}}

      Merge into one deduplicated context object for this meeting.
    outputHandlerPrompt: |
      Extract the merged context as one valid JSON object only. Remove
      markdown fences, prose, and trailing whitespace. Output only the
      JSON object.

  - name: generate-brief
    type: Prompt
    dependsOn: [merge-context]
    systemPrompt: |
      You are a meeting preparation expert. Synthesize all gathered context
      into ONE concise, actionable preparation brief for the meeting.

      The output of this step is a single JSON manifest. Do NOT call
      orchestra_save_file. Do NOT emit markdown alongside the JSON. The
      downstream Script step writes the markdown to disk from the manifest.

      Required manifest shape:

      {
        "title": "<meeting title>",
        "startTime": "<original startTime string>",
        "endTime": "<original endTime string>",
        "organizer": "<name>",
        "attendees": ["<name>", ...],
        "timeZone": "<as provided>",
        "webLink": "<calendar event web link or empty string>",
        "slug": "<filename slug: YYYY-MM-DD-<title-slug>, lowercase, hyphens, special chars stripped, max 60 chars overall>",
        "talkingPoints": ["...", "..."],
        "openItems": ["...", "..."],
        "quickReference": [{"label": "...", "url": "..."}, ...],
        "topicsCount": <integer>,
        "hasOpenItems": <true|false>,
        "markdown": "<full markdown brief body>"
      }

      Markdown body structure (rendered verbatim from the `markdown`
      field):

      # Meeting Brief: <title>

      **Date/Time:** <start> - <end> (<timezone>)
      **Organizer:** <name>
      **Attendees:** <comma-separated list>

      ## Agenda & Context
      <synthesized from description + historical context>

      ## Key Background
      <synthesized from emails, Teams, mail, calendar history>

      ## Related Development Activity
      <relevant PRs and work items with URLs>

      ## Open Items from Last Time
      <items from prior occurrences>

      ## Suggested Talking Points
      <bullet list, mirrors talkingPoints>

      ## Quick Reference
      <bullet list of label -> URL, mirrors quickReference>

      Rules:
      1. Be concise. Each section scannable in under 30 seconds.
      2. Use bullet points, not paragraphs.
      3. If a section has no relevant content, write 'None identified.'
         rather than padding.
      4. EVERY artifact reference in 'Related Development Activity' and
         'Quick Reference' MUST be a canonical URL surfaced in the merged
         context. Do not invent URLs.
      5. `slug` must collide-resistant: prefix with the meeting date in
         YYYY-MM-DD form (from startTime, UTC date is fine), then the
         title slugified to <=50 chars, lowercased, with `[^a-z0-9]+`
         collapsed to `-` and trimmed.
      6. `talkingPoints` should be the top 3-5 items the reviewer should
         bring up or be prepared to discuss.
      7. `openItems` should reflect carry-over from prior occurrences;
         empty array when none.
      8. `quickReference` must be at most 8 items.
      9. The orchestration output of this step MUST be the JSON manifest
         only. The output handler will reject anything else.
    userPrompt: |
      Meeting:
      {{normalize-meeting.output}}

      Merged context:
      {{merge-context.output}}

      I am {{param.reviewerName}}. Generate the brief manifest.
    outputHandlerPrompt: |
      Extract the brief manifest as one valid JSON object only with the
      fields: title, startTime, endTime, organizer, attendees, timeZone,
      webLink, slug, talkingPoints, openItems, quickReference,
      topicsCount, hasOpenItems, markdown. Remove markdown fences, prose,
      logs, and any trailing whitespace. The `markdown` field's value must
      contain the rendered brief as a single JSON-escaped string. Output
      only the JSON object.
    reasoningLevel: Medium

  - name: save-brief-to-disk
    type: Script
    dependsOn: [generate-brief]
    shell: pwsh
    script: |
      $ErrorActionPreference = 'Stop'

      $dryRun        = $args[0]
      $briefingsDir  = $args[1]
      $manifestJson  = $args[2]

      if ($dryRun -eq 'true') {
        [pscustomobject]@{
          status   = 'dry-run-skipped'
          filePath = $null
          slug     = $null
        } | ConvertTo-Json -Compress
        return
      }

      if ([string]::IsNullOrWhiteSpace($manifestJson)) {
        throw 'generate-brief output (manifest) is empty; cannot save brief.'
      }

      $manifest = ConvertFrom-Json -InputObject $manifestJson -NoEnumerate -ErrorAction Stop

      $slug = [string]$manifest.slug
      $markdown = [string]$manifest.markdown

      if ([string]::IsNullOrWhiteSpace($slug)) {
        throw 'Brief manifest is missing required field: slug.'
      }
      if ([string]::IsNullOrWhiteSpace($markdown)) {
        throw 'Brief manifest is missing required field: markdown.'
      }

      # Defensive slug sanitisation in case the model returned a slightly
      # off-spec slug (extension, slashes, spaces).
      $slug = $slug.Trim().Trim('.', '-', '/', '\')
      $slug = [regex]::Replace($slug.ToLowerInvariant(), '[^a-z0-9-]+', '-')
      $slug = [regex]::Replace($slug, '-+', '-').Trim('-')
      if ($slug.Length -gt 80) { $slug = $slug.Substring(0, 80).TrimEnd('-') }
      if ([string]::IsNullOrWhiteSpace($slug)) { $slug = 'meeting-brief-' + [guid]::NewGuid().ToString('N').Substring(0, 8) }

      if (-not (Test-Path -LiteralPath $briefingsDir)) {
        New-Item -ItemType Directory -Path $briefingsDir -Force | Out-Null
      }

      $filePath = Join-Path -Path $briefingsDir -ChildPath ($slug + '.md')
      Set-Content -LiteralPath $filePath -Value $markdown -Encoding utf8NoBOM

      [pscustomobject]@{
        status   = 'saved'
        filePath = $filePath
        slug     = $slug
      } | ConvertTo-Json -Compress
    arguments:
      - "{{param.dryRun}}"
      - "{{param.briefingsDir}}"
      - "{{generate-brief.output}}"
    timeoutSeconds: 180

  - name: mark-briefed
    type: Prompt
    dependsOn: [save-brief-to-disk]
    systemPrompt: |
      You are a state management agent. Record the 'briefed' state for this
      meeting in Zakira.Exchange so the parent orchestration's next run
      does not regenerate the brief.

      Rules:
      1. If `dryRun` is the string 'true', do NOT write to Zakira. Output
         exactly: {"status":"dry-run-skipped"}
      2. Otherwise, use the canonical Zakira key from the normalized
         meeting payload (`zakiraKey`). Use Zakira.Exchange create_memory
         (or edit_memory if a record already exists) with that exact key.
      3. Data payload (JSON object):
         {
           "status": "briefed",
           "briefedAt": "<current ISO-8601 timestamp>",
           "fileName": "<filePath from save result>",
           "slug": "<slug from save result>",
           "meetingTitle": "<title>",
           "meetingTime": "<startTime>",
           "eventId": "<eventId or empty string>",
           "iCalUId": "<iCalUId or empty string>",
           "occurrenceStart": "<occurrenceStart or empty string>",
           "orchestrationRunId": "{{orchestration.runId}}"
         }
      4. Output a single JSON object summarising the write:
         {"status":"marked","zakiraKey":"<key>","briefedAt":"<timestamp>"}
      5. Do not call any other tools. Do not output prose.
    userPrompt: |
      dryRun flag: {{param.dryRun}}

      Normalized meeting (canonical Zakira key inside):
      {{normalize-meeting.output}}

      Save result from disk write:
      {{save-brief-to-disk.output}}
    outputHandlerPrompt: |
      Extract one valid JSON object only with the fields appropriate to
      the branch (status, zakiraKey?, briefedAt?). Strip markdown fences,
      prose, and trailing whitespace. Output only the JSON object.
    mcps: [zakira]

  - name: emit-child-result
    type: Transform
    dependsOn: [generate-brief, save-brief-to-disk, mark-briefed]
    template: |
      {
        "status": "briefed",
        "dryRun": "{{param.dryRun}}",
        "runId": "{{orchestration.runId}}",
        "manifest": {{generate-brief.output}},
        "save": {{save-brief-to-disk.output}},
        "zakira": {{mark-briefed.output}},
        "meeting": {{normalize-meeting.output}}
      }
    contentType: application/json
