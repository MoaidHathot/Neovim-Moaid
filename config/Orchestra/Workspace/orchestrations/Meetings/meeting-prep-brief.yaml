# yaml-language-server: $schema=https://raw.githubusercontent.com/MoaidHathot/orchestra/main/schemas/orchestration.schema.json
name: meeting-prep-brief
description: |
  Scheduler + dispatcher for meeting preparation briefs. Every 6 hours it
  discovers upcoming meetings in the next 6 hours via the Calendar MCP,
  filters out ones whose canonical Zakira key already has a fresh 'briefed'
  record, then dispatches one synchronous `meeting-prep-briefer` child
  per remaining meeting via the Orchestra data-plane MCP. The child owns
  context gathering, brief generation, disk write, and Zakira state. After
  all children complete, this parent aggregates results, posts a single
  ActionView entry using the `meeting-prep` template (one entry per run),
  and emits a deterministic markdown summary.
version: 2.0.0
tags: ["productivity", "meetings", "WorkIQ", "MSFT", "auto", "ZTS"]
defaultModel: gpt-5.4

metadata:
  owner: Moaid Hathot
  ownerAlias: moaid
  domain: productivity
  sla: best-effort
  schedule: "every 6h, 6h look-ahead"
  documentation: |
    Sibling per-meeting child orchestration: `meeting-prep-briefer.yaml`.
    ActionView template: `config/ActionView/templates/meeting-prep.json`.
    Reusable submitter: `ActionView/actionview-submit.yaml`.

inputs:
  lookAheadHours:
    type: string
    description: |
      Look-ahead window in hours from now. Default matches the scheduler
      cadence so every meeting is seen exactly once in the run that
      precedes it.
    required: false
    default: "6"
  meetingFilter:
    type: string
    description: |
      Optional case-insensitive substring filter on the meeting title.
      When non-empty, only matching meetings are dispatched. Useful for
      manual reruns scoped to a specific meeting.
    required: false
    default: ""
  forceRebrief:
    type: boolean
    description: |
      When true, bypass the Zakira short-circuit for every dispatched
      meeting and regenerate briefs even if a recent one exists.
    required: false
    default: "false"
  dryRun:
    type: boolean
    description: |
      When true, generate briefs but skip disk saves, Zakira writes, and
      the ActionView submission. Useful for verifying the gather+brief
      logic without producing side effects.
    required: false
    default: "false"

variables:
  briefingsDir: "{{env.USERPROFILE}}\\OneDrive - Microsoft\\Notes\\Obsidian\\Work\\OrcStra\\Meeting Briefs"
  zakiraCategory: meeting-prep-state
  organization: msazure
  project: One
  repository: ZTS
  reviewerName: Moaid Hathot
  actionViewGroupId: "meetings-{{orchestration.runId}}"

defaultRetryPolicy:
  maxRetries: 2
  backoffSeconds: 10
  backoffMultiplier: 2.0
  retryOnTimeout: true

defaultStepTimeoutSeconds: 1200
timeoutSeconds: 18000

mcps:
  - name: orchestra
    type: remote
    endpoint: "{{server.url}}/mcp/data"

  - name: zakira
    type: local
    command: dnx
    arguments:
      - Zakira.Exchange
      - "--yes"
      - "--"
      - "--db"
      - "{{env.XDG_CONFIG_HOME}}/orchestra/zakira.db"
      - mcp
      - "--category"
      - "{{vars.zakiraCategory}}"

trigger:
  type: scheduler
  enabled: true
  intervalSeconds: 21600

steps:
  - name: get-timezone
    type: Prompt
    systemPrompt: |
      You are a timezone resolution agent. Use the Calendar MCP tool
      `GetUserDateAndTimeZoneSettings` to resolve the user's current date,
      time, and configured time zone. Pass the value through verbatim — do
      not convert it to IANA, do not transform it in any way.
    userPrompt: |
      Use GetUserDateAndTimeZoneSettings to fetch the user's current
      timezone settings.

      Then output ONLY a JSON object with these fields:
      {
        "currentDateTime": "<ISO-8601 timestamp in the user's local timezone, e.g. 2026-04-19T14:30:00>",
        "windowEndDateTime": "<currentDateTime + {{param.lookAheadHours}} hours, same format>",
        "timeZone": "<exact value of the timezone returned by the MCP (e.g. 'Pacific Standard Time')>"
      }

      Do not include any other text. Just the JSON object.
    outputHandlerPrompt: |
      Extract one valid JSON object only with the fields currentDateTime,
      windowEndDateTime, and timeZone. Strip markdown fences, prose, and
      trailing whitespace. Output only the JSON object.
    mcps: [calendar]

  - name: discover-meetings
    type: Prompt
    dependsOn: [get-timezone]
    systemPrompt: |
      You are a meeting discovery agent. Use the Calendar MCP to find all
      meetings scheduled in the upcoming look-ahead window provided by the
      previous step.

      Rules:
      1. Call `ListCalendarView` with the `currentDateTime` (start) and
         `windowEndDateTime` (end) from the timezone step, expressed in
         the user's configured timezone (passed through verbatim).
      2. Include calendar events that are real meetings: 1:1s, standups,
         reviews, design sessions, syncs, interviews, ad-hoc calls.
      3. Exclude cancelled events, focus-time blocks, OOF blocks, and
         all-day placeholder events.
      4. For EVERY meeting, capture all of the following fields. The
         downstream Script step REQUIRES at least one of (eventId,
         iCalUId+occurrenceStart, startTime+title) per meeting in order
         to compute a canonical Zakira key. Capture as many as the API
         exposes — do not leave fields out that the API returned.
         - `eventId`        : the calendar event id (Graph `id`).
         - `iCalUId`        : the iCalendar UID (Graph `iCalUId`).
         - `occurrenceStart`: ISO-8601 start of this instance (use start.dateTime).
         - `title`          : the event subject.
         - `startTime`      : ISO-8601 start.
         - `endTime`        : ISO-8601 end.
         - `timeZone`       : start.timeZone if exposed, else inherit the user's TZ.
         - `organizer`      : organizer display name.
         - `attendees`      : array of attendee display names.
         - `description`    : bodyPreview or first ~500 chars of body.
         - `webLink`        : canonical event URL.
         - `recurrence`     : recurrence object if present, else null.
      5. Apply the meetingFilter (case-insensitive substring match on
         title) when non-empty. Otherwise keep every meeting.
      6. If zero meetings remain after filtering, call orchestra_complete
         with status 'success' and reason 'No meetings in the next
         {{param.lookAheadHours}} hours' (substitute the filter clause
         when relevant).
      7. Output a single JSON array of meeting objects. No prose, no
         fences.
    userPrompt: |
      Timezone and window:
      {{get-timezone.output}}

      Look-ahead hours: {{param.lookAheadHours}}
      Meeting filter (substring, empty = no filter): "{{param.meetingFilter}}"

      Enumerate calendar events in the look-ahead window with every field
      listed in your system prompt. Return a JSON array.
    outputHandlerPrompt: |
      Extract one valid JSON array only. Strip markdown fences, prose,
      and trailing whitespace. Preserve every field returned by the
      calendar MCP. Output only the JSON array.
    mcps: [calendar]

  - name: normalize-meetings-array
    type: Script
    dependsOn: [discover-meetings]
    shell: pwsh
    script: |
      $ErrorActionPreference = 'Stop'

      function Get-OptionalProperty {
        param($Object, [Parameter(Mandatory)][string]$Name)
        if ($null -eq $Object) { return $null }
        $prop = $Object.PSObject.Properties[$Name]
        if ($null -eq $prop) { return $null }
        return $prop.Value
      }

      function Get-JsonCandidate {
        param([Parameter(Mandatory)][string]$Text)
        $trimmed = $Text.Trim()
        if ($trimmed.StartsWith('```')) {
          $lines = @($trimmed -split "`r?`n")
          if ($lines.Count -gt 1) {
            $trimmed = ($lines[1..($lines.Count - 1)] -join "`n").Trim()
            if ($trimmed.EndsWith('```')) {
              $trimmed = $trimmed.Substring(0, $trimmed.Length - 3).Trim()
            }
          }
        }
        $start = -1
        for ($i = 0; $i -lt $trimmed.Length; $i++) {
          if ($trimmed[$i] -eq '{' -or $trimmed[$i] -eq '[') { $start = $i; break }
        }
        if ($start -lt 0) { throw 'No JSON object or array was found in discover-meetings output.' }
        return $trimmed.Substring($start)
      }

      function Get-Slug {
        param([string]$Value, [int]$MaxLength = 50)
        if ([string]::IsNullOrWhiteSpace($Value)) { return '' }
        $lower = $Value.ToLowerInvariant()
        $cleaned = [regex]::Replace($lower, '[^a-z0-9]+', '-').Trim('-')
        if ($cleaned.Length -gt $MaxLength) {
          $cleaned = $cleaned.Substring(0, $MaxLength).TrimEnd('-')
        }
        return $cleaned
      }

      function Get-ShortHash {
        param([Parameter(Mandatory)][string]$Value, [int]$Length = 8)
        $bytes = [System.Text.Encoding]::UTF8.GetBytes($Value)
        $sha = [System.Security.Cryptography.SHA1]::Create()
        try {
          $hashBytes = $sha.ComputeHash($bytes)
        } finally {
          $sha.Dispose()
        }
        $hex = ($hashBytes | ForEach-Object { $_.ToString('x2') }) -join ''
        if ($Length -gt $hex.Length) { return $hex }
        return $hex.Substring(0, $Length)
      }

      function ConvertTo-UtcTimestampString {
        param($Value)
        if ($null -eq $Value) { return $null }
        $text = [string]$Value
        if ([string]::IsNullOrWhiteSpace($text)) { return $null }
        try {
          $parsed = [datetimeoffset]::Parse($text, [System.Globalization.CultureInfo]::InvariantCulture)
          return $parsed.UtcDateTime.ToString('yyyyMMddHHmm', [System.Globalization.CultureInfo]::InvariantCulture)
        } catch {
          return $null
        }
      }

      $raw = $args[0]
      if ([string]::IsNullOrWhiteSpace($raw)) {
        throw 'discover-meetings output is empty.'
      }

      $candidate = Get-JsonCandidate -Text $raw
      $list = ConvertFrom-Json -InputObject $candidate -NoEnumerate -ErrorAction Stop

      $enriched = New-Object System.Collections.Generic.List[object]
      foreach ($m in @($list)) {
        if ($null -eq $m) { continue }

        $eventId         = [string](Get-OptionalProperty $m 'eventId')
        $iCalUId         = [string](Get-OptionalProperty $m 'iCalUId')
        $occurrenceStart = Get-OptionalProperty $m 'occurrenceStart'
        $title           = [string](Get-OptionalProperty $m 'title')
        $startTime       = Get-OptionalProperty $m 'startTime'
        $organizer       = [string](Get-OptionalProperty $m 'organizer')
        $attendeesRaw    = Get-OptionalProperty $m 'attendees'

        $attendees = @()
        if ($null -ne $attendeesRaw) {
          $attendees = @(@($attendeesRaw) | ForEach-Object { [string]$_ })
        }

        $occurrenceStamp = ConvertTo-UtcTimestampString $occurrenceStart
        if (-not $occurrenceStamp) { $occurrenceStamp = ConvertTo-UtcTimestampString $startTime }
        $titleSlug = Get-Slug -Value $title -MaxLength 50

        $zakiraKey = $null
        $zakiraKeyStrategy = $null

        if (-not [string]::IsNullOrWhiteSpace($eventId)) {
          $zakiraKey = "meeting-$eventId"
          $zakiraKeyStrategy = 'eventId'
        } elseif (-not [string]::IsNullOrWhiteSpace($iCalUId) -and $occurrenceStamp) {
          $zakiraKey = "meeting-icaluid-$iCalUId-$occurrenceStamp"
          $zakiraKeyStrategy = 'iCalUId+occurrenceStart'
        } elseif ($occurrenceStamp) {
          $hashInput = ($title + '|' + $organizer + '|' + ($attendees -join ','))
          $shortHash = Get-ShortHash -Value $hashInput -Length 8
          $slugForKey = if ([string]::IsNullOrWhiteSpace($titleSlug)) { 'untitled' } else { $titleSlug }
          $zakiraKey = "meeting-$occurrenceStamp-$slugForKey-$shortHash"
          $zakiraKeyStrategy = 'timestamp+slug+hash'
        } else {
          # Skip meetings we cannot uniquely key; they'll be reported in errors.
          continue
        }

        # Re-emit the meeting with the canonical key fields added. Any
        # property the LLM returned that we didn't explicitly read is
        # preserved by copying over PSObject properties.
        $enrichedObj = [ordered]@{}
        foreach ($p in $m.PSObject.Properties) {
          $enrichedObj[$p.Name] = $p.Value
        }
        $enrichedObj['zakiraKey'] = $zakiraKey
        $enrichedObj['zakiraKeyStrategy'] = $zakiraKeyStrategy
        $enrichedObj['titleSlug'] = $titleSlug
        [void]$enriched.Add([pscustomobject]$enrichedObj)
      }

      $arr = $enriched.ToArray()
      $arr | ConvertTo-Json -Depth 50 -Compress -AsArray
    arguments:
      - "{{discover-meetings.output}}"
    timeoutSeconds: 120

  - name: filter-already-briefed
    type: Prompt
    dependsOn: [normalize-meetings-array]
    systemPrompt: |
      You are a state checker for meeting briefs. Use Zakira.Exchange to
      decide which of the enriched meetings still need a brief.

      Rules:
      1. The canonical Zakira key is already computed on each meeting as
         `zakiraKey`. Use it verbatim — do not invent or transform keys.
      2. For each meeting, call Zakira.Exchange `get_memory` with the
         exact `zakiraKey`.
      3. If `forceRebrief` (passed via the user prompt) is the string
         'true', mark every meeting as `needs-brief` regardless of stored
         state.
      4. Otherwise:
         - If a memory exists with status 'briefed' AND `briefedAt` is
           less than 12 hours old (relative to now), mark the meeting as
           `skip` and include the stored briefedAt in the result.
         - Otherwise mark as `needs-brief`.
      5. If ALL meetings are `skip`, call orchestra_complete with status
         'success' and reason 'All upcoming meetings already have a
         recent brief.'
      6. Output a single JSON object:
         {
           "meetingsToBrief": [ <enriched meeting object>, ... ],
           "meetingsSkipped": [
             { "zakiraKey": "...", "title": "...", "startTime": "...", "briefedAt": "..." },
             ...
           ]
         }
      7. Preserve every original field on each meeting object you pass
         through into `meetingsToBrief`. The downstream dispatcher needs
         the full payload.
    userPrompt: |
      Enriched meetings (each has a canonical `zakiraKey`):
      {{normalize-meetings-array.output}}

      forceRebrief flag: {{param.forceRebrief}}

      Look up Zakira.Exchange for each `zakiraKey` and produce the
      split JSON object described above.
    outputHandlerPrompt: |
      Extract one valid JSON object only with the keys `meetingsToBrief`
      and `meetingsSkipped`. Strip markdown fences, prose, and trailing
      whitespace. Output only the JSON object.
    mcps: [zakira]

  - name: dispatch-briefer
    type: Prompt
    dependsOn: [filter-already-briefed]
    systemPrompt: |
      You are an orchestration coordinator. For every meeting that needs
      a brief, invoke the `meeting-prep-briefer` child orchestration
      synchronously and collect its result. Mirror of the
      pr-auto-reviewer dispatch pattern: one child run per item, in the
      same step.

      Rules:
      1. Read `meetingsToBrief` from the input. If the array is empty,
         call orchestra_complete with status 'success' and reason
         'No meetings to dispatch after the Zakira gate.'
      2. For each meeting object in the array:
         a. Use `invoke_orchestration` with `orchestration_name`
            'meeting-prep-briefer', `mode` 'sync', and `timeoutSeconds`
            2400.
         b. Pass parameters as a JSON object mapping parameter names to
            STRING values:
              meetingData    : the meeting object serialised as a single
                                canonical JSON string. Every literal
                                backslash inside string values must be
                                escaped so the child's Script can parse
                                it via ConvertFrom-Json.
              briefingsDir   : the user-prompt-supplied briefingsDir.
              forceRebrief   : the user-prompt-supplied forceRebrief
                                value (string 'true' or 'false').
              dryRun         : the user-prompt-supplied dryRun value.
              zakiraCategory : the user-prompt-supplied zakiraCategory.
              reviewerName   : the user-prompt-supplied reviewerName.
              organization   : the user-prompt-supplied organization.
              project        : the user-prompt-supplied project.
              repository     : the user-prompt-supplied repository.
         c. Wait for completion. Capture the child's `executionId`,
            terminal `status`, and final content.
      3. Output a single JSON object aggregating per-meeting results:
         {
           "totalDispatched": <int>,
           "succeeded": <int>,
           "failed": <int>,
           "results": [
             {
               "title": "...",
               "startTime": "...",
               "zakiraKey": "...",
               "executionId": "...",
               "status": "succeeded|failed",
               "filePath": "<from child save block when available>" | "",
               "summary": "<short text>",
               "webLink": "<from input meeting>",
               "error": null | "..."
             }
           ]
         }
      4. Do not call orchestra_save_file. Output only the JSON object.
    userPrompt: |
      Filter result (meetings to brief and meetings skipped):
      {{filter-already-briefed.output}}

      Forward these parameters into every child invocation:
        briefingsDir   : {{vars.briefingsDir}}
        forceRebrief   : {{param.forceRebrief}}
        dryRun         : {{param.dryRun}}
        zakiraCategory : {{vars.zakiraCategory}}
        reviewerName   : {{vars.reviewerName}}
        organization   : {{vars.organization}}
        project        : {{vars.project}}
        repository     : {{vars.repository}}

      Dispatch each meeting through `meeting-prep-briefer` and aggregate
      the results.
    outputHandlerPrompt: |
      Extract one valid JSON object only with the keys totalDispatched,
      succeeded, failed, and results. Strip markdown fences, prose, and
      trailing whitespace. Preserve every field. Output only the JSON
      object.
    mcps: [orchestra]
    timeoutSeconds: 16000
    retry:
      maxRetries: 2
      backoffSeconds: 10
      backoffMultiplier: 2.0
      retryOnTimeout: true

  - name: gate-noteworthy-activity
    type: Prompt
    dependsOn: [dispatch-briefer]
    systemPrompt: |
      You are a noise filter for the meeting-prep run. Decide whether
      this scheduler tick produced anything worth surfacing to ActionView.

      Read the dispatcher summary JSON. The run is "noteworthy" only if
      at least one child briefer succeeded (`succeeded > 0`) OR at least
      one child briefer failed (`failed > 0`). Both signal real activity
      that warrants a notification.

      If the run is NOT noteworthy (every dispatched briefer was a no-op
      or the dispatcher itself early-completed), call orchestra_complete
      with status 'success' and a reason like 'All <N> dispatched
      briefers reported no actionable activity; skipping ActionView entry.'

      If the run IS noteworthy, output the dispatcher summary JSON
      verbatim (no prose, no markdown fences) so the downstream entry
      generator can consume it.

      Do not call any other tools.
    userPrompt: |
      Decide whether this meeting-prep run is noteworthy enough to surface
      in ActionView.

      Dispatcher summary:
      {{dispatch-briefer.output}}
    outputHandlerPrompt: |
      When continuing, output the dispatcher summary JSON object verbatim
      with no prose or fences. Otherwise (early-completion path),
      preserve the orchestra_complete reason text. Output only the
      relevant content.

  - name: create-actionview-entry
    type: Prompt
    dependsOn: [gate-noteworthy-activity, filter-already-briefed, discover-meetings]
    systemPrompt: |
      You generate ActionView entries for the meeting-prep orchestration.
      The actionview skill (`skills/actionview`) has been loaded — consult
      it for the entry schema and content-block reference. The entry
      `type` must be exactly `meeting-prep` so the ActionView template
      with the same name normalises it; `source` must be
      `{{orchestration.name}}`.

      Required entry shape (the `meeting-prep` template documents the
      expected content blocks):

      - type: `meeting-prep`
      - source: `{{orchestration.name}}`
      - title: `Meeting Prep: <N> brief(s) for the next {{param.lookAheadHours}}h`
      - subtitle: e.g. `<succeeded> briefed, <failed> failed, <skipped> skipped`
      - severity: `high` if any briefer failed; `medium` otherwise
      - icon: `calendar-check`
      - tags: ['meetings', 'prep', 'productivity']
      - pinned: true when any meeting has open items
      - content (ordered):
        1. Optional `alert` block (level 'warning') if any briefer
           failed.
        2. `keyValue` block labelled 'Run Overview' with keys: Window,
           Discovered, Briefed, Skipped, Failed.
        3. `table` block labelled 'Meetings' with columns: Time, Title,
           Organizer, Attendees, Open Items, Brief File. One row per
           successful brief.
        4. A `section` titled 'Per-Meeting Briefs' containing one nested
           section per successful brief:
             - `keyValue` 'Meeting' with Time, Organizer, Attendees.
             - `markdown` 'Top Talking Points' with up to 3 bulleted
               points from the child's talkingPoints.
             - `alert` 'Open Items from Last Time' (level 'info') only
               if the child reported open items; otherwise omit.
             - `link` 'Open Brief' to `filePath` (use a `file://` URL).
             - `link` 'Meeting Link' to the meeting's `webLink` when
               present.
        5. A `section` titled 'Failed Dispatches' when `failed > 0`,
           listing failed meetings with their error messages.
        6. Optional `markdown` 'Run Notes' summarising anything else.
      - actions: leave empty (the template documents 'Open Briefs
        Folder' and 'Dismiss' as expected actions; commands are not
        required for those at submission time).

      Rules:
      1. Save the complete entry JSON using orchestra_save_file with
         extension 'json'. The downstream Script reads that file.
      2. Output only the JSON entry (no prose, no fences). The saved
         file content and the step output must match.
      3. Use canonical URLs from the dispatcher results. Do not invent
         URLs. If a brief file path is empty (dry-run), omit the
         'Open Brief' link for that meeting.
    userPrompt: |
      Dispatcher summary (post-gate):
      {{gate-noteworthy-activity.output}}

      Filter summary (for skipped counts):
      {{filter-already-briefed.output}}

      Discovery output (total discovered count):
      {{discover-meetings.output}}

      Run parameters:
        Window           : {{param.lookAheadHours}} hours
        forceRebrief     : {{param.forceRebrief}}
        dryRun           : {{param.dryRun}}

      Build the ActionView entry per your system prompt and save it via
      orchestra_save_file.
    outputHandlerPrompt: |
      Output one valid JSON object only — the ActionView entry. Strip
      markdown fences, prose, and trailing whitespace. The output must
      match the file you saved via orchestra_save_file.
    skillDirectories:
      - "{{orchestration.sourceDirectory}}/../../skills/actionview"

  - name: read-actionview-entry-file
    type: Script
    dependsOn: [create-actionview-entry]
    shell: pwsh
    script: |
      Get-Content -LiteralPath '{{create-actionview-entry.files[0]}}' -Raw
    timeoutSeconds: 60

  # First-class Orchestration step: launches actionview-submit in-process
  # via the engine's IChildOrchestrationLauncher. No MCP transport is
  # involved, so the 3-minute MCP request timeout does not apply. The
  # step blocks until the child reaches a terminal state and propagates
  # failures as native step failures.
  - name: submit-actionview-entry
    type: Orchestration
    dependsOn: [read-actionview-entry-file]
    orchestration: actionview-submit
    parameters:
      entryJson: "{{read-actionview-entry-file.output}}"
      template: meeting-prep
      groupId: "{{vars.actionViewGroupId}}"
    mode: sync
    timeoutSeconds: 600

  - name: generate-summary
    type: Transform
    dependsOn:
      - discover-meetings
      - filter-already-briefed
      - dispatch-briefer
      - submit-actionview-entry
    template: |
      # Meeting Prep Run Summary

      **Run ID:** {{orchestration.runId}}
      **Started:** {{orchestration.startedAt}}
      **Window:** {{param.lookAheadHours}}h look-ahead
      **Filter:** "{{param.meetingFilter}}"
      **forceRebrief:** {{param.forceRebrief}}
      **dryRun:** {{param.dryRun}}

      ## Discovery
      ```json
      {{discover-meetings.output}}
      ```

      ## Filter (already-briefed gate)
      ```json
      {{filter-already-briefed.output}}
      ```

      ## Dispatch Results
      ```json
      {{dispatch-briefer.output}}
      ```

      ## ActionView Submission
      ```text
      {{submit-actionview-entry.output}}
      ```
    contentType: text/markdown
