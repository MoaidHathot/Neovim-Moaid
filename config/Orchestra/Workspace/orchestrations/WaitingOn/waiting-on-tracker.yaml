      {{pass1-extract-candidates.output}}
      ```

      ## Pass 2 verified
      ```json
      {{pass2-verify.output}}
      ```

      ## Prior ledger
      ```json
      {{load-prior-state.output}}
      ```

      ## Merge + diff
      ```json
      {{merge-and-diff.output}}
      ```

      ## Ledger persistence
