name: actionview-submit
description: |
  Reusable orchestration for submitting entries to ActionView. Accepts pre-built entry JSON and an optional template name. Validates against the ActionView schema before submission.
version: 1.0.0
tags: ["utility", "actionview", "reusable"]

inputs:
  entryJson:
    type: String
    description: |
      The full ActionView entry JSON string to submit. Must conform to the ActionView entry schema (requires at minimum: type, source, title).
    required: true
  template:
    type: String
    description: |
      Optional ActionView template name. If provided, the entry will be validated and merged against this template's definition before submission.
    required: false
    default: ""
  groupId:
    type: String
    description: |
      Optional group ID to assign to the entry. When set, overrides any groupId in the entry JSON. Useful for callers that want to group entries from the same orchestration run.
    required: false
    default: ""

variables:
  defaultModel: claude-opus-4.6

defaultRetryPolicy:
  maxRetries: 2
  backoffSeconds: 3
  backoffMultiplier: 2.0
  retryOnTimeout: true

defaultStepTimeoutSeconds: 120
timeoutSeconds: 600

steps:
  - name: fetch-schema
    type: Command
    dependsOn: []
    command: dnx
    arguments:
      - ActionView.Cli
      - "--yes"
      - "--"
      - schema
    timeoutSeconds: 60

  - name: fetch-template
    type: Command
    dependsOn: []
    command: pwsh
    arguments:
      - "-NoProfile"
      - "-Command"
      - "if ('{{param.template}}' -and '{{param.template}}' -ne '') { dnx ActionView.Cli --yes -- template show '{{param.template}}' } else { Write-Output 'NO_TEMPLATE' }"
    timeoutSeconds: 60

  - name: prepare-entry
    type: Prompt
    dependsOn: [fetch-schema, fetch-template]
    systemPrompt: |
      You are an ActionView entry validator and preparer. Your job is to take a raw entry JSON, validate it against the ActionView schema, optionally apply template defaults, and produce a final clean entry JSON.

      Rules:
      1. The entry MUST have at minimum: type, source, title
      2. If a template definition was provided (not 'NO_TEMPLATE'), use it to fill in any missing defaults or validate that required template fields are present
      3. If a groupId parameter was provided (non-empty), set or override the entry's groupId field with that value
      4. Ensure all content blocks have valid 'type' fields
      5. Ensure severity is one of: low, medium, high, critical (default to 'medium' if not set)
      6. Do NOT modify the entry content beyond validation fixes, template merging, and groupId override
      7. Save the final validated JSON using orchestra_save_file with extension 'json'
      8. If the entry JSON is malformed or missing required fields and cannot be fixed, call orchestra_set_status with status 'failed' and explain the validation error
    userPrompt: |
      ActionView Schema:
      {{fetch-schema.output}}

      Template Definition:
      {{fetch-template.output}}

      GroupId Parameter: '{{param.groupId}}'

      Raw Entry JSON:
      {{param.entryJson}}

      Validate the entry against the schema. If a template was provided, merge any template defaults into the entry for fields that are missing. If groupId is non-empty, set it on the entry. Save the final JSON via orchestra_save_file.
    model: "{{vars.defaultModel}}"
    timeoutSeconds: 90

  - name: submit-entry
    type: Command
    dependsOn: [prepare-entry]
    command: dnx
    arguments:
      - ActionView.Cli
      - "--yes"
      - "--"
      - add
      - "--file"
      - "{{prepare-entry.files[0]}}"
    timeoutSeconds: 60
