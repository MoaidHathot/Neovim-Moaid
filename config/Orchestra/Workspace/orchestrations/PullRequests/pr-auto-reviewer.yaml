name: pr-auto-reviewer
description: |
  Discovers Pull Requests assigned to me in Azure DevOps that need review. Filters out self-authored PRs, checks review state via Zakira.Exchange and PowerReview session/thread state to determine which PRs need review, including new PRs, new iterations, failed/stale runs, and replies to comments created by reviewer agents. Invokes the pr-code-reviewer orchestration for each PR that needs attention, and tracks failed invocations so they are retried on the next run.
version: 1.1.0
tags: ["ZTS", "MSFT", "PR", "Code-Review", "auto"]
defaultModel: gpt-5.4

variables:
  organization: msazure
  project: One
  repository: ZTS
  reviewerName: Moaid Hathot
  zakiraCategory: pr-code-review-state
  staleReviewMinutes: "60"
  pullRequestsDir: "../../orchestrations/PullRequests"
  skillsDirPowerReview: "{{vars.pullRequestsDir}}/skills-powerreview"

defaultRetryPolicy:
  maxRetries: 2
  backoffSeconds: 5
  backoffMultiplier: 2.0
  retryOnTimeout: true

defaultStepTimeoutSeconds: 900
timeoutSeconds: 7200

mcps:
  - name: zakira
    type: local
    command: dnx
    arguments:
      - Zakira.Exchange
      - "--yes"
      - "--"
      - mcp
      - "--category"
      - "{{vars.zakiraCategory}}"

  - name: orchestra
    type: remote
    endpoint: "{{server.url}}/mcp/data"

steps:
  - name: fetch-assigned-prs
    type: Prompt
    systemPrompt: |
      You are an Azure DevOps assistant. Query for active pull requests using the Azure DevOps MCP tools. Return structured data only -- no commentary.
    userPrompt: |
      Using the Azure DevOps tools, list all active (open) pull requests in project '{{vars.project}}' repository '{{vars.repository}}' that have '{{vars.reviewerName}}' as a reviewer. For each PR, return: id, title, createdBy (author display name), creationDate, sourceRefName, targetRefName, reviewers (array of display names), url (full Azure DevOps PR URL), and the latest iteration id (if available).

      Return ONLY a JSON array. If no PRs found, return [].
    outputHandlerPrompt: |
      Ensure the output is a valid JSON array. Strip any markdown fences. If empty, return [].
    mcps: [azdo]
    timeoutSeconds: 600
    retry:
      maxRetries: 3
      backoffSeconds: 10
      backoffMultiplier: 2.0
      retryOnTimeout: true

  - name: filter-prs
    type: Transform
    dependsOn: [fetch-assigned-prs]
    template: |
      The following is the list of open PRs assigned to {{vars.reviewerName}} as a reviewer:

      {{fetch-assigned-prs.output}}

      INSTRUCTION: From the list above, only keep PRs where 'createdBy' is NOT '{{vars.reviewerName}}'. These are PRs created by others awaiting review. Pass the filtered list as-is.
    contentType: text/plain

  - name: check-review-state
    type: Prompt
    dependsOn: [filter-prs]
    systemPrompt: |
      You are a review state manager. You use both Zakira.Exchange and PowerReview to determine whether PRs need review or follow-up.

      Reviewer agents that create PowerReview comments/replies:
      - .NET Expert
      - Principal Engineer
      - Security Expert
      - DTFx Expert
      - liabadi
      - ohads

      ## State Machine

      PR review states stored in Zakira.Exchange:
      - (no entry) = never reviewed
      - 'in-review' = review orchestration is currently running (or was running and crashed)
      - 'reviewed' = review completed successfully at a specific iteration
      - 'failed' = review orchestration failed

      Reviewed state may also contain thread tracking fields such as reviewedAt, sourceCommit, agentThreadSnapshot, and agentThreadLastCheckedAt. Treat them as hints, not as the only source of truth. PowerReview session/thread state is authoritative for comments and replies.

      ## Decision Logic

      For each PR, check Zakira.Exchange first (get_memory with PR ID as key), then use PowerReview with the PR URL. Prefer the `url` field from the PR data. If missing, construct https://dev.azure.com/{{vars.organization}}/{{vars.project}}/_git/{{vars.repository}}/pullrequest/<id>.

      If a PowerReview session exists, refresh/read it using PowerReview so thread and iteration state are current. Inspect session metadata, changed iteration/source commit signals, local AI-authored drafts/submitted comments, and remote comment threads.

      A thread needs follow-up review when it was created by one of the reviewer agents and has a newer human reply/comment that was not already handled. Detect reviewer-agent ownership using any available PowerReview metadata such as draft.author_name/comment.author_name/agentName, and also by the hidden marker `<!-- powerreview-agent: <agent name> -->` in the comment/reply body.

      When a reviewer-agent thread has new human activity, include a reviewEvent with enough detail for pr-code-reviewer to handle it: type, threadId, agentName, filePath, lineStart, latestReplyAuthor, latestReplyCreatedAt, and a short reason. Do not require a new PR iteration for this case.

      A PR needs (re-)review if:
      1. No Zakira state exists AND no PowerReview session exists (first time seeing this PR)
      2. No Zakira state exists BUT a PowerReview session exists (partially reviewed or session created by another process -- include it for review, the code reviewer will pick up the existing session)
      3. Zakira state is 'reviewed' but the stored iterationId differs from the current iteration ID (new commits pushed since last review)
      4. Zakira state is 'failed' (previous review attempt failed, retry it)
      5. Zakira state is 'in-review' but the startedAt timestamp is older than {{vars.staleReviewMinutes}} minutes ago (stale -- the review orchestration likely crashed, retry it)
      6. A reviewer-agent-created comment thread has a new human reply/comment that was not already handled, even if the PR iteration did not change

      A PR should be SKIPPED if:
      1. Zakira state is 'reviewed' AND the iterationId matches the current iteration AND there are no new reviewer-agent thread replies to handle
      2. Zakira state is 'in-review' AND the startedAt timestamp is within the last {{vars.staleReviewMinutes}} minutes (review is still actively running)

      You also have access to the orchestra_complete tool. If ALL PRs should be skipped, call orchestra_complete with status 'success' and reason explaining why no reviews are needed.
    userPrompt: |
      Check the review state for each PR in the filtered list:

      {{filter-prs.output}}

      For each PR:
      1. Use Zakira.Exchange get_memory with the PR ID as key to retrieve stored review state
      2. Use PowerReview with the PR URL to check whether a review session exists, refresh/read current session/thread state if it does, and identify new reviewer-agent thread replies
      3. Apply the decision logic from your instructions

      Output a JSON object:
      {
        "prsToReview": [
          {
            ...PR data...,
            "prUrl": "full PR URL used for PowerReview",
            "reviewReason": "first-time|new-iteration|agent-thread-reply|stale-in-review|failed-retry",
            "reviewEvents": [
              {
                "type": "agent-thread-reply",
                "threadId": 123,
                "agentName": ".NET Expert|Principal Engineer|Security Expert|DTFx Expert|liabadi|ohads",
                "filePath": "path or empty for PR-level thread",
                "lineStart": 42,
                "latestReplyAuthor": "display name",
                "latestReplyCreatedAt": "timestamp",
                "reason": "short explanation"
              }
            ],
            "existingZakiraState": null | { "status": "...", "iterationId": "...", "startedAt": "..." },
            "existingPowerReviewSession": null | { "sessionId": "...", "iterationId": "...", "sourceCommit": "...", "status": "..." }
          }
        ],
        "prsSkipped": [
          { "id": ..., "title": "...", "reason": "already reviewed at iteration X and no agent-thread replies" | "review in progress since <timestamp>" }
        ]
      }

      If prsToReview is empty, call orchestra_complete. Otherwise output the JSON.
    mcps: [zakira, powerreview]
    skillDirectories:
      - "{{vars.skillsDirPowerReview}}"

  - name: invoke-reviews
    type: Prompt
    dependsOn: [check-review-state]
    systemPrompt: |
      You are an orchestration coordinator. You invoke the pr-code-reviewer orchestration for each PR that needs review, then track whether each invocation succeeded or failed.

      For each PR:
      1. Invoke pr-code-reviewer with the PR data as the 'prData' parameter
      2. Use synchronous mode so you can detect success or failure
      3. If the invocation fails or times out, record it as a failure

      After all invocations complete, for any PRs whose review FAILED, update Zakira.Exchange to set their state to 'failed' so the next run of pr-auto-reviewer knows to retry them. Use edit_memory (or create_memory if no entry exists) with:
      - key: the PR ID
      - data: { "status": "failed", "iterationId": <current iteration>, "failedAt": <current timestamp>, "error": <brief error description> }
      - reason: 'Review orchestration failed'

      Do NOT update Zakira for successful reviews -- the pr-code-reviewer orchestration handles that itself.
    userPrompt: |
      The following PRs need to be reviewed:

      {{check-review-state.output}}

      For each PR in the 'prsToReview' array:
      1. Use invoke_orchestration to invoke 'pr-code-reviewer' with mode 'sync' and timeoutSeconds 70000
      2. Pass the enriched PR object as the 'prData' parameter -- serialize the full object, including prUrl/url, reviewReason, reviewEvents, existingZakiraState, and existingPowerReviewSession
      3. After invocation completes, check whether it succeeded or failed
      4. For any failed invocations, update Zakira.Exchange to mark the PR as 'failed'

      After all reviews are complete, output a JSON summary:
      {
        "totalPRsReviewed": <count>,
        "succeeded": <count>,
        "failed": <count>,
        "results": [
          { "prId": ..., "prTitle": "...", "executionId": "...", "status": "succeeded|failed", "summary": "...", "error": null | "..." }
        ]
      }
    mcps: [orchestra, zakira]
    timeoutSeconds: 7200

  - name: fetch-action-view-schema
    type: Command
    command: dnx
    arguments:
      - ActionView.Cli
      - "--yes"
      - "--"
      - schema
    timeoutSeconds: 120

  - name: create-action-view-entry
    type: Prompt
    dependsOn: [invoke-reviews, check-review-state, fetch-action-view-schema]
    systemPrompt: |
      You are an ActionView entry generator for PR auto-review runs. You create structured JSON entries conforming to the ActionView schema. The entry type must be 'pr-auto-review-run' and source must be '{{orchestration.name}}'.

      Your entries should give the user a clear overview of what the auto-reviewer discovered and dispatched: how many PRs were found, how many were skipped vs reviewed, which were triggered by new iterations or reviewer-agent thread replies, and the outcomes. This lets users stay informed about automated review activity.

      IMPORTANT: Save the generated JSON entry using the orchestra_save_file tool.
    userPrompt: |
      Create an ActionView entry summarizing this PR auto-review run.

      ActionView entry schema:
      {{fetch-action-view-schema.output}}

      Review state check (PRs found, skipped, and queued):
      {{check-review-state.output}}

      Review invocation results:
      {{invoke-reviews.output}}

      Create an entry with:
      1. type: 'pr-auto-review-run'
      2. source: '{{orchestration.name}}'
       3. title: 'PR Auto-Review Run' with count of PRs reviewed
       4. subtitle: Summary like 'X reviewed, Y skipped, Z failed'
      5. severity: 'high' if any reviews failed, 'medium' if reviews were dispatched, 'low' if all skipped (nothing to do)
      6. tags: ['pr-review', 'auto-review', 'ZTS']
      7. content blocks:
         - Alert block if any reviews failed (so the user knows retries are pending)
         - A summary table: PR ID | Title | Author | Action | Outcome
           - Action: 'reviewed', 'skipped (already reviewed)', 'skipped (in progress)', etc.
           - Outcome: 'succeeded', 'failed', 'N/A' for skipped
          - A section 'Skipped PRs' listing why each was skipped (if any)
          - A section 'Review Results' with per-PR outcome details and reviewReason (if any were reviewed)
          - A section 'Agent Thread Replies' listing PRs dispatched because a human replied to a reviewer-agent-created thread (if any)
          - A section 'Failed Reviews' listing errors and noting they will be retried (if any failed)
      8. actions:
         - 'View PRs' (style: primary)
         - 'Dismiss' (style: default)

      Save the JSON using orchestra_save_file. Output ONLY the raw JSON.
    timeoutSeconds: 120

  - name: submit-action-view-entry
    type: Command
    dependsOn: [create-action-view-entry]
    command: dnx
    arguments:
      - ActionView.Cli
      - "--yes"
      - "--"
      - add
      - "--file"
      - "{{create-action-view-entry.files[0]}}"
    timeoutSeconds: 120

  - name: generate-summary
    type: Prompt
    dependsOn: [invoke-reviews, check-review-state, submit-action-view-entry]
    systemPrompt: |
      You are a reporting assistant. Produce a clear, concise markdown summary of the PR auto-review orchestration run.
    userPrompt: |
      Create a final markdown summary of this PR auto-review orchestration run.

      Review state check:
      {{check-review-state.output}}

      Review results:
      {{invoke-reviews.output}}

      ActionView submission:
      {{submit-action-view-entry.output}}

      Produce a polished markdown report:
      1. Header: '## PR Auto-Review Summary' with orchestration run info
      2. How many PRs were found assigned for review
      3. How many were skipped (already reviewed or actively in-review) and why
      4. How many were sent for review and their outcomes (succeeded vs failed)
      5. For each reviewed PR: PR title, author, review reason (first-time, new-iteration, agent-thread-reply, retry after failure, stale), and the outcome
      6. Any PRs marked as failed that will be retried on the next run
      7. Confirmation that ActionView entry was submitted
      8. Any errors or issues encountered during the run
    timeoutSeconds: 60

trigger:
  type: scheduler
  enabled: true
  intervalSeconds: 3600
