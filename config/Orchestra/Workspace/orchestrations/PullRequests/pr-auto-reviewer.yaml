name: pr-auto-reviewer
description: |
  Discovers Pull Requests assigned to me in Azure DevOps, filters out self-authored PRs, and delegates each candidate to pr-review-dispatcher. The dispatcher owns PowerReview session refresh, Zakira review-state checks, reviewer-agent thread reply detection, and invoking pr-code-reviewer only when needed.
version: 2.0.0
tags: ["ZTS", "MSFT", "PR", "Code-Review", "auto"]
defaultModel: claude-opus-4.7-1m-internal

variables:
  organization: msazure
  project: One
  repository: ZTS
  reviewerName: Moaid Hathot
  reviewerUniqueName: MoaidHathot@microsoft.com

defaultRetryPolicy:
  maxRetries: 2
  backoffSeconds: 5
  backoffMultiplier: 2.0
  retryOnTimeout: true

defaultStepTimeoutSeconds: 900
timeoutSeconds: 7200

mcps:
  - name: orchestra
    type: remote
    endpoint: "{{server.url}}/mcp/data"

steps:
  - name: fetch-assigned-prs
    type: Script
    shell: pwsh
    # Hard timeout so a regression in the underlying REST call fails fast instead
    # of hanging indefinitely like the prior `az repos pr list --reviewer` path
    # (which left 9 zombie az processes accumulating over 2 hours on 2026-06-04).
    timeoutSeconds: 60
    script: |
      # Deterministic PR enumeration via az CLI.
      #
      # PREVIOUS APPROACH (broken): `az repos pr list --reviewer <email>` forces az
      # to translate the email into an identity descriptor via the SPS REST API
      # endpoint `/Identities?searchFilter=General&filterValue=<email>`. On large orgs
      # (Microsoft's primary `msazure` ADO instance) that lookup scans the entire
      # org directory and routinely hangs for 2+ minutes -- sometimes forever.
      # Without a step timeout it left zombie az processes accumulating.
      #
      # NEW APPROACH: skip identity resolution entirely. The git REST API can list
      # all active PRs in a repo (without `searchCriteria.reviewerId`) in ~1 sec
      # regardless of org size, because no directory scan is involved. We then
      # filter client-side to PRs where any reviewer's `uniqueName` matches the
      # configured reviewer email. Total cost: ~1 REST call + ~50 KB transfer +
      # an O(N) loop over typically 20-50 active PRs in a single repo. Strictly
      # faster AND more robust than the identity-resolved path.
      #
      # Bonus: `--repository <name>` previously forced a repo-name lookup as well;
      # we now resolve the repo ID once (cached for 30 days) and address the
      # endpoint by ID, which is the cheapest stable form.
      #
      # Emits the same JSON-array shape downstream consumers (filter-prs,
      # dispatch-candidates, etc.) expect.
      $ErrorActionPreference = 'Stop'
      try { Get-Command az -ErrorAction Stop | Out-Null } catch {
        throw "az CLI is not available on PATH; cannot fetch assigned PRs."
      }

      # `az` ships an embedded Python that defaults to cp1252 on Windows and dies
      # with a UnicodeEncodeError if any HTTP response contains non-ASCII (the
      # msazure org's PR titles/identity fields commonly do). Force UTF-8.
      $env:PYTHONIOENCODING = 'utf-8'

      function ConvertTo-IsoUtcString {
        param($value)
        if ($null -eq $value) { return "" }
        if ($value -is [datetime]) { return ([datetime]$value).ToUniversalTime().ToString("o") }
        if ($value -is [datetimeoffset]) { return ([datetimeoffset]$value).UtcDateTime.ToString("o") }
        return [string]$value
      }

      $organization = '{{vars.organization}}'
      $project = '{{vars.project}}'
      $repository = '{{vars.repository}}'
      $reviewerUnique = '{{vars.reviewerUniqueName}}'
      $orgUrl = "https://dev.azure.com/$organization"
      # Azure DevOps OAuth resource ID -- same constant az CLI uses for ADO calls.
      $adoResource = '499b84ac-1321-427f-aa17-267ca6975798'

      # ── Resolve & cache the repository ID (NOT the reviewer identity) ─────
      # The reviewer email is matched client-side below; only the repo ID needs
      # a one-time lookup. We cache it for 30 days because repo IDs are
      # effectively immutable.
      $cacheRoot = Join-Path $env:LOCALAPPDATA 'Orchestra\pr-auto-reviewer'
      if (-not (Test-Path $cacheRoot)) { New-Item -ItemType Directory -Path $cacheRoot -Force | Out-Null }
      $cachePath = Join-Path $cacheRoot 'repo-cache.json'
      $cacheKey = "$organization|$project|$repository"
      $cacheMaxAgeDays = 30

      $repoId = $null
      if (Test-Path $cachePath) {
        try {
          $cacheDoc = Get-Content $cachePath -Raw | ConvertFrom-Json
          if ($cacheDoc.key -eq $cacheKey -and $cacheDoc.cachedAt -and $cacheDoc.repositoryId) {
            $cachedAt = [datetime]::Parse($cacheDoc.cachedAt)
            if (((Get-Date) - $cachedAt).TotalDays -lt $cacheMaxAgeDays) {
              $repoId = [string]$cacheDoc.repositoryId
            }
          }
        } catch {
          # Corrupt cache -- fall through to re-resolve.
        }
      }

      if (-not $repoId) {
        # az rest is built-in; az repos show would require the `azure-devops` extension
        # which prompts interactively (via stdin) when missing -- that prompt receives
        # EOF in a piped-stdin orchestration context and crashes az with EOFError.
        $repoBase = "$orgUrl/$project/_apis/git/repositories/$repository"
        # Route stderr to a temp file rather than merging it into stdout with 2>&1.
        # az ignores $env:PYTHONIOENCODING on Windows and unconditionally emits
        # `WARNING: Unable to encode the output with cp1252 encoding...` whenever
        # the HTTP response contains a non-ASCII character. With 2>&1 that warning
        # contaminates the JSON parser's input ('W' is invalid JSON). Keeping the
        # streams separate gives us clean stdout for parsing and preserves stderr
        # for the throw path so real errors still surface with full context.
        $repoStderr = [System.IO.Path]::GetTempFileName()
        try {
          $repoRaw = & az rest `
            --method get `
            --uri $repoBase `
            --uri-parameters "api-version=7.1-preview.1" `
            --resource $adoResource `
            -o json 2>$repoStderr
          if ($LASTEXITCODE -ne 0) {
            $stderr = Get-Content -Raw -LiteralPath $repoStderr -ErrorAction SilentlyContinue
            throw "az rest repository lookup failed (exit $LASTEXITCODE). stderr: $stderr"
          }
          $repoObj = (($repoRaw | ForEach-Object { [string]$_ }) -join "`n") | ConvertFrom-Json -Depth 100
        } finally {
          Remove-Item -LiteralPath $repoStderr -ErrorAction SilentlyContinue
        }
        $repoId = [string]$repoObj.id
        if ([string]::IsNullOrWhiteSpace($repoId)) {
          throw "Could not resolve repository ID for '$project/$repository' in org '$organization'."
        }
        [pscustomobject]@{
          key = $cacheKey
          repositoryId = $repoId
          cachedAt = (Get-Date).ToString('o')
        } | ConvertTo-Json -Depth 5 | Set-Content -LiteralPath $cachePath -Encoding utf8
      }

      # ── Fast PR list: all active PRs in the repo, filtered client-side ────
      # The git REST API returns active PRs in ~1s regardless of org size when
      # the request is keyed by repo ID with NO identity-based filter. We pass
      # --uri-parameters so az re-encodes the query (going through --url with
      # literal `&` characters breaks because az.cmd dispatches via cmd.exe and
      # cmd interprets `&` as a command separator).
      $listBase = "$orgUrl/$project/_apis/git/repositories/$repoId/pullrequests"
      # '$top' is single-quoted so PowerShell doesn't try to interpolate $top.
      # stderr is routed to a temp file (see the comment on the repo lookup
      # above for why merging via 2>&1 corrupts ConvertFrom-Json).
      $listStderr = [System.IO.Path]::GetTempFileName()
      try {
        $raw = & az rest `
          --method get `
          --uri $listBase `
          --uri-parameters "api-version=7.1-preview.1" "searchCriteria.status=active" '$top=200' `
          --resource $adoResource `
          -o json 2>$listStderr
        if ($LASTEXITCODE -ne 0) {
          $stderr = Get-Content -Raw -LiteralPath $listStderr -ErrorAction SilentlyContinue
          throw "az rest pullrequests list failed (exit $LASTEXITCODE). stderr: $stderr"
        }
        $jsonString = ($raw | ForEach-Object { [string]$_ }) -join "`n"
        $envelope = $jsonString | ConvertFrom-Json -Depth 100
      } finally {
        Remove-Item -LiteralPath $listStderr -ErrorAction SilentlyContinue
      }
      # The REST API wraps results in { value: [...], count: N }; unwrap so the
      # downstream foreach body (originally written against the unwrapped array
      # that `az repos pr list` returns) keeps working unchanged.
      $allActive = if ($null -ne $envelope.value) { $envelope.value } else { @() }

      # Client-side filter: keep PRs where any reviewer's uniqueName matches the
      # configured reviewer email (case-insensitive). The ADO PR list response
      # includes the full reviewers[] array on every PR, so this is just a loop
      # over typically 20-50 active PRs in a single repo -- microseconds.
      $list = @($allActive | Where-Object {
        $_ -and $_.reviewers -and @($_.reviewers | Where-Object {
          $_ -and $_.uniqueName -and [string]::Equals([string]$_.uniqueName, $reviewerUnique, [StringComparison]::OrdinalIgnoreCase)
        }).Count -gt 0
      })

      # ── Transform to the downstream output contract ──────────────────────
      # Emits the same JSON-array shape `az repos pr list` used to produce, so
      # the downstream `filter-prs` step (and everything keyed off
      # \{{fetch-assigned-prs.output}}) keeps working without any change.
      $prs = New-Object System.Collections.Generic.List[object]
      foreach ($p in @($list)) {
        if ($null -eq $p) { continue }

        $reviewerNames = @()
        if ($null -ne $p.reviewers) {
          $reviewerNames = @(@($p.reviewers) | ForEach-Object { [string]$_.displayName } | Where-Object { -not [string]::IsNullOrWhiteSpace($_) })
        }

        $createdByName = ""
        $createdByUnique = ""
        if ($null -ne $p.createdBy) {
          $createdByName = [string]$p.createdBy.displayName
          $createdByUnique = [string]$p.createdBy.uniqueName
        }

        $prId = [int]$p.pullRequestId
        $webUrl = "https://dev.azure.com/$organization/$project/_git/$repository/pullrequest/$prId"

        $lastCommit = ""
        if ($null -ne $p.lastMergeSourceCommit -and $p.lastMergeSourceCommit.commitId) {
          $lastCommit = [string]$p.lastMergeSourceCommit.commitId
        }

        $isDraftVal = $false
        if ($null -ne $p.isDraft) { $isDraftVal = [bool]$p.isDraft }

        $entry = [ordered]@{
          id = $prId
          title = [string]$p.title
          status = [string]$p.status
          isDraft = $isDraftVal
          createdBy = $createdByName
          createdByUniqueName = $createdByUnique
          creationDate = ConvertTo-IsoUtcString $p.creationDate
          sourceRefName = [string]$p.sourceRefName
          targetRefName = [string]$p.targetRefName
          reviewers = $reviewerNames
          url = $webUrl
          apiUrl = [string]$p.url
          lastMergeSourceCommitId = $lastCommit
        }
        [void]$prs.Add($entry)
      }

      $prsArr = $prs.ToArray()
      $prsArr | ConvertTo-Json -Depth 100 -Compress -AsArray

  - name: filter-prs
    type: Script
    dependsOn: [fetch-assigned-prs]
    shell: pwsh
    script: |
      # Deterministic filter (replaces the prior text-template that asked the
      # LLM to keep PRs created by anyone other than the reviewer).
      # Drops PRs whose createdBy display name matches `{{vars.reviewerName}}`
      # (case-insensitive). Emits the same JSON-array shape downstream consumers
      # (`dispatch-candidates`, `create-action-view-entry`, `generate-summary`)
      # expect.
      $ErrorActionPreference = 'Stop'

      $reviewerDisplayName = '{{vars.reviewerName}}'

      $all = @'
      {{fetch-assigned-prs.output}}
      '@ | ConvertFrom-Json -Depth 100

      $filtered = New-Object System.Collections.Generic.List[object]
      foreach ($pr in @($all)) {
        if ($null -eq $pr) { continue }
        $createdBy = [string]$pr.createdBy
        if ([string]::Equals($createdBy, $reviewerDisplayName, [StringComparison]::OrdinalIgnoreCase)) {
          continue
        }
        [void]$filtered.Add($pr)
      }

      $filteredArr = $filtered.ToArray()
      $filteredArr | ConvertTo-Json -Depth 100 -Compress -AsArray

  - name: dispatch-candidates
    type: Orchestration
    dependsOn: [filter-prs]
    orchestration: pr-review-dispatcher
    forEach: "{{filter-prs.output}}"
    itemParameter: prData
    parameters:
      mode: auto
      forceReview: "false"
    mode: sync
    maxConcurrency: 4
    continueOnItemFailure: true
    timeoutSeconds: 17000

  - name: aggregate-dispatch
    type: Script
    dependsOn: [dispatch-candidates]
    shell: pwsh
    script: |
      # Deterministic aggregator over the engine forEach rollup. The engine emits
      # {totalDispatched, succeeded, failed, results:[{index, executionId, status,
      # errorMessage, finalContent, input, ...}]}. Each child's finalContent is
      # the pr-review-dispatcher's terminal output (an opaque string), which we
      # do not parse here — we surface it verbatim and classify by status.
      $ErrorActionPreference = 'Stop'

      $raw = $args[0]
      if ([string]::IsNullOrWhiteSpace($raw)) {
        throw 'dispatch-candidates output is empty.'
      }
      $rollup = ConvertFrom-Json -InputObject $raw -Depth 100 -ErrorAction Stop

      $results = @()
      $reviewed = 0
      $skipped = 0
      foreach ($r in @($rollup.results)) {
        $prId = $null; $prTitle = $null
        if ($r.input) {
          try {
            $inputObj = if ($r.input -is [string]) { ConvertFrom-Json -InputObject $r.input -Depth 50 } else { $r.input }
            $prId = $inputObj.id
            $prTitle = $inputObj.title
          } catch { }
        }

        # Best-effort classification: the dispatcher's finalContent (when present)
        # commonly mentions 'reviewed', 'skipped', or 'no-action'. We treat
        # "skipped" hits as skips for the rollup; everything else with status
        # 'succeeded' counts as a review.
        $classification = $r.status
        if ($r.status -eq 'succeeded' -and $r.finalContent) {
          $fc = ([string]$r.finalContent).ToLowerInvariant()
          if ($fc.Contains('"status":"skipped"') -or $fc.Contains('skipped') -and -not $fc.Contains('reviewed')) {
            $classification = 'skipped'; $skipped++
          } else {
            $classification = 'reviewed'; $reviewed++
          }
        }

        $results += [pscustomobject]@{
          prId        = $prId
          prTitle     = $prTitle
          executionId = $r.executionId
          status      = $classification
          summary     = if ($r.finalContent) { [string]$r.finalContent } else { '' }
          error       = $r.errorMessage
        }
      }

      [pscustomobject]@{
        totalPRsDispatched = [int]$rollup.totalDispatched
        succeeded          = [int]$rollup.succeeded
        failed             = [int]$rollup.failed
        reviewed           = $reviewed
        skipped            = $skipped
        results            = $results
      } | ConvertTo-Json -Depth 50 -Compress
    arguments:
      - "{{dispatch-candidates.output}}"
    timeoutSeconds: 120

  - name: gate-noteworthy-activity
    type: Prompt
    dependsOn: [aggregate-dispatch]
    systemPrompt: |
      You are a noise filter for the PR auto-reviewer. Your only job is to decide whether this scheduled run produced anything worth surfacing to the user via ActionView.

      Read the dispatcher summary JSON. The run is "noteworthy" only if at least one PR was actually reviewed by the dispatcher (`reviewed > 0`) OR at least one dispatch failed (`failed > 0`). Both signal real activity that warrants a notification.

      If the run is NOT noteworthy (every PR was skipped — already reviewed at current iteration/source commit, no reviewer-agent thread replies, no failures, nothing meaningful), call orchestra_complete with status 'success' and a reason like 'All <totalPRsDispatched> PR(s) were skipped by the dispatcher (no new reviews, no failures). Skipping ActionView entry creation for this uneventful run.'. This stops the orchestration cleanly so no ActionView entry is created or submitted.

      If the run IS noteworthy, output the dispatcher summary JSON unchanged (no prose, no markdown, no fences) so the downstream ActionView generator can consume it.

      Do not call any other tools. Do not write commentary in either branch.
    userPrompt: |
      Decide whether this PR auto-review run is noteworthy enough to surface in ActionView.

      Dispatcher summary:
      {{aggregate-dispatch.output}}

  - name: fetch-action-view-schema
    type: Command
    command: dnx
    arguments:
      - ActionView.Cli
      - "--yes"
      - "--"
      - schema
    timeoutSeconds: 120

  - name: create-action-view-entry
    type: Prompt
    dependsOn: [gate-noteworthy-activity, filter-prs, fetch-action-view-schema]
    systemPrompt: |
      You are an ActionView entry generator for PR auto-review runs. You create structured JSON entries conforming to the ActionView schema. The entry type must be 'pr-auto-review-run' and source must be '{{orchestration.name}}'.

      Your entries should give the user a clear overview of what the auto-reviewer discovered and dispatched through the shared dispatcher: how many PRs were found, how many were skipped vs reviewed, and the outcomes. This lets users stay informed about automated review activity.

      IMPORTANT: Save the generated JSON entry using the orchestra_save_file tool.
    userPrompt: |
      Create an ActionView entry summarizing this PR auto-review run.

      ActionView entry schema:
      {{fetch-action-view-schema.output}}

      Filtered PR candidates:
      {{filter-prs.output}}

      Dispatcher results:
      {{gate-noteworthy-activity.output}}

      Create an entry with:
      1. type: 'pr-auto-review-run'
      2. source: '{{orchestration.name}}'
      3. title: 'PR Auto-Review Run' with count of PRs dispatched
      4. subtitle: Summary like 'X dispatched, Y reviewed, Z skipped, W failed'
      5. severity: 'high' if any reviews failed, 'medium' if reviews were dispatched, 'low' if all skipped (nothing to do)
      6. tags: ['pr-review', 'auto-review', 'ZTS']
      7. content blocks: include an alert block if any reviews failed, a summary table (PR ID | Title | Author | Action | Outcome), a Dispatcher Results section, a Skipped PRs section if any were skipped, and a Failed Dispatches section if any failed.
      8. actions:
         - 'View PRs' (style: primary)
         - 'Dismiss' (style: default)

      Save the JSON using orchestra_save_file. Output ONLY the raw JSON.
    timeoutSeconds: 120

  - name: submit-action-view-entry
    type: Command
    dependsOn: [create-action-view-entry]
    command: dnx
    arguments:
      - ActionView.Cli
      - "--yes"
      - "--"
      - add
      - "--file"
      - "{{create-action-view-entry.files[0]}}"
    timeoutSeconds: 120

  - name: generate-summary
    type: Prompt
    dependsOn: [aggregate-dispatch, filter-prs, submit-action-view-entry]
    systemPrompt: |
      You are a reporting assistant. Produce a clear, concise markdown summary of the PR auto-review orchestration run.
    userPrompt: |
      Create a final markdown summary of this PR auto-review orchestration run.

      Filtered PR candidates:
      {{filter-prs.output}}

      Dispatcher results:
      {{aggregate-dispatch.output}}

      ActionView submission:
      {{submit-action-view-entry.output}}

      Produce a polished markdown report:
      1. Header: '## PR Auto-Review Summary' with orchestration run info
      2. How many PRs were found assigned for review
      3. How many were skipped (already reviewed or actively in-review) and why
      4. How many were dispatched and their outcomes (reviewed, skipped, failed)
      5. For each dispatched PR: PR title, author, and outcome
      6. Any dispatcher/review failures
      7. Confirmation that ActionView entry was submitted
      8. Any errors or issues encountered during the run
    timeoutSeconds: 60

trigger:
  type: scheduler
  enabled: true
  intervalSeconds: 3600
