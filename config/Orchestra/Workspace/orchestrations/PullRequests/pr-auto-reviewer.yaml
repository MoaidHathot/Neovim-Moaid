name: pr-auto-reviewer
description: |
  Discovers Pull Requests assigned to me in Azure DevOps, filters out self-authored PRs, and delegates each candidate to pr-review-dispatcher. The dispatcher owns PowerReview session refresh, Zakira review-state checks, reviewer-agent thread reply detection, and invoking pr-code-reviewer only when needed.
version: 2.0.0
tags: ["ZTS", "MSFT", "PR", "Code-Review", "auto"]
defaultModel: gpt-5.4

variables:
  organization: msazure
  project: One
  repository: ZTS
  reviewerName: Moaid Hathot
  reviewerUniqueName: MoaidHathot@microsoft.com

defaultRetryPolicy:
  maxRetries: 2
  backoffSeconds: 5
  backoffMultiplier: 2.0
  retryOnTimeout: true

defaultStepTimeoutSeconds: 900
timeoutSeconds: 7200

mcps:
  - name: orchestra
    type: remote
    endpoint: "{{server.url}}/mcp/data"

steps:
  - name: fetch-assigned-prs
    type: Script
    shell: pwsh
    script: |
      # Deterministic PR enumeration via az CLI (replaces the prior azdo MCP prompt).
      # Lists active PRs in `{{vars.project}}/{{vars.repository}}` where the user
      # identified by `{{vars.reviewerUniqueName}}` is a reviewer. Emits a JSON
      # array — the same contract the downstream `filter-prs` step consumes.
      # Note: the `--reviewer` argument requires a resolvable identity (email or
      # descriptor). The display name (`vars.reviewerName`) cannot be used here
      # because Azure DevOps may have multiple identities with the same display
      # name and az CLI fails fast with "multiple identities found".
      $ErrorActionPreference = 'Stop'
      try { Get-Command az -ErrorAction Stop | Out-Null } catch {
        throw "az CLI is not available on PATH; cannot fetch assigned PRs."
      }

      function ConvertTo-IsoUtcString {
        param($value)
        if ($null -eq $value) { return "" }
        if ($value -is [datetime]) { return ([datetime]$value).ToUniversalTime().ToString("o") }
        if ($value -is [datetimeoffset]) { return ([datetimeoffset]$value).UtcDateTime.ToString("o") }
        return [string]$value
      }

      $organization = '{{vars.organization}}'
      $project = '{{vars.project}}'
      $repository = '{{vars.repository}}'
      $reviewerUnique = '{{vars.reviewerUniqueName}}'
      $orgUrl = "https://dev.azure.com/$organization"

      $raw = & az repos pr list `
        --org $orgUrl `
        --project $project `
        --repository $repository `
        --reviewer $reviewerUnique `
        --status active `
        --top 100 `
        -o json 2>&1
      if ($LASTEXITCODE -ne 0) {
        $errText = if ($raw -is [array]) { ($raw | ForEach-Object { [string]$_ }) -join "`n" } else { [string]$raw }
        throw "az repos pr list failed (exit $LASTEXITCODE): $errText"
      }
      $jsonString = if ($raw -is [array]) { ($raw | ForEach-Object { [string]$_ }) -join "`n" } else { [string]$raw }
      $list = $jsonString | ConvertFrom-Json -Depth 100

      $prs = New-Object System.Collections.Generic.List[object]
      foreach ($p in @($list)) {
        if ($null -eq $p) { continue }

        $reviewerNames = @()
        if ($null -ne $p.reviewers) {
          $reviewerNames = @(@($p.reviewers) | ForEach-Object { [string]$_.displayName } | Where-Object { -not [string]::IsNullOrWhiteSpace($_) })
        }

        $createdByName = ""
        $createdByUnique = ""
        if ($null -ne $p.createdBy) {
          $createdByName = [string]$p.createdBy.displayName
          $createdByUnique = [string]$p.createdBy.uniqueName
        }

        $prId = [int]$p.pullRequestId
        $webUrl = "https://dev.azure.com/$organization/$project/_git/$repository/pullrequest/$prId"

        $lastCommit = ""
        if ($null -ne $p.lastMergeSourceCommit -and $p.lastMergeSourceCommit.commitId) {
          $lastCommit = [string]$p.lastMergeSourceCommit.commitId
        }

        $isDraftVal = $false
        if ($null -ne $p.isDraft) { $isDraftVal = [bool]$p.isDraft }

        $entry = [ordered]@{
          id = $prId
          title = [string]$p.title
          status = [string]$p.status
          isDraft = $isDraftVal
          createdBy = $createdByName
          createdByUniqueName = $createdByUnique
          creationDate = ConvertTo-IsoUtcString $p.creationDate
          sourceRefName = [string]$p.sourceRefName
          targetRefName = [string]$p.targetRefName
          reviewers = $reviewerNames
          url = $webUrl
          apiUrl = [string]$p.url
          lastMergeSourceCommitId = $lastCommit
        }
        [void]$prs.Add($entry)
      }

      $prsArr = $prs.ToArray()
      $prsArr | ConvertTo-Json -Depth 100 -Compress -AsArray

  - name: filter-prs
    type: Script
    dependsOn: [fetch-assigned-prs]
    shell: pwsh
    script: |
      # Deterministic filter (replaces the prior text-template that asked the
      # LLM to keep PRs created by anyone other than the reviewer).
      # Drops PRs whose createdBy display name matches `{{vars.reviewerName}}`
      # (case-insensitive). Emits the same JSON-array shape downstream consumers
      # (`dispatch-candidates`, `create-action-view-entry`, `generate-summary`)
      # expect.
      $ErrorActionPreference = 'Stop'

      $reviewerDisplayName = '{{vars.reviewerName}}'

      $all = @'
      {{fetch-assigned-prs.output}}
      '@ | ConvertFrom-Json -Depth 100

      $filtered = New-Object System.Collections.Generic.List[object]
      foreach ($pr in @($all)) {
        if ($null -eq $pr) { continue }
        $createdBy = [string]$pr.createdBy
        if ([string]::Equals($createdBy, $reviewerDisplayName, [StringComparison]::OrdinalIgnoreCase)) {
          continue
        }
        [void]$filtered.Add($pr)
      }

      $filteredArr = $filtered.ToArray()
      $filteredArr | ConvertTo-Json -Depth 100 -Compress -AsArray

  - name: dispatch-candidates
    type: Prompt
    dependsOn: [filter-prs]
    systemPrompt: |
      You are an orchestration coordinator. You delegate each filtered PR candidate to pr-review-dispatcher using synchronous mode. The dispatcher decides whether to skip or invoke pr-code-reviewer, and it handles review-state updates through the child review path.

      If there are no filtered PRs, call orchestra_complete with status 'success' and reason 'No active PRs assigned for review after filtering self-authored PRs.'.
    userPrompt: |
      Dispatch each filtered PR candidate through pr-review-dispatcher.

      The input below is a JSON array of PR objects (already filtered to
      exclude self-authored PRs). If the array is empty, call orchestra_complete
      as instructed in your system prompt.

      Filtered PRs (JSON array):
      {{filter-prs.output}}

      For each PR object in the array:
      1. Use invoke_orchestration to invoke 'pr-review-dispatcher' with mode 'sync' and timeoutSeconds 17000.
      2. Pass parameters: prData = the serialized PR object as valid JSON, mode = 'auto', forceReview = 'false'. The prData string must be parseable JSON; escape every literal backslash in string values (for example, reviewer names like `[TEAM FOUNDATION]\ZTS`).
      3. Record whether the dispatcher reviewed, skipped, failed, or completed with no action.

      After all dispatches complete, output a JSON summary:
      {
        "totalPRsDispatched": <count>,
        "reviewed": <count>,
        "skipped": <count>,
        "succeeded": <count>,
        "failed": <count>,
        "results": [
          { "prId": ..., "prTitle": "...", "executionId": "...", "status": "reviewed|skipped|failed", "summary": "...", "error": null | "..." }
        ]
      }
    mcps: [orchestra]
    timeoutSeconds: 7200

  - name: fetch-action-view-schema
    type: Command
    command: dnx
    arguments:
      - ActionView.Cli
      - "--yes"
      - "--"
      - schema
    timeoutSeconds: 120

  - name: create-action-view-entry
    type: Prompt
    dependsOn: [dispatch-candidates, filter-prs, fetch-action-view-schema]
    systemPrompt: |
      You are an ActionView entry generator for PR auto-review runs. You create structured JSON entries conforming to the ActionView schema. The entry type must be 'pr-auto-review-run' and source must be '{{orchestration.name}}'.

      Your entries should give the user a clear overview of what the auto-reviewer discovered and dispatched through the shared dispatcher: how many PRs were found, how many were skipped vs reviewed, and the outcomes. This lets users stay informed about automated review activity.

      IMPORTANT: Save the generated JSON entry using the orchestra_save_file tool.
    userPrompt: |
      Create an ActionView entry summarizing this PR auto-review run.

      ActionView entry schema:
      {{fetch-action-view-schema.output}}

      Filtered PR candidates:
      {{filter-prs.output}}

      Dispatcher results:
      {{dispatch-candidates.output}}

      Create an entry with:
      1. type: 'pr-auto-review-run'
      2. source: '{{orchestration.name}}'
      3. title: 'PR Auto-Review Run' with count of PRs dispatched
      4. subtitle: Summary like 'X dispatched, Y reviewed, Z skipped, W failed'
      5. severity: 'high' if any reviews failed, 'medium' if reviews were dispatched, 'low' if all skipped (nothing to do)
      6. tags: ['pr-review', 'auto-review', 'ZTS']
      7. content blocks: include an alert block if any reviews failed, a summary table (PR ID | Title | Author | Action | Outcome), a Dispatcher Results section, a Skipped PRs section if any were skipped, and a Failed Dispatches section if any failed.
      8. actions:
         - 'View PRs' (style: primary)
         - 'Dismiss' (style: default)

      Save the JSON using orchestra_save_file. Output ONLY the raw JSON.
    timeoutSeconds: 120

  - name: submit-action-view-entry
    type: Command
    dependsOn: [create-action-view-entry]
    command: dnx
    arguments:
      - ActionView.Cli
      - "--yes"
      - "--"
      - add
      - "--file"
      - "{{create-action-view-entry.files[0]}}"
    timeoutSeconds: 120

  - name: generate-summary
    type: Prompt
    dependsOn: [dispatch-candidates, filter-prs, submit-action-view-entry]
    systemPrompt: |
      You are a reporting assistant. Produce a clear, concise markdown summary of the PR auto-review orchestration run.
    userPrompt: |
      Create a final markdown summary of this PR auto-review orchestration run.

      Filtered PR candidates:
      {{filter-prs.output}}

      Dispatcher results:
      {{dispatch-candidates.output}}

      ActionView submission:
      {{submit-action-view-entry.output}}

      Produce a polished markdown report:
      1. Header: '## PR Auto-Review Summary' with orchestration run info
      2. How many PRs were found assigned for review
      3. How many were skipped (already reviewed or actively in-review) and why
      4. How many were dispatched and their outcomes (reviewed, skipped, failed)
      5. For each dispatched PR: PR title, author, and outcome
      6. Any dispatcher/review failures
      7. Confirmation that ActionView entry was submitted
      8. Any errors or issues encountered during the run
    timeoutSeconds: 60

trigger:
  type: scheduler
  enabled: true
  intervalSeconds: 3600
