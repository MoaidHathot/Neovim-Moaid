name: pr-code-reviewer
description: |
  Reviews or follows up on a single Pull Request using six expert reviewers (.NET Expert, Principal Software Engineer, Security Expert, DurableTasksFramework Expert, liabadi persona, ohads persona). Uses PowerReview open to create or refresh the session, then reviewers use PowerReview MCP on demand for metadata, diffs, files, threads, replies, and draft comments. Handles new PRs, new PR iterations, and replies to comments created by reviewer agents. Correlates with WorkIQ for related organizational context. Tracks PR review state via Zakira.Exchange. Produces an ActionView summary of all draft feedback.
version: 1.1.0
tags: ["ZTS", "MSFT", "PR", "Code-Review", "auto"]
defaultModel: gpt-5.4

inputs:
  prData:
    type: string
    description: |
      JSON object containing the PR to review with fields such as id, title, createdBy, creationDate, sourceRefName, targetRefName, reviewers, url/prUrl, iterationId, reviewReason, and optional reviewEvents for reviewer-agent thread replies
    required: true

variables:
  organization: msazure
  project: One
  repository: ZTS
  reviewerName: Moaid Hathot
  zakiraCategory: pr-code-review-state
  reviewerAgentNames: ".NET Expert, Principal Engineer, Security Expert, DTFx Expert, liabadi, ohads"
  personasDir: "./Personas"
  liabadiDir: "{{vars.personasDir}}/liabadi"
  liabadiSkillsDir: "{{vars.liabadiDir}}/Skills"
  ohadsDir: "{{vars.personasDir}}/ohads"
  ohadsSkillsDir: "{{vars.ohadsDir}}/Skills"
  skillsDirPowerReview: "./skills-powerreview"
  skillsDirActionView: "./skills-actionview"
  promptsDir: "./prompts"

defaultRetryPolicy:
  maxRetries: 2
  backoffSeconds: 5
  backoffMultiplier: 2.0
  retryOnTimeout: true

defaultStepTimeoutSeconds: 1000
timeoutSeconds: 15000

mcps:
  - name: zakira
    type: local
    command: dnx
    arguments:
      - Zakira.Exchange
      - "--yes"
      - "--"
      - mcp
      - "--category"
      - "{{vars.zakiraCategory}}"

  - name: workiq
    type: local
    command: npx
    arguments:
      - "-y"
      - "@microsoft/workiq"
      - mcp

  - name: context7
    type: local
    command: npx
    arguments:
      - "-y"
      - "@upstash/context7-mcp"

steps:
  - name: prepare-pr-data
    type: Script
    shell: pwsh
    script: |
        $ErrorActionPreference = 'Stop'

        function Get-JsonCandidate {
          param([Parameter(Mandatory)][string]$Text)

          $trimmed = $Text.Trim()
          if ($trimmed.StartsWith('```')) {
            $lines = @($trimmed -split "`r?`n")
            if ($lines.Count -gt 1) {
              $trimmed = ($lines[1..($lines.Count - 1)] -join "`n").Trim()
              if ($trimmed.EndsWith('```')) {
                $trimmed = $trimmed.Substring(0, $trimmed.Length - 3).Trim()
              }
            }
          }

          $start = -1
          for ($i = 0; $i -lt $trimmed.Length; $i++) {
            if ($trimmed[$i] -eq '{' -or $trimmed[$i] -eq '[') { $start = $i; break }
          }
          if ($start -lt 0) { throw 'No JSON object or array was found in PR data.' }

          $stack = [System.Collections.Generic.List[char]]::new()
          $inString = $false
          for ($i = $start; $i -lt $trimmed.Length; $i++) {
            $ch = $trimmed[$i]
            if ($inString) {
              if ($ch -eq '\') {
                if ($i + 1 -lt $trimmed.Length) { $i++ }
                continue
              }
              if ($ch -eq '"') { $inString = $false }
              continue
            }

            if ($ch -eq '"') { $inString = $true; continue }
            if ($ch -eq '{') { $stack.Add([char]'}'); continue }
            if ($ch -eq '[') { $stack.Add([char]']'); continue }
            if ($ch -eq '}' -or $ch -eq ']') {
              if ($stack.Count -eq 0) { continue }
              $expected = $stack[$stack.Count - 1]
              if ($ch -ne $expected) { throw "Mismatched JSON delimiter. Expected '$expected' but found '$ch'." }
              $stack.RemoveAt($stack.Count - 1)
              if ($stack.Count -eq 0) {
                return $trimmed.Substring($start, $i - $start + 1).Trim()
              }
            }
          }

          throw 'JSON object or array was not complete.'
        }

        function Repair-InvalidJsonStringEscapes {
          param([Parameter(Mandatory)][string]$Text)

          $builder = [System.Text.StringBuilder]::new()
          $inString = $false
          for ($i = 0; $i -lt $Text.Length; $i++) {
            $ch = $Text[$i]
            if ($inString) {
              if ($ch -eq '\') {
                if ($i + 1 -ge $Text.Length) {
                  [void]$builder.Append('\\')
                  continue
                }

                $next = $Text[$i + 1]
                if ($next -match '["\\/bfnrt]') {
                  [void]$builder.Append($ch)
                  [void]$builder.Append($next)
                  $i++
                  continue
                }

                if ($next -eq 'u') {
                  $hasHex = $i + 5 -lt $Text.Length
                  if ($hasHex) {
                    $hex = $Text.Substring($i + 2, 4)
                    if ($hex -match '^[0-9A-Fa-f]{4}$') {
                      [void]$builder.Append($ch)
                      [void]$builder.Append('u')
                      [void]$builder.Append($hex)
                      $i += 5
                      continue
                    }
                  }
                }

                [void]$builder.Append('\\')
                continue
              }

              if ($ch -eq '"') { $inString = $false }
              [void]$builder.Append($ch)
              continue
            }

            if ($ch -eq '"') { $inString = $true }
            [void]$builder.Append($ch)
          }

          return $builder.ToString()
        }

        function ConvertTo-CanonicalJson {
          param([Parameter(Mandatory)][string]$Text)

          if ([string]::IsNullOrWhiteSpace($Text)) { throw 'PR data JSON is empty.' }

          $candidate = Get-JsonCandidate -Text $Text
          try {
            $value = ConvertFrom-Json -InputObject $candidate -NoEnumerate -ErrorAction Stop
          } catch {
            $repaired = Repair-InvalidJsonStringEscapes -Text $candidate
            try {
              $value = ConvertFrom-Json -InputObject $repaired -NoEnumerate -ErrorAction Stop
            } catch {
              throw "PR data was not valid JSON after extracting and repairing common backslash escapes. $($_.Exception.Message)"
            }
          }

          ConvertTo-Json -InputObject $value -Compress -Depth 20
        }

        ConvertTo-CanonicalJson -Text $args[0]
    arguments:
      - "{{param.prData}}"
    timeoutSeconds: 120

  - name: mark-in-review
    type: Prompt
    dependsOn: [prepare-pr-data]
    systemPrompt: |
      You are a state persistence assistant. You use Zakira.Exchange to mark a PR as 'in-review' so that other orchestration runs know this PR is currently being reviewed and should not be picked up again.

      Extract the PR ID from the PR data and use it as the key. Store the state with status 'in-review' and the current timestamp as startedAt.

      Use create_memory for new entries or edit_memory if an entry already exists (e.g., retrying a previously failed review).
    userPrompt: |
      Mark the following PR as 'in-review' in Zakira.Exchange:

      {{prepare-pr-data.output}}

      Use Zakira.Exchange to save with:
      - key: the PR ID
      - data: JSON with { "status": "in-review", "iterationId": <current iteration from PR data>, "prUrl": <PR URL if available>, "reviewReason": <review reason if available>, "startedAt": <current timestamp>, "orchestrationRunId": "{{orchestration.runId}}" }
      - reason: 'PR review started by pr-code-reviewer orchestration'
      - tags: ['in-review', the PR author]

      Try create_memory first; if the key already exists, use edit_memory.

      Output confirmation of what was saved.
    mcps: [zakira]

  - name: open-review-session
    type: Script
    dependsOn: [mark-in-review, prepare-pr-data]
    shell: pwsh
    script: |
        $ErrorActionPreference = 'Stop'
        $pr = ConvertFrom-Json -InputObject $args[0] -NoEnumerate -ErrorAction Stop

        function Normalize-PrUrl {
          param([string]$Url)

          if ([string]::IsNullOrWhiteSpace($Url)) { return $Url }

          # PowerReview and Windows shell callers only need the stable PR URL; strip view-specific query fragments.
          return (($Url.Trim() -split '[?#]', 2)[0]).TrimEnd('/')
        }

        function Resolve-PowerReviewOpenPrUrl {
          param(
            [Parameter(Mandatory)]$Result,
            [Parameter(Mandatory)][string]$FallbackPrUrl
          )

          $candidates = @(
            $Result.prUrl,
            $Result.url,
            $Result.pullRequest.url,
            $Result.pull_request.url,
            $Result.session.prUrl,
            $Result.session.url,
            $Result.session.pullRequest.url,
            $Result.session.pull_request.url,
            $FallbackPrUrl
          )

          foreach ($candidate in $candidates) {
            $value = [string]$candidate
            if (-not [string]::IsNullOrWhiteSpace($value)) { return $value }
          }

          return ''
        }

        $prUrl = $pr.prUrl
        if ([string]::IsNullOrWhiteSpace([string]$prUrl)) { $prUrl = $pr.url }
        if ([string]::IsNullOrWhiteSpace([string]$prUrl)) { $prUrl = "https://dev.azure.com/{{vars.organization}}/{{vars.project}}/_git/{{vars.repository}}/pullrequest/$($pr.id)" }
        $prUrl = Normalize-PrUrl -Url $prUrl

        function Invoke-PowerReviewOpen {
          param([Parameter(Mandatory)][string]$PrUrl)

          $stdoutPath = [System.IO.Path]::GetTempFileName()
          $stderrPath = [System.IO.Path]::GetTempFileName()
          $previousNativeCommandPreference = $PSNativeCommandUseErrorActionPreference
          $PSNativeCommandUseErrorActionPreference = $false

          try {
            & dnx --yes --add-source https://api.nuget.org/v3/index.json PowerReview -- open --pr-url $PrUrl 1> $stdoutPath 2> $stderrPath
            $exitCode = $LASTEXITCODE
            $stdout = Get-Content -LiteralPath $stdoutPath -Raw -ErrorAction SilentlyContinue
            $stderr = Get-Content -LiteralPath $stderrPath -Raw -ErrorAction SilentlyContinue
          } finally {
            $PSNativeCommandUseErrorActionPreference = $previousNativeCommandPreference
            Remove-Item -LiteralPath $stdoutPath, $stderrPath -Force -ErrorAction SilentlyContinue
          }

          if ($exitCode -ne 0) {
            throw "PowerReview open failed with exit code $exitCode for '$PrUrl'. Stdout: $stdout Stderr: $stderr"
          }

          $jsonText = if ($null -eq $stdout) { '' } else { $stdout.Trim() }
          if ([string]::IsNullOrWhiteSpace($jsonText)) {
            throw "PowerReview open produced empty stdout for '$PrUrl'. Stderr: $stderr"
          }

          try {
            $result = ConvertFrom-Json -InputObject $jsonText -NoEnumerate -ErrorAction Stop
          } catch {
            throw "PowerReview open stdout was not valid JSON for '$PrUrl'. Stdout: $jsonText Stderr: $stderr"
          }

          $openPrUrl = Resolve-PowerReviewOpenPrUrl -Result $result -FallbackPrUrl $PrUrl
          if ([string]::IsNullOrWhiteSpace($openPrUrl)) {
            throw "PowerReview open JSON did not contain a usable PR URL for '$PrUrl'. Stdout: $jsonText"
          }

          $result | Add-Member -NotePropertyName prUrl -NotePropertyValue $openPrUrl -Force
          return $result
        }

        $openResult = Invoke-PowerReviewOpen -PrUrl $prUrl
        [pscustomobject]@{
          prId = $pr.id
          prTitle = $pr.title
          prUrl = $prUrl
          powerReviewOpenPrUrl = $openResult.prUrl
          author = if ($pr.createdBy) { $pr.createdBy } else { $pr.author }
          iterationId = $pr.iterationId
          sourceRefName = $pr.sourceRefName
          targetRefName = $pr.targetRefName
          reviewReason = $pr.reviewReason
          reviewEvents = $pr.reviewEvents
          existingZakiraState = $pr.existingZakiraState
          existingPowerReviewSession = $pr.existingPowerReviewSession
          reviewerAgents = '{{vars.reviewerAgentNames}}'
          status = 'opened-or-refreshed'
        } | ConvertTo-Json -Compress -Depth 20
    arguments:
      - "{{prepare-pr-data.output}}"
    timeoutSeconds: 1200

  - name: workiq-context
    type: Prompt
    dependsOn: [open-review-session]
    systemPrompt: |
      You are a contextual intelligence analyst. You use WorkIQ to search for additional context about this PR and its related work items across Microsoft 365 data (emails, Teams messages, meetings, documents). Use PowerReview MCP tools as needed to read PR metadata, work item metadata, threads, and current session state. Do not use Azure DevOps MCP here; PowerReview is the PR source of truth.

      WorkIQ accepts natural language queries about organizational communications. Simply ask questions like:
      - 'Find emails about [topic]'
      - 'What meetings discussed [feature name]?'
      - 'Find Teams messages mentioning [keyword]'
      - 'Who has been discussing [topic] recently?'
      - 'Find documents related to [feature]'

      No explicit authentication step is needed -- WorkIQ handles authentication automatically.

      Combine WorkIQ findings with PowerReview PR/session metadata to understand why the PR exists and whether the implementation appears aligned with the available requirements. Keep the output compact.
    userPrompt: |
      Search for organizational context about this PR and its requirements.

      Review session:
      {{open-review-session.output}}

      Steps:
      1. Use PowerReview MCP tools as needed to understand the PR title, description, linked work items, current threads, and review trigger
      2. Ask WorkIQ to find emails related to this PR's title, feature name, and linked work item titles
      3. Ask WorkIQ about recent meetings (last 14 days) that discussed this feature or related topics
      4. Ask WorkIQ to find Teams messages mentioning this PR, work items, or the feature being implemented
      5. Ask WorkIQ for any documents or design specs related to this feature
      6. Cross-reference WorkIQ findings against the PowerReview PR/work item context

      Produce a JSON report:
      {
        "relatedDiscussions": [ { "source": "chat|email|meeting|document", "summary": "...", "participants": [...], "date": "..." } ],
        "requirementsAlignment": "aligned|partial|misaligned|unknown",
        "alignmentNotes": "Explanation of how the implementation matches or deviates from discussed requirements",
        "additionalContext": "Any relevant context from communications that reviewers should know about"
      }
    mcps: [workiq, powerreview]
    retry:
      maxRetries: 2
      backoffSeconds: 10
      backoffMultiplier: 2.0
      retryOnTimeout: true

  - name: review-dotnet-expert
    type: Prompt
    dependsOn: [open-review-session]
    systemPromptFile: "{{vars.promptsDir}}/dotnet-expert.md"
    userPrompt: |
      Review this Pull Request from a .NET expertise perspective.

      ## Review Session
      {{open-review-session.output}}

      Session URL guard: Treat this Review Session block as the only allowed source for the PR URL. Before using any PowerReview tool, verify that the session data is valid JSON and contains a non-empty `powerReviewOpenPrUrl` or `prUrl`. If it does not, do not search prior portal output, discovery output, ActionView entries, logs, or any other stale text for a PR URL; stop this reviewer and output a JSON summary with `commentsLeft: 0`, `status: "needs-work"`, and a summary explaining that review could not proceed because the current session did not include a PR URL.

      Use the loaded PowerReview skills and PowerReview MCP tools as needed to review the PR. Load PR metadata, changed files, diffs, existing threads/replies, work items, and repository files from PowerReview on demand; do not assume all context is preloaded.

      This orchestration handles new PR review, new iteration re-review, and follow-up replies to comments/threads created by reviewer agents. If reviewReason is 'agent-thread-reply', prioritize reviewEvents for agentName ".NET Expert" and decide whether to create draft follow-up feedback, recommend resolving/dismissing via a draft reply, or leave no draft. If there are no matching .NET Expert follow-up events, do not perform a full re-review; output a zero-comment summary for this reviewer.

      Do not directly resolve or dismiss threads unless PowerReview supports draftable status changes. For now, use a draft reply to explain any recommended resolution or dismissal so the user can approve it in ActionView.

      For any PowerReview draft/comment/reply/proposal you create, set agentName exactly ".NET Expert" and include this hidden marker in the body: `<!-- powerreview-agent: .NET Expert -->`.

      After leaving all comments, output a JSON summary:
      {
        "reviewer": ".NET Expert",
        "commentsLeft": <count of draft comments or replies created>,
        "followUpsHandled": <count of reviewer-agent thread events handled>,
        "criticalIssues": <count>,
        "summary": "Brief overview of .NET-specific findings",
        "status": "approved|approved-with-suggestions|needs-work"
      }
    mcps: [powerreview]
    reasoningLevel: High
    skillDirectories:
      - "{{vars.skillsDirPowerReview}}"
    subagents:
      - name: dotnet-docs-checker
        displayName: Documentation Checker
        description: |
          Checks latest .NET documentation via Context7 to verify whether APIs, patterns, or practices used in the PR are current and recommended. Use this agent when you need to verify if a .NET API usage is correct or if there are newer recommended approaches.
        prompt: |
          You are a .NET documentation researcher. Use the Context7 MCP to look up the latest documentation for .NET APIs, packages, and patterns referenced in the code changes. Verify that:
          1. APIs used are not deprecated or obsolete
          2. The usage patterns match current Microsoft recommendations
          3. There are no newer, better alternatives available

          Return findings as JSON: { "verified": [...items checked], "issues": [...problems found with documentation links] }
        mcps: [context7]
        infer: true

      - name: dotnet-code-analyzer
        displayName: Code Comparison Analyzer
        description: |
          Reads the current codebase files via PowerReview to compare against the PR changes, looking for suspicious patterns, inconsistencies with existing code conventions, and potential regressions. Use this agent to understand the existing code context around changed files.
        prompt: |
          You are a codebase analyst with access to the repository through PowerReview MCP tools. Use PowerReview to discover project structure and read source files in the PR session worktree as needed.

          The PR URL is available in the review session data passed to your parent agent. Use it with all PowerReview tool calls.

          Read files surrounding the changed code to understand:
          1. Existing patterns and conventions in the codebase
          2. Whether the PR changes are consistent with existing code style
          3. Whether the changes might break existing callers or contracts
          4. Any suspicious deviations from the codebase's established patterns

          Focus on .NET-specific concerns: DI registration consistency, naming conventions, async patterns, error handling patterns used elsewhere.

          Prefer targeted PowerReview reads around changed files and related files. Use offset/limit style reads for large files when available.

          Return findings as JSON: { "patterns": [...existing patterns observed], "inconsistencies": [...deviations from existing patterns], "risks": [...potential regression risks] }
        mcps: [powerreview]
        infer: true

      - name: dotnet-test-coverage-checker
        displayName: Test Coverage Checker
        description: |
          Checks whether the PR includes adequate test coverage for the changes made. Uses PowerReview to read both changed files and corresponding test files. Use this agent to assess test quality and coverage gaps.
        prompt: |
          You are a test coverage analyst with access to the repository through PowerReview MCP tools. Use PowerReview to examine changed files and related test files as needed.

          The PR URL is available in the review session data passed to your parent agent. Use it with all PowerReview tool calls.

          For each file or reviewer-agent follow-up in scope:
          1. Use PowerReview MCP tools to inspect changed files, diffs, and corresponding test files as needed
          2. Determine if the PR adds new tests for new functionality
          3. Identify untested code paths in the changes
          4. Check test quality: are they testing behavior or implementation details?

          Return findings as JSON: { "filesWithTests": [...], "filesWithoutTests": [...], "newTestsAdded": true/false, "coverageGaps": [...specific untested scenarios], "testQuality": "good|adequate|poor" }
        mcps: [powerreview]
        infer: true

  - name: review-principal-engineer
    type: Prompt
    dependsOn: [open-review-session]
    systemPromptFile: "{{vars.promptsDir}}/principal-software-engineer.md"
    userPrompt: |
      Review this Pull Request from a Principal Software Engineer perspective.

      ## Review Session
      {{open-review-session.output}}

      Session URL guard: Treat this Review Session block as the only allowed source for the PR URL. Before using any PowerReview tool, verify that the session data is valid JSON and contains a non-empty `powerReviewOpenPrUrl` or `prUrl`. If it does not, do not search prior portal output, discovery output, ActionView entries, logs, or any other stale text for a PR URL; stop this reviewer and output a JSON summary with `commentsLeft: 0`, `status: "needs-work"`, and a summary explaining that review could not proceed because the current session did not include a PR URL.

      Use the loaded PowerReview skills and PowerReview MCP tools as needed to review the PR. Load PR metadata, changed files, diffs, existing threads/replies, work items, and repository files from PowerReview on demand; do not assume all context is preloaded.

      This orchestration handles new PR review, new iteration re-review, and follow-up replies to comments/threads created by reviewer agents. If reviewReason is 'agent-thread-reply', prioritize reviewEvents for agentName "Principal Engineer" and decide whether to create draft follow-up feedback, recommend resolving/dismissing via a draft reply, or leave no draft. If there are no matching Principal Engineer follow-up events, do not perform a full re-review; output a zero-comment summary for this reviewer.

      Do not directly resolve or dismiss threads unless PowerReview supports draftable status changes. For now, use a draft reply to explain any recommended resolution or dismissal so the user can approve it in ActionView.

      For any PowerReview draft/comment/reply/proposal you create, set agentName exactly "Principal Engineer" and include this hidden marker in the body: `<!-- powerreview-agent: Principal Engineer -->`.

      After leaving all comments, output a JSON summary:
      {
        "reviewer": "Principal Software Engineer",
        "commentsLeft": <count of draft comments or replies created>,
        "followUpsHandled": <count of reviewer-agent thread events handled>,
        "criticalIssues": <count>,
        "summary": "Brief overview of architectural and design findings",
        "status": "approved|approved-with-suggestions|needs-work"
      }
    mcps: [powerreview]
    reasoningLevel: High
    skillDirectories:
      - "{{vars.skillsDirPowerReview}}"
    subagents:
      - name: architecture-docs-checker
        displayName: Architecture Documentation Checker
        description: |
          Checks latest documentation for frameworks and libraries used in the PR to verify architectural patterns are current. Use this agent to look up best practices for design patterns and frameworks.
        prompt: |
          You are an architecture documentation researcher. Use the Context7 MCP to look up latest documentation for frameworks, libraries, and design patterns used in the PR. Verify that:
          1. Architectural patterns used are current best practices
          2. Framework APIs are used as intended by their documentation
          3. Integration patterns follow recommended approaches

          Return findings as JSON: { "patternsVerified": [...], "concerns": [...], "recommendations": [...] }
        mcps: [context7]
        infer: true

      - name: architecture-code-analyzer
        displayName: Architecture Code Analyzer
        description: |
          Reads the existing codebase via PowerReview to understand architectural patterns and verify the PR changes are consistent. Use this agent to compare the PR's design against established project conventions.
        prompt: |
          You are an architecture analyst with access to the repository through PowerReview MCP tools. Use PowerReview to explore project structure and read source files as needed.

          The PR URL is available in the review session data passed to your parent agent. Use it with all PowerReview tool calls.

          Read the project structure and key files to understand:
           1. The project's layering (controllers, services, repositories, domain, etc.)
          2. Existing dependency injection patterns and registrations -- look for Startup.cs, Program.cs, or DI extension files
          3. How similar features are structured elsewhere in the codebase
          4. Whether the PR introduces new patterns or breaks existing ones
          5. Cross-cutting concerns (logging, error handling, validation) patterns

          Return findings as JSON: { "projectArchitecture": "...", "existingPatterns": [...], "prAlignmentIssues": [...], "designConcerns": [...] }
        mcps: [powerreview]
        infer: true

      - name: architecture-test-checker
        displayName: Architecture Test Checker
        description: |
          Checks whether the PR has adequate test coverage from an architectural perspective -- integration tests, proper test isolation, test patterns. Use this agent to assess test architecture quality.
        prompt: |
          You are a test architecture analyst with access to the repository through PowerReview MCP tools. Use PowerReview to examine the test infrastructure as needed.

          The PR URL is available in the review session data passed to your parent agent. Use it with all PowerReview tool calls.

          Evaluate the PR's test coverage from an architectural perspective:
          1. Use PowerReview MCP tools to find integration test projects and directories as needed
          2. Are there integration tests for new API endpoints or service interactions?
          3. Are tests properly isolated (no shared mutable state, proper DI mocking)?
          4. Do tests follow the project's testing patterns (Arrange/Act/Assert, builder patterns, etc.)?
          5. Are there missing test scenarios for edge cases and error paths?
          6. Is the test infrastructure appropriate (WebApplicationFactory, test fixtures, etc.)?

          Return findings as JSON: { "integrationTests": "present|missing|partial", "testIsolation": "good|concerning", "missingScenarios": [...], "testPatternIssues": [...] }
        mcps: [powerreview]
        infer: true

  - name: review-security-expert
    type: Prompt
    dependsOn: [open-review-session]
    systemPromptFile: "{{vars.promptsDir}}/security-expert.md"
    userPrompt: |
      Review this Pull Request from a Security perspective.

      ## Review Session
      {{open-review-session.output}}

      Session URL guard: Treat this Review Session block as the only allowed source for the PR URL. Before using any PowerReview tool, verify that the session data is valid JSON and contains a non-empty `powerReviewOpenPrUrl` or `prUrl`. If it does not, do not search prior portal output, discovery output, ActionView entries, logs, or any other stale text for a PR URL; stop this reviewer and output a JSON summary with `commentsLeft: 0`, `status: "needs-work"`, and a summary explaining that review could not proceed because the current session did not include a PR URL.

      Use the loaded PowerReview skills and PowerReview MCP tools as needed to review the PR. Load PR metadata, changed files, diffs, existing threads/replies, work items, and repository files from PowerReview on demand; do not assume all context is preloaded.

      This orchestration handles new PR review, new iteration re-review, and follow-up replies to comments/threads created by reviewer agents. If reviewReason is 'agent-thread-reply', prioritize reviewEvents for agentName "Security Expert" and decide whether to create draft follow-up feedback, recommend resolving/dismissing via a draft reply, or leave no draft. If there are no matching Security Expert follow-up events, do not perform a full re-review; output a zero-comment summary for this reviewer.

      Do not directly resolve or dismiss threads unless PowerReview supports draftable status changes. For now, use a draft reply to explain any recommended resolution or dismissal so the user can approve it in ActionView.

      For any PowerReview draft/comment/reply/proposal you create, set agentName exactly "Security Expert" and include this hidden marker in the body: `<!-- powerreview-agent: Security Expert -->`.

      After leaving all comments, output a JSON summary:
      {
        "reviewer": "Security Expert",
        "commentsLeft": <count of draft comments or replies created>,
        "followUpsHandled": <count of reviewer-agent thread events handled>,
        "criticalIssues": <count>,
        "vulnerabilities": [ { "severity": "critical|high|medium|low", "type": "...", "file": "..." } ],
        "summary": "Brief overview of security findings",
        "status": "approved|approved-with-suggestions|needs-work"
      }
    mcps: [powerreview]
    reasoningLevel: High
    skillDirectories:
      - "{{vars.skillsDirPowerReview}}"
    subagents:
      - name: security-docs-checker
        displayName: Security Documentation Checker
        description: |
          Checks latest security advisories and documentation for packages and patterns used in the PR. Use this agent to verify there are no known CVEs or security advisories for dependencies.
        prompt: |
          You are a security documentation researcher. Use the Context7 MCP to look up:
          1. Known CVEs or security advisories for NuGet packages referenced in the PR
          2. Latest security best practices for .NET APIs used (e.g., cryptography, authentication)
          3. Microsoft security guidance for the patterns used
          4. OWASP recommendations for any web-facing code

          Return findings as JSON: { "cveChecks": [...], "securityAdvisories": [...], "bestPracticeViolations": [...] }
        mcps: [context7]
        infer: true

      - name: security-code-analyzer
        displayName: Security Code Analyzer
        description: |
          Reads the existing codebase via PowerReview to check security patterns, authentication/authorization setup, and compares against PR changes. Use this agent to verify the PR doesn't weaken existing security controls.
        prompt: |
          You are a security analyst with access to the repository through PowerReview MCP tools. Use PowerReview to examine the codebase as needed.

          The PR URL is available in the review session data passed to your parent agent. Use it with all PowerReview tool calls.

          Read the codebase to understand:
          1. Existing authentication and authorization patterns, including middleware, auth, and policy files
          2. Input validation and sanitization patterns
          3. Secret management approach (Key Vault, environment variables, user secrets) -- look for configuration files
          4. Whether the PR changes weaken any existing security controls
          5. Whether new endpoints or data flows are properly protected

          Return findings as JSON: { "securityControls": [...existing controls], "weakenedControls": [...if any], "unprotectedEndpoints": [...], "inputValidationGaps": [...] }
        mcps: [powerreview]
        infer: true

      - name: security-test-checker
        displayName: Security Test Checker
        description: |
          Checks whether the PR includes security-focused tests such as authorization tests, input validation tests, and boundary condition tests. Use this agent to assess security test coverage.
        prompt: |
          You are a security test analyst with access to the repository through PowerReview MCP tools. Use PowerReview to examine test files as needed.

          The PR URL is available in the review session data passed to your parent agent. Use it with all PowerReview tool calls.

          Check the PR for:
          1. Use PowerReview MCP tools to find test directories and security-related test files as needed
          2. Authorization tests (testing that unauthenticated/unauthorized requests are rejected)
          3. Input validation tests (boundary values, malicious inputs, injection attempts)
          4. Error handling tests (ensuring errors don't leak sensitive information)
          5. Tests for any new security controls introduced in the PR
          6. Tests that verify security invariants (e.g., data isolation between tenants)

          Return findings as JSON: { "authTests": "present|missing|partial", "validationTests": "present|missing|partial", "securityTestGaps": [...specific missing test scenarios] }
        mcps: [powerreview]
        infer: true

  - name: review-durable-tasks-expert
    type: Prompt
    dependsOn: [open-review-session]
    systemPromptFile: "{{vars.promptsDir}}/durable-tasks-expert.md"
    userPrompt: |
      Review this Pull Request from a Durable Tasks Framework perspective.

      ## Review Session
      {{open-review-session.output}}

      Session URL guard: Treat this Review Session block as the only allowed source for the PR URL. Before using any PowerReview tool, verify that the session data is valid JSON and contains a non-empty `powerReviewOpenPrUrl` or `prUrl`. If it does not, do not search prior portal output, discovery output, ActionView entries, logs, or any other stale text for a PR URL; stop this reviewer and output a JSON summary with `commentsLeft: 0`, `status: "needs-work"`, and a summary explaining that review could not proceed because the current session did not include a PR URL.

      Use the loaded PowerReview skills and PowerReview MCP tools as needed to review the PR. Load PR metadata, changed files, diffs, existing threads/replies, work items, and repository files from PowerReview on demand; do not assume all context is preloaded.

      This orchestration handles new PR review, new iteration re-review, and follow-up replies to comments/threads created by reviewer agents. If reviewReason is 'agent-thread-reply', prioritize reviewEvents for agentName "DTFx Expert" and decide whether to create draft follow-up feedback, recommend resolving/dismissing via a draft reply, or leave no draft. If there are no matching DTFx Expert follow-up events, do not perform a full re-review; output a zero-comment summary for this reviewer.

      Do not directly resolve or dismiss threads unless PowerReview supports draftable status changes. For now, use a draft reply to explain any recommended resolution or dismissal so the user can approve it in ActionView.

      For any PowerReview draft/comment/reply/proposal you create, set agentName exactly "DTFx Expert" and include this hidden marker in the body: `<!-- powerreview-agent: DTFx Expert -->`.

      First, determine if this PR touches any Durable Task Framework code or has DTFx Expert follow-up events. If it does NOT, output:
      {
        "reviewer": "DurableTasksFramework Expert",
        "commentsLeft": 0,
        "followUpsHandled": 0,
        "criticalIssues": 0,
        "summary": "No Durable Tasks Framework code changes detected in this PR.",
        "status": "approved"
      }

      If it DOES touch DTFx code or has DTFx Expert follow-up events, perform your review following the instructions in your system prompt.

      Output a JSON summary:
      {
        "reviewer": "DurableTasksFramework Expert",
        "commentsLeft": <count of draft comments or replies created>,
        "followUpsHandled": <count of reviewer-agent thread events handled>,
        "criticalIssues": <count>,
        "determinismViolations": [ { "file": "...", "line": ..., "description": "..." } ],
        "summary": "Brief overview of DTFx-specific findings",
        "status": "approved|approved-with-suggestions|needs-work"
      }
    mcps: [powerreview]
    reasoningLevel: High
    skillDirectories:
      - "{{vars.skillsDirPowerReview}}"
    subagents:
      - name: dtfx-docs-checker
        displayName: Durable Tasks Documentation Checker
        description: |
          Checks latest Durable Task Framework and Azure Durable Functions documentation. Use this agent to verify DTFx patterns, replay behavior, and API usage are current.
        prompt: |
          You are a Durable Tasks documentation researcher. Use the Context7 MCP to look up:
          1. Latest Durable Task Framework SDK documentation and best practices
          2. Azure Durable Functions documentation for patterns used in the PR
          3. Known issues or breaking changes in recent DTFx versions
          4. Recommended patterns for orchestration versioning and state management

          Return findings as JSON: { "documentationChecks": [...], "deprecatedAPIs": [...], "bestPracticeUpdates": [...] }
        mcps: [context7]
        infer: true

      - name: dtfx-code-analyzer
        displayName: Durable Tasks Code Analyzer
        description: |
          Reads the existing codebase via PowerReview to understand orchestration patterns, activity implementations, and DTFx configuration. Use this agent to verify the PR changes are consistent with existing DTFx usage.
        prompt: |
          You are a Durable Tasks code analyst with access to the repository through PowerReview MCP tools. Use PowerReview to examine the codebase as needed.

          The PR URL is available in the review session data passed to your parent agent. Use it with all PowerReview tool calls.

          Read the codebase to understand:
          1. Use PowerReview MCP tools to find orchestration, activity, and entity files (search for *Orchestrat*, *Activity*, *Entity* patterns)
          2. Existing orchestration patterns (how are orchestrators structured?)
          3. Activity function patterns (idempotency, error handling)
          4. Entity function patterns if used
          5. DTFx configuration (storage providers, dispatcher settings) -- look for host.json, Startup.cs, or config files
          6. Whether the PR changes are consistent with established orchestration patterns
          7. Whether in-flight orchestration instances might be affected by the changes

          Return findings as JSON: { "existingOrchestrations": [...names/patterns], "consistencyIssues": [...], "inFlightRisks": [...], "configurationConcerns": [...] }
        mcps: [powerreview]
        infer: true

      - name: dtfx-test-checker
        displayName: Durable Tasks Test Checker
        description: |
          Checks whether the PR includes tests for orchestration replay safety, activity idempotency, and DTFx-specific concerns. Use this agent to assess DTFx test coverage.
        prompt: |
          You are a Durable Tasks test analyst with access to the repository through PowerReview MCP tools. Use PowerReview to examine test files as needed.

          The PR URL is available in the review session data passed to your parent agent. Use it with all PowerReview tool calls.

          Check the PR for:
          1. Use PowerReview MCP tools to find DTFx-related test files as needed
          2. Orchestration replay tests (does the test verify deterministic behavior?)
          3. Activity idempotency tests
          4. Proper mocking of IDurableOrchestrationContext
          5. Tests for error/compensation scenarios
          6. Tests for timer and external event handling

          Return findings as JSON: { "replayTests": "present|missing|partial", "idempotencyTests": "present|missing|partial", "dtfxTestGaps": [...specific missing scenarios] }
        mcps: [powerreview]
        infer: true

  - name: review-liabadi
    type: Prompt
    dependsOn: [open-review-session]
    systemPromptFile: "{{vars.liabadiDir}}/pr.persona.liabadi.systemPrompt.md"
    userPromptFile: "{{vars.liabadiDir}}/pr.persona.liabadi.userPrompt.md"
    model: claude-opus-4.6
    mcps: [powerreview]
    reasoningLevel: High
    skillDirectories:
      - "{{vars.liabadiSkillsDir}}"
      - "{{vars.skillsDirPowerReview}}"

  - name: review-ohads
    type: Prompt
    dependsOn: [open-review-session]
    systemPromptFile: "{{vars.ohadsDir}}/pr.persona.ohads.systemPrompt.md"
    userPromptFile: "{{vars.ohadsDir}}/pr.persona.ohads.userPrompt.md"
    model: claude-opus-4.6
    mcps: [powerreview]
    reasoningLevel: High
    skillDirectories:
      - "{{vars.ohadsSkillsDir}}"
      - "{{vars.skillsDirPowerReview}}"

  - name: consolidate-reviews
    type: Prompt
    dependsOn: [review-dotnet-expert, review-principal-engineer, review-security-expert, review-durable-tasks-expert, review-liabadi, review-ohads, workiq-context, open-review-session]
    systemPrompt: |
      You are a review consolidation assistant. You combine the findings from multiple expert reviewers into a unified review summary. You also incorporate contextual intelligence from WorkIQ to flag any requirements misalignment.

      Your job is to:
      1. Aggregate all review findings
      2. Identify cross-cutting concerns (issues flagged by multiple reviewers)
      3. Determine the overall recommendation
      4. Highlight the most critical issues that must be addressed
      5. Note any requirements alignment concerns from the WorkIQ analysis

      The overall status should be the most restrictive status from all reviewers:
      - If ANY reviewer says 'needs-work', the overall is 'needs-work'
      - If no reviewer says 'needs-work' but any says 'approved-with-suggestions', overall is 'approved-with-suggestions'
      - Only if ALL reviewers say 'approved' is the overall 'approved'
    userPrompt: |
      Consolidate the following expert reviews into a unified summary.

      ## .NET Expert Review
      {{review-dotnet-expert.output}}

      ## Principal Engineer Review
      {{review-principal-engineer.output}}

      ## Security Expert Review
      {{review-security-expert.output}}

      ## Durable Tasks Expert Review
      {{review-durable-tasks-expert.output}}

      ## liabadi Persona Review
      {{review-liabadi.output}}

      ## ohads Persona Review
      {{review-ohads.output}}

      ## WorkIQ Context & Requirements Alignment
      {{workiq-context.output}}

      ## Review Session
      {{open-review-session.output}}

      Produce a consolidated JSON report:
      {
        "prId": <id>,
        "prTitle": "...",
        "prUrl": "...",
        "reviewReason": "first-time|new-iteration|agent-thread-reply|stale-in-review|failed-retry|unknown",
        "overallStatus": "approved|approved-with-suggestions|needs-work",
        "totalComments": <sum of all comments>,
        "totalFollowUpsHandled": <sum of followUpsHandled values>,
        "totalCriticalIssues": <sum of critical issues>,
        "executiveSummary": "2-3 sentence overview",
        "reviewerSummaries": [
          { "reviewer": "...", "status": "...", "comments": <n>, "followUpsHandled": <n>, "criticals": <n>, "summary": "..." }
        ],
        "requirementsAlignment": {
          "status": "aligned|partial|misaligned|unknown",
          "notes": "..."
        },
        "crossCuttingConcerns": [ "...issues flagged by multiple reviewers..." ],
        "topPriorityIssues": [ "...most critical items to address..." ]
      }

      Use orchestra_save_file to save this consolidated report.

  - name: save-review-state
    type: Prompt
    dependsOn: [consolidate-reviews, open-review-session]
    systemPrompt: |
      You are a state persistence assistant. You use Zakira.Exchange to update the PR review state from 'in-review' to 'reviewed' now that the review has completed successfully.

      This state is used by the pr-auto-reviewer orchestration to determine if the PR needs re-review in future runs. The key fields are:
      - status: must be 'reviewed' to indicate successful completion
      - iterationId: the PR iteration that was reviewed, used to detect new commits
      - sourceCommit: the source commit that was reviewed when PowerReview exposes it
      - reviewedAt: timestamp of this review
      - reviewStatus: the overall review verdict (approved/approved-with-suggestions/needs-work)
      - agentThreadLastCheckedAt: timestamp used as a baseline for future reviewer-agent thread reply detection
      - reviewerAgents: stable names used by reviewers when creating PowerReview drafts/replies

      Since we previously created/updated the entry when marking 'in-review', use edit_memory to update the existing entry.
    userPrompt: |
      Update the review state for the PR that was just reviewed.

      Review Session:
      {{open-review-session.output}}

      Consolidated Review:
      {{consolidate-reviews.output}}

      Use Zakira.Exchange edit_memory with:
      - key: the PR ID
      - data: JSON with { "status": "reviewed", "iterationId": <current iteration from PowerReview/session data>, "sourceCommit": <source commit if available>, "reviewedAt": <current timestamp>, "agentThreadLastCheckedAt": <current timestamp>, "reviewStatus": <overall status from consolidated review>, "commentsCount": <total comments from consolidated review>, "followUpsHandled": <total follow-ups handled from consolidated review>, "summary": <executive summary from consolidated review>, "reviewerAgents": [".NET Expert", "Principal Engineer", "Security Expert", "DTFx Expert", "liabadi", "ohads"], "orchestrationRunId": "{{orchestration.runId}}" }
      - reason: 'PR review completed successfully by pr-code-reviewer orchestration'
      - tags: ['reviewed', the overall review status, the PR author]

      Output confirmation of what was saved.
    mcps: [zakira]
    timeoutSeconds: 120

  - name: fetch-action-view-schema
    type: Command
    command: dnx
    arguments:
      - ActionView.Cli
      - "--yes"
      - "--"
      - schema

  - name: create-action-view-entry
    type: Prompt
    dependsOn: [consolidate-reviews, fetch-action-view-schema, open-review-session]
    systemPrompt: |
      You are an ActionView entry generator for PR reviews. You create structured JSON entries conforming to the ActionView schema and the pr-review-summary template.

      You have access to the PowerReview MCP server. Use it to fetch the individual draft comments and draft replies (with their UUIDs), parent thread context, and file diffs needed for per-draft sections and action buttons.

      Follow the instructions in the 'creating-review-actionview-entry' skill for the exact data collection steps, content block structure, action command templates, and verification checklist.

      IMPORTANT: Save the generated JSON entry using the orchestra_save_file tool.
    userPrompt: |
      Create an ActionView entry summarizing the PR review.

      ActionView entry schema:
      {{fetch-action-view-schema.output}}

      Consolidated review:
      {{consolidate-reviews.output}}

      Review session:
      {{open-review-session.output}}

      Follow the 'creating-review-actionview-entry' skill to build the entry. Key steps:

      1. Use the prUrl from the review session and PowerReview MCP tools to get all individual draft comments and draft replies with their UUIDs, file paths or thread IDs, line ranges, bodies, and author_name fields.
      2. For each file that has draft comments or thread-linked draft replies, use PowerReview MCP tools to get the relevant unified diff when helpful.
      3. Build the entry with type 'pr-review-summary', source '{{orchestration.name}}'.
      4. Include:
         - Alert block if there are critical/blocking issues
         - Pull Request keyValue (repo, branch, author, files changed)
         - Review Summary table: Reviewer | Status | Comments | Critical Issues
         - Review Comments section with one nested section PER DRAFT COMMENT OR DRAFT REPLY containing:
            a) Details keyValue (Reviewer = draft.author_name, File, Lines, Severity, Draft ID)
            b) Comment markdown (the draft body)
            c) Code block with the relevant diff hunk when available (language: diff)
            d) Actions: Approve and Delete with correct draft UUID and prUrl
         - Optional expert sections from the consolidated review
         - Full Review Report markdown with executive summary
         - View PR link
      5. Entry-level actions:
         - 'Open PR' (primary)
         - 'Approve All' (success, powerreview comment approve-all)
         - 'Submit Review' (success, powerreview submit, onSuccess: archive)
         - 'Approve PR' (success, powerreview vote --value approve)
         - 'Wait for Author' (default, powerreview vote --value wait-for-author)
         - 'Delete All' (danger, powerreview comment delete-all --author ai, onSuccess: archive)
      6. Severity: high if needs-work/critical, medium if approved-with-suggestions, low if approved

      Save the JSON using orchestra_save_file. Output ONLY the raw JSON.
    mcps: [powerreview]
    skillDirectories:
      - "{{vars.skillsDirActionView}}"
      - "{{vars.skillsDirPowerReview}}"

  - name: submit-action-view-entry
    type: Command
    dependsOn: [create-action-view-entry]
    command: dnx
    arguments:
      - ActionView.Cli
      - "--yes"
      - "--"
      - add
      - "--file"
      - "{{create-action-view-entry.files[0]}}"

  - name: generate-summary
    type: Prompt
    dependsOn: [consolidate-reviews, save-review-state, submit-action-view-entry]
    systemPrompt: |
      You are a reporting assistant. Produce a clear, concise markdown summary of the PR review orchestration run.
    userPrompt: |
      Create a final markdown summary of this PR review orchestration run.

      Consolidated review:
      {{consolidate-reviews.output}}

      State save result:
      {{save-review-state.output}}

      ActionView submission:
      {{submit-action-view-entry.output}}

      Produce a polished markdown report:
      1. Header: '## PR Code Review Summary' with orchestration run info
      2. PR title, author, and link
      3. Overall recommendation status (approved / approved-with-suggestions / needs-work)
      4. Table of reviewer findings: Reviewer | Status | Comments | Critical Issues
      5. Top priority items to address (if any)
      6. Requirements alignment status
      7. Confirmation that review state was saved and ActionView entry submitted
      8. List of any errors or notes
