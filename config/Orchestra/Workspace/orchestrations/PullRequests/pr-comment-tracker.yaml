name: pr-comment-tracker
description: |
  Discovers active Pull Requests created by me in Azure DevOps and delegates each candidate to pr-comment-dispatcher. The dispatcher owns PowerReview session refresh, Zakira comment-response state checks, unaddressed reviewer comment detection, and invoking pr-comment-responder only when needed. Runs on an hourly schedule.
version: 2.0.0
tags: ["ZTS", "MSFT", "PR", "Comment-Response", "auto"]
defaultModel: gpt-5.4

variables:
  organization: msazure
  project: One
  repository: ZTS
  authorName: Moaid Hathot
  authorUniqueName: MoaidHathot@microsoft.com

defaultRetryPolicy:
  maxRetries: 3
  backoffSeconds: 5
  backoffMultiplier: 2.0
  retryOnTimeout: true

defaultStepTimeoutSeconds: 1500
timeoutSeconds: 7200

mcps:
  - name: orchestra
    type: remote
    endpoint: "{{server.url}}/mcp/data"

steps:
  - name: fetch-my-prs
    type: Script
    shell: pwsh
    script: |
      # Deterministic PR enumeration via az CLI (replaces the prior azdo MCP prompt).
      # Lists active PRs in `{{vars.project}}/{{vars.repository}}` that were CREATED BY
      # the author identified by `{{vars.authorUniqueName}}`. Emits a JSON array — the
      # same contract the downstream `gate-no-prs` / `dispatch-candidates` steps consume.
      # Note: the `--creator` argument requires a resolvable identity (email or
      # descriptor). The display name (`vars.authorName`) cannot be used here
      # because Azure DevOps may have multiple identities with the same display
      # name and az CLI fails fast with "multiple identities found".
      $ErrorActionPreference = 'Stop'
      try { Get-Command az -ErrorAction Stop | Out-Null } catch {
        throw "az CLI is not available on PATH; cannot fetch authored PRs."
      }

      function ConvertTo-IsoUtcString {
        param($value)
        if ($null -eq $value) { return "" }
        if ($value -is [datetime]) { return ([datetime]$value).ToUniversalTime().ToString("o") }
        if ($value -is [datetimeoffset]) { return ([datetimeoffset]$value).UtcDateTime.ToString("o") }
        return [string]$value
      }

      $organization = '{{vars.organization}}'
      $project = '{{vars.project}}'
      $repository = '{{vars.repository}}'
      $authorUnique = '{{vars.authorUniqueName}}'
      $orgUrl = "https://dev.azure.com/$organization"

      $raw = & az repos pr list `
        --org $orgUrl `
        --project $project `
        --repository $repository `
        --creator $authorUnique `
        --status active `
        --top 100 `
        -o json 2>&1
      if ($LASTEXITCODE -ne 0) {
        $errText = if ($raw -is [array]) { ($raw | ForEach-Object { [string]$_ }) -join "`n" } else { [string]$raw }
        throw "az repos pr list failed (exit $LASTEXITCODE): $errText"
      }
      $jsonString = if ($raw -is [array]) { ($raw | ForEach-Object { [string]$_ }) -join "`n" } else { [string]$raw }
      $list = $jsonString | ConvertFrom-Json -Depth 100

      $prs = New-Object System.Collections.Generic.List[object]
      foreach ($p in @($list)) {
        if ($null -eq $p) { continue }

        $reviewerNames = @()
        if ($null -ne $p.reviewers) {
          $reviewerNames = @(@($p.reviewers) | ForEach-Object { [string]$_.displayName } | Where-Object { -not [string]::IsNullOrWhiteSpace($_) })
        }

        $createdByName = ""
        $createdByUnique = ""
        if ($null -ne $p.createdBy) {
          $createdByName = [string]$p.createdBy.displayName
          $createdByUnique = [string]$p.createdBy.uniqueName
        }

        $prId = [int]$p.pullRequestId
        $webUrl = "https://dev.azure.com/$organization/$project/_git/$repository/pullrequest/$prId"

        $lastCommit = ""
        if ($null -ne $p.lastMergeSourceCommit -and $p.lastMergeSourceCommit.commitId) {
          $lastCommit = [string]$p.lastMergeSourceCommit.commitId
        }

        $isDraftVal = $false
        if ($null -ne $p.isDraft) { $isDraftVal = [bool]$p.isDraft }

        $entry = [ordered]@{
          id = $prId
          title = [string]$p.title
          status = [string]$p.status
          isDraft = $isDraftVal
          createdBy = $createdByName
          createdByUniqueName = $createdByUnique
          creationDate = ConvertTo-IsoUtcString $p.creationDate
          sourceRefName = [string]$p.sourceRefName
          targetRefName = [string]$p.targetRefName
          reviewers = $reviewerNames
          url = $webUrl
          apiUrl = [string]$p.url
          lastMergeSourceCommitId = $lastCommit
        }
        [void]$prs.Add($entry)
      }

      $prsArr = $prs.ToArray()
      $prsArr | ConvertTo-Json -Depth 100 -Compress -AsArray

  - name: gate-no-prs
    type: Prompt
    dependsOn: [fetch-my-prs]
    systemPrompt: |
      You are a gate checker. If the input is an empty JSON array, call orchestra_complete with status 'success' and reason 'No active PRs created by {{vars.authorName}} found. Nothing to check.'. Otherwise, pass the data through unchanged.
    userPrompt: |
      Check if there are any PRs to process:

      {{fetch-my-prs.output}}

      If the array is empty, call orchestra_complete. Otherwise, output the array as-is.

  - name: dispatch-candidates
    type: Prompt
    dependsOn: [gate-no-prs]
    systemPrompt: |
      You are an orchestration coordinator. Delegate each PR candidate to pr-comment-dispatcher using synchronous mode. The dispatcher decides whether to skip or invoke pr-comment-responder, and it handles comment-response state through the child response path.
    userPrompt: |
      Dispatch each PR candidate through pr-comment-dispatcher:

      {{gate-no-prs.output}}

      For each PR object in the array:
      1. Use invoke_orchestration to invoke 'pr-comment-dispatcher' with mode 'sync' and timeoutSeconds 5000.
      2. Pass parameters: prData = the serialized PR object as valid JSON, mode = 'auto', forceProcess = 'false'. The prData string must be parseable JSON; escape every literal backslash in string values (for example, reviewer names like `[TEAM FOUNDATION]\ZTS`).
      3. Record whether the dispatcher processed, skipped, failed, or completed with no action.

      After all dispatches complete, output a JSON summary:
      {
        "totalPRsDispatched": <count>,
        "processed": <count>,
        "skipped": <count>,
        "succeeded": <count>,
        "failed": <count>,
        "results": [
          { "prId": ..., "prTitle": "...", "executionId": "...", "status": "processed|skipped|failed", "summary": "...", "error": null | "..." }
        ]
      }
    mcps: [orchestra]
    timeoutSeconds: 7200

  - name: gate-noteworthy-activity
    type: Prompt
    dependsOn: [dispatch-candidates]
    systemPrompt: |
      You are a noise filter for the PR comment tracker. Your only job is to decide whether this scheduled run produced anything worth surfacing to the user via ActionView.

      Read the dispatcher summary JSON. The run is "noteworthy" only if at least one PR was actually processed by the dispatcher (`processed > 0`) OR at least one dispatch failed (`failed > 0`). Both signal real activity that warrants a notification.

      If the run is NOT noteworthy (every PR was skipped — no new unaddressed reviewer comments, no failures, nothing interesting), call orchestra_complete with status 'success' and a reason like 'All <totalPRsDispatched> PR(s) were skipped by the dispatcher (no new unaddressed comments, no failures). Skipping ActionView entry creation for this uneventful run.'. This stops the orchestration cleanly so no ActionView entry is created or submitted.

      If the run IS noteworthy, output the dispatcher summary JSON unchanged (no prose, no markdown, no fences) so the downstream ActionView generator can consume it.

      Do not call any other tools. Do not write commentary in either branch.
    userPrompt: |
      Decide whether this PR comment tracker run is noteworthy enough to surface in ActionView.

      Dispatcher summary:
      {{dispatch-candidates.output}}

  - name: create-action-view-entry
    type: Prompt
    dependsOn: [gate-noteworthy-activity, gate-no-prs]
    systemPrompt: |
      You are an ActionView entry generator for PR comment tracking runs. You create structured JSON entries. The entry type must be 'pr-comment-tracker-run' and source must be '{{orchestration.name}}'.

      Your entries should give the user a clear overview of what the comment tracker discovered and dispatched through the shared dispatcher: how many PRs were found, how many were skipped vs processed, and the outcomes.

      IMPORTANT: Save the generated JSON entry using the orchestra_save_file tool. Output ONLY the raw JSON -- it will be validated and submitted by a downstream step.
    userPrompt: |
      Create an ActionView entry summarizing this PR comment tracking run.

      PR candidates:
      {{gate-no-prs.output}}

      Dispatcher results:
      {{gate-noteworthy-activity.output}}

      Create an entry with:
      1. type: 'pr-comment-tracker-run'
      2. source: '{{orchestration.name}}'
      3. title: 'PR Comment Tracker Run' with count of PRs dispatched
      4. subtitle: Summary like 'X dispatched, Y processed, Z skipped, W failed'
      5. severity: 'high' if any processing failed, 'medium' if PRs were processed, 'low' if all skipped
      6. tags: ['pr-response', 'comment-tracker', 'ZTS']
      7. content blocks: include an alert block if any dispatch failed, a summary table (PR ID | Title | Action | Outcome), a Dispatcher Results section, a Skipped PRs section if any were skipped, and a Failed Dispatches section if any failed.
      8. actions: include 'View PRs' (primary) and 'Dismiss' (default)

      Save the JSON using orchestra_save_file. Output ONLY the raw JSON.

  - name: submit-action-view-entry
    type: Orchestration
    dependsOn: [create-action-view-entry]
    orchestration: actionview-submit
    parameters:
      entryJson: "{{create-action-view-entry.output}}"
    mode: sync
    timeoutSeconds: 600

  - name: generate-summary
    type: Prompt
    dependsOn: [dispatch-candidates, gate-no-prs, submit-action-view-entry]
    systemPrompt: |
      You are a reporting assistant. Produce a clear, concise markdown summary of the PR comment tracking orchestration run.
    userPrompt: |
      Create a final markdown summary of this PR comment tracking run.

      PR candidates:
      {{gate-no-prs.output}}

      Dispatcher results:
      {{dispatch-candidates.output}}

      ActionView submission:
      {{submit-action-view-entry.output}}

      Produce a polished markdown report:
      1. Header: '## PR Comment Tracker Summary' with orchestration run info
      2. How many PRs were found that I created
      3. How many were dispatched and their outcomes (processed, skipped, failed)
      4. Any dispatcher/response failures
      5. Confirmation that ActionView entry was submitted
      6. Any errors or issues encountered during the run

trigger:
  type: scheduler
  enabled: true
  intervalSeconds: 3600
