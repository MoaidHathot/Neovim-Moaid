name: pr-comment-dispatcher
description: |
  Shared dispatcher for PR comment responses. Accepts either a PR URL or PR data, opens or refreshes the PowerReview session, uses Zakira.Exchange plus PowerReview session/thread state to decide whether reviewer comments need responses, builds the enriched prData contract, and invokes pr-comment-responder. Used by scheduled comment tracking and optional manual comment-response entrypoints.
version: 1.0.0
tags: ["ZTS", "MSFT", "PR", "Comment-Response", "dispatcher"]
defaultModel: gpt-5.4

inputs:
  prUrl:
    type: string
    description: |
      Optional full Azure DevOps Pull Request URL.
    required: false
    default: ""
  prData:
    type: string
    description: |
      Optional JSON object containing PR metadata from discovery, including id, title, createdBy, creationDate, sourceRefName, targetRefName, reviewers, url/prUrl, and iterationId if available.
    required: false
    default: ""
  mode:
    type: string
    description: |
      Dispatch mode. Use 'auto' for scheduled response and 'manual' for explicit user-triggered response.
    required: false
    default: auto
  forceProcess:
    type: boolean
    description: |
      When true, dispatches pr-comment-responder even if state checks would normally skip the PR.
    required: false
    default: "false"
  threadIds:
    type: string
    description: |
      Optional JSON array or comma-separated list of thread IDs to process. Useful for manual targeted response.
    required: false
    default: ""

variables:
  organization: msazure
  project: One
  repository: ZTS
  authorName: Moaid Hathot
  zakiraCategory: pr-comment-response-state
  staleRespondingMinutes: "75"
  agentName: PR Author Assistant
  skillsDirPowerReview: "../../skills/powerreview"

defaultRetryPolicy:
  maxRetries: 2
  backoffSeconds: 5
  backoffMultiplier: 2.0
  retryOnTimeout: true

defaultStepTimeoutSeconds: 900
timeoutSeconds: 5000

mcps:
  - name: zakira
    type: local
    command: dnx
    arguments:
      - Zakira.Exchange
      - "--yes"
      - "--"
      - mcp
      - "--category"
      - "{{vars.zakiraCategory}}"

steps:
  - name: normalize-comment-request
    type: Script
    shell: pwsh
    script: |
        $ErrorActionPreference = 'Stop'

        $prUrlInput = $args[0]
        $prDataInput = $args[1]
        $mode = $args[2]
        $forceProcessRaw = $args[3]
        $threadIdsRaw = $args[4]

        function Get-JsonCandidate {
          param([Parameter(Mandatory)][string]$Text)

          $trimmed = $Text.Trim()
          if ($trimmed.StartsWith('```')) {
            $lines = @($trimmed -split "`r?`n")
            if ($lines.Count -gt 1) {
              $trimmed = ($lines[1..($lines.Count - 1)] -join "`n").Trim()
              if ($trimmed.EndsWith('```')) {
                $trimmed = $trimmed.Substring(0, $trimmed.Length - 3).Trim()
              }
            }
          }

          $start = -1
          for ($i = 0; $i -lt $trimmed.Length; $i++) {
            if ($trimmed[$i] -eq '{' -or $trimmed[$i] -eq '[') { $start = $i; break }
          }
          if ($start -lt 0) { throw 'No JSON object or array was found in PR data.' }

          $stack = [System.Collections.Generic.List[char]]::new()
          $inString = $false
          for ($i = $start; $i -lt $trimmed.Length; $i++) {
            $ch = $trimmed[$i]
            if ($inString) {
              if ($ch -eq '\') {
                if ($i + 1 -lt $trimmed.Length) { $i++ }
                continue
              }
              if ($ch -eq '"') { $inString = $false }
              continue
            }

            if ($ch -eq '"') { $inString = $true; continue }
            if ($ch -eq '{') { $stack.Add([char]'}'); continue }
            if ($ch -eq '[') { $stack.Add([char]']'); continue }
            if ($ch -eq '}' -or $ch -eq ']') {
              if ($stack.Count -eq 0) { continue }
              $expected = $stack[$stack.Count - 1]
              if ($ch -ne $expected) { throw "Mismatched JSON delimiter. Expected '$expected' but found '$ch'." }
              $stack.RemoveAt($stack.Count - 1)
              if ($stack.Count -eq 0) {
                return $trimmed.Substring($start, $i - $start + 1).Trim()
              }
            }
          }

          throw 'JSON object or array was not complete.'
        }

        function Repair-InvalidJsonStringEscapes {
          param([Parameter(Mandatory)][string]$Text)

          $builder = [System.Text.StringBuilder]::new()
          $inString = $false
          for ($i = 0; $i -lt $Text.Length; $i++) {
            $ch = $Text[$i]
            if ($inString) {
              if ($ch -eq '\') {
                if ($i + 1 -ge $Text.Length) {
                  [void]$builder.Append('\\')
                  continue
                }

                $next = $Text[$i + 1]
                if ($next -match '["\\/bfnrt]') {
                  [void]$builder.Append($ch)
                  [void]$builder.Append($next)
                  $i++
                  continue
                }

                if ($next -eq 'u') {
                  $hasHex = $i + 5 -lt $Text.Length
                  if ($hasHex) {
                    $hex = $Text.Substring($i + 2, 4)
                    if ($hex -match '^[0-9A-Fa-f]{4}$') {
                      [void]$builder.Append($ch)
                      [void]$builder.Append('u')
                      [void]$builder.Append($hex)
                      $i += 5
                      continue
                    }
                  }
                }

                [void]$builder.Append('\\')
                continue
              }

              if ($ch -eq '"') { $inString = $false }
              [void]$builder.Append($ch)
              continue
            }

            if ($ch -eq '"') { $inString = $true }
            [void]$builder.Append($ch)
          }

          return $builder.ToString()
        }

        function ConvertFrom-CanonicalJson {
          param([Parameter(Mandatory)][string]$Text)

          $candidate = Get-JsonCandidate -Text $Text
          try {
            return ConvertFrom-Json -InputObject $candidate -NoEnumerate -ErrorAction Stop
          } catch {
            $repaired = Repair-InvalidJsonStringEscapes -Text $candidate
            return ConvertFrom-Json -InputObject $repaired -NoEnumerate -ErrorAction Stop
          }
        }

        $forceProcess = $false
        if (-not [string]::IsNullOrWhiteSpace($forceProcessRaw)) {
          $forceProcess = $forceProcessRaw -match '^(?i:true|1|yes)$'
        }

        $pr = $null
        if (-not [string]::IsNullOrWhiteSpace($prDataInput)) {
          $pr = ConvertFrom-CanonicalJson -Text $prDataInput
        }

        $threadIds = @()
        if (-not [string]::IsNullOrWhiteSpace($threadIdsRaw)) {
          if ($threadIdsRaw.TrimStart().StartsWith('[')) {
            $threadIds = @(ConvertFrom-CanonicalJson -Text $threadIdsRaw)
          } else {
            $threadIds = @($threadIdsRaw -split ',' | ForEach-Object { $_.Trim() } | Where-Object { $_ })
          }
        }
        if ($pr -and $pr.newCommentThreadIds) { $threadIds = @($threadIds + @($pr.newCommentThreadIds)) | Select-Object -Unique }
        if ($pr -and $pr.commentEvents) { $threadIds = @($threadIds + @($pr.commentEvents | ForEach-Object { $_.threadId })) | Where-Object { $_ } | Select-Object -Unique }

        $prUrl = $prUrlInput
        if ([string]::IsNullOrWhiteSpace($prUrl) -and $pr) { $prUrl = $pr.prUrl }
        if ([string]::IsNullOrWhiteSpace($prUrl) -and $pr) { $prUrl = $pr.url }

        $prId = if ($pr) { $pr.id } else { $null }
        if (-not $prId -and $prUrl -match '/pullrequest/(\d+)') { $prId = [int]$Matches[1] }
        if ([string]::IsNullOrWhiteSpace($prUrl) -and $prId) {
          $prUrl = "https://dev.azure.com/{{vars.organization}}/{{vars.project}}/_git/{{vars.repository}}/pullrequest/$prId"
        }
        if ([string]::IsNullOrWhiteSpace($prUrl)) {
          throw 'A PR URL or PR data with id/url is required.'
        }

        [pscustomobject]@{
          id = $prId
          title = if ($pr) { $pr.title } else { $null }
          createdBy = if ($pr) { $pr.createdBy } else { $null }
          creationDate = if ($pr) { $pr.creationDate } else { $null }
          sourceRefName = if ($pr) { $pr.sourceRefName } else { $null }
          targetRefName = if ($pr) { $pr.targetRefName } else { $null }
          reviewers = if ($pr) { $pr.reviewers } else { @() }
          iterationId = if ($pr) { $pr.iterationId } else { $null }
          url = $prUrl
          prUrl = $prUrl
          targetThreadIds = @($threadIds)
          inputCommentEvents = if ($pr -and $pr.commentEvents) { $pr.commentEvents } else { @() }
          dispatchMode = $mode
          forceProcess = $forceProcess
        } | ConvertTo-Json -Compress -Depth 20
    arguments:
      - "{{param.prUrl}}"
      - "{{param.prData}}"
      - "{{param.mode}}"
      - "{{param.forceProcess}}"
      - "{{param.threadIds}}"
    timeoutSeconds: 120

  - name: open-review-session
    type: Script
    dependsOn: [normalize-comment-request]
    shell: pwsh
    script: |
        $ErrorActionPreference = 'Stop'
        $request = ConvertFrom-Json -InputObject $args[0] -NoEnumerate -ErrorAction Stop

        function Resolve-PowerReviewOpenPrUrl {
          param(
            [Parameter(Mandatory)]$Result,
            [Parameter(Mandatory)][string]$FallbackPrUrl
          )

          $candidates = @(
            $Result.prUrl,
            $Result.url,
            $Result.pullRequest.url,
            $Result.pull_request.url,
            $Result.session.prUrl,
            $Result.session.url,
            $Result.session.pullRequest.url,
            $Result.session.pull_request.url,
            $FallbackPrUrl
          )

          foreach ($candidate in $candidates) {
            $value = [string]$candidate
            if (-not [string]::IsNullOrWhiteSpace($value)) { return $value }
          }

          return ''
        }

        function Invoke-PowerReviewOpen {
          param([Parameter(Mandatory)][string]$PrUrl)

          $stdoutPath = [System.IO.Path]::GetTempFileName()
          $stderrPath = [System.IO.Path]::GetTempFileName()
          $previousNativeCommandPreference = $PSNativeCommandUseErrorActionPreference
          $PSNativeCommandUseErrorActionPreference = $false

          try {
            & dnx --yes --add-source https://api.nuget.org/v3/index.json PowerReview -- open --pr-url $PrUrl 1> $stdoutPath 2> $stderrPath
            $exitCode = $LASTEXITCODE
            $stdout = Get-Content -LiteralPath $stdoutPath -Raw -ErrorAction SilentlyContinue
            $stderr = Get-Content -LiteralPath $stderrPath -Raw -ErrorAction SilentlyContinue
          } finally {
            $PSNativeCommandUseErrorActionPreference = $previousNativeCommandPreference
            Remove-Item -LiteralPath $stdoutPath, $stderrPath -Force -ErrorAction SilentlyContinue
          }

          if ($exitCode -ne 0) {
            throw "PowerReview open failed with exit code $exitCode for '$PrUrl'. Stdout: $stdout Stderr: $stderr"
          }

          $jsonText = if ($null -eq $stdout) { '' } else { $stdout.Trim() }
          if ([string]::IsNullOrWhiteSpace($jsonText)) {
            throw "PowerReview open produced empty stdout for '$PrUrl'. Stderr: $stderr"
          }

          try {
            $result = ConvertFrom-Json -InputObject $jsonText -NoEnumerate -ErrorAction Stop
          } catch {
            throw "PowerReview open stdout was not valid JSON for '$PrUrl'. Stdout: $jsonText Stderr: $stderr"
          }

          $openPrUrl = Resolve-PowerReviewOpenPrUrl -Result $result -FallbackPrUrl $PrUrl
          if ([string]::IsNullOrWhiteSpace($openPrUrl)) {
            throw "PowerReview open JSON did not contain a usable PR URL for '$PrUrl'. Stdout: $jsonText"
          }

          $result | Add-Member -NotePropertyName prUrl -NotePropertyValue $openPrUrl -Force
          return $result
        }

        $openResult = Invoke-PowerReviewOpen -PrUrl $request.prUrl
        $request | Add-Member -NotePropertyName powerReviewOpenStatus -NotePropertyValue 'opened-or-refreshed' -Force
        $request | Add-Member -NotePropertyName powerReviewOpenedAt -NotePropertyValue ([DateTimeOffset]::UtcNow.ToString('o')) -Force
        $request | Add-Member -NotePropertyName powerReviewOpenPrUrl -NotePropertyValue $openResult.prUrl -Force
        $request | ConvertTo-Json -Compress -Depth 20
    arguments:
      - "{{normalize-comment-request.output}}"
    timeoutSeconds: 1200

  - name: prepare-comment-dispatch
    type: Prompt
    dependsOn: [open-review-session]
    systemPrompt: |
      You are a PR comment-response dispatcher. Decide whether the given PR has reviewer comments that need a response from the PR author assistant, build the enriched prData contract expected by pr-comment-responder, or skip by calling orchestra_complete.

      Use PowerReview as the PR/session/thread source of truth and Zakira.Exchange as the persisted response-state source.

      State in Zakira.Exchange may contain legacy `processedThreadIds` and newer `processedCommentCursors`. Prefer cursors when available. A cursor identifies the latest processed comment on a thread using threadId plus latestCommentId and/or latestCommentCreatedAt.

      Dispatch when:
      - forceProcess is true and there are target thread IDs or unaddressed reviewer comments.
      - The state is failed.
      - The state is responding but respondedAt is older than {{vars.staleRespondingMinutes}} minutes.
      - A reviewer/human comment on an Active/Pending thread is newer than the stored cursor and has no later PR-author or PR Author Assistant draft/reply addressing it.

      Skip when there are no target thread IDs and no unaddressed reviewer comments, or all candidate comments are already addressed by a later author/AI reply or a stored cursor.

      Do not fetch file diffs here. The responder can fetch targeted code context on demand.

      When dispatching, output ONLY the enriched PR JSON object for pr-comment-responder. Do not wrap it.

      When skipping, call orchestra_complete with status 'success' and a concise reason. Do not invoke pr-comment-responder for skipped PRs.
    userPrompt: |
      Decide whether to dispatch this PR for comment response.

      Normalized request and PowerReview open result:
      {{open-review-session.output}}

      Steps:
      1. Use Zakira.Exchange get_memory with the PR ID as key to retrieve stored comment-response state.
      2. Use PowerReview MCP tools as needed to sync/read current session, threads, replies, drafts, proposals, and PR metadata.
      3. Identify reviewer comments needing response. Prefer explicit targetThreadIds when provided; otherwise inspect all Active/Pending threads.
      4. Compare candidates against processedCommentCursors and legacy processedThreadIds. A processedThreadIds match should not suppress a newer comment in the same thread.
      5. Apply the decision rules from the system prompt.

      If response is needed, output ONLY a JSON object shaped like:
      {
        "id": <number>,
        "title": "...",
        "createdBy": "...",
        "creationDate": "...",
        "sourceRefName": "...",
        "targetRefName": "...",
        "reviewers": ["..."],
        "iterationId": <number>,
        "url": "full PR URL",
        "prUrl": "full PR URL",
        "processReason": "new-comments|stale-responding|failed-retry|manual|first-time",
        "commentEvents": [
          {
            "type": "reviewer-comment",
            "threadId": 123,
            "commentId": 456,
            "filePath": "path or empty for PR-level thread",
            "lineStart": 42,
            "lineEnd": 43,
            "threadStatus": "Active|Pending",
            "commenter": "display name",
            "commentBody": "latest reviewer comment body",
            "commentCreatedAt": "timestamp",
            "reason": "short explanation"
          }
        ],
        "newCommentThreadIds": [123],
        "dispatchMode": "auto|manual",
        "forceProcess": true|false,
        "existingZakiraState": null | { "status": "...", "processedCommentCursors": [] },
        "existingPowerReviewSession": null | { "sessionId": "...", "iterationId": "...", "sourceCommit": "...", "status": "..." }
      }

      If response is not needed, call orchestra_complete with a reason like 'PR 123 has no new unaddressed reviewer comments.'
    outputHandlerPrompt: |
      Extract the dispatch payload as one valid JSON object only.
      If the content includes markdown fences, explanatory text, or logs, remove them.
      Preserve all fields and nested arrays/objects.
      Escape every literal backslash inside JSON string values.
      Output only the JSON object, with no commentary.
    mcps: [zakira, powerreview]
    skillDirectories:
      - "{{vars.skillsDirPowerReview}}"

  - name: normalize-comment-dispatch
    type: Script
    dependsOn: [prepare-comment-dispatch]
    shell: pwsh
    script: |
        $ErrorActionPreference = 'Stop'

        function Get-JsonCandidate {
          param([Parameter(Mandatory)][string]$Text)

          $trimmed = $Text.Trim()
          if ($trimmed.StartsWith('```')) {
            $lines = @($trimmed -split "`r?`n")
            if ($lines.Count -gt 1) {
              $trimmed = ($lines[1..($lines.Count - 1)] -join "`n").Trim()
              if ($trimmed.EndsWith('```')) {
                $trimmed = $trimmed.Substring(0, $trimmed.Length - 3).Trim()
              }
            }
          }

          $start = -1
          for ($i = 0; $i -lt $trimmed.Length; $i++) {
            if ($trimmed[$i] -eq '{' -or $trimmed[$i] -eq '[') { $start = $i; break }
          }
          if ($start -lt 0) { throw 'No JSON object or array was found in dispatch output.' }

          $stack = [System.Collections.Generic.List[char]]::new()
          $inString = $false
          for ($i = $start; $i -lt $trimmed.Length; $i++) {
            $ch = $trimmed[$i]
            if ($inString) {
              if ($ch -eq '\') {
                if ($i + 1 -lt $trimmed.Length) { $i++ }
                continue
              }
              if ($ch -eq '"') { $inString = $false }
              continue
            }

            if ($ch -eq '"') { $inString = $true; continue }
            if ($ch -eq '{') { $stack.Add([char]'}'); continue }
            if ($ch -eq '[') { $stack.Add([char]']'); continue }
            if ($ch -eq '}' -or $ch -eq ']') {
              if ($stack.Count -eq 0) { continue }
              $expected = $stack[$stack.Count - 1]
              if ($ch -ne $expected) { throw "Mismatched JSON delimiter. Expected '$expected' but found '$ch'." }
              $stack.RemoveAt($stack.Count - 1)
              if ($stack.Count -eq 0) {
                return $trimmed.Substring($start, $i - $start + 1).Trim()
              }
            }
          }

          throw 'JSON object or array was not complete.'
        }

        function Repair-InvalidJsonStringEscapes {
          param([Parameter(Mandatory)][string]$Text)

          $builder = [System.Text.StringBuilder]::new()
          $inString = $false
          for ($i = 0; $i -lt $Text.Length; $i++) {
            $ch = $Text[$i]
            if ($inString) {
              if ($ch -eq '\') {
                if ($i + 1 -ge $Text.Length) {
                  [void]$builder.Append('\\')
                  continue
                }

                $next = $Text[$i + 1]
                if ($next -match '["\\/bfnrt]') {
                  [void]$builder.Append($ch)
                  [void]$builder.Append($next)
                  $i++
                  continue
                }

                if ($next -eq 'u') {
                  $hasHex = $i + 5 -lt $Text.Length
                  if ($hasHex) {
                    $hex = $Text.Substring($i + 2, 4)
                    if ($hex -match '^[0-9A-Fa-f]{4}$') {
                      [void]$builder.Append($ch)
                      [void]$builder.Append('u')
                      [void]$builder.Append($hex)
                      $i += 5
                      continue
                    }
                  }
                }

                [void]$builder.Append('\\')
                continue
              }

              if ($ch -eq '"') { $inString = $false }
              [void]$builder.Append($ch)
              continue
            }

            if ($ch -eq '"') { $inString = $true }
            [void]$builder.Append($ch)
          }

          return $builder.ToString()
        }

        $candidate = Get-JsonCandidate -Text $args[0]
        try {
          $value = ConvertFrom-Json -InputObject $candidate -NoEnumerate -ErrorAction Stop
        } catch {
          $repaired = Repair-InvalidJsonStringEscapes -Text $candidate
          $value = ConvertFrom-Json -InputObject $repaired -NoEnumerate -ErrorAction Stop
        }

        ConvertTo-Json -InputObject $value -Compress -Depth 20
    arguments:
      - "{{prepare-comment-dispatch.output}}"
    timeoutSeconds: 120

  - name: respond-to-comments
    type: Orchestration
    dependsOn: [normalize-comment-dispatch]
    orchestration: pr-comment-responder
    parameters:
      prData: "{{normalize-comment-dispatch.output}}"
    inputHandlerPrompt: |
      Return ONLY a valid JSON object mapping parameter names to string values.
      Preserve the parameter name `prData`.
      The `prData` value must be a single canonical JSON object serialized as a string.
      If the value contains extra prose or markdown, extract the JSON object.
      Escape every literal backslash inside JSON string values so the `prData` string can be parsed by ConvertFrom-Json.
    mode: sync
    timeoutSeconds: 3600

  - name: generate-summary
    type: Prompt
    dependsOn: [respond-to-comments, normalize-comment-dispatch]
    systemPrompt: |
      You are a reporting assistant. Produce a clear, concise markdown summary of this PR comment-response dispatch run.
    userPrompt: |
      Create a final markdown summary of this PR comment-response dispatch.

      Dispatch input sent to pr-comment-responder:
      {{normalize-comment-dispatch.output}}

      pr-comment-responder output:
      {{respond-to-comments.output}}

      Produce a concise report with:
      1. Header: '## PR Comment Dispatch Summary'
      2. PR title, id, author, and link
      3. Dispatch mode and process reason
      4. Outcome from pr-comment-responder
      5. Any notes or errors surfaced by the child response run
