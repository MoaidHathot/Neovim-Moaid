name: pr-review-dispatcher
description: |
  Shared dispatcher for PR code reviews. Accepts either a PR URL or PR data, opens or refreshes the PowerReview session, uses Zakira.Exchange plus PowerReview session/thread state to decide whether review work is needed, builds the enriched prData contract, and invokes pr-code-reviewer. Used by both scheduled and manual PR review entrypoints.
version: 1.0.0
tags: ["ZTS", "MSFT", "PR", "Code-Review", "dispatcher"]
defaultModel: claude-opus-4.7-1m-internal

inputs:
  prUrl:
    type: string
    description: |
      Optional full Azure DevOps Pull Request URL. Use this for manual/on-demand review.
    required: false
    default: ""
  prData:
    type: string
    description: |
      Optional JSON object containing PR metadata from discovery, including id, title, createdBy, creationDate, sourceRefName, targetRefName, reviewers, url/prUrl, and iterationId if available.
    required: false
    default: ""
  mode:
    type: string
    description: |
      Dispatch mode. Use 'auto' for scheduled review and 'manual' for explicit user-triggered review.
    required: false
    default: auto
  forceReview:
    type: boolean
    description: |
      When true, dispatches pr-code-reviewer even if state checks would normally skip the PR.
    required: false
    default: "false"

variables:
  organization: msazure
  project: One
  repository: ZTS
  zakiraCategory: pr-code-review-state
  staleReviewMinutes: "60"
  reviewerAgentNames: ".NET Expert, Principal Engineer, Security Expert, DTFx Expert, liabadi, ohads"
  skillsDirPowerReview: "../../skills/powerreview"

defaultRetryPolicy:
  maxRetries: 2
  backoffSeconds: 5
  backoffMultiplier: 2.0
  retryOnTimeout: true

defaultStepTimeoutSeconds: 900
timeoutSeconds: 17000

mcps:
  - name: zakira
    type: local
    command: dnx
    arguments:
      - Zakira.Exchange
      - "--yes"
      - "--"
      - "--db"
      - "{{env.XDG_CONFIG_HOME}}/orchestra/zakira.db"
      - mcp
      - "--category"
      - "{{vars.zakiraCategory}}"

steps:
  - name: normalize-review-request
    type: Script
    shell: pwsh
    script: |
        $ErrorActionPreference = 'Stop'

        # Strict-safe optional property accessors. Reading $obj.Foo on a parsed
        # JSON object that does not have a `Foo` property throws under
        # Set-StrictMode -Version Latest; the helpers below return $null
        # instead so the script works under both default and strict prologues.
        function Get-OptionalProperty {
          param($Object, [Parameter(Mandatory)][string]$Name)
          if ($null -eq $Object) { return $null }
          $prop = $Object.PSObject.Properties[$Name]
          if ($null -eq $prop) { return $null }
          return $prop.Value
        }

        function Get-NestedOptionalProperty {
          param($Object, [Parameter(Mandatory)][string]$Path)
          $current = $Object
          foreach ($segment in $Path.Split('.')) {
            $current = Get-OptionalProperty -Object $current -Name $segment
            if ($null -eq $current) { return $null }
          }
          return $current
        }

        $prUrlInput = $args[0]
        $prDataInput = $args[1]
        $mode = $args[2]
        $forceReviewRaw = $args[3]

        function Get-JsonCandidate {
          param([Parameter(Mandatory)][string]$Text)

          $trimmed = $Text.Trim()
          if ($trimmed.StartsWith('```')) {
            $lines = @($trimmed -split "`r?`n")
            if ($lines.Count -gt 1) {
              $trimmed = ($lines[1..($lines.Count - 1)] -join "`n").Trim()
              if ($trimmed.EndsWith('```')) {
                $trimmed = $trimmed.Substring(0, $trimmed.Length - 3).Trim()
              }
            }
          }

          $start = -1
          for ($i = 0; $i -lt $trimmed.Length; $i++) {
            if ($trimmed[$i] -eq '{' -or $trimmed[$i] -eq '[') { $start = $i; break }
          }
          if ($start -lt 0) { throw 'No JSON object or array was found in PR data.' }

          $stack = [System.Collections.Generic.List[char]]::new()
          $inString = $false
          for ($i = $start; $i -lt $trimmed.Length; $i++) {
            $ch = $trimmed[$i]
            if ($inString) {
              if ($ch -eq '\') {
                if ($i + 1 -lt $trimmed.Length) { $i++ }
                continue
              }
              if ($ch -eq '"') { $inString = $false }
              continue
            }

            if ($ch -eq '"') { $inString = $true; continue }
            if ($ch -eq '{') { $stack.Add([char]'}'); continue }
            if ($ch -eq '[') { $stack.Add([char]']'); continue }
            if ($ch -eq '}' -or $ch -eq ']') {
              if ($stack.Count -eq 0) { continue }
              $expected = $stack[$stack.Count - 1]
              if ($ch -ne $expected) { throw "Mismatched JSON delimiter. Expected '$expected' but found '$ch'." }
              $stack.RemoveAt($stack.Count - 1)
              if ($stack.Count -eq 0) {
                return $trimmed.Substring($start, $i - $start + 1).Trim()
              }
            }
          }

          throw 'JSON object or array was not complete.'
        }

        function Repair-InvalidJsonStringEscapes {
          param([Parameter(Mandatory)][string]$Text)

          $builder = [System.Text.StringBuilder]::new()
          $inString = $false
          for ($i = 0; $i -lt $Text.Length; $i++) {
            $ch = $Text[$i]
            if ($inString) {
              if ($ch -eq '\') {
                if ($i + 1 -ge $Text.Length) {
                  [void]$builder.Append('\\')
                  continue
                }

                $next = $Text[$i + 1]
                if ($next -match '["\\/bfnrt]') {
                  [void]$builder.Append($ch)
                  [void]$builder.Append($next)
                  $i++
                  continue
                }

                if ($next -eq 'u') {
                  $hasHex = $i + 5 -lt $Text.Length
                  if ($hasHex) {
                    $hex = $Text.Substring($i + 2, 4)
                    if ($hex -match '^[0-9A-Fa-f]{4}$') {
                      [void]$builder.Append($ch)
                      [void]$builder.Append('u')
                      [void]$builder.Append($hex)
                      $i += 5
                      continue
                    }
                  }
                }

                [void]$builder.Append('\\')
                continue
              }

              if ($ch -eq '"') { $inString = $false }
              [void]$builder.Append($ch)
              continue
            }

            if ($ch -eq '"') { $inString = $true }
            [void]$builder.Append($ch)
          }

          return $builder.ToString()
        }

        function ConvertFrom-CanonicalJson {
          param([Parameter(Mandatory)][string]$Text)

          $candidate = Get-JsonCandidate -Text $Text
          try {
            return ConvertFrom-Json -InputObject $candidate -NoEnumerate -ErrorAction Stop
          } catch {
            $repaired = Repair-InvalidJsonStringEscapes -Text $candidate
            return ConvertFrom-Json -InputObject $repaired -NoEnumerate -ErrorAction Stop
          }
        }

        $forceReview = $false
        if (-not [string]::IsNullOrWhiteSpace($forceReviewRaw)) {
          $forceReview = $forceReviewRaw -match '^(?i:true|1|yes)$'
        }

        function Normalize-PrUrl {
          param([string]$Url)

          if ([string]::IsNullOrWhiteSpace($Url)) { return $Url }

          # PowerReview and Windows shell callers only need the stable PR URL; strip view-specific query fragments.
          return (($Url.Trim() -split '[?#]', 2)[0]).TrimEnd('/')
        }

        $pr = $null
        if (-not [string]::IsNullOrWhiteSpace($prDataInput)) {
          $pr = ConvertFrom-CanonicalJson -Text $prDataInput
        }

        $prUrl = $prUrlInput
        if ([string]::IsNullOrWhiteSpace($prUrl) -and $pr) { $prUrl = Get-OptionalProperty $pr 'prUrl' }
        if ([string]::IsNullOrWhiteSpace($prUrl) -and $pr) { $prUrl = Get-OptionalProperty $pr 'url' }
        if (-not [string]::IsNullOrWhiteSpace($prUrl)) { $prUrl = Normalize-PrUrl -Url $prUrl }

        $prId = if ($pr) { Get-OptionalProperty $pr 'id' } else { $null }
        if (-not $prId -and $prUrl -match '/pullrequest/(\d+)') { $prId = [int]$Matches[1] }
        if ([string]::IsNullOrWhiteSpace($prUrl) -and $prId) {
          $prUrl = "https://dev.azure.com/{{vars.organization}}/{{vars.project}}/_git/{{vars.repository}}/pullrequest/$prId"
        }
        if ([string]::IsNullOrWhiteSpace($prUrl)) {
          throw 'A PR URL or PR data with id/url is required.'
        }

        [pscustomobject]@{
          id = $prId
          title = if ($pr) { Get-OptionalProperty $pr 'title' } else { $null }
          createdBy = if ($pr) { Get-OptionalProperty $pr 'createdBy' } else { $null }
          creationDate = if ($pr) { Get-OptionalProperty $pr 'creationDate' } else { $null }
          sourceRefName = if ($pr) { Get-OptionalProperty $pr 'sourceRefName' } else { $null }
          targetRefName = if ($pr) { Get-OptionalProperty $pr 'targetRefName' } else { $null }
          reviewers = if ($pr) { Get-OptionalProperty $pr 'reviewers' } else { @() }
          iterationId = if ($pr) { Get-OptionalProperty $pr 'iterationId' } else { $null }
          url = $prUrl
          prUrl = $prUrl
          inputReviewReason = if ($pr) { Get-OptionalProperty $pr 'reviewReason' } else { $null }
          inputReviewEvents = if ($pr) { Get-OptionalProperty $pr 'reviewEvents' } else { @() }
          dispatchMode = $mode
          forceReview = $forceReview
        } | ConvertTo-Json -Compress -Depth 20
    arguments:
      - "{{param.prUrl}}"
      - "{{param.prData}}"
      - "{{param.mode}}"
      - "{{param.forceReview}}"
    timeoutSeconds: 120

  - name: open-review-session
    type: Script
    dependsOn: [normalize-review-request]
    shell: pwsh
    script: |
        $ErrorActionPreference = 'Stop'

        # Strict-safe optional property accessors (see normalize-review-request).
        function Get-OptionalProperty {
          param($Object, [Parameter(Mandatory)][string]$Name)
          if ($null -eq $Object) { return $null }
          $prop = $Object.PSObject.Properties[$Name]
          if ($null -eq $prop) { return $null }
          return $prop.Value
        }

        function Get-NestedOptionalProperty {
          param($Object, [Parameter(Mandatory)][string]$Path)
          $current = $Object
          foreach ($segment in $Path.Split('.')) {
            $current = Get-OptionalProperty -Object $current -Name $segment
            if ($null -eq $current) { return $null }
          }
          return $current
        }

        $request = ConvertFrom-Json -InputObject $args[0] -NoEnumerate -ErrorAction Stop

        function Resolve-PowerReviewOpenPrUrl {
          param(
            [Parameter(Mandatory)]$Result,
            [Parameter(Mandatory)][string]$FallbackPrUrl
          )

          $candidates = @(
            (Get-OptionalProperty $Result 'prUrl'),
            (Get-OptionalProperty $Result 'url'),
            (Get-NestedOptionalProperty $Result 'pullRequest.url'),
            (Get-NestedOptionalProperty $Result 'pull_request.url'),
            (Get-NestedOptionalProperty $Result 'session.prUrl'),
            (Get-NestedOptionalProperty $Result 'session.url'),
            (Get-NestedOptionalProperty $Result 'session.pullRequest.url'),
            (Get-NestedOptionalProperty $Result 'session.pull_request.url'),
            $FallbackPrUrl
          )

          foreach ($candidate in $candidates) {
            $value = [string]$candidate
            if (-not [string]::IsNullOrWhiteSpace($value)) { return $value }
          }

          return ''
        }

        function Invoke-PowerReviewOpen {
          param([Parameter(Mandatory)][string]$PrUrl)

          $stdoutPath = [System.IO.Path]::GetTempFileName()
          $stderrPath = [System.IO.Path]::GetTempFileName()
          $previousNativeCommandPreference = $PSNativeCommandUseErrorActionPreference
          $PSNativeCommandUseErrorActionPreference = $false

          try {
            & dnx --yes --add-source https://api.nuget.org/v3/index.json PowerReview -- open --pr-url $PrUrl 1> $stdoutPath 2> $stderrPath
            $exitCode = $LASTEXITCODE
            $stdout = Get-Content -LiteralPath $stdoutPath -Raw -ErrorAction SilentlyContinue
            $stderr = Get-Content -LiteralPath $stderrPath -Raw -ErrorAction SilentlyContinue
          } finally {
            $PSNativeCommandUseErrorActionPreference = $previousNativeCommandPreference
            Remove-Item -LiteralPath $stdoutPath, $stderrPath -Force -ErrorAction SilentlyContinue
          }

          if ($exitCode -ne 0) {
            throw "PowerReview open failed with exit code $exitCode for '$PrUrl'. Stdout: $stdout Stderr: $stderr"
          }

          $jsonText = if ($null -eq $stdout) { '' } else { $stdout.Trim() }
          if ([string]::IsNullOrWhiteSpace($jsonText)) {
            throw "PowerReview open produced empty stdout for '$PrUrl'. Stderr: $stderr"
          }

          try {
            $result = ConvertFrom-Json -InputObject $jsonText -NoEnumerate -ErrorAction Stop
          } catch {
            throw "PowerReview open stdout was not valid JSON for '$PrUrl'. Stdout: $jsonText Stderr: $stderr"
          }

          $openPrUrl = Resolve-PowerReviewOpenPrUrl -Result $result -FallbackPrUrl $PrUrl
          if ([string]::IsNullOrWhiteSpace($openPrUrl)) {
            throw "PowerReview open JSON did not contain a usable PR URL for '$PrUrl'. Stdout: $jsonText"
          }

          $result | Add-Member -NotePropertyName prUrl -NotePropertyValue $openPrUrl -Force
          return $result
        }

        $openResult = Invoke-PowerReviewOpen -PrUrl $request.prUrl
        $request | Add-Member -NotePropertyName powerReviewOpenStatus -NotePropertyValue 'opened-or-refreshed' -Force
        $request | Add-Member -NotePropertyName powerReviewOpenedAt -NotePropertyValue ([DateTimeOffset]::UtcNow.ToString('o')) -Force
        $request | Add-Member -NotePropertyName powerReviewOpenPrUrl -NotePropertyValue $openResult.prUrl -Force
        $request | ConvertTo-Json -Compress -Depth 20
    arguments:
      - "{{normalize-review-request.output}}"
    timeoutSeconds: 1200

  - name: prepare-review-dispatch
    type: Prompt
    dependsOn: [open-review-session]
    systemPrompt: |
      You are a PR review dispatcher. Your job is to decide whether the given PR should be reviewed now, build the enriched prData contract expected by pr-code-reviewer, or skip the PR by calling orchestra_complete.

      Use PowerReview as the PR/session/thread source of truth and Zakira.Exchange as the persisted review-state source.

      Reviewer agents that create PowerReview comments/replies:
      - .NET Expert
      - Principal Engineer
      - Security Expert
      - DTFx Expert
      - liabadi
      - ohads

      Decision rules:
      - If forceReview is true, always dispatch review. Use reviewReason 'manual' unless a more specific input reason exists.
      - If mode is 'manual', prefer dispatching review unless forceReview is explicitly false and the user-provided input reason says otherwise.
      - In auto mode, dispatch when there is no successful reviewed state, the stored iteration/source commit differs from the current PowerReview session, the state is failed, the in-review state is stale, or a human replied to a reviewer-agent-created thread.
      - Skip in auto mode when the PR was already reviewed at the current iteration/source commit and there are no unhandled reviewer-agent thread replies.
      - A reviewer-agent-created thread can be identified by PowerReview metadata such as author_name/agentName or by the hidden marker `<!-- powerreview-agent: <agent name> -->` in a comment/reply body.
      - For reviewer-agent thread replies, include reviewEvents with type, threadId, agentName, filePath, lineStart, latestReplyAuthor, latestReplyCreatedAt, and reason.

      When dispatching, output ONLY the enriched PR JSON object for pr-code-reviewer. Do not wrap it.

      When skipping, call orchestra_complete with status 'success' and a concise reason. Do not invoke pr-code-reviewer for skipped PRs.
    userPrompt: |
      Decide whether to dispatch this PR for code review.

      Normalized request and PowerReview open result:
      {{open-review-session.output}}

      Steps:
      1. Use Zakira.Exchange get_memory with the PR ID as key to retrieve stored review state.
      2. Use PowerReview MCP tools as needed to read current PR/session metadata, iteration/source commit, changed files, threads, replies, draft state, and work item metadata.
      3. Detect reviewer-agent thread replies that need follow-up.
      4. Apply the decision rules from the system prompt.

      If review is needed, output ONLY a JSON object shaped like:
      {
        "id": <number>,
        "title": "...",
        "createdBy": "...",
        "creationDate": "...",
        "sourceRefName": "...",
        "targetRefName": "...",
        "reviewers": ["..."],
        "iterationId": <number>,
        "url": "full PR URL",
        "prUrl": "full PR URL",
        "reviewReason": "manual|first-time|new-iteration|agent-thread-reply|stale-in-review|failed-retry",
        "reviewEvents": [
          {
            "type": "agent-thread-reply",
            "threadId": 123,
            "agentName": ".NET Expert|Principal Engineer|Security Expert|DTFx Expert|liabadi|ohads",
            "filePath": "path or empty for PR-level thread",
            "lineStart": 42,
            "latestReplyAuthor": "display name",
            "latestReplyCreatedAt": "timestamp",
            "reason": "short explanation"
          }
        ],
        "dispatchMode": "auto|manual",
        "forceReview": true|false,
        "existingZakiraState": null | { "status": "...", "iterationId": "...", "startedAt": "..." },
        "existingPowerReviewSession": null | { "sessionId": "...", "iterationId": "...", "sourceCommit": "...", "status": "..." }
      }

      If review is not needed, call orchestra_complete with a reason like 'PR 123 already reviewed at current iteration and has no reviewer-agent thread replies.'
    outputHandlerPrompt: |
      Extract the dispatch payload as one valid JSON object only.
      If the content includes markdown fences, explanatory text, or logs, remove them.
      Preserve all fields and nested arrays/objects.
      Escape every literal backslash inside JSON string values.
      Output only the JSON object, with no commentary.
    mcps: [zakira, powerreview]
    skillDirectories:
      - "{{vars.skillsDirPowerReview}}"

  - name: normalize-review-dispatch
    type: Script
    dependsOn: [prepare-review-dispatch]
    shell: pwsh
    script: |
        $ErrorActionPreference = 'Stop'

        function Get-JsonCandidate {
          param([Parameter(Mandatory)][string]$Text)

          $trimmed = $Text.Trim()
          if ($trimmed.StartsWith('```')) {
            $lines = @($trimmed -split "`r?`n")
            if ($lines.Count -gt 1) {
              $trimmed = ($lines[1..($lines.Count - 1)] -join "`n").Trim()
              if ($trimmed.EndsWith('```')) {
                $trimmed = $trimmed.Substring(0, $trimmed.Length - 3).Trim()
              }
            }
          }

          $start = -1
          for ($i = 0; $i -lt $trimmed.Length; $i++) {
            if ($trimmed[$i] -eq '{' -or $trimmed[$i] -eq '[') { $start = $i; break }
          }
          if ($start -lt 0) { throw 'No JSON object or array was found in dispatch output.' }

          $stack = [System.Collections.Generic.List[char]]::new()
          $inString = $false
          for ($i = $start; $i -lt $trimmed.Length; $i++) {
            $ch = $trimmed[$i]
            if ($inString) {
              if ($ch -eq '\') {
                if ($i + 1 -lt $trimmed.Length) { $i++ }
                continue
              }
              if ($ch -eq '"') { $inString = $false }
              continue
            }

            if ($ch -eq '"') { $inString = $true; continue }
            if ($ch -eq '{') { $stack.Add([char]'}'); continue }
            if ($ch -eq '[') { $stack.Add([char]']'); continue }
            if ($ch -eq '}' -or $ch -eq ']') {
              if ($stack.Count -eq 0) { continue }
              $expected = $stack[$stack.Count - 1]
              if ($ch -ne $expected) { throw "Mismatched JSON delimiter. Expected '$expected' but found '$ch'." }
              $stack.RemoveAt($stack.Count - 1)
              if ($stack.Count -eq 0) {
                return $trimmed.Substring($start, $i - $start + 1).Trim()
              }
            }
          }

          throw 'JSON object or array was not complete.'
        }

        function Repair-InvalidJsonStringEscapes {
          param([Parameter(Mandatory)][string]$Text)

          $builder = [System.Text.StringBuilder]::new()
          $inString = $false
          for ($i = 0; $i -lt $Text.Length; $i++) {
            $ch = $Text[$i]
            if ($inString) {
              if ($ch -eq '\') {
                if ($i + 1 -ge $Text.Length) {
                  [void]$builder.Append('\\')
                  continue
                }

                $next = $Text[$i + 1]
                if ($next -match '["\\/bfnrt]') {
                  [void]$builder.Append($ch)
                  [void]$builder.Append($next)
                  $i++
                  continue
                }

                if ($next -eq 'u') {
                  $hasHex = $i + 5 -lt $Text.Length
                  if ($hasHex) {
                    $hex = $Text.Substring($i + 2, 4)
                    if ($hex -match '^[0-9A-Fa-f]{4}$') {
                      [void]$builder.Append($ch)
                      [void]$builder.Append('u')
                      [void]$builder.Append($hex)
                      $i += 5
                      continue
                    }
                  }
                }

                [void]$builder.Append('\\')
                continue
              }

              if ($ch -eq '"') { $inString = $false }
              [void]$builder.Append($ch)
              continue
            }

            if ($ch -eq '"') { $inString = $true }
            [void]$builder.Append($ch)
          }

          return $builder.ToString()
        }

        $candidate = Get-JsonCandidate -Text $args[0]
        try {
          $value = ConvertFrom-Json -InputObject $candidate -NoEnumerate -ErrorAction Stop
        } catch {
          $repaired = Repair-InvalidJsonStringEscapes -Text $candidate
          $value = ConvertFrom-Json -InputObject $repaired -NoEnumerate -ErrorAction Stop
        }

        ConvertTo-Json -InputObject $value -Compress -Depth 20
    arguments:
      - "{{prepare-review-dispatch.output}}"
    timeoutSeconds: 120

  - name: review-pr
    type: Orchestration
    dependsOn: [normalize-review-dispatch]
    orchestration: pr-code-reviewer
    parameters:
      prData: "{{normalize-review-dispatch.output}}"
    inputHandlerPrompt: |
      Return ONLY a valid JSON object mapping parameter names to string values.
      Preserve the parameter name `prData`.
      The `prData` value must be a single canonical JSON object serialized as a string.
      If the value contains extra prose or markdown, extract the JSON object.
      Escape every literal backslash inside JSON string values so the `prData` string can be parsed by ConvertFrom-Json.
    mode: sync
    timeoutSeconds: 15300

  - name: generate-summary
    type: Prompt
    dependsOn: [review-pr, normalize-review-dispatch]
    systemPrompt: |
      You are a reporting assistant. Produce a clear, concise markdown summary of this PR review dispatch run.
    userPrompt: |
      Create a final markdown summary of this PR review dispatch.

      Dispatch input sent to pr-code-reviewer:
      {{normalize-review-dispatch.output}}

      pr-code-reviewer output:
      {{review-pr.output}}

      Produce a concise report with:
      1. Header: '## PR Review Dispatch Summary'
      2. PR title, id, author, and link
      3. Dispatch mode and review reason
      4. Outcome from pr-code-reviewer
      5. Any notes or errors surfaced by the child review
