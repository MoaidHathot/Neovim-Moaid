name: pr-comment-responder
description: |
  Responds to reviewer comments on a single Pull Request created by me. Consumes commentEvents prepared by pr-comment-dispatcher, analyzes targeted code context on demand, and uses a coordinator agent with specialized subagents (code-context-reader, code-fixer, docs-checker) to decide whether to reply, make code fixes, mark won't-fix/by-design, acknowledge, or resolve via user-approved PowerReview draft operations. Uses PowerReview MCP for comment and code fix operations. Creates draft replies, draft operations, and code fix proposals that require user approval before submission. Produces an ActionView entry of type 'pr-comment-response' with per-comment approve/delete/reject actions. Tracks processed comment cursors via Zakira.Exchange.
version: 2.0.0
tags: ["ZTS", "MSFT", "PR", "Comment-Response", "auto"]
defaultModel: gpt-5.4

inputs:
  prData:
    type: string
    description: |
      JSON object containing the PR data with fields: id, title, createdBy, creationDate, sourceRefName, targetRefName, reviewers, url, newCommentThreadIds (optional), and latest iteration id
      New dispatcher shape may also include prUrl, processReason, commentEvents, dispatchMode, forceProcess, existingZakiraState, and existingPowerReviewSession.
    required: true

variables:
  organization: msazure
  project: One
  repository: ZTS
  authorName: Moaid Hathot
  zakiraCategory: pr-comment-response-state
  pullRequestsDir: "../../orchestrations/PullRequests"
  skillsDirPowerReview: "{{vars.pullRequestsDir}}/skills-powerreview"
  skillsDirActionView: "{{vars.pullRequestsDir}}/skills-actionview"

defaultRetryPolicy:
  maxRetries: 2
  backoffSeconds: 5
  backoffMultiplier: 2.0
  retryOnTimeout: true

defaultStepTimeoutSeconds: 900
timeoutSeconds: 3600

mcps:
  - name: zakira
    type: local
    command: dnx
    arguments:
      - Zakira.Exchange
      - "--yes"
      - "--"
      - mcp
      - "--category"
      - "{{vars.zakiraCategory}}"

  - name: workiq
    type: local
    command: npx
    arguments:
      - "-y"
      - "@microsoft/workiq"
      - mcp

  - name: context7
    type: local
    command: npx
    arguments:
      - "-y"
      - "@upstash/context7-mcp"

steps:
  - name: prepare-pr-data
    type: Script
    shell: pwsh
    script: |
        $ErrorActionPreference = 'Stop'

        function Get-JsonCandidate {
          param([Parameter(Mandatory)][string]$Text)

          $trimmed = $Text.Trim()
          if ($trimmed.StartsWith('```')) {
            $lines = @($trimmed -split "`r?`n")
            if ($lines.Count -gt 1) {
              $trimmed = ($lines[1..($lines.Count - 1)] -join "`n").Trim()
              if ($trimmed.EndsWith('```')) {
                $trimmed = $trimmed.Substring(0, $trimmed.Length - 3).Trim()
              }
            }
          }

          $start = -1
          for ($i = 0; $i -lt $trimmed.Length; $i++) {
            if ($trimmed[$i] -eq '{' -or $trimmed[$i] -eq '[') { $start = $i; break }
          }
          if ($start -lt 0) { throw 'No JSON object or array was found in PR data.' }

          $stack = [System.Collections.Generic.List[char]]::new()
          $inString = $false
          for ($i = $start; $i -lt $trimmed.Length; $i++) {
            $ch = $trimmed[$i]
            if ($inString) {
              if ($ch -eq '\') {
                if ($i + 1 -lt $trimmed.Length) { $i++ }
                continue
              }
              if ($ch -eq '"') { $inString = $false }
              continue
            }

            if ($ch -eq '"') { $inString = $true; continue }
            if ($ch -eq '{') { $stack.Add([char]'}'); continue }
            if ($ch -eq '[') { $stack.Add([char]']'); continue }
            if ($ch -eq '}' -or $ch -eq ']') {
              if ($stack.Count -eq 0) { continue }
              $expected = $stack[$stack.Count - 1]
              if ($ch -ne $expected) { throw "Mismatched JSON delimiter. Expected '$expected' but found '$ch'." }
              $stack.RemoveAt($stack.Count - 1)
              if ($stack.Count -eq 0) {
                return $trimmed.Substring($start, $i - $start + 1).Trim()
              }
            }
          }

          throw 'JSON object or array was not complete.'
        }

        function Repair-InvalidJsonStringEscapes {
          param([Parameter(Mandatory)][string]$Text)

          $builder = [System.Text.StringBuilder]::new()
          $inString = $false
          for ($i = 0; $i -lt $Text.Length; $i++) {
            $ch = $Text[$i]
            if ($inString) {
              if ($ch -eq '\') {
                if ($i + 1 -ge $Text.Length) {
                  [void]$builder.Append('\\')
                  continue
                }

                $next = $Text[$i + 1]
                if ($next -match '["\\/bfnrt]') {
                  [void]$builder.Append($ch)
                  [void]$builder.Append($next)
                  $i++
                  continue
                }

                if ($next -eq 'u') {
                  $hasHex = $i + 5 -lt $Text.Length
                  if ($hasHex) {
                    $hex = $Text.Substring($i + 2, 4)
                    if ($hex -match '^[0-9A-Fa-f]{4}$') {
                      [void]$builder.Append($ch)
                      [void]$builder.Append('u')
                      [void]$builder.Append($hex)
                      $i += 5
                      continue
                    }
                  }
                }

                [void]$builder.Append('\\')
                continue
              }

              if ($ch -eq '"') { $inString = $false }
              [void]$builder.Append($ch)
              continue
            }

            if ($ch -eq '"') { $inString = $true }
            [void]$builder.Append($ch)
          }

          return $builder.ToString()
        }

        function ConvertTo-CanonicalJson {
          param([Parameter(Mandatory)][string]$Text)

          if ([string]::IsNullOrWhiteSpace($Text)) { throw 'PR data JSON is empty.' }

          $candidate = Get-JsonCandidate -Text $Text
          try {
            $value = ConvertFrom-Json -InputObject $candidate -NoEnumerate -ErrorAction Stop
          } catch {
            $repaired = Repair-InvalidJsonStringEscapes -Text $candidate
            try {
              $value = ConvertFrom-Json -InputObject $repaired -NoEnumerate -ErrorAction Stop
            } catch {
              throw "PR data was not valid JSON after extracting and repairing common backslash escapes. $($_.Exception.Message)"
            }
          }

          ConvertTo-Json -InputObject $value -Compress -Depth 20
        }

        ConvertTo-CanonicalJson -Text $args[0]
    arguments:
      - "{{param.prData}}"
    timeoutSeconds: 120

  - name: mark-responding
    type: Prompt
    dependsOn: [prepare-pr-data]
    systemPrompt: |
      You are a state persistence assistant. Mark this PR comment-response run as responding in Zakira.Exchange before draft replies or proposals are created.

      Preserve any existing processedCommentCursors and legacy processedThreadIds. Do not clear prior successful cursor state when starting a new response run.
    userPrompt: |
      Mark the following PR as responding in Zakira.Exchange:

      {{prepare-pr-data.output}}

      Use the PR ID as the key. First call get_memory to retrieve any existing state; the dispatcher may also have included existingZakiraState in prData.

      Save with create_memory or edit_memory:
      - status: "responding"
      - prUrl: full PR URL
      - processReason: reason from prData
      - startedAt: current timestamp
      - orchestrationRunId: "{{orchestration.runId}}"
      - targetThreadIds: thread IDs from commentEvents and newCommentThreadIds
      - processedCommentCursors: existing processedCommentCursors if present, otherwise []
      - processedThreadIds: existing legacy processedThreadIds if present, otherwise []
      - lastRunSummary: "Comment response run started"

      Use reason 'Comment response run started by pr-comment-responder' and tags ['comment-response', 'responding'].

      Output confirmation of what was saved.
    mcps: [zakira]

  - name: open-review-session
    type: Script
    dependsOn: [prepare-pr-data, mark-responding]
    shell: pwsh
    script: |
        $ErrorActionPreference = 'Stop'
        $pr = ConvertFrom-Json -InputObject $args[0] -NoEnumerate -ErrorAction Stop
        $prUrl = $pr.prUrl
        if (-not $prUrl) { $prUrl = $pr.url }
        if (-not $prUrl) { $prUrl = "https://dev.azure.com/{{vars.organization}}/{{vars.project}}/_git/{{vars.repository}}/pullrequest/$($pr.id)" }

        function Invoke-PowerReviewOpen {
          param([Parameter(Mandatory)][string]$PrUrl)

          $stdoutPath = [System.IO.Path]::GetTempFileName()
          $stderrPath = [System.IO.Path]::GetTempFileName()
          $previousNativeCommandPreference = $PSNativeCommandUseErrorActionPreference
          $PSNativeCommandUseErrorActionPreference = $false

          try {
            & dnx --yes --add-source https://api.nuget.org/v3/index.json PowerReview -- open --pr-url $PrUrl 1> $stdoutPath 2> $stderrPath
            $exitCode = $LASTEXITCODE
            $stdout = Get-Content -LiteralPath $stdoutPath -Raw -ErrorAction SilentlyContinue
            $stderr = Get-Content -LiteralPath $stderrPath -Raw -ErrorAction SilentlyContinue
          } finally {
            $PSNativeCommandUseErrorActionPreference = $previousNativeCommandPreference
            Remove-Item -LiteralPath $stdoutPath, $stderrPath -Force -ErrorAction SilentlyContinue
          }

          if ($exitCode -ne 0) {
            throw "PowerReview open failed with exit code $exitCode for '$PrUrl'. Stdout: $stdout Stderr: $stderr"
          }

          $jsonText = if ($null -eq $stdout) { '' } else { $stdout.Trim() }
          if ([string]::IsNullOrWhiteSpace($jsonText)) {
            throw "PowerReview open produced empty stdout for '$PrUrl'. Stderr: $stderr"
          }

          try {
            $result = ConvertFrom-Json -InputObject $jsonText -NoEnumerate -ErrorAction Stop
          } catch {
            throw "PowerReview open stdout was not valid JSON for '$PrUrl'. Stdout: $jsonText Stderr: $stderr"
          }

          if (-not $result -or [string]::IsNullOrWhiteSpace([string]$result.prUrl)) {
            throw "PowerReview open JSON did not contain a non-empty prUrl for '$PrUrl'. Stdout: $jsonText"
          }

          return $result
        }

        $openResult = Invoke-PowerReviewOpen -PrUrl $prUrl
        [pscustomobject]@{
          prId = $pr.id
          prTitle = $pr.title
          prUrl = $prUrl
          powerReviewOpenPrUrl = $openResult.prUrl
          author = if ($pr.createdBy) { $pr.createdBy } else { $pr.author }
          iterationId = $pr.iterationId
          sourceRefName = $pr.sourceRefName
          targetRefName = $pr.targetRefName
          processReason = $pr.processReason
          commentEvents = $pr.commentEvents
          newCommentThreadIds = $pr.newCommentThreadIds
          existingZakiraState = $pr.existingZakiraState
          existingPowerReviewSession = $pr.existingPowerReviewSession
          agentName = 'PR Author Assistant'
          status = 'opened-or-refreshed'
        } | ConvertTo-Json -Compress -Depth 20
    arguments:
      - "{{prepare-pr-data.output}}"
    timeoutSeconds: 1200

  - name: workiq-context
    type: Prompt
    dependsOn: [open-review-session]
    systemPrompt: |
      You are a contextual intelligence analyst. You use WorkIQ to search for additional context about this PR and its related work items across Microsoft 365 data (emails, Teams messages, meetings, documents). Use PowerReview MCP tools as needed to read PR metadata, work item metadata, threads, and current session state. Do not use Azure DevOps MCP here; PowerReview is the PR source of truth.

      WorkIQ accepts natural language queries about organizational communications. Simply ask questions like:
      - 'Find emails about [topic]'
      - 'What meetings discussed [feature name]?'
      - 'Find Teams messages mentioning [keyword]'
      - 'Who has been discussing [topic] recently?'
      - 'Find documents related to [feature]'

      No explicit authentication step is needed -- WorkIQ handles authentication automatically.

      This context is useful for responding to reviewer comments accurately: if a reviewer questions a design decision, discussions and meeting notes can provide the justification. Keep the output compact and focused on the targeted comment events.
    userPrompt: |
      Search for organizational context about this PR, its requirements, and any related discussions.

      Session:
      {{open-review-session.output}}

      Steps:
      1. Use PowerReview MCP tools as needed to understand the PR title, description, linked work items, current threads, and targeted comment events
      2. Ask WorkIQ for emails, meetings, Teams messages, or documents only when they are likely to help answer the targeted comments
      3. Cross-reference discussions with the PowerReview PR/work item context

      Produce a JSON report:
      {
        "relatedDiscussions": [
          { "source": "chat|email|meeting|document", "summary": "...", "participants": [...], "date": "..." }
        ],
        "designDecisions": ["key design decisions found in discussions that explain why the PR is implemented this way"],
        "requirementsContext": "summary of requirements from discussions that may not be in the work items",
        "additionalContext": "any other relevant context from communications that would help respond to reviewer comments",
        "relevantQuotes": ["direct quotes from discussions that could be cited in comment responses"]
      }
    mcps: [workiq, powerreview]
    retry:
      maxRetries: 2
      backoffSeconds: 10
      backoffMultiplier: 2.0
      retryOnTimeout: true

  - name: respond-to-comments
    type: Prompt
    dependsOn: [open-review-session, workiq-context]
    systemPrompt: |
      You are a PR comment response coordinator acting on behalf of the PR author '{{vars.authorName}}'. You consume the dispatcher-provided commentEvents, verify targeted thread context through PowerReview as needed, decide how to respond to each reviewer comment, then execute the appropriate draft actions using PowerReview.

      ## Your Role

      You coordinate responses to reviewer comments. For each comment, you:
      1. Understand what the reviewer is asking or pointing out
      2. Analyze the code context (using the code-context-reader subagent if needed)
      3. Decide on the appropriate action
      4. Execute the action using PowerReview tools

      CRITICAL: You MUST address EVERY commentEvent passed by pr-comment-dispatcher. Do not skip any unless PowerReview shows it is already addressed by a later PR-author or PR Author Assistant draft/reply/operation. Every targeted reviewer comment must receive a response -- whether that is a reply, a code fix, a won't-fix/by-design operation, an acknowledgement reaction, or a fixed/resolved operation. If you encounter an error processing a comment, log it and move on to the next, but attempt all of them.

      ## Available Actions

      - **Reply**: The comment is a question, clarification request, or discussion point. Draft a thoughtful reply.
      - **Code Fix**: The comment identifies a legitimate code issue (bug, missing validation, bad pattern, etc.) that should be fixed. Use the code-fixer subagent to make changes and create a proposal.
      - **Won't Fix / By Design**: The comment raises a valid point but the current approach is intentional or the change is out of scope. Draft a reply explaining why and create a draft thread-status operation when appropriate.
      - **Resolve / Fixed**: The comment has already been addressed by a previous iteration push or the code fix/proposal addresses it. Draft a reply if useful and create a draft thread-status operation to mark the thread fixed.
      - **Acknowledge**: The appropriate response is a lightweight acknowledgement. Create a draft comment reaction when a reply would add noise.

      ## Decision Guidelines

      - Be thoughtful and strategic. Not every comment requires a code change.
      - If a reviewer asks a question, answer it clearly and concisely.
      - If a reviewer suggests a minor improvement that makes sense, make the code fix.
      - If a reviewer points out a bug, security issue, or correctness problem, ALWAYS make a code fix.
      - If the current approach is intentional, explain the design reasoning respectfully -- use PowerReview PR metadata, work item context, and WorkIQ discussions to back up your explanation with concrete references to requirements, design decisions, or meeting outcomes.
      - Consider the full thread history to understand the conversation context.
      - When unsure about the right approach, use the docs-checker subagent to verify best practices.
      - When making code fixes, ensure they don't introduce new issues -- use the code-context-reader to understand surrounding code first.
      - Leverage work item acceptance criteria and organizational discussions to inform your responses. Use PowerReview MCP tools to fetch PR/work item metadata on demand when it helps answer a targeted comment. If a reviewer's comment contradicts a documented decision, cite the relevant context.

      ## Executing Actions

      ### For replies (Reply, Won't Fix, By Design, Resolve / Fixed):
      Call ReplyToThread with the prUrl, threadId, your reply body, and agentName "PR Author Assistant".

      ### For code fixes:
      1. First use the code-context-reader subagent to understand the code around the comment
      2. Then delegate to the code-fixer subagent with the thread details, file path, line numbers, the reviewer's comment, and code context
      3. The code-fixer will handle: PrepareFixWorktree, CreateFixBranch, make changes, commit, ReplyToThread, CreateProposal
      4. Record the returned proposalId and replyDraftId

      ### For thread status decisions:
      Call DraftThreadStatusChange with prUrl, threadId, status, reason, and agentName "PR Author Assistant". Use draft status changes for fixed, wontfix, bydesign, closed, pending, or active decisions. These are local draft operations only; the user must approve them before submit applies them remotely.

      ### For lightweight acknowledgements:
      Call DraftCommentReaction with prUrl, threadId, commentId, reaction "like", reason, and agentName "PR Author Assistant". This is a local draft operation only; the user must approve it before submit applies it remotely.

      ## Output Format

      After processing all comments, output a JSON summary:
      {
        "totalProcessed": <count>,
        "actions": {
          "replies": <count>,
          "codeFixes": <count>,
          "wontFix": <count>,
          "byDesign": <count>,
          "fixed": <count>,
          "acknowledged": <count>,
          "draftOperations": <count>
        },
        "responses": [
          {
            "threadId": <id>,
            "commenter": "...",
            "filePath": "...",
            "lineStart": <line>,
            "commentId": <latest reviewer comment id or null>,
            "commentCreatedAt": "timestamp or null",
            "action": "reply|code-fix|wont-fix|by-design|fixed|acknowledge",
            "replyDraftId": "draft UUID",
            "proposalId": "proposal UUID" or null,
            "draftOperationId": "draft operation UUID for status/reaction" or null,
            "draftOperationType": "thread-status|comment-reaction" or null,
            "processedCursor": {
              "threadId": <id>,
              "latestCommentId": <comment id or null>,
              "latestCommentCreatedAt": "timestamp or null",
              "latestCommentAuthor": "reviewer display name"
            },
            "summary": "Brief description of what was done"
          }
        ],
        "errors": []
      }
    userPrompt: |
      Respond to the following unaddressed reviewer comments on my PR.

      Session data:
      {{open-review-session.output}}

      Targeted comment events from pr-comment-dispatcher:
      {{prepare-pr-data.output}}

      ## Organizational Context (emails, chats, meetings, documents)
      {{workiq-context.output}}

      Process EVERY commentEvent in the prData -- do not skip any unless PowerReview now shows a later author/AI response or draft operation already addresses it:
      1. Read the event and use PowerReview MCP tools to load its current thread context, drafts, and PR/work item metadata when useful
      2. Consider PowerReview PR metadata, work item requirements, and organizational discussions for relevant context
      3. If the code context is not clear from the event/thread, use the code-context-reader subagent to read surrounding code or targeted diffs
      4. Decide the appropriate action (reply, code fix, won't fix, by-design, fixed, or acknowledge)
      5. Execute the action using PowerReview tools or subagents
      6. Track the results, including a processedCursor for each addressed reviewer comment
      7. Move to the next comment -- repeat until ALL comments have been addressed

      When responding, draw on the work item context and organizational discussions where relevant. For example:
      - If a reviewer asks "why was this done this way?", cite the relevant design decision from meetings or emails
      - If a reviewer questions requirements, reference acceptance criteria or work item details from PowerReview
      - If a reviewer suggests an alternative approach that was already discussed and rejected, mention the discussion

      Write responses as if you are the PR author ('{{vars.authorName}}'). Be professional, acknowledge valid feedback, and provide clear explanations.

      IMPORTANT: When calling ReplyToThread, CreateComment, or any PowerReview tool that accepts agentName, always pass agentName: "PR Author Assistant".
      IMPORTANT: Do not update remote thread status or reactions directly. Use PowerReview draft operations (DraftThreadStatusChange or DraftCommentReaction) so the user can approve them before submit.
    mcps: [powerreview]
    reasoningLevel: High
    timeoutSeconds: 1800
    skillDirectories:
      - "{{vars.skillsDirPowerReview}}"
    subagents:
      - name: code-context-reader
        displayName: Code Context Reader
        description: |
          Reads code files surrounding commented areas to understand the context and design intent of the code. Use this agent when you need to understand the codebase context before deciding how to respond to a reviewer comment. Provide the PR URL, file path, and line numbers.
        prompt: |
          You are a code context analyst with access to the repository through PowerReview MCP file access tools. Your job is to read and analyze code files to help the coordinator understand the context around reviewer comments.

          Use these tools:
          - ReadFile: to read file contents (supports offset/limit for large files)
          - ListRepositoryFiles: to discover project structure and find related files
          - GetFileDiff: to see the full diff for a specific file

          The PR URL is available in the data passed to your parent agent. Use it with all PowerReview tool calls.

          When asked about a specific file and line range:
          1. Read the file using ReadFile, including at least 40 lines before and 40 lines after the commented area for context
          2. Identify and read related files: interfaces implemented, base classes, callers of modified methods, corresponding test files
          3. Use ListRepositoryFiles to discover the project structure around the changed file (list the directory to see sibling files)
          4. Understand the design intent: why is the code written this way? What patterns does it follow?

          Return your analysis as JSON:
          {
            "filePath": "the file analyzed",
            "codeContext": "description of what the code does in the commented area",
            "designIntent": "why the code appears to be written this way",
            "relatedFiles": ["list of relevant related files discovered"],
            "existingPatterns": ["patterns in the codebase that are relevant to this comment"],
            "callers": ["methods/classes that call or depend on this code"],
            "testCoverage": "whether tests exist for this code",
            "recommendation": "whether a code change seems warranted and what it should do, based on the full context"
          }
        mcps: [powerreview]
        infer: true

      - name: code-fixer
        displayName: Code Fixer
        description: |
          Makes targeted code changes in response to reviewer comments. Creates fix branches, modifies code, commits changes, creates draft replies, and registers proposals via PowerReview. Use this agent when a reviewer comment requires an actual code change. Provide the PR URL, thread ID, file path, line numbers, the reviewer's comment, and any code context from the code-context-reader.
        prompt: |
          You are a code fix specialist with access to the repository through PowerReview MCP tools. You make targeted, careful code changes in response to reviewer comments.

          The PR URL is available in the data passed to your parent agent. Use it with all PowerReview tool calls.

          When asked to fix code for a specific comment thread, follow these steps in order:

          1. **Prepare the worktree** (idempotent -- safe to call multiple times):
             Call PrepareFixWorktree(prUrl) to get the isolated fix worktree path.

          2. **Create a fix branch** for this specific thread:
             Call CreateFixBranch(prUrl, threadId) to create a branch named powerreview/fix/thread-{threadId}.

          3. **Read the current code**:
             Call ReadFile(prUrl, filePath) to see the exact current state of the file in the worktree.

          4. **Make the code changes**:
             Use your file editing tools to modify the file(s) in the worktree path returned by PrepareFixWorktree.
             Be surgical -- change only what is needed to address the reviewer's comment.

          5. **Commit the changes**:
             Run git add and git commit in the worktree directory.

          6. **Create a draft reply**:
             Call ReplyToThread(prUrl, threadId, body, agentName: "PR Author Assistant") explaining what was fixed and why.
             Note the returned draft id (UUID).

          7. **Register the proposal**:
             Call CreateProposal(prUrl, threadId, branchName, description, filesChanged, replyDraftId, agentName: "PR Author Assistant").
             - branchName: the branch from step 2
             - description: clear explanation of the fix
             - filesChanged: comma-separated list of modified files
             - replyDraftId: the UUID from step 6

          Return the results as JSON:
          {
            "threadId": <id>,
            "branchName": "powerreview/fix/thread-<id>",
            "filesChanged": ["list of modified files"],
            "proposalId": "proposal UUID",
            "replyDraftId": "reply draft UUID",
            "description": "what was fixed and why"
          }

          IMPORTANT:
          - The fix worktree is isolated. Changes here do NOT affect the user's working directory.
          - All changes are proposals that must be approved by the user before they are applied.
          - Be conservative: fix only what the reviewer asked for, don't refactor surrounding code.
        mcps: [powerreview]
        infer: true

      - name: docs-checker
        displayName: Documentation Checker
        description: |
          Checks latest documentation for APIs, patterns, and best practices referenced in reviewer comments. Use this agent when a reviewer questions whether an API usage is correct, suggests a different pattern, or when you need to verify the right approach before responding.
        prompt: |
          You are a documentation researcher. Use the Context7 MCP to look up the latest documentation for APIs, frameworks, patterns, and best practices that are relevant to the reviewer's comment.

          When asked to verify a specific API, pattern, or practice:
          1. Search for the relevant documentation using Context7
          2. Verify whether the current code usage is correct and current
          3. Check for deprecations, breaking changes, or newer alternatives
          4. Find official recommendations and best practice guidance

          Return findings as JSON:
          {
            "topic": "what was looked up",
            "currentUsageCorrect": true/false,
            "documentation": "relevant documentation summary",
            "recommendations": "what the official docs recommend",
            "deprecations": "any deprecation warnings or migration notes",
            "links": ["relevant documentation references"]
          }
        mcps: [context7]
        infer: true

  - name: fetch-template
    type: Command
    command: dnx
    arguments:
      - ActionView.Cli
      - "--yes"
      - "--"
      - template
      - show
      - pr-comment-response

  - name: create-action-view-entry
    type: Prompt
    dependsOn: [respond-to-comments, open-review-session, fetch-template]
    systemPrompt: |
      You are an ActionView entry generator for PR comment responses. You create structured JSON entries conforming to the pr-comment-response template.

      You have access to the PowerReview MCP server. Use it to fetch the current state of drafts, proposals, and threads to build accurate per-response sections with correct UUIDs for action buttons.

      Follow the instructions in the 'creating-comment-response-actionview-entry' skill for the exact data collection steps, content block structure, action command templates, and verification checklist.

      The template definition below is the runtime source of truth. Ensure your entry satisfies every required content block and expected action defined in the template.

      IMPORTANT: Save the generated JSON entry using the orchestra_save_file tool. Output ONLY the raw JSON -- it will be validated and submitted by a downstream step.
    userPrompt: |
      Create an ActionView entry of type 'pr-comment-response' summarizing the comment responses.

      ## pr-comment-response Template Definition
      {{fetch-template.output}}

      ## Response Results
      {{respond-to-comments.output}}

      ## Review Session
      {{open-review-session.output}}

      Follow the 'creating-comment-response-actionview-entry' skill to build the entry. Ensure the entry satisfies all required blocks from the template above. Key steps:

      1. Call GetReviewSession to get PR metadata (title, URL, branches, author)
      2. Call ListCommentThreads to get all threads, draft replies, and draft operations with their UUIDs
      3. Call ListProposals to get all proposals with their UUIDs
      4. For file/line-specific addressed comments, call GetFileDiff only when targeted context is useful for the optional Code Context block
      5. For each proposal, call GetProposalDiff to get the proposed fix diff
      6. Build the entry with type 'pr-comment-response', source '{{orchestration.name}}'
      7. Include:
         - Alert block if there were errors processing any comments
         - Pull Request keyValue (REQUIRED: PR Title, Repository, Branch, Author, PR URL)
         - Response Summary table: Action | Count (Replies, Code Fixes, Won't Fix / By Design, Fixed, Acknowledged, Draft Operations, Total)
         - Comment Responses section with one nested section PER addressed comment containing:
           a) Details keyValue (Thread ID, Commenter, File, Lines, Action, Agent, Reply Draft ID, Draft Operation ID, Draft Operation Type, Proposal ID)
           b) Original Comment markdown (the reviewer's comment as blockquote)
           c) AI Response markdown (the draft reply text)
           d) Code Context code block (optional: targeted diff hunk around the commented lines, language: diff)
           e) Proposed Fix code block (if code fix: the proposal diff, language: diff)
           f) Per-response actions: Approve Reply + Delete Reply when a reply draft exists; Approve Operation + Delete Operation when a draft status/reaction operation exists; Approve Proposal + Reject Proposal only for code fixes
         - Optional Proposed Code Fixes section (table listing all proposals)
         - Summary markdown
         - View PR link (REQUIRED)
      8. Entry-level actions:
         - 'Open PR' (primary, use pwsh Start-Process with the PR URL)
         - 'Approve All Replies' or equivalent per-draft approval actions for replies and draft operations
         - 'Submit Replies/Operations' (success, powerreview submit, onSuccess: archive)
         - Proposal bulk actions only if the installed PowerReview CLI explicitly supports them; otherwise rely on per-proposal actions
         - 'Delete All' (danger, onSuccess: archive)
      9. Severity: medium if code fixes exist, low if only replies, high if errors occurred

      Save the JSON using orchestra_save_file. Output ONLY the raw JSON.
    mcps: [powerreview]
    skillDirectories:
      - "{{vars.skillsDirActionView}}"

  # First-class Orchestration step: launches actionview-submit in-process via the engine's
  # IChildOrchestrationLauncher. No MCP transport is involved, so the 3-minute MCP request
  # timeout does not apply. The step blocks until the child reaches a terminal state and
  # propagates failures as native step failures.
  - name: submit-action-view-entry
    type: Orchestration
    dependsOn: [create-action-view-entry]
    orchestration: actionview-submit
    parameters:
      entryJson: "{{create-action-view-entry.output}}"
      template: pr-comment-response
    mode: sync
    timeoutSeconds: 600

  - name: update-tracking-state
    type: Prompt
    dependsOn: [respond-to-comments]
    systemPrompt: |
      You are a state persistence assistant. Update Zakira.Exchange to record exactly which reviewer comment cursors on this PR were processed, so the dispatcher does not re-process the same comment but can still detect newer comments in the same thread.

      Preserve legacy processedThreadIds for compatibility, but processedCommentCursors is the primary state. A cursor should include threadId plus latestCommentId and/or latestCommentCreatedAt. Do not let a legacy processedThreadIds match suppress newer comments in the same thread.
    userPrompt: |
      Update the tracking state for this PR after processing comments.

      PR Data:
      {{prepare-pr-data.output}}

      Response results:
      {{respond-to-comments.output}}

      Open review session:
      {{open-review-session.output}}

      Steps:
      1. First, call get_memory with the PR ID as key to retrieve any existing state (including existing processedCommentCursors and legacy processedThreadIds)
      2. Build processed cursors from respond-to-comments.responses[*].processedCursor. If a response lacks processedCursor, derive one from threadId, commentId, commentCreatedAt, and commenter in the response/event.
      3. Merge cursors by threadId plus latestCommentId/latestCommentCreatedAt, preserving older distinct cursors but replacing duplicates.
      4. Also maintain legacy processedThreadIds as the union of existing processedThreadIds and this run's response thread IDs.
      5. If respond-to-comments.errors is non-empty, set status to 'failed'; otherwise set status to 'idle'.
      6. Update Zakira.Exchange using edit_memory (or create_memory if no entry exists):
          - key: the PR ID
          - data: JSON with:
            - "status": "idle" or "failed"
            - "prUrl": full PR URL
            - "processReason": reason from prData
            - "lastProcessedAt": <current timestamp>
            - "processedCommentCursors": <merged list of processed comment cursors>
            - "processedThreadIds": <legacy merged list of processed thread IDs>
            - "lastCommentEvents": <commentEvents from prData>
            - "lastRunSummary": <brief summary: "X comments addressed (Y replies, Z code fixes)">
            - "lastRunOrchestrationId": "{{orchestration.runId}}"
            - "errors": <errors from respond-to-comments, if any>
          - reason: 'Comment response run completed by pr-comment-responder'
          - tags: ['comment-response', 'processed'] if successful, otherwise ['comment-response', 'failed']

      Output confirmation of what was saved.
    mcps: [zakira]

  - name: generate-summary
    type: Prompt
    dependsOn: [respond-to-comments, update-tracking-state, submit-action-view-entry]
    systemPrompt: |
      You are a reporting assistant. Produce a clear, concise markdown summary of the PR comment response orchestration run.
    userPrompt: |
      Create a final markdown summary of this comment response run.

      Response results:
      {{respond-to-comments.output}}

      State update:
      {{update-tracking-state.output}}

      ActionView submission:
      {{submit-action-view-entry.output}}

      Produce a polished markdown report:
      1. Header: '## PR Comment Response Summary' with orchestration run info
      2. PR title and link
      3. Total comments addressed
      4. Breakdown by action type: replies, code fixes, won't fix/by design, fixed, acknowledged, draft operations
      5. For each response: thread ID, file, commenter, action taken, brief summary of the response
      6. Number of proposals pending user approval
      7. Number of draft replies and draft operations pending user approval
      8. Confirmation that tracking state was updated and ActionView entry was submitted
      9. Any errors or issues encountered
