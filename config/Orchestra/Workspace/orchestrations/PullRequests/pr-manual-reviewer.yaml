name: pr-manual-reviewer
description: |
  On-demand companion to pr-auto-reviewer. Reviews a single Azure DevOps Pull Request specified by URL by delegating to pr-review-dispatcher with manual mode and forceReview enabled.
version: 2.0.0
tags: ["ZTS", "MSFT", "PR", "Code-Review", "on-demand", "favorite"]
defaultModel: gpt-5.4

inputs:
  prUrl:
    type: string
    description: |
      Full Azure DevOps Pull Request URL, e.g.
      https://dev.azure.com/{org}/{project}/_git/{repo}/pullrequest/{id}
      or https://{org}.visualstudio.com/{project}/_git/{repo}/pullrequest/{id}
    required: true

defaultRetryPolicy:
  maxRetries: 2
  backoffSeconds: 5
  backoffMultiplier: 2.0
  retryOnTimeout: true

timeoutSeconds: 34400

steps:
  - name: dispatch-review
    type: Orchestration
    orchestration: pr-review-dispatcher
    parameters:
      prUrl: "{{param.prUrl}}"
      mode: manual
      forceReview: "true"
    mode: sync
    timeoutSeconds: 17000

  - name: generate-summary
    type: Prompt
    dependsOn: [dispatch-review]
    systemPrompt: |
      You are a reporting assistant. Produce a clear, concise markdown summary of this on-demand PR review run.
    userPrompt: |
      Create a final markdown summary of this on-demand PR review.

      PR URL:
      {{param.prUrl}}

      Dispatcher output:
      {{dispatch-review.output}}

      Produce a polished markdown report:
      1. Header: '## On-Demand PR Review Summary'
      2. PR link ({{param.prUrl}})
      3. Outcome from the dispatcher/child review
      4. Any notes the child review surfaced

trigger:
  type: manual
