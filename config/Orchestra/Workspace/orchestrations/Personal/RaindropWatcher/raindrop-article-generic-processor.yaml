# yaml-language-server: $schema=https://raw.githubusercontent.com/MoaidHathot/orchestra/main/schemas/orchestration.schema.json
name: raindrop-article-generic-processor
description: |
  Fallback processor for (article, generic) and (article, session) raindrops.
  Fetches the page via Invoke-WebRequest, falls back to Playwright when the
  cheap fetch returns thin/JS-only content, then synthesizes a flexible
  analysis. The default ask covers blog posts, news articles, and reference
  docs; the user's note overrides everything when provided.

  Images: fetch-article.ps1 extracts ad-filtered image candidates. A
  select-images step picks up to a small cap of the most informative ones
  (hero image, key diagrams, screenshots) and we embed them inline in the
  analysis and in the ActionView entry by REMOTE URL -- we do NOT download
  them, because generic articles aren't archived to disk like recipes are.
  This keeps the entry small and avoids syncing image files we'll rarely
  re-open.
version: 1.1.0
tags: ["personal", "raindrop", "auto", "article", "generic"]
defaultModel: claude-opus-4.8

inputs:
  raindropId: { type: string, required: true }
  url:        { type: string, required: true }
  title:      { type: string, required: true }
  note:       { type: string, required: false, default: "", multiline: true }
  noteHash:   { type: string, required: false, default: "" }
  tags:       { type: string, required: false, default: "[]" }
  addedAt:    { type: string, required: false, default: "" }

variables:
  defaultAnalysisAsk: |
    Produce a polished markdown analysis. Adapt the structure to the article
    kind:

      - News article: 1-paragraph TL;DR + bullet "Key facts" (5W1H) +
                       bullet "Notable quotes" (with attribution).
      - Blog / opinion: 1-paragraph TL;DR + bullet "Author's argument" +
                        bullet "Strongest claim" + bullet "Weakest claim".
      - Reference / how-to / docs: 1-paragraph TL;DR + bullet "What it
                                   teaches" + bullet "Prerequisites" +
                                   bullet "Key terms / APIs" + bullet
                                   "When to use this".

    End every analysis with a short "Worth re-reading?" verdict (one
    sentence) and 1-3 follow-up questions worth pursuing.

  # Embed at most this many images. Generic articles are read-then-archive;
  # too many embedded images make the ActionView entry noisy.
  maxImagesToEmbed: "4"

defaultStepTimeoutSeconds: 900
timeoutSeconds: 3600

mcps:
  - name: playwright
    type: local
    command: npx
    arguments:
      - "@playwright/mcp@latest"
      - "--headless"
      - "--browser=msedge"

steps:
  - name: fetch-http
    type: Script
    shell: pwsh
    scriptFile: "./tools/scripts/fetch-article.ps1"
    arguments:
      - "{{param.url}}"
      - "-MaxChars"
      - "80000"
      - "-TimeoutSeconds"
      - "30"
      - "-MaxImageCandidates"
      - "30"
    timeoutSeconds: 120

  - name: fetch-readable
    type: Prompt
    dependsOn: [fetch-http]
    systemPrompt: |
      You are a fetch-and-extract assistant. Decide whether the cheap HTTP
      fetch result is good enough:

        - If `ok` is true AND `looksThin` is false AND `wordCount` >= 80:
            extract the readable content directly from `text`.
        - Otherwise: use the Playwright MCP tools to navigate to the URL,
            wait for the page to render, take a snapshot, and extract the
            readable content from the rendered DOM. Use browser_close when
            done.

      Output ONLY a JSON object:

        {
          "mode": "http" | "playwright",
          "fetchedAt": "<ISO-8601 UTC>",
          "finalUrl": "<resolved URL>",
          "title": "<page title>",
          "byline": "<author or null>",
          "siteName": "<publication or null>",
          "publishedAt": "<ISO date or null>",
          "content": "<clean markdown of the article body>",
          "rawWordCount": <number>
        }

      Do not synthesize -- just extract the page text. The synth step will
      analyse it.

      Do NOT touch the image candidates -- the next step handles them.
    userPrompt: |
      HTTP fetch result:
      {{fetch-http.output}}

      Raindrop:
        url   = {{param.url}}
        title = {{param.title}}

      Follow the system prompt and output ONLY the JSON object.
    mcps: [playwright]
    timeoutSeconds: 600

  - name: select-images
    type: Prompt
    dependsOn: [fetch-http, fetch-readable]
    systemPrompt: |
      You are an image curator for an article analysis. You have a list of
      ad-filtered image candidates from the raw HTML and the extracted
      readable content.

      Pick at most {{vars.maxImagesToEmbed}} images that meaningfully
      complement the analysis. Prefer:
        - The article's hero image when there is a clear one.
        - Key diagrams / charts / screenshots that are referenced by the
          surrounding text.
        - Annotated figures with figcaptions.

      Drop anything that looks like a related-post thumbnail, an
      author headshot, a stock decorative image, a banner, or a logo.

      Output a SINGLE JSON object (no commentary):

        {
          "selected": [
            { "src": "<URL>", "alt": "<alt or short caption>", "reason": "<why>" }
          ],
          "rejected": [
            { "src": "<URL>", "reason": "<short>" }
          ]
        }

      If the candidate list is empty, output { "selected": [], "rejected": [] }.
    userPrompt: |
      Image candidates (from fetch-http.output.images):
      {{fetch-http.output}}

      Extracted page content (use to understand the article and decide which images add value):
      {{fetch-readable.output}}

      Pick at most {{vars.maxImagesToEmbed}} images per the system prompt.
      Output ONLY the JSON.
    timeoutSeconds: 300

  - name: synthesize
    type: Prompt
    dependsOn: [fetch-readable, select-images]
    systemPrompt: |
      You are an article analyst. Build a clean markdown analysis based on
      the extracted page content. Cite specific paragraphs when quoting.
      Never invent facts.

      Use the user's note as the analysis request when it is non-empty.
      Otherwise use the default ask, choosing the shape that best matches
      the article kind (news vs blog vs docs).

      For each item in `selected` from select-images, embed it inline in
      the most relevant part of the analysis using markdown image syntax
      with the REMOTE URL: `![<alt>](<src>)`. Do not download or rewrite
      the URLs -- generic articles use remote embeds.

      Save the final markdown via orchestra_save_file.
    userPrompt: |
      Raindrop:
        title = {{param.title}}
        url   = {{param.url}}
        tags  = {{param.tags}}

      User note (analysis request; may be empty):
        {{param.note}}

      Default analysis ask:
        {{vars.defaultAnalysisAsk}}

      Extracted page content (JSON envelope):
      {{fetch-readable.output}}

      Selected images (embed inline via remote URL):
      {{select-images.output}}

      Produce the markdown analysis. Save via orchestra_save_file. Output
      the markdown as the step output.
    timeoutSeconds: 1200

  - name: fetch-action-view-schema
    type: Command
    command: dnx
    arguments: [ActionView.Cli, "--yes", "--", schema]
    timeoutSeconds: 120

  - name: create-action-view-entry
    type: Prompt
    dependsOn: [synthesize, select-images, fetch-action-view-schema]
    systemPrompt: |
      You produce ActionView entries that match the entry schema. Type must
      be 'raindrop-article'; source must be '{{orchestration.name}}'.
      Save the JSON via orchestra_save_file -- the next step submits the file.
    userPrompt: |
      ActionView schema:
      {{fetch-action-view-schema.output}}

      Raindrop:
        id    = {{param.raindropId}}
        title = {{param.title}}
        url   = {{param.url}}
        tags  = {{param.tags}}
        note  = {{param.note}}

      Extracted page content (for metadata only):
      {{fetch-readable.output}}

      Synthesized analysis:
      {{synthesize.output}}

      Selected images (for Visual evidence section):
      {{select-images.output}}

      Build an entry with:
        id       = 'raindrop-{{param.raindropId}}-article'  # stable per-raindrop key -> idempotent re-runs
        type     = 'raindrop-article'
        source   = '{{orchestration.name}}'
        title    = the raindrop title (cap at 120 chars)
        subtitle = '<author if known> | <publication if known> | <published date if known>'
        severity = 'low'
        icon     = 'file-text'
        tags     = raindrop tags + ['raindrop','article']
        content blocks:
          - keyValue 'Source' with: URL, Added at, Original tags, Note, Fetch mode (from fetch-readable)
          - section 'Analysis' containing a markdown block with the synth output (already embeds inline images)
          - section 'Visual evidence' containing a markdown block listing each `selected` image as
              "### <alt or 'image N'>" followed by `![<alt>](<src>)` (REMOTE URL).
              Omit this section if `selected` is empty.
          - link 'Open original' to the raindrop URL
        actions:
          - 'Open original' (cli, onSuccess=keep)
          - 'Reprocess'     -- include this action VERBATIM (substituting the templated values shown):
              {
                "label": "Reprocess (move back to AI-Inbox)",
                "style": "default",
                "confirmMessage": "Move this raindrop back to AI-Inbox and rerun the full analysis on the next tracker tick?",
                "command": {
                  "type": "cli",
                  "program": "pwsh",
                  "args": [
                    "-NoProfile",
                    "-File",
                    "{{orchestration.sourceDirectory}}/tools/scripts/reprocess-raindrop.ps1",
                    "-RaindropId",
                    "{{param.raindropId}}"
                  ]
                },
                "onSuccess": "archive"
              }
          - 'Dismiss'       (default, onSuccess=archive)

      Save the JSON via orchestra_save_file. Output ONLY the raw JSON.
    timeoutSeconds: 600

  - name: submit-action-view-entry
    type: Script
    shell: pwsh
    dependsOn: [create-action-view-entry]
    scriptFile: "./tools/scripts/submit-actionview-upsert.ps1"
    arguments:
      - "-EntryFile"
      - "{{create-action-view-entry.files[0]}}"
    timeoutSeconds: 120

  - name: result-envelope
    type: Prompt
    dependsOn: [fetch-readable, synthesize, select-images, submit-action-view-entry]
    systemPrompt: |
      Output ONLY a JSON envelope describing the outcome.
    userPrompt: |
      Build a JSON envelope like:

      {
        "ok": true,
        "processor": "{{orchestration.name}}",
        "raindropId": "{{param.raindropId}}",
        "fetchMode": "<http or playwright from fetch-readable>",
        "imagesSelected": <count from select-images output `selected` length>,
        "actionViewEntryId": "<id parsed from submit-action-view-entry, or null>",
        "summary": "<one-sentence summary line>"
      }

      Fetch-readable output: {{fetch-readable.output}}
      Select-images output:  {{select-images.output}}
      ActionView submission: {{submit-action-view-entry.output}}

      Output ONLY the JSON.
    timeoutSeconds: 60
