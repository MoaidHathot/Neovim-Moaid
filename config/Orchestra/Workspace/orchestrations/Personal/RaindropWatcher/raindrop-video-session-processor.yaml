# yaml-language-server: $schema=https://raw.githubusercontent.com/MoaidHathot/orchestra/main/schemas/orchestration.schema.json
name: raindrop-video-session-processor
description: |
  Processor for raindrops classified as (video, session) -- conference talks,
  lectures, keynotes, webinars.

  Two-stage frame pipeline:
    1. BASELINE: Zakira.Replay `analyze` with the `lecture` preset, plus
       --ocr and --vision so slides and on-screen text are captured.
    2. TARGETED: a Prompt step with Zakira.Replay's MCP requests additional
       frames at moments the LLM judges worth a visual (slide reference,
       on-stage demo, code shown, diagram, "as you can see on this slide..."
       narrations). Bounded cap to stay balanced.

  Synthesizes a session summary using the user's note as the analysis prompt
  (default ask when note is empty) and publishes a rich ActionView entry
  with chapters, key quotes, and inline targeted frames.
version: 1.1.0
tags: ["personal", "raindrop", "auto", "video", "session"]
defaultModel: claude-opus-4.7-1m-internal

inputs:
  raindropId: { type: string, required: true }
  url:        { type: string, required: true }
  title:      { type: string, required: true }
  note:       { type: string, required: false, default: "", multiline: true }
  noteHash:   { type: string, required: false, default: "" }
  tags:       { type: string, required: false, default: "[]" }
  addedAt:    { type: string, required: false, default: "" }

variables:
  defaultAnalysisAsk: |
    Summarize this conference / lecture session. Produce:
    1. A 3-5 sentence executive summary.
    2. A "Key takeaways" list (5-10 bullet points).
    3. A "Notable quotes" list with timestamps and the speaker's name when known.
    4. A "Action items / follow-ups" list extracted from explicit calls to action.
    5. A short list of "Open questions" worth following up on.

  # Sessions need fewer additional frames than recipes -- slides already
  # cover most visual evidence. Cap at 12.
  targetedFrameCap: "12"

defaultStepTimeoutSeconds: 1800
timeoutSeconds: 7200

mcps:
  - name: zakira-replay
    type: local
    command: dnx
    arguments:
      - Zakira.Replay
      - "--yes"
      - "--"
      - mcp
      - serve
      - "--transport"
      - stdio

steps:
  - name: zakira-analyze
    type: Command
    command: dnx
    arguments:
      - Zakira.Replay
      - "--yes"
      - "--"
      - analyze
      - "{{param.url}}"
      - "--preset"
      - lecture
      - "--ocr"
      - "--vision"
      - "--cache"
      - "--max-ai-frames"
      - "60"
      - "--output-format"
      - json
      - "--correlation-id"
      - "{{orchestration.runId}}"
    includeStdErr: false
    timeoutSeconds: 5400

  - name: zakira-chapters
    type: Script
    dependsOn: [zakira-analyze]
    shell: pwsh
    script: |
      $ErrorActionPreference = 'Stop'
      $payload = $args[0] | ConvertFrom-Json
      $runId = $payload.runId
      if (-not $runId) { throw "zakira-analyze did not return a runId" }
      $artifactDir = $payload.artifactDirectory
      if (-not $artifactDir -or -not (Test-Path -LiteralPath $artifactDir)) {
        throw "artifactDirectory missing or not on disk: $artifactDir"
      }
      & dnx Zakira.Replay --yes -- chapters build $artifactDir --output-format json 2>$null
      if ($LASTEXITCODE -ne 0) {
        # Soft fail: chapters are nice to have, not required.
        Write-Output (@{ ok = $false; reason = "chapters build exit $LASTEXITCODE" } | ConvertTo-Json -Compress)
      }
    arguments:
      - "{{zakira-analyze.output}}"
    timeoutSeconds: 600

  - name: read-artifacts
    type: Script
    dependsOn: [zakira-analyze, zakira-chapters]
    shell: pwsh
    script: |
      $ErrorActionPreference = 'Stop'
      $payload = $args[0] | ConvertFrom-Json
      $artifactDir = $payload.artifactDirectory
      function ReadFileOrEmpty($name) {
        $p = Join-Path $artifactDir $name
        if (Test-Path -LiteralPath $p) { Get-Content -LiteralPath $p -Raw } else { '' }
      }
      $manifestText  = ReadFileOrEmpty 'manifest.json'
      $evidenceText  = ReadFileOrEmpty 'evidence.json'
      $transcriptMd  = ReadFileOrEmpty 'transcript.md'
      $chaptersText  = ReadFileOrEmpty 'chapters/chapters.md'
      $ocrCombined   = ReadFileOrEmpty 'ocr/combined.md'
      $visionCombined= ReadFileOrEmpty 'vision/combined.md'

      # Cap large artifacts so we don't blow the LLM's context.
      function Cap($s, [int]$max) {
        if ($null -eq $s) { return '' }
        if ($s.Length -le $max) { return $s }
        return $s.Substring(0, $max) + "`n`n...[truncated $($s.Length - $max) chars]"
      }

      # Enumerate baseline frames present on disk (slide-detected by analyze).
      $framesDir = Join-Path $artifactDir 'frames'
      $baselineFrames = @()
      if (Test-Path -LiteralPath $framesDir) {
        $files = Get-ChildItem -LiteralPath $framesDir -File -Recurse -Include *.jpg,*.jpeg,*.png,*.webp -ErrorAction SilentlyContinue | Select-Object -First 60
        foreach ($f in $files) {
          $baselineFrames += [pscustomobject]@{
            file = $f.Name
            path = $f.FullName
            fileUri = ([System.Uri]::new($f.FullName)).AbsoluteUri
          }
        }
      }

      $pack = @{
        runId = $payload.runId
        artifactDirectory = $artifactDir
        manifest = (Cap $manifestText 30000)
        evidence = (Cap $evidenceText 30000)
        transcript = (Cap $transcriptMd 80000)
        chapters = (Cap $chaptersText 20000)
        ocr = (Cap $ocrCombined 20000)
        vision = (Cap $visionCombined 20000)
        baselineFrames = $baselineFrames
      }
      $pack | ConvertTo-Json -Depth 8 -Compress
    arguments:
      - "{{zakira-analyze.output}}"
    timeoutSeconds: 120

  - name: targeted-frame-capture
    type: Prompt
    dependsOn: [read-artifacts]
    systemPrompt: |
      You are a visual evidence curator for a conference/session summary
      pipeline. You have the Zakira.Replay MCP server in scope (transport:
      stdio). It exposes ad-hoc frame-capture capabilities; use whichever
      tool corresponds to ad-hoc frame capture (likely named `frames` or
      similar -- list_tools first to confirm the exact name and arg shape).

      Your job: scan the transcript and chapter list for moments where a
      still image meaningfully helps the reader recall WHAT was on screen.
      Reuse the same `runId` so frames land alongside the baseline ones.

      What counts as a valuable moment:
        - Speaker explicitly directs attention to the screen ("as you can
          see on this slide", "look at this chart", "here is the demo").
        - A diagram, architecture sketch, or block diagram is shown.
        - Code or terminal output is on screen (not as a CLIP, but the
          single best representative frame).
        - A live demo screen / GUI is shown.
        - Speaker arrives at a key conclusion accompanied by a slide.
        - A panel or speaker line-up shot (when speakers are introduced).

      Hard caps (BALANCE, not spam):
        - Total additional frames captured: at most {{vars.targetedFrameCap}}.
        - Skip any moment within ~15 seconds of an existing baseline frame.
        - Each request MUST include a one-sentence `reason`.

      Output a SINGLE JSON object:

      {
        "ok": true,
        "runId": "<runId from input>",
        "captured": [
          { "timestamp": "hh:mm:ss", "reason": "...", "path": "...", "fileUri": "..." }
        ],
        "skipped": [
          { "timestamp": "hh:mm:ss", "reason": "..." }
        ],
        "budget": "captured N of {{vars.targetedFrameCap}}"
      }

      Do NOT call any non-MCP tool. Do NOT invent paths. Output ONLY the
      JSON object, no commentary.
    userPrompt: |
      Raindrop:
        title = {{param.title}}
        url   = {{param.url}}

      Zakira.Replay artifact pack:
      {{read-artifacts.output}}

      Capture targeted frames per the system prompt. Output ONLY the JSON.
    mcps: [zakira-replay]
    timeoutSeconds: 1200

  - name: synthesize
    type: Prompt
    dependsOn: [read-artifacts, targeted-frame-capture]
    systemPrompt: |
      You are a session analyst. The user attached a raindrop to their inbox
      and you have a pack of Zakira.Replay artifacts (manifest, evidence,
      transcript, chapters, OCR, vision, baseline frames) plus a list of
      targeted frames captured by the prior step. Synthesize the requested
      analysis strictly from the artifacts -- never invent claims, names,
      or quotes. Every quote must be tied to a transcript timestamp. Every
      claim about a slide must reference a slideId from the evidence.

      Use the user's note as the analysis request when it is non-empty.
      Otherwise fall back to the default ask provided in the userPrompt.

      Save the final markdown to a file using orchestra_save_file so that
      downstream steps can reference it via {{synthesize.files[0]}}.
    userPrompt: |
      Raindrop:
        title = {{param.title}}
        url   = {{param.url}}
        tags  = {{param.tags}}

      User note (analysis request; may be empty):
        {{param.note}}

      Default analysis ask (use only when the note is empty):
        {{vars.defaultAnalysisAsk}}

      Zakira.Replay artifact pack:
        {{read-artifacts.output}}

      Targeted frame capture results:
        {{targeted-frame-capture.output}}

      Produce a polished markdown report following the requested analysis.
      Save it via orchestra_save_file. Output the markdown content as the
      step output as well.
    timeoutSeconds: 1800

  - name: fetch-action-view-schema
    type: Command
    command: dnx
    arguments:
      - ActionView.Cli
      - "--yes"
      - "--"
      - schema
    timeoutSeconds: 120

  - name: create-action-view-entry
    type: Prompt
    dependsOn: [synthesize, targeted-frame-capture, fetch-action-view-schema]
    systemPrompt: |
      You produce ActionView entries that match the entry schema. The entry
      type must be 'raindrop-video-session' and source must be
      '{{orchestration.name}}'. Save the JSON via orchestra_save_file -- the
      next step submits whatever was saved.
    userPrompt: |
      ActionView schema:
      {{fetch-action-view-schema.output}}

      Raindrop:
        id    = {{param.raindropId}}
        title = {{param.title}}
        url   = {{param.url}}
        tags  = {{param.tags}}
        note  = {{param.note}}

      Synthesized analysis (markdown):
      {{synthesize.output}}

      Zakira.Replay artifact pack:
      {{read-artifacts.output}}

      Targeted frame capture results (use for the Visual evidence section):
      {{targeted-frame-capture.output}}

      Build an entry with:
        id       = 'raindrop-{{param.raindropId}}-video-session'  # stable per-raindrop key -> idempotent re-runs
        type     = 'raindrop-video-session'
        source   = '{{orchestration.name}}'
        title    = the raindrop title (truncate to 120 chars)
        subtitle = '<duration> | <speaker(s) if known> | <source host>'
        severity = 'medium'
        icon     = 'video'
        tags     = the raindrop tags + ['raindrop','session']
        content blocks:
          - keyValue 'Source' with: URL, Added at, Original tags, Note (the user prompt)
          - alert (level info) if the run produced warnings worth surfacing
          - section 'Summary' containing a markdown block with the synthesized summary
          - section 'Chapters' containing a table (Time | Title | Notes) built from the chapters pack
                          (omit the section entirely if there are no chapters)
          - section 'Key Quotes' containing a markdown block of timestamped quotes (linked via deep-links when possible)
          - section 'Action items' containing a markdown checklist
          - section 'Visual evidence' containing a markdown block that lists each item from `captured` (targeted frames):
              "### <timestamp> -- <reason>" followed by `![<reason>](<fileUri>)`.
              Omit this section when `captured` is empty.
          - link 'Open original' to the raindrop URL
        actions:
          - 'Open original'   (cli command opening the URL in browser, onSuccess=keep)
          - 'Open Zakira run' (cli command opening the artifactDirectory in the user's file manager, onSuccess=keep)
          - 'Dismiss'         (default action, onSuccess=archive)

      Save the JSON via orchestra_save_file. Output ONLY the raw JSON.
    timeoutSeconds: 600

  - name: submit-action-view-entry
    type: Script
    shell: pwsh
    dependsOn: [create-action-view-entry]
    scriptFile: "./tools/scripts/submit-actionview-upsert.ps1"
    arguments:
      - "-EntryFile"
      - "{{create-action-view-entry.files[0]}}"
    timeoutSeconds: 120

  - name: result-envelope
    type: Prompt
    dependsOn: [zakira-analyze, targeted-frame-capture, synthesize, create-action-view-entry, submit-action-view-entry]
    systemPrompt: |
      You produce a single small JSON envelope describing the outcome of
      this processor run, so the parent raindrop-processor can persist a
      tidy state record. Output ONLY the JSON.
    userPrompt: |
      Build a JSON envelope like:

      {
        "ok": true,
        "processor": "{{orchestration.name}}",
        "raindropId": "{{param.raindropId}}",
        "zakiraReplayRunId": "<runId from zakira-analyze output>",
        "targetedFramesCaptured": <count from targeted-frame-capture output `captured` length>,
        "actionViewEntryId": "<id parsed from submit-action-view-entry output, or null>",
        "summary": "<one-sentence summary line>"
      }

      Zakira analyze output:    {{zakira-analyze.output}}
      Targeted frame capture:   {{targeted-frame-capture.output}}
      ActionView submission:    {{submit-action-view-entry.output}}
      Synth headline: take the first line of {{synthesize.output}}

      Output ONLY the JSON.
    timeoutSeconds: 60
