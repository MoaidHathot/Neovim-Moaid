# yaml-language-server: $schema=https://raw.githubusercontent.com/MoaidHathot/orchestra/main/schemas/orchestration.schema.json
name: raindrop-video-recipe-processor
description: |
  Processor for raindrops classified as (video, recipe). Two-stage frame
  pipeline:

    1. BASELINE: Zakira.Replay `analyze` with scene-detection + vision + OCR.
       Captures one frame per visual scene change so ingredient shots,
       technique demos, and finished-dish reveals are all in the artifact
       tree. Cached -- safe to re-run.

    2. TARGETED: a Prompt step reads the transcript and asks Zakira.Replay's
       MCP for additional frames at moments the LLM judges important (specific
       product shots, hand-on demonstrations, "now you should see..."
       narrations, sauce textures, plating, etc.). Bounded cap so it stays
       balanced, not spammy.

  The synth step builds the recipe markdown referencing both baseline scene
  frames AND targeted frames by file path. The ActionView entry embeds the
  selected images via markdown image blocks (file:// URIs).

  Saves a self-contained recipe markdown file to the configured recipes dir.
version: 1.1.0
tags: ["personal", "raindrop", "auto", "video", "recipe"]
defaultModel: claude-opus-4.7-1m-internal

inputs:
  raindropId: { type: string, required: true }
  url:        { type: string, required: true }
  title:      { type: string, required: true }
  note:       { type: string, required: false, default: "", multiline: true }
  noteHash:   { type: string, required: false, default: "" }
  tags:       { type: string, required: false, default: "[]" }
  addedAt:    { type: string, required: false, default: "" }
  recipesDirectory:
    type: string
    description: Where to save the extracted recipe markdown. Passed in by the parent processor.
    required: true

variables:
  defaultAnalysisAsk: |
    Extract this recipe from the cooking video. Produce a clean, repeatable
    recipe markdown document with these sections (in order):

      ## Summary       (1-2 sentences)
      ## Yield         (servings or output count)
      ## Time          (prep time, cook time, total time)
      ## Equipment     (bullet list)
      ## Ingredients   (bullet list with quantity + ingredient + prep notes;
                        group by sub-recipe when applicable)
      ## Steps         (numbered list; each step references the timestamp
                        in the source video as `[hh:mm:ss]` so the user can
                        jump back; cite the frame slideId when a step is
                        primarily visual; inline relevant captured frames
                        using markdown image syntax with file:// URIs:
                        `![what it shows at hh:mm:ss](file:///path/to/frame.jpg)`)
      ## Tips          (bullet list of variations / substitutions / pitfalls)
      ## Source        (link to the original video + author / channel name)

  # Cap on additional frames captured by the targeted step. Recipe is the
  # most visual of all intents, so we allow more here than for session.
  targetedFrameCap: "20"

defaultStepTimeoutSeconds: 1800
timeoutSeconds: 7200

steps:
  - name: zakira-analyze
    type: Command
    command: dnx
    arguments:
      - Zakira.Replay
      - "--yes"
      - "--"
      - analyze
      - "{{param.url}}"
      - "--frame-strategy"
      - scene
      - "--ocr"
      - "--vision"
      - "--cache"
      - "--max-ai-frames"
      - "80"
      - "--output-format"
      - json
      - "--correlation-id"
      - "{{orchestration.runId}}"
    includeStdErr: false
    timeoutSeconds: 5400

  - name: read-artifacts
    type: Script
    dependsOn: [zakira-analyze]
    shell: pwsh
    script: |
      $ErrorActionPreference = 'Stop'
      $payload = $args[0] | ConvertFrom-Json
      $artifactDir = $payload.artifactDirectory
      if (-not $artifactDir -or -not (Test-Path -LiteralPath $artifactDir)) {
        throw "artifactDirectory missing or not on disk: $artifactDir"
      }
      function ReadFileOrEmpty($name) {
        $p = Join-Path $artifactDir $name
        if (Test-Path -LiteralPath $p) { Get-Content -LiteralPath $p -Raw } else { '' }
      }
      function Cap($s, [int]$max) {
        if ($null -eq $s) { return '' }
        if ($s.Length -le $max) { return $s }
        return $s.Substring(0, $max) + "`n`n...[truncated $($s.Length - $max) chars]"
      }

      # Enumerate baseline frames present on disk (scene-detected by analyze).
      $framesDir = Join-Path $artifactDir 'frames'
      $baselineFrames = @()
      if (Test-Path -LiteralPath $framesDir) {
        $files = Get-ChildItem -LiteralPath $framesDir -File -Recurse -Include *.jpg,*.jpeg,*.png,*.webp -ErrorAction SilentlyContinue | Select-Object -First 80
        foreach ($f in $files) {
          $baselineFrames += [pscustomobject]@{
            file = $f.Name
            path = $f.FullName
            fileUri = ([System.Uri]::new($f.FullName)).AbsoluteUri
          }
        }
      }

      $pack = @{
        runId = $payload.runId
        artifactDirectory = $artifactDir
        manifest = (Cap (ReadFileOrEmpty 'manifest.json') 30000)
        evidence = (Cap (ReadFileOrEmpty 'evidence.json') 40000)
        transcript = (Cap (ReadFileOrEmpty 'transcript.md') 60000)
        ocr = (Cap (ReadFileOrEmpty 'ocr/combined.md') 30000)
        vision = (Cap (ReadFileOrEmpty 'vision/combined.md') 30000)
        baselineFrames = $baselineFrames
      }
      $pack | ConvertTo-Json -Depth 8 -Compress
    arguments:
      - "{{zakira-analyze.output}}"
    timeoutSeconds: 120

  - name: pick-targeted-frames
    type: Prompt
    dependsOn: [read-artifacts]
    systemPrompt: |
      You are a visual evidence curator for a cooking-video recipe extraction
      pipeline. Your job is to scan the transcript for moments where a still
      image is VALUABLE to a cook trying to reproduce this recipe later, and
      output a JSON list of timestamps with one-sentence reasons. A downstream
      Script step will actually capture those frames via Zakira.Replay's
      `frames` CLI.

      What counts as a valuable moment (call out one per timestamp):
        - "Hero shot" of a specific product / brand / ingredient on screen
          ("the brand of yeast I use is...").
        - Hands-on technique demo ("knead like this...", "fold the egg
          whites in like so..."). Pick the mid-motion timestamp.
        - State / texture cue ("look for this color", "should feel like
          this", "should be the consistency of...").
        - Visual measurement ("fill it to here").
        - Setup / mise-en-place ("here is everything you need").
        - Tool usage ("hold the knife like this", "the pan is at this
          heat").
        - Plating / finished dish.

      Hard caps (BALANCE, not spam):
        - Pick at most {{vars.targetedFrameCap}} timestamps.
        - Skip any moment within ~10 seconds of an existing baseline scene
          frame (consult `baselineFrames` in the input).
        - Every pick MUST include a one-sentence `reason`.

      Output a SINGLE JSON object on stdout (no commentary, no fences):

        {
          "ok": true,
          "picks": [
            { "timestamp": "hh:mm:ss", "reason": "<one short sentence>" }
          ]
        }

      Timestamps must be in `hh:mm:ss` form (no fractional seconds). If no
      transcript moments are worth a frame, output { "ok": true, "picks": [] }.
    userPrompt: |
      Raindrop:
        title = {{param.title}}
        url   = {{param.url}}

      Zakira.Replay artifact pack (consult baselineFrames before picking to
      avoid near-duplicates):
      {{read-artifacts.output}}

      Output ONLY the JSON object described in the system prompt.
    timeoutSeconds: 600

  - name: targeted-frame-capture
    type: Script
    shell: pwsh
    dependsOn: [zakira-analyze, pick-targeted-frames]
    scriptFile: "./tools/scripts/capture-targeted-frames.ps1"
    arguments:
      - "-PicksJson"
      - "{{pick-targeted-frames.output}}"
      - "-Source"
      - "{{param.url}}"
      - "-ZakiraAnalyzeJson"
      - "{{zakira-analyze.output}}"
      - "-MaxCap"
      - "{{vars.targetedFrameCap}}"
    timeoutSeconds: 1800

  - name: synthesize
    type: Prompt
    dependsOn: [read-artifacts, targeted-frame-capture]
    systemPrompt: |
      You are a recipe extractor. The user wants a clean, repeatable recipe
      built from the transcript + extracted frames (baseline scene + targeted)
      + OCR + vision artifacts. Never invent ingredients or steps -- if an
      ingredient is mentioned in narration but not visible on-screen, that's
      fine; cite the timestamp. If you cannot find a piece of information
      (e.g., exact oven temperature), write "unspecified" rather than guessing.

      Embed images inline in the Steps section using markdown image syntax
      with file:// URIs taken from `baselineFrames` and `captured` in the
      inputs. Cap inline images at ~12 across the whole recipe and pick the
      ones whose `reason` is most useful for a cook reproducing this. Place
      each image immediately under the step it illustrates.

      Use the user's note as the primary analysis request when it is
      non-empty; otherwise use the default ask provided.

      Output a single self-contained markdown document. Start with a YAML
      front-matter block ('---') including: title, source_url, source_type
      (= "video"), servings (if known), total_time (if known), tags (recipe
      plus any tags from the raindrop). Then the body following the section
      order specified in the ask.

      Save the final markdown to a file via orchestra_save_file -- the
      downstream step uses {{synthesize.files[0]}}.
    userPrompt: |
      Raindrop:
        title = {{param.title}}
        url   = {{param.url}}
        tags  = {{param.tags}}

      User note (analysis request; may be empty):
        {{param.note}}

      Default analysis ask (use only when the note is empty):
        {{vars.defaultAnalysisAsk}}

      Zakira.Replay artifact pack:
        {{read-artifacts.output}}

      Targeted frame capture results:
        {{targeted-frame-capture.output}}

      Produce the recipe markdown. Save it via orchestra_save_file. Output
      the markdown content as the step output too.
    timeoutSeconds: 1800

  - name: save-recipe-file
    type: Script
    dependsOn: [synthesize]
    shell: pwsh
    scriptFile: "./tools/scripts/save-recipe.ps1"
    arguments:
      - "-RecipesDirectory"
      - "{{param.recipesDirectory}}"
      - "-SourcePath"
      - "{{synthesize.files[0]}}"
      - "-Title"
      - "{{param.title}}"
      - "-SourceUrl"
      - "{{param.url}}"
    timeoutSeconds: 60

  - name: fetch-action-view-schema
    type: Command
    command: dnx
    arguments: [ActionView.Cli, "--yes", "--", schema]
    timeoutSeconds: 120

  - name: create-action-view-entry
    type: Prompt
    dependsOn: [synthesize, targeted-frame-capture, save-recipe-file, fetch-action-view-schema]
    systemPrompt: |
      You produce ActionView entries that match the entry schema. The entry
      type must be 'raindrop-recipe' and source must be '{{orchestration.name}}'.
      Save the JSON via orchestra_save_file -- the next step submits whatever
      was saved.
    userPrompt: |
      ActionView schema:
      {{fetch-action-view-schema.output}}

      Raindrop:
        id    = {{param.raindropId}}
        title = {{param.title}}
        url   = {{param.url}}
        tags  = {{param.tags}}
        note  = {{param.note}}

      Recipe markdown:
      {{synthesize.output}}

      Recipe save result (JSON):
      {{save-recipe-file.output}}

      Targeted frame capture results (use for the Visual evidence section):
      {{targeted-frame-capture.output}}

      Build an entry with:
        id       = 'raindrop-{{param.raindropId}}-recipe'  # stable per-raindrop key -> idempotent re-runs replace, never duplicate
        type     = 'raindrop-recipe'
        source   = '{{orchestration.name}}'
        title    = the recipe title (from the markdown front-matter when present, otherwise raindrop title)
        subtitle = '<servings if known> | <total_time if known> | source: video'
        severity = 'low'
        icon     = 'utensils-crossed'
        tags     = the raindrop tags + ['raindrop','recipe','video']
        content blocks:
          - keyValue 'Source' with: URL, Added at, Source medium = "video", Saved to (path from save-recipe-file)
          - section 'Recipe' containing a markdown block with the entire recipe body (which already embeds inline images)
          - section 'Visual evidence' containing a markdown block that lists each item from `captured` (targeted frames):
              "### <timestamp> -- <reason>" followed by an inline image markdown line `![<reason>](<fileUri>)`.
              Omit this section entirely when `captured` is empty.
          - link 'Open original video' to the raindrop URL
          - link 'Open saved recipe' to the file:// URI of the saved recipe path
        actions:
          - 'Open original'      (cli: open URL in browser, onSuccess=keep)
          - 'Open saved recipe'  (cli: open the saved recipe file in the user's editor, onSuccess=keep)
          - 'Reprocess'          -- include this action VERBATIM (substituting the templated values shown):
              {
                "label": "Reprocess (move back to AI-Inbox)",
                "style": "default",
                "confirmMessage": "Move this raindrop back to AI-Inbox and rerun the full analysis on the next tracker tick?",
                "command": {
                  "type": "cli",
                  "program": "pwsh",
                  "args": [
                    "-NoProfile",
                    "-File",
                    "{{orchestration.sourceDirectory}}/tools/scripts/reprocess-raindrop.ps1",
                    "-RaindropId",
                    "{{param.raindropId}}"
                  ]
                },
                "onSuccess": "archive"
              }
          - 'Dismiss'            (default action, onSuccess=archive)

      Save the JSON via orchestra_save_file. Output ONLY the raw JSON.
    timeoutSeconds: 600

  - name: submit-action-view-entry
    type: Script
    shell: pwsh
    dependsOn: [create-action-view-entry]
    scriptFile: "./tools/scripts/submit-actionview-upsert.ps1"
    arguments:
      - "-EntryFile"
      - "{{create-action-view-entry.files[0]}}"
    timeoutSeconds: 120

  - name: result-envelope
    type: Prompt
    dependsOn: [zakira-analyze, targeted-frame-capture, synthesize, save-recipe-file, submit-action-view-entry]
    systemPrompt: |
      You produce a single small JSON envelope describing the outcome of
      this processor run, so the parent raindrop-processor can persist a
      tidy state record. Output ONLY the JSON.
    userPrompt: |
      Build a JSON envelope like:

      {
        "ok": true,
        "processor": "{{orchestration.name}}",
        "raindropId": "{{param.raindropId}}",
        "zakiraReplayRunId": "<runId from zakira-analyze output>",
        "targetedFramesCaptured": <count from targeted-frame-capture output `captured` length>,
        "savedRecipePath": "<savedPath from save-recipe-file output>",
        "actionViewEntryId": "<id parsed from submit-action-view-entry output, or null>",
        "summary": "<one-sentence summary line>"
      }

      Zakira analyze output:        {{zakira-analyze.output}}
      Targeted frame capture:       {{targeted-frame-capture.output}}
      Recipe save output:           {{save-recipe-file.output}}
      ActionView submission:        {{submit-action-view-entry.output}}

      Output ONLY the JSON.
    timeoutSeconds: 60
