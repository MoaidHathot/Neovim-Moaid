# yaml-language-server: $schema=https://raw.githubusercontent.com/MoaidHathot/orchestra/main/schemas/orchestration.schema.json
name: raindrop-processor
description: |
  Processes a single raindrop. Classifies it across two orthogonal axes
  (`medium` = video|article and `intent` = recipe|session|generic), then
  delegates synchronously to the appropriate (medium, intent) processor
  child orchestration, marks Zakira.Exchange state to completed, and moves
  the raindrop into the Processed collection.

  Collection ids and the recipes directory are passed in as parameters by
  the tracker (which resolves them from names via `bootstrap-config`). This
  orchestration carries no machine-specific config.

  If any step fails the orchestration.failure hook flips Zakira.Exchange
  state to "failed", tags the raindrop `failed`, and publishes a
  raindrop-error ActionView entry so the failure is visible.

  Step order is intentionally: classify -> dispatch-processor ->
  verify-dispatch -> move-to-processed -> mark-completed -> processor-summary.
  CRITICAL: `invoke_orchestration` (sync) does NOT throw when the child
  fails -- it returns status="Failed" -- so `dispatch-processor` (an LLM
  step) succeeds even for a failed child. Without a gate, move-to-processed
  would then move a FAILED raindrop into AI-Processed and mark-completed
  would record state="completed" (silent data loss: no summary/frames, item
  wrongly out of the inbox and invisible to the tracker's retry/dead-letter
  rules). `verify-dispatch` is a deterministic gate that parses the child's
  status from the dispatch envelope and THROWS unless it is a success
  status. Everything downstream (move-to-processed, mark-completed) depends
  on verify-dispatch, so a failed child never reaches AI-Processed: the
  raindrop stays in AI-Inbox, the failure hook flips state to "failed", and
  the tracker retries on the next tick (then dead-letters after maxAttempts).
  The raindrop is still moved into AI-Processed *before* mark-completed, so a
  flaky move can never leave "state=completed but raindrop still in AI-Inbox".
version: 1.3.0
tags: ["personal", "raindrop", "auto", "processor"]
defaultModel: claude-opus-4.8

inputs:
  raindropId:
    type: string
    description: Raindrop.io item id (as a string).
    required: true
  url:
    type: string
    description: The raindrop link.
    required: true
  title:
    type: string
    description: Raindrop title.
    required: true
  note:
    type: string
    description: User note attached to the raindrop. May be empty. Used as the user-provided analysis prompt.
    required: false
    default: ""
    multiline: true
  noteHash:
    type: string
    description: SHA-256 hex of the note string at dispatch time.
    required: false
    default: ""
  tags:
    type: string
    description: JSON array of tag strings.
    required: false
    default: "[]"
  addedAt:
    type: string
    description: When the raindrop was added (ISO-8601).
    required: false
    default: ""
  priorAttempts:
    type: string
    description: How many times this item was previously attempted.
    required: false
    default: "0"
  processedCollectionId:
    type: string
    description: Numeric id of the Processed collection (resolved by the tracker's bootstrap-config step). Required.
    required: true
  recipesDirectory:
    type: string
    description: Where recipe processors should save extracted recipe markdown. Propagated from the tracker.
    required: true

variables:
  zakiraCategory: "raindrop-watcher-state"
  raindropCli: "{{orchestration.sourceDirectory}}/tools/raindrop.cs"
  routerSkillsDir: "{{orchestration.sourceDirectory}}/skills"

defaultRetryPolicy:
  maxRetries: 1
  backoffSeconds: 5
  backoffMultiplier: 2.0
  retryOnTimeout: true

defaultStepTimeoutSeconds: 1800
timeoutSeconds: 7200

mcps:
  # Zakira state writes moved to deterministic Script steps (mark-processing / mark-completed)
  # that shell out to `dnx Zakira.Exchange` directly, so the `zakira` MCP is no longer
  # referenced by any step. Only the remote `orchestra` data-plane MCP remains (used by
  # dispatch-processor to invoke the child processor).
  - name: orchestra
    type: remote
    endpoint: "{{server.url}}/mcp/data"

hooks:
  - name: mark-failed-on-orchestration-failure
    on: orchestration.failure
    payload:
      detail: standard
      steps: failed
      includeRefs: true
    action:
      type: script
      shell: pwsh
      scriptFile: ./tools/scripts/hook-mark-failed.ps1
      arguments:
        - "{{param.raindropId}}"
        - "{{param.url}}"
        - "{{param.title}}"
        - "{{vars.raindropCli}}"

steps:
  - name: mark-processing
    type: Script
    shell: pwsh
    dependsOn: []
    # Deterministic state write. Previously an LLM Prompt (claude-opus-4.8) that timed out at
    # 60s: the model over-reasoned a trivial edit_memory and the two Zakira MCP round-trips blew
    # the budget -- even though the write eventually succeeded, the step was already marked
    # failed. This shells out to the Zakira CLI directly (same package as the MCP) and does
    # get -> merge -> idempotent upsert, so the record's other fields (noteHash -- the tracker's
    # change-detection key -- queuedAt, firstSeenAt, addedAt, ...) are preserved. Idempotent:
    # `edit` is tried first (the tracker pre-created the record) and falls back to `create` if
    # the key is missing, so neither "already exists" nor "not found" can fail the step.
    # The CLI is invoked via `dotnet dnx` (NOT the `dnx` shim) with Standard native arg
    # passing: PowerShell's default Windows arg passing strips the double-quotes out of the
    # JSON --data payload when the target is the dnx.cmd shim, storing the record as
    # unparseable `{k:v}` text that load-state can't read back. Standard passing + calling
    # dotnet.exe directly keeps the JSON intact.
    script: |
      $ErrorActionPreference = 'Stop'
      $PSNativeCommandArgumentPassing = 'Standard'
      # The Zakira CLI emits UTF-8; decode its captured output as UTF-8 so non-ASCII fields
      # (titles/notes) survive the read -> merge -> write round-trip instead of being mojibake'd
      # through the console's OEM code page. Guarded: the setter can throw under redirected
      # stdout, in which case only free-text display fields degrade -- the ASCII state fields the
      # scheduler actually reads (status, attempts, timestamps, noteHash) are unaffected.
      try { [Console]::OutputEncoding = [System.Text.Encoding]::UTF8 } catch { }

      $rid      = $args[0]
      $url      = $args[1]
      $title    = $args[2]
      $noteHash = $args[3]
      $tagsJson = $args[4]
      $addedAt  = $args[5]
      $prior    = 0; try { $prior = [int]$args[6] } catch { $prior = 0 }
      $runId    = $args[7]
      $db       = $args[8]
      $category = $args[9]

      if ([string]::IsNullOrWhiteSpace($rid)) { throw 'raindropId is required.' }
      if ([string]::IsNullOrWhiteSpace($db))  { throw 'zakira db path is required.' }

      # Invoke Zakira.Exchange through dotnet.exe directly (see step note): PowerShell's default
      # Windows native arg passing strips the quotes out of the --data JSON when the target is
      # the dnx.cmd shim. Standard passing (set above) + calling dotnet.exe directly keeps the
      # JSON payload intact so the record round-trips as valid JSON.
      $dotnet = (Get-Command dotnet -CommandType Application -ErrorAction Stop | Select-Object -First 1).Source
      function Invoke-Zakira { & $dotnet dnx Zakira.Exchange --yes -- @args }

      function Get-DataJsonFromCliOutput {
        param([string[]]$Lines)
        if ($null -eq $Lines -or $Lines.Count -eq 0) { return $null }
        $dataIdx = -1
        for ($i = 0; $i -lt $Lines.Count; $i++) {
          if ([string]$Lines[$i] -match '^\s*Data:\s*') { $dataIdx = $i; break }
        }
        if ($dataIdx -lt 0) { return $null }
        $endIdx = $Lines.Count
        for ($j = $dataIdx + 1; $j -lt $Lines.Count; $j++) {
          if ([string]$Lines[$j] -match '^\s*(Author|Reason|Tags|Custom|Created|Last Modified):\s*') { $endIdx = $j; break }
        }
        $span = ($Lines[$dataIdx..($endIdx - 1)] | ForEach-Object { [string]$_ }) -join "`n"
        return ($span -replace '^\s*Data:\s*', '').Trim()
      }

      # 1) Read the current record (may not exist yet).
      $existed = $false
      $data = [ordered]@{}
      $cliOut = Invoke-Zakira --db $db get $category $rid 2>&1
      if ($LASTEXITCODE -eq 0) {
        $json = Get-DataJsonFromCliOutput -Lines @($cliOut)
        if (-not [string]::IsNullOrWhiteSpace($json)) {
          try {
            $obj = $json | ConvertFrom-Json -DateKind String -ErrorAction Stop
            foreach ($p in $obj.PSObject.Properties) { $data[$p.Name] = $p.Value }
            $existed = $true
          } catch { $existed = $false }
        }
      }

      # 2) Seed identity fields from params only when missing (never clobber existing state).
      if (-not $data.Contains('raindropId')) { $data['raindropId'] = $rid }
      if (-not $data.Contains('url')      -and $url)      { $data['url']      = $url }
      if (-not $data.Contains('title')    -and $title)    { $data['title']    = $title }
      if (-not $data.Contains('noteHash') -and $noteHash) { $data['noteHash'] = $noteHash }
      if (-not $data.Contains('addedAt')  -and $addedAt)  { $data['addedAt']  = $addedAt }
      if (-not $data.Contains('tags')) {
        $t = @(); if ($tagsJson) { try { $t = @($tagsJson | ConvertFrom-Json) } catch { $t = @() } }
        $data['tags'] = $t
      }

      # 3) Merge the processing-state fields.
      $attempts = $prior + 1
      $data['status']             = 'processing'
      $data['attempts']           = $attempts
      $data['startedAt']          = (Get-Date).ToUniversalTime().ToString('o')
      $data['orchestrationRunId'] = $runId
      $data['lastError']          = $null

      $payload = $data | ConvertTo-Json -Depth 50 -Compress
      $reason  = "mark-processing: raindrop $rid -> processing (attempt $attempts) under run $runId"
      $author  = 'raindrop-watcher'

      # 4) Idempotent upsert. `edit` fails if the key is missing; `create` fails if it exists.
      #    Prefer edit (record pre-created by the tracker), fall back to create.
      $primary   = if ($existed) { 'edit' }   else { 'create' }
      $secondary = if ($existed) { 'create' } else { 'edit' }

      $out1 = Invoke-Zakira --db $db $primary $category $rid --data $payload --author $author --reason $reason --tags processing 2>&1
      if ($LASTEXITCODE -ne 0) {
        $out2 = Invoke-Zakira --db $db $secondary $category $rid --data $payload --author $author --reason $reason --tags processing 2>&1
        if ($LASTEXITCODE -ne 0) {
          throw "zakira upsert failed for ${rid}: ${primary}=[$($out1 -join ' ')] ${secondary}=[$($out2 -join ' ')]"
        }
      }

      '{ "ok": true }'
    arguments:
      - "{{param.raindropId}}"
      - "{{param.url}}"
      - "{{param.title}}"
      - "{{param.noteHash}}"
      - "{{param.tags}}"
      - "{{param.addedAt}}"
      - "{{param.priorAttempts}}"
      - "{{orchestration.runId}}"
      - "{{env.XDG_CONFIG_HOME}}/orchestra/zakira.db"
      - "{{vars.zakiraCategory}}"
    timeoutSeconds: 120

  - name: classify
    type: Prompt
    workingDirectory: "{{orchestration.tempDir}}"
    dependsOn: [mark-processing]
    systemPrompt: |
      You are the RaindropWatcher router. You assign every raindrop to one
      of the registered processor orchestrations by computing a (medium,
      intent) pair. Follow the router skill precisely.

      You output ONLY a single JSON object with this exact shape:

      {
        "medium": "video" | "article",
        "intent": "recipe" | "session" | "generic",
        "processor": "<full child-orchestration name from the routing table>",
        "reasoning": "<one short sentence explaining the decision>"
      }
    userPrompt: |
      Classify this raindrop:

      url       = {{param.url}}
      title     = {{param.title}}
      tags      = {{param.tags}}
      note      = {{param.note}}
      addedAt   = {{param.addedAt}}

      Output ONLY the JSON object described in the system prompt.
    skillDirectories:
      - "{{vars.routerSkillsDir}}"
    timeoutSeconds: 180

  - name: dispatch-processor
    type: Prompt
    workingDirectory: "{{orchestration.tempDir}}"
    dependsOn: [classify]
    systemPrompt: |
      You are a dispatcher. Read the classification JSON, extract its
      `processor` field, and call `invoke_orchestration` with mode="sync"
      so the child's final output flows back. Pass these parameters
      (every value is a STRING):

        raindropId, url, title, note, noteHash, tags, addedAt,
        recipesDirectory   (always pass; recipe processors require it,
                            non-recipe processors will silently ignore it)

      Return the child's executionId, status, and finalContent verbatim.
      Report the child's status EXACTLY as invoke_orchestration returns it
      (e.g. "Succeeded" or "Failed") -- never invent "Succeeded" for a child
      that failed. A downstream deterministic gate parses this status.

      The classification JSON is:
        {{classify.output}}

      Do not invent parameters. Do not call any other tool than
      invoke_orchestration. Output ONLY the following JSON object and nothing
      else -- no prose, no markdown fences:

        {
          "processor": "<name>",
          "executionId": "<id>",
          "status": "<child status verbatim>",
          "finalContent": "<child output or error>"
        }
    userPrompt: |
      Dispatch the chosen child orchestration synchronously.

      Original raindrop:
        raindropId       = {{param.raindropId}}
        url              = {{param.url}}
        title            = {{param.title}}
        note             = {{param.note}}
        noteHash         = {{param.noteHash}}
        tags             = {{param.tags}}
        addedAt          = {{param.addedAt}}
        recipesDirectory = {{param.recipesDirectory}}

      Wait for completion and return the result envelope described in the
      system prompt.
    mcps: [orchestra]
    timeoutSeconds: 5400

  - name: verify-dispatch
    type: Script
    shell: pwsh
    dependsOn: [dispatch-processor]
    # Deterministic success gate. `invoke_orchestration` (sync) returns status="Failed" WITHOUT
    # throwing (Orchestra.Host/ChildOrchestrationLauncher), so dispatch-processor (an LLM step)
    # succeeds even when the child failed. This step parses the child status out of the dispatch
    # envelope and THROWS unless it is a success status -- fail-safe: anything we cannot positively
    # confirm as success is treated as failure. move-to-processed and mark-completed depend on this
    # step, so a failed child never reaches AI-Processed and never gets state="completed": the
    # raindrop stays in AI-Inbox, the failure hook flips state to "failed", and the tracker retries
    # (then dead-letters after maxAttempts). Retrying a genuine success is cheap and idempotent
    # (cached Zakira.Replay run, upserted ActionView entry), so failing safe is the correct default.
    script: |
      $ErrorActionPreference = 'Stop'
      $raw = [string]$args[0]
      if ([string]::IsNullOrWhiteSpace($raw)) { throw 'verify-dispatch: dispatch-processor produced no output; treating as failure.' }

      # Extract the child status from the dispatch envelope as robustly as possible.
      $status = $null; $finalContent = $null; $obj = $null
      try { $obj = $raw | ConvertFrom-Json -ErrorAction Stop } catch { $obj = $null }
      if (-not $obj -and ($raw -match '(?s)```(?:json)?\s*(\{.*?\})\s*```')) {
        try { $obj = $Matches[1] | ConvertFrom-Json -ErrorAction Stop } catch { $obj = $null }
      }
      if (-not $obj -and ($raw -match '(?s)(\{(?:[^{}]|\{[^{}]*\})*"status"(?:[^{}]|\{[^{}]*\})*\})')) {
        try { $obj = $Matches[1] | ConvertFrom-Json -ErrorAction Stop } catch { $obj = $null }
      }
      if ($obj) {
        if ($obj.PSObject.Properties['status'])       { $status = [string]$obj.status }
        if ($obj.PSObject.Properties['finalContent']) { $finalContent = [string]$obj.finalContent }
      }
      if (-not $status -and ($raw -match '"status"\s*:\s*"([^"]+)"'))   { $status = $Matches[1] }
      if (-not $status -and ($raw -match 'status\s*\*\*([A-Za-z-]+)\*\*')) { $status = $Matches[1] }

      $success = @('succeeded', 'completed', 'success', 'ok')
      $norm = if ($status) { $status.Trim().ToLowerInvariant() } else { '' }
      if ($success -notcontains $norm) {
        $why = if ($status) { "child processing did not succeed (status='$status')" } else { 'could not determine child status from the dispatch envelope' }
        if (-not [string]::IsNullOrWhiteSpace($finalContent)) {
          $snippet = if ($finalContent.Length -gt 500) { $finalContent.Substring(0, 500) + ' ...[truncated]' } else { $finalContent }
          $why += ". Child error: $snippet"
        }
        throw "verify-dispatch: $why"
      }
      "{ `"ok`": true, `"childStatus`": `"$status`" }"
    arguments:
      - "{{dispatch-processor.output}}"
    timeoutSeconds: 60

  - name: move-to-processed
    type: Script
    dependsOn: [verify-dispatch]
    shell: pwsh
    script: |
      $ErrorActionPreference = 'Stop'
      $cli = $args[0]
      $rid = $args[1]
      $target = $args[2]
      $out = & dotnet run $cli -- move $rid --to-collection $target --add-tag processed 2>$null
      if ($LASTEXITCODE -ne 0) {
        throw "raindrop move failed with exit code $LASTEXITCODE. Output: $out"
      }
      $out
    arguments:
      - "{{vars.raindropCli}}"
      - "{{param.raindropId}}"
      - "{{param.processedCollectionId}}"
    timeoutSeconds: 120

  - name: mark-completed
    type: Script
    shell: pwsh
    dependsOn: [verify-dispatch, move-to-processed]
    # Deterministic state write (previously an LLM Prompt). Runs AFTER move-to-processed, so a
    # timeout here would waste a successful, expensive analysis. Same get -> merge -> idempotent
    # upsert as mark-processing; lastProcessor / lastChildExecutionId are parsed from the
    # dispatch result. Order note preserved from the original: "completed" is written only after
    # the raindrop is already in AI-Processed, so a flaky move can never leave state=completed
    # while the raindrop is still in AI-Inbox.
    script: |
      $ErrorActionPreference = 'Stop'
      $PSNativeCommandArgumentPassing = 'Standard'
      # See mark-processing: decode the CLI's UTF-8 output as UTF-8 so non-ASCII fields survive
      # the read -> merge -> write round-trip. Guarded against redirected-stdout hosts.
      try { [Console]::OutputEncoding = [System.Text.Encoding]::UTF8 } catch { }

      $rid          = $args[0]
      $noteHash     = $args[1]
      $dispatchJson = $args[2]
      $db           = $args[3]
      $category     = $args[4]

      if ([string]::IsNullOrWhiteSpace($rid)) { throw 'raindropId is required.' }
      if ([string]::IsNullOrWhiteSpace($db))  { throw 'zakira db path is required.' }

      # Invoke Zakira.Exchange through dotnet.exe directly (see mark-processing note): PowerShell's
      # default Windows native arg passing strips the quotes out of the --data JSON when the target
      # is the dnx.cmd shim. Standard passing + calling dotnet.exe directly keeps the JSON intact.
      $dotnet = (Get-Command dotnet -CommandType Application -ErrorAction Stop | Select-Object -First 1).Source
      function Invoke-Zakira { & $dotnet dnx Zakira.Exchange --yes -- @args }

      function Get-DataJsonFromCliOutput {
        param([string[]]$Lines)
        if ($null -eq $Lines -or $Lines.Count -eq 0) { return $null }
        $dataIdx = -1
        for ($i = 0; $i -lt $Lines.Count; $i++) {
          if ([string]$Lines[$i] -match '^\s*Data:\s*') { $dataIdx = $i; break }
        }
        if ($dataIdx -lt 0) { return $null }
        $endIdx = $Lines.Count
        for ($j = $dataIdx + 1; $j -lt $Lines.Count; $j++) {
          if ([string]$Lines[$j] -match '^\s*(Author|Reason|Tags|Custom|Created|Last Modified):\s*') { $endIdx = $j; break }
        }
        $span = ($Lines[$dataIdx..($endIdx - 1)] | ForEach-Object { [string]$_ }) -join "`n"
        return ($span -replace '^\s*Data:\s*', '').Trim()
      }

      # Best-effort parse of the dispatcher result for processor + child executionId.
      $lastProcessor = $null; $lastChildExecutionId = $null
      if (-not [string]::IsNullOrWhiteSpace($dispatchJson)) {
        try {
          $d = $dispatchJson | ConvertFrom-Json -ErrorAction Stop
          if ($d.PSObject.Properties['processor'])   { $lastProcessor        = [string]$d.processor }
          if ($d.PSObject.Properties['executionId']) { $lastChildExecutionId = [string]$d.executionId }
        } catch { }
      }

      # 1) Read the current record (set to 'processing' by mark-processing).
      $existed = $false
      $data = [ordered]@{}
      $cliOut = Invoke-Zakira --db $db get $category $rid 2>&1
      if ($LASTEXITCODE -eq 0) {
        $json = Get-DataJsonFromCliOutput -Lines @($cliOut)
        if (-not [string]::IsNullOrWhiteSpace($json)) {
          try {
            $obj = $json | ConvertFrom-Json -DateKind String -ErrorAction Stop
            foreach ($p in $obj.PSObject.Properties) { $data[$p.Name] = $p.Value }
            $existed = $true
          } catch { $existed = $false }
        }
      }
      if (-not $data.Contains('raindropId')) { $data['raindropId'] = $rid }

      # 2) Merge the completed-state fields.
      $data['status']               = 'completed'
      $data['completedAt']          = (Get-Date).ToUniversalTime().ToString('o')
      if ($noteHash) { $data['noteHash'] = $noteHash }
      $data['lastProcessor']        = $lastProcessor
      $data['lastChildExecutionId'] = $lastChildExecutionId
      $data['lastError']            = $null

      $payload = $data | ConvertTo-Json -Depth 50 -Compress
      $reason  = "mark-completed: raindrop $rid -> completed (processor=$lastProcessor)"
      $author  = 'raindrop-watcher'

      # 3) Idempotent upsert (edit-first, create fallback).
      $primary   = if ($existed) { 'edit' }   else { 'create' }
      $secondary = if ($existed) { 'create' } else { 'edit' }
      $out1 = Invoke-Zakira --db $db $primary $category $rid --data $payload --author $author --reason $reason --tags completed 2>&1
      if ($LASTEXITCODE -ne 0) {
        $out2 = Invoke-Zakira --db $db $secondary $category $rid --data $payload --author $author --reason $reason --tags completed 2>&1
        if ($LASTEXITCODE -ne 0) {
          throw "zakira upsert failed for ${rid}: ${primary}=[$($out1 -join ' ')] ${secondary}=[$($out2 -join ' ')]"
        }
      }

      '{ "ok": true }'
    arguments:
      - "{{param.raindropId}}"
      - "{{param.noteHash}}"
      - "{{dispatch-processor.output}}"
      - "{{env.XDG_CONFIG_HOME}}/orchestra/zakira.db"
      - "{{vars.zakiraCategory}}"
    timeoutSeconds: 120

  - name: processor-summary
    type: Prompt
    workingDirectory: "{{orchestration.tempDir}}"
    dependsOn: [dispatch-processor, move-to-processed, mark-completed]
    systemPrompt: |
      You are a reporting assistant. Produce a short markdown summary of
      this per-item processor run -- one paragraph then a tiny bullet list.
    userPrompt: |
      raindropId = {{param.raindropId}}
      url        = {{param.url}}
      title      = {{param.title}}

      Classification:
      {{classify.output}}

      Child dispatch:
      {{dispatch-processor.output}}

      Move result:
      {{move-to-processed.output}}

      State update:
      {{mark-completed.output}}

      Write a short markdown report (no headings deeper than h3) with one
      summary line + a bullet list. End with a line "Done." when everything
      succeeded.
    timeoutSeconds: 60
