# yaml-language-server: $schema=https://raw.githubusercontent.com/MoaidHathot/orchestra/main/schemas/orchestration.schema.json
name: raindrop-video-generic-processor
description: |
  Fallback processor for (video, generic) raindrops. Cheap transcript-first
  Zakira.Replay run, light synthesis, ActionView entry. Use this for one-off
  videos that don't warrant deep frame extraction.

  Includes an optional, tightly-capped (5 frames) targeted-frame-capture
  step driven by Zakira.Replay's MCP, so genuinely visual moments
  ("look at this graph", a screenshot, a meme) can still be surfaced
  without doing a full vision pass.
version: 1.1.0
tags: ["personal", "raindrop", "auto", "video", "generic"]
defaultModel: claude-opus-4.8

inputs:
  raindropId: { type: string, required: true }
  url:        { type: string, required: true }
  title:      { type: string, required: true }
  note:       { type: string, required: false, default: "", multiline: true }
  noteHash:   { type: string, required: false, default: "" }
  tags:       { type: string, required: false, default: "[]" }
  addedAt:    { type: string, required: false, default: "" }

variables:
  defaultAnalysisAsk: |
    Summarize this video in plain prose, then list:
      - 3-5 key takeaways
      - 3-5 notable quotes with timestamps
      - 1-3 potential follow-up actions or open questions

  # Keep this very low -- the whole point of "generic" is to be cheap. The
  # LLM should only capture truly visual moments.
  targetedFrameCap: "5"

defaultStepTimeoutSeconds: 1800
timeoutSeconds: 5400

steps:
  - name: zakira-analyze
    type: Script
    shell: pwsh
    # Invoke Zakira.Replay through `dotnet dnx` (the real dotnet.exe) from a
    # pwsh Script step instead of a Command step. A Command step runs the
    # whole line through `cmd.exe /c`, and the `dnx` launcher is itself a cmd
    # shim (dnx.cmd = `dotnet.exe dnx %*`); either path lets cmd.exe treat an
    # unquoted `&` in the video URL (e.g. `...watch?v=ID&t=652s`) as a command
    # separator, which truncates the URL AND drops every flag after it (so the
    # step also loses --output-format json and produces no usable output).
    # A Script step launches pwsh directly (no cmd.exe) and calls dotnet.exe
    # (a real PE, not a batch shim), so `&` is passed through verbatim.
    # Repro: run c7289a4871dd failed with "'t' is not recognized ...".
    script: |
      $ErrorActionPreference = 'Stop'
      # Gate success on the process exit code, not on whether the tool wrote
      # to stderr (Zakira.Replay sends progress text there).
      $PSNativeCommandUseErrorActionPreference = $false

      $url   = $args[0]
      $runId = $args[1]

      $errLog = Join-Path ([System.IO.Path]::GetTempPath()) "zakira-replay-analyze-$runId.err"

      # `dotnet dnx <pkg> --yes -- <args>` is exactly what `dnx` runs
      # (dnx.cmd = `dotnet.exe dnx %*`) minus the cmd.exe round-trip.
      # --frames-per-minute requires an INTEGER (Zakira.Replay 0.14.x);
      # --allow-media-download covers sources yt-dlp can't directly resolve
      # (e.g. some YouTube videos with cookie/region issues).
      $stdout = & dotnet dnx Zakira.Replay --yes -- analyze $url `
        --frame-strategy interval `
        --frames-per-minute 1 `
        --max-ai-frames 12 `
        --allow-media-download `
        --cache `
        --output-format json `
        --correlation-id $runId 2> $errLog
      $exit = $LASTEXITCODE

      $errText = ''
      if (Test-Path -LiteralPath $errLog) {
        $errText = Get-Content -LiteralPath $errLog -Raw -ErrorAction SilentlyContinue
        Remove-Item -LiteralPath $errLog -ErrorAction SilentlyContinue
      }

      if ($exit -ne 0) {
        throw "Zakira.Replay analyze failed (exit $exit) for '$url'.`n$errText"
      }

      # Emit the JSON document Zakira.Replay wrote to stdout; the downstream
      # read-artifacts step parses it for artifactDirectory + runId.
      $json = ($stdout -join "`n").Trim()
      if ([string]::IsNullOrWhiteSpace($json)) {
        throw "Zakira.Replay analyze produced no stdout for '$url'.`n$errText"
      }
      $json
    arguments:
      - "{{param.url}}"
      - "{{orchestration.runId}}"
    timeoutSeconds: 3600

  - name: read-artifacts
    type: Script
    dependsOn: [zakira-analyze]
    shell: pwsh
    script: |
      $ErrorActionPreference = 'Stop'
      $payload = $args[0] | ConvertFrom-Json
      $artifactDir = $payload.artifactDirectory
      if (-not $artifactDir -or -not (Test-Path -LiteralPath $artifactDir)) {
        throw "artifactDirectory missing or not on disk: $artifactDir"
      }
      function ReadFileOrEmpty($name) {
        $p = Join-Path $artifactDir $name
        if (Test-Path -LiteralPath $p) { Get-Content -LiteralPath $p -Raw } else { '' }
      }
      function Cap($s, [int]$max) {
        if ($null -eq $s) { return '' }
        if ($s.Length -le $max) { return $s }
        return $s.Substring(0, $max) + "`n`n...[truncated $($s.Length - $max) chars]"
      }

      # Enumerate baseline frames present on disk so the pick step can
      # avoid duplicating timestamps and the synth/AV steps can reference
      # them. Even video-generic now captures a small baseline set.
      $framesDir = Join-Path $artifactDir 'frames'
      $baselineFrames = @()
      if (Test-Path -LiteralPath $framesDir) {
        $files = Get-ChildItem -LiteralPath $framesDir -File -Recurse -Include *.jpg,*.jpeg,*.png,*.webp -ErrorAction SilentlyContinue | Select-Object -First 30
        foreach ($f in $files) {
          $baselineFrames += [pscustomobject]@{
            file = $f.Name
            path = $f.FullName
            fileUri = ([System.Uri]::new($f.FullName)).AbsoluteUri
          }
        }
      }

      $pack = @{
        runId = $payload.runId
        artifactDirectory = $artifactDir
        manifest   = (Cap (ReadFileOrEmpty 'manifest.json') 20000)
        transcript = (Cap (ReadFileOrEmpty 'transcript.md') 80000)
        metadata   = (Cap (ReadFileOrEmpty 'metadata.json') 20000)
        baselineFrames = $baselineFrames
      }
      $pack | ConvertTo-Json -Depth 8 -Compress
    arguments:
      - "{{zakira-analyze.output}}"
    timeoutSeconds: 120

  - name: pick-targeted-frames
    type: Prompt
    workingDirectory: "{{orchestration.tempDir}}"
    dependsOn: [read-artifacts]
    systemPrompt: |
      You are a visual evidence curator. The video has a small baseline
      set of interval-sampled frames already (see `baselineFrames` in the
      input). Your job is to ADD up to {{vars.targetedFrameCap}} more
      frames that improve the visual story: moments the speaker explicitly
      directs attention to the screen, moments where seeing the screen is
      genuinely more informative than just hearing the audio.

      Be GENEROUS, not conservative. The goal is for the user to see
      meaningful stills next to the summary. Almost every video has at
      least a few moments that benefit from a frame:

        - Speaker says "look at this", "see this", "here", "you can see..."
        - On-screen text / labels / numbers / code / UI
        - A chart, diagram, or graph being referenced
        - A product / device being shown or held up
        - A demo or example being walked through
        - A reaction shot or notable visual moment

      If the transcript is vague (just narration with no visual cues),
      still pick 2-3 timestamps spread across the duration so the user
      gets representative frames -- one early, one middle, one late.
      Picking ZERO timestamps is reserved for true edge cases (e.g., a
      static talking-head with no visual content at all). Default behavior
      is to pick.

      Each pick MUST include a one-sentence `reason`. Pick timestamps
      that are at least ~15 seconds away from a baselineFrames timestamp
      so you don't duplicate (the file names typically encode the
      timestamp, e.g., `frame-003-02-15.jpg` is the 2:15 mark).

      Output a SINGLE JSON object on stdout (no commentary, no fences):

        {
          "ok": true,
          "picks": [
            { "timestamp": "hh:mm:ss", "reason": "<one short sentence>" }
          ]
        }

      Timestamps must be in `hh:mm:ss` form.
    userPrompt: |
      Raindrop:
        title = {{param.title}}
        url   = {{param.url}}

      Artifact pack:
      {{read-artifacts.output}}

      Output ONLY the JSON.
    timeoutSeconds: 300

  - name: targeted-frame-capture
    type: Script
    shell: pwsh
    dependsOn: [zakira-analyze, pick-targeted-frames]
    scriptFile: "./tools/scripts/capture-targeted-frames.ps1"
    arguments:
      - "-PicksJson"
      - "{{pick-targeted-frames.output}}"
      - "-Source"
      - "{{param.url}}"
      - "-ZakiraAnalyzeJson"
      - "{{zakira-analyze.output}}"
      - "-MaxCap"
      - "{{vars.targetedFrameCap}}"
    timeoutSeconds: 1200

  - name: synthesize
    type: Prompt
    workingDirectory: "{{orchestration.tempDir}}"
    dependsOn: [read-artifacts, targeted-frame-capture]
    systemPrompt: |
      You are a video summarizer. Synthesize a tight markdown summary strictly
      from the Zakira.Replay artifact pack. Cite every quote with its
      transcript timestamp. Never invent claims. Use the user's note as the
      analysis request when non-empty, else fall back to the default ask.

      Inline visuals: the artifact pack includes `baselineFrames` (small set
      of interval-sampled stills) and the targeted-frame-capture output
      includes `captured` (LLM-picked stills). When either is non-empty,
      embed a handful of the most relevant frames inline in the summary
      using markdown image syntax with each frame's `fileUri`:
      `![reason or caption](file:///...)`. Aim for 2-4 inline frames total;
      do not embed every frame.

      Save the final markdown via orchestra_save_file.
    userPrompt: |
      Raindrop:
        title = {{param.title}}
        url   = {{param.url}}
        tags  = {{param.tags}}

      User note (analysis request; may be empty):
        {{param.note}}

      Default analysis ask:
        {{vars.defaultAnalysisAsk}}

      Artifact pack:
      {{read-artifacts.output}}

      Targeted frame capture results:
      {{targeted-frame-capture.output}}

      Produce the markdown summary. Save via orchestra_save_file. Output
      the markdown as the step output.
    timeoutSeconds: 1200

  - name: fetch-action-view-schema
    type: Command
    command: dnx
    arguments: [ActionView.Cli, "--yes", "--", schema]
    timeoutSeconds: 120

  - name: create-action-view-entry
    type: Prompt
    workingDirectory: "{{orchestration.tempDir}}"
    dependsOn: [read-artifacts, synthesize, targeted-frame-capture, fetch-action-view-schema]
    systemPrompt: |
      You produce ActionView entries that match the entry schema. Type must
      be 'raindrop-video-generic'; source must be '{{orchestration.name}}'.
      Save the JSON via orchestra_save_file -- the next step submits the file.
    userPrompt: |
      ActionView schema:
      {{fetch-action-view-schema.output}}

      Raindrop:
        id    = {{param.raindropId}}
        title = {{param.title}}
        url   = {{param.url}}
        tags  = {{param.tags}}
        note  = {{param.note}}

      Synthesized summary:
      {{synthesize.output}}

      Read-artifacts pack (for baselineFrames and artifactDirectory):
      {{read-artifacts.output}}

      Targeted frame capture:
      {{targeted-frame-capture.output}}

      Build an entry with:
        id       = 'raindrop-{{param.raindropId}}-video-generic'  # stable per-raindrop key -> idempotent re-runs
        type     = 'raindrop-video-generic'
        source   = '{{orchestration.name}}'
        title    = the raindrop title (cap at 120 chars)
        subtitle = '<duration if known> | <source host>'
        severity = 'low'
        icon     = 'video'
        tags     = raindrop tags + ['raindrop','video']
        content blocks:
          - keyValue 'Source' with: URL, Added at, Original tags, Note
          - section 'Summary' containing a markdown block with the synthesized summary
          - section 'Visual evidence' -- ALWAYS include this section, never omit it.
            Populate the markdown body using both the baseline frames AND the targeted captures:
              * If `baselineFrames` (from read-artifacts) is non-empty: show them first under a sub-heading "### Baseline frames"
                with each as `![<filename>](<fileUri>)` (one per line, 4-8 at most).
              * If `captured` (from targeted-frame-capture) is non-empty: show them under "### Targeted frames"
                with each as "**<timestamp>** -- <reason>" followed by `![<reason>](<fileUri>)`.
              * If BOTH are empty: include the section anyway with a small italic note explaining why,
                e.g. "_No visual frames were captured for this video._ Possible causes: source media could not
                be resolved by Zakira.Replay (yt-dlp / inline-media probes failed), or the transcript had no
                visual moments worth a targeted capture. Check the run directory at the path in
                `read-artifacts.output.artifactDirectory` for diagnostic logs."
          - link 'Open original' to the raindrop URL
        actions:
          - 'Open original' (cli, onSuccess=keep)
          - 'Reprocess'     -- include this action VERBATIM (substituting the templated values shown):
              {
                "label": "Reprocess (move back to AI-Inbox)",
                "style": "default",
                "confirmMessage": "Move this raindrop back to AI-Inbox and rerun the full analysis on the next tracker tick?",
                "command": {
                  "type": "cli",
                  "program": "pwsh",
                  "args": [
                    "-NoProfile",
                    "-File",
                    "{{orchestration.sourceDirectory}}/tools/scripts/reprocess-raindrop.ps1",
                    "-RaindropId",
                    "{{param.raindropId}}"
                  ]
                },
                "onSuccess": "archive"
              }
          - 'Dismiss'       (default, onSuccess=archive)

      Save the JSON via orchestra_save_file. Output ONLY the raw JSON.
    timeoutSeconds: 900

  - name: submit-action-view-entry
    type: Script
    shell: pwsh
    dependsOn: [create-action-view-entry]
    scriptFile: "./tools/scripts/submit-actionview-upsert.ps1"
    arguments:
      - "-EntryFile"
      - "{{create-action-view-entry.files[0]}}"
    timeoutSeconds: 120

  - name: result-envelope
    type: Prompt
    workingDirectory: "{{orchestration.tempDir}}"
    dependsOn: [zakira-analyze, read-artifacts, targeted-frame-capture, synthesize, submit-action-view-entry]
    systemPrompt: |
      Output ONLY a JSON envelope describing the outcome. Be FACTUAL.
      Do NOT invent causes for missing data -- only report what the
      step outputs literally say. If a count is 0, report 0; do not
      speculate why unless the step output itself states a reason.
    userPrompt: |
      Build a JSON envelope like:

      {
        "ok": true,
        "processor": "{{orchestration.name}}",
        "raindropId": "{{param.raindropId}}",
        "zakiraReplayRunId": "<runId from zakira-analyze output>",
        "baselineFramesAvailable": <count from read-artifacts output `baselineFrames` array length, 0 if missing>,
        "targetedFramesCaptured": <count from targeted-frame-capture output `captured` array length, 0 if missing>,
        "actionViewEntryId": "<id parsed from submit-action-view-entry output, or null>",
        "summary": "<one factual sentence: processor name + raindrop title + counts. E.g. 'raindrop-video-generic-processor processed \"<title>\" with N baseline + M targeted frames.' Do NOT add explanations for low counts unless an error message in one of the inputs explicitly states one.>"
      }

      Zakira analyze output:   {{zakira-analyze.output}}
      Read-artifacts output:   {{read-artifacts.output}}
      Targeted frame capture:  {{targeted-frame-capture.output}}
      ActionView submission:   {{submit-action-view-entry.output}}

      Output ONLY the JSON.
    timeoutSeconds: 60
