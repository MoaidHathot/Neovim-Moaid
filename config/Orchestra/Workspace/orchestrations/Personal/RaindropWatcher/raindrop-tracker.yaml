# yaml-language-server: $schema=https://raw.githubusercontent.com/MoaidHathot/orchestra/main/schemas/orchestration.schema.json
name: raindrop-tracker
description: |
  Polls a raindrop.io inbox collection on a schedule, compares the current
  raindrops against per-item state in Zakira.Exchange, and dispatches the
  raindrop-processor child orchestration (async) for each new or changed item.

  The tracker is fully name-based: collection names live in `variables` and
  are resolved to numeric ids by a `bootstrap-config` step that runs at the
  top of every tick. Auth is verified at the same time. There are no numeric
  collection ids hard-coded anywhere -- the suite is portable across
  machines as soon as `raindrop login` (or RAINDROP_TOKEN) is configured.

  State machine (Zakira.Exchange, category=raindrop-watcher-state, key=raindropId):
      (no record) -> queued -> processing -> completed   (success path)
                                          \-> failed     (recoverable; retried up to maxAttempts)
                                          \-> dead-lettered  (terminal; moved out of inbox)

  Safety nets the tracker enforces every tick:
    * stuck-in-flight detection -- if status in {queued, processing} but
      now - (queuedAt|startedAt) > stuckThresholdMinutes, the item is
      reclassified as failed (with lastError="stuck-in-flight: ...") and the
      normal failed-rule applies (re-dispatch or dead-letter).
    * dead-letter -- when attempts >= maxAttempts the item is moved out of
      AI-Inbox into AI-DeadLetter (separate collection), tagged dead-letter,
      and a critical-severity ActionView entry is published so it cannot be
      silently lost.
    * rolling watcher-status -- exactly one raindrop-watcher-status entry
      exists in ActionView at any time; it is replaced each tick with the
      current counts so you have a single glanceable health indicator.

  Concurrency is capped per tick via maxDispatchPerTick. State that survives
  ticks (and even host restarts) lives in Zakira.Exchange under the
  raindrop-watcher-state category. Re-processing is triggered when a
  raindrop's note text changes (the orchestration tracks a SHA-256 hash of
  the note).

  Auth, API calls, and OAuth all live in tools/raindrop.cs -- this
  orchestration shells out to that helper and never speaks raindrop.io's
  REST API directly.
version: 1.2.0
tags: ["personal", "raindrop", "auto", "watcher"]
defaultModel: claude-opus-4.8

variables:
  # ---- USER-FACING CONFIG -------------------------------------------------
  # Collection names (NOT numeric ids). The bootstrap-config step creates
  # the collections on first tick if they don't exist (idempotent), so
  # this is the single source of truth across every machine.
  inboxCollectionName: "AI-Inbox"
  processedCollectionName: "AI-Processed"
  deadLetterCollectionName: "AI-DeadLetter"
  # Where recipes (from both video and article recipe processors) are
  # written. Propagated to children as a parameter -- do not duplicate
  # this value in any child orchestration.
  recipesDirectory: "{{env.USERPROFILE}}/OneDrive/Documents/Recipes"
  # Tuning knobs.
  maxDispatchPerTick: "3"
  maxAttempts: "3"
  # How long an item can sit in status=queued|processing before we declare
  # it stuck and re-classify as failed. Should be larger than any legitimate
  # child orchestration's total timeout to avoid false positives; 60min is
  # comfortable for the current article (~1800s) and video (~5400s) ceilings.
  stuckThresholdMinutes: "60"
  pollMaxItems: "100"
  # -------------------------------------------------------------------------
  childOrchestrationName: "raindrop-processor"
  zakiraCategory: "raindrop-watcher-state"
  raindropCli: "{{orchestration.sourceDirectory}}/tools/raindrop.cs"
  deadLetterScript: "{{orchestration.sourceDirectory}}/tools/scripts/dead-letter-process.ps1"
  rollingStatusScript: "{{orchestration.sourceDirectory}}/tools/scripts/publish-rolling-status.ps1"

defaultRetryPolicy:
  maxRetries: 2
  backoffSeconds: 5
  backoffMultiplier: 2.0
  retryOnTimeout: true

defaultStepTimeoutSeconds: 600
timeoutSeconds: 3600

mcps:
  - name: zakira
    type: local
    command: dnx
    arguments:
      - Zakira.Exchange
      - "--yes"
      - "--"
      - "--db"
      - "{{env.XDG_CONFIG_HOME}}/orchestra/zakira.db"
      - mcp
      - "--category"
      - "{{vars.zakiraCategory}}"

  - name: orchestra
    type: remote
    endpoint: "{{server.url}}/mcp/data"

steps:
  - name: bootstrap-config
    type: Script
    shell: pwsh
    script: |
      $ErrorActionPreference = 'Stop'
      $cli = $args[0]
      $inboxName = $args[1]
      $processedName = $args[2]
      $deadLetterName = $args[3]

      # Windows-only resilience: if Orchestra host was started BEFORE the
      # user set these env vars at User scope, the host's process tree
      # (including this script) doesn't see them. Pull them from the User
      # registry and inject into the current process so `dotnet run` below
      # inherits the right values. No-op on non-Windows or when the vars
      # are already present.
      if ($IsWindows -or $env:OS -eq 'Windows_NT') {
        foreach ($name in @('RAINDROP_TOKEN','RAINDROP_OAUTH_CLIENT_ID','RAINDROP_OAUTH_CLIENT_SECRET','RAINDROP_AUTO_LOGIN','RAINDROP_API_BASE','RAINDROP_STATE_DIR')) {
          if (-not [Environment]::GetEnvironmentVariable($name,'Process')) {
            $fromUser = [Environment]::GetEnvironmentVariable($name,'User')
            if ($fromUser) {
              [Environment]::SetEnvironmentVariable($name, $fromUser, 'Process')
            }
          }
        }
      }

      # 1) Auth probe.
      & dotnet run $cli -- whoami 1>$null 2>$null
      if ($LASTEXITCODE -ne 0) {
        throw "raindrop auth check failed (exit $LASTEXITCODE). On this machine, set RAINDROP_TOKEN, OR set RAINDROP_OAUTH_CLIENT_ID + RAINDROP_OAUTH_CLIENT_SECRET (login is automatic on first use)."
      }

      # 2) Resolve / create all three collections by name (idempotent).
      function EnsureCollection([string]$name) {
        $stdout = & dotnet run $cli -- ensure-collection $name 2>$null
        if ($LASTEXITCODE -ne 0) {
          throw "raindrop ensure-collection '$name' failed with exit $LASTEXITCODE"
        }
        return (($stdout -join "`n") | ConvertFrom-Json)
      }
      $inbox      = EnsureCollection $inboxName
      $proc       = EnsureCollection $processedName
      $deadLetter = EnsureCollection $deadLetterName

      @{
        inboxCollectionId        = $inbox.id
        inboxCollectionName      = $inboxName
        processedCollectionId    = $proc.id
        processedCollectionName  = $processedName
        deadLetterCollectionId   = $deadLetter.id
        deadLetterCollectionName = $deadLetterName
      } | ConvertTo-Json -Compress
    arguments:
      - "{{vars.raindropCli}}"
      - "{{vars.inboxCollectionName}}"
      - "{{vars.processedCollectionName}}"
      - "{{vars.deadLetterCollectionName}}"
    # Bumped to cover first-run interactive OAuth (browser open + user click).
    # Subsequent ticks finish in ~1-2 seconds; this only matters once per machine.
    timeoutSeconds: 600

  - name: list-inbox
    type: Script
    shell: pwsh
    dependsOn: [bootstrap-config]
    script: |
      $ErrorActionPreference = 'Stop'
      $cli = $args[0]
      $cfg = $args[1] | ConvertFrom-Json
      $maxItems = [int]$args[2]

      $stdout = & dotnet run $cli -- list --collection $cfg.inboxCollectionId --max $maxItems 2>$null
      if ($LASTEXITCODE -ne 0) {
        throw "raindrop list failed with exit code $LASTEXITCODE"
      }
      ($stdout -join "`n")
    arguments:
      - "{{vars.raindropCli}}"
      - "{{bootstrap-config.output}}"
      - "{{vars.pollMaxItems}}"
    timeoutSeconds: 180

  - name: gate-empty
    type: Script
    shell: pwsh
    dependsOn: [list-inbox]
    # Deterministic emptiness gate. Previously an LLM Prompt step that needed a healthy,
    # authenticated Copilot CLI just to decide count==0 -- a fragile dependency for a trivial
    # check (a de-authenticated CLI failed the whole tick here). This Script extracts the
    # raindrop `items` array for downstream steps and, when the inbox is empty, halts the tick
    # early via the Script control channel (Orchestra-Complete) -- the non-LLM equivalent of
    # orchestra_complete. Empty ticks now cost zero LLM calls.
    script: |
      $ErrorActionPreference = 'Stop'
      $resp = $null
      try { $resp = $args[0] | ConvertFrom-Json } catch {}
      $items = @()
      if ($resp -and $resp.PSObject.Properties['items'] -and $resp.items) { $items = @($resp.items) }
      $count = if ($resp -and $resp.PSObject.Properties['count']) { [int]$resp.count } else { $items.Count }
      if (-not $resp -or -not $resp.ok -or $count -eq 0 -or $items.Count -eq 0) {
        Orchestra-Complete -Status success -Reason 'Inbox is empty, nothing to dispatch.'
        '[]'
        return
      }
      $items | ConvertTo-Json -Depth 100 -Compress -AsArray
    arguments:
      - "{{list-inbox.output}}"
    timeoutSeconds: 60

  - name: load-state
    type: Script
    shell: pwsh
    dependsOn: [gate-empty]
    # Deterministic Zakira state lookup. Previously an LLM Prompt step that intermittently
    # finished with a prose "record exists" status instead of the record fields, which forced
    # the downstream scheduler to improvise raw zakira.db queries (the _qz.py scratch files).
    # Mirrors the proven pattern in zakira-find-or-skip / daily-morning-digest: shell out to the
    # Zakira.Exchange CLI and parse the `Data:` JSON payload. No LLM in the data path, so the
    # records always arrive complete and structured.
    script: |
      $ErrorActionPreference = 'Stop'
      $PSNativeCommandArgumentPassing = 'Standard'

      $raindropsJson = $args[0]
      $dbPath        = $args[1]
      if ([string]::IsNullOrWhiteSpace($raindropsJson)) { throw 'raindrops JSON is required.' }
      if ([string]::IsNullOrWhiteSpace($dbPath))        { throw 'dbPath is required.' }

      $category  = 'raindrop-watcher-state'
      $raindrops = ConvertFrom-Json -InputObject $raindropsJson -NoEnumerate -DateKind String -ErrorAction Stop

      # Extract the `Data:` JSON payload from the Zakira CLI's human-formatted record output.
      function Get-DataJsonFromCliOutput {
        param([string[]]$Lines)
        if ($null -eq $Lines -or $Lines.Count -eq 0) { return $null }
        $dataIdx = -1
        for ($i = 0; $i -lt $Lines.Count; $i++) {
          if ([string]$Lines[$i] -match '^\s*Data:\s*') { $dataIdx = $i; break }
        }
        if ($dataIdx -lt 0) { return $null }
        $endIdx = $Lines.Count
        for ($j = $dataIdx + 1; $j -lt $Lines.Count; $j++) {
          if ([string]$Lines[$j] -match '^\s*(Author|Reason|Tags|Custom|Created|Last Modified):\s*') {
            $endIdx = $j; break
          }
        }
        $span = ($Lines[$dataIdx..($endIdx - 1)] | ForEach-Object { [string]$_ }) -join "`n"
        return ($span -replace '^\s*Data:\s*', '').Trim()
      }

      $map = [ordered]@{}
      foreach ($r in @($raindrops)) {
        if ($null -eq $r) { continue }
        $idProp = $r.PSObject.Properties['_id']
        $key = if ($idProp) { [string]$idProp.Value } else { '' }
        if ([string]::IsNullOrWhiteSpace($key)) { continue }

        $cliOutput = & dnx Zakira.Exchange --yes -- --db $dbPath get $category $key 2>&1
        $cliExit = $LASTEXITCODE

        if ($cliExit -ne 0) {
          # exit 1 = not found; any other non-zero = transient CLI error. Either way report null
          # so the scheduler's R6 (new) treats it as fresh rather than silently dropping it.
          $map[$key] = $null
          continue
        }

        $dataJson = Get-DataJsonFromCliOutput -Lines $cliOutput
        if ([string]::IsNullOrWhiteSpace($dataJson)) { $map[$key] = $null; continue }
        try { $map[$key] = (ConvertFrom-Json -InputObject $dataJson -DateKind String -ErrorAction Stop) }
        catch { $map[$key] = $null }
      }

      # Always emit an object (even {}), so downstream gets clean JSON to ConvertFrom-Json.
      if ($map.Count -eq 0) { '{}' } else { $map | ConvertTo-Json -Depth 100 -Compress }
    arguments:
      - "{{gate-empty.output}}"
      - "{{env.XDG_CONFIG_HOME}}/orchestra/zakira.db"
    timeoutSeconds: 300

  - name: select-dispatchable
    type: Script
    shell: pwsh
    dependsOn: [gate-empty, load-state]
    # Deterministic queue scheduler. Previously an LLM Prompt step that, when its input was
    # incomplete, improvised raw zakira.db queries (the _qz.py scratch). Scheduling is pure,
    # rule-based logic (R1-R6 on status/attempts/age) -- ported verbatim to PowerShell so it is
    # reproducible and never scripts or miscalculates. The fuzzy work (classification) stays an
    # LLM step in raindrop-processor. Output shape is identical to the old prompt, so every
    # downstream step (mark-queued, strip-workflow-tags, dead-letter-move, dispatch,
    # publish-rolling-status) is unchanged.
    #
    # RULES (first match wins), with now = current UTC:
    #   R1 in-flight     status in {queued,processing} AND ageMinutes <= stuck -> skip
    #   R2 stuck         status in {queued,processing} AND ageMinutes >  stuck -> treat as failed
    #   R3 dead-letter   failed AND attempts >= maxAttempts                    -> deadLetter (no dispatch)
    #   R4 retry         failed AND attempts <  maxAttempts                    -> dispatch (retry-failed/stuck-retry)
    #   R5 reprocess     status in {completed,dead-lettered}                   -> dispatch (priorAttempts=0)
    #   R6 new           no record / unknown status                           -> dispatch (priorAttempts=0)
    # Cap: first maxDispatchPerTick dispatchables -> selected, rest -> deferred. Dead-letter uncapped.
    script: |
      $ErrorActionPreference = 'Stop'

      $raindropsJson = $args[0]
      $stateJson     = $args[1]
      $maxDispatch   = 0; try { $maxDispatch = [int]$args[2] } catch { $maxDispatch = 0 }
      $maxAttempts   = 0; try { $maxAttempts = [int]$args[3] } catch { $maxAttempts = 0 }
      $stuckMin      = 0; try { $stuckMin    = [int]$args[4] } catch { $stuckMin    = 0 }

      $nowUtc = (Get-Date).ToUniversalTime()
      $raindrops = ConvertFrom-Json -InputObject $raindropsJson -NoEnumerate -DateKind String -ErrorAction Stop
      $state = $null
      if (-not [string]::IsNullOrWhiteSpace($stateJson)) {
        try { $state = ConvertFrom-Json -InputObject $stateJson -DateKind String -ErrorAction Stop } catch { $state = $null }
      }

      function Get-Field($obj, [string]$name) {
        if ($null -eq $obj) { return $null }
        $p = $obj.PSObject.Properties[$name]
        if ($p) { return $p.Value } else { return $null }
      }

      function Get-NoteHash([string]$note) {
        if ($null -eq $note) { $note = '' }
        $sha = [System.Security.Cryptography.SHA256]::Create()
        try {
          $bytes = [System.Text.Encoding]::UTF8.GetBytes($note)
          return (($sha.ComputeHash($bytes) | ForEach-Object { $_.ToString('x2') }) -join '')
        } finally { $sha.Dispose() }
      }

      # Age basis: when the item entered its current in-flight state. Missing timestamps -> very
      # old (never wedge an item in-flight forever).
      function Get-AgeMinutes($rec, [string]$status, [datetime]$nowUtc) {
        $candidates = New-Object System.Collections.Generic.List[string]
        if ($status -eq 'processing') { $candidates.Add([string](Get-Field $rec 'startedAt')) }
        $candidates.Add([string](Get-Field $rec 'queuedAt'))
        $candidates.Add([string](Get-Field $rec 'startedAt'))
        $candidates.Add([string](Get-Field $rec 'lastFailedAt'))
        $candidates.Add([string](Get-Field $rec 'firstSeenAt'))
        foreach ($c in $candidates) {
          if (-not [string]::IsNullOrWhiteSpace($c)) {
            try {
              $ts = [datetimeoffset]::Parse($c, [System.Globalization.CultureInfo]::InvariantCulture).UtcDateTime
              return [int][math]::Floor(($nowUtc - $ts).TotalMinutes)
            } catch { }
          }
        }
        return [int]::MaxValue
      }

      $selected   = New-Object System.Collections.Generic.List[object]
      $skipped    = New-Object System.Collections.Generic.List[object]
      $deferred   = New-Object System.Collections.Generic.List[object]
      $deadLetter = New-Object System.Collections.Generic.List[object]
      $stuck      = New-Object System.Collections.Generic.List[object]
      $dispatch   = New-Object System.Collections.Generic.List[object]   # candidates, capped later

      function New-Dispatch($id, $url, $title, $note, $noteHash, $tags, $addedAt, $reason, [int]$priorAttempts) {
        [pscustomobject][ordered]@{
          raindropId = $id; url = $url; title = $title; note = $note; noteHash = $noteHash
          tags = @($tags); addedAt = $addedAt; reason = $reason; priorAttempts = $priorAttempts
        }
      }

      foreach ($r in @($raindrops)) {
        if ($null -eq $r) { continue }
        $id = [string](Get-Field $r '_id')
        if ([string]::IsNullOrWhiteSpace($id)) { continue }

        $url     = [string](Get-Field $r 'link')
        $title   = [string](Get-Field $r 'title')
        $note    = [string](Get-Field $r 'note')
        $tags    = Get-Field $r 'tags'; if ($null -eq $tags) { $tags = @() }
        $addedAt = [string](Get-Field $r 'created')
        $noteHash = Get-NoteHash $note

        $rec = if ($state) { Get-Field $state $id } else { $null }

        if ($null -eq $rec) {
          # R6 NEW
          $dispatch.Add((New-Dispatch $id $url $title $note $noteHash $tags $addedAt 'new' 0))
          continue
        }

        $status = ([string](Get-Field $rec 'status')).Trim().ToLowerInvariant()
        $attempts = 0; $aRaw = Get-Field $rec 'attempts'
        if ($null -ne $aRaw) { try { $attempts = [int]$aRaw } catch { $attempts = 0 } }

        $treatAsFailed = $false
        $dispatchReason = 'retry-failed'

        if ($status -eq 'queued' -or $status -eq 'processing') {
          $age = Get-AgeMinutes $rec $status $nowUtc
          if ($age -le $stuckMin) {
            # R1 in-flight
            $skipped.Add([pscustomobject][ordered]@{ raindropId = $id; reason = 'in-flight' })
            continue
          }
          # R2 stuck reclassification -> treat as failed (record for observability)
          $stuck.Add([pscustomobject][ordered]@{ raindropId = $id; priorStatus = $status; ageMinutes = $age; newAttempts = $attempts })
          $treatAsFailed = $true
          $dispatchReason = 'stuck-retry'
        }

        if ($treatAsFailed -or $status -eq 'failed') {
          if ($attempts -ge $maxAttempts) {
            # R3 dead-letter
            $deadLetter.Add([pscustomobject][ordered]@{
              raindropId = $id; url = $url; title = $title; attempts = $attempts
              lastError = [string](Get-Field $rec 'lastError'); reason = 'max-attempts-exceeded'
            })
            continue
          }
          # R4 retry failed
          $dispatch.Add((New-Dispatch $id $url $title $note $noteHash $tags $addedAt $dispatchReason $attempts))
          continue
        }

        if ($status -eq 'completed') {
          # R5 user reprocess
          $dispatch.Add((New-Dispatch $id $url $title $note $noteHash $tags $addedAt 'user-reprocess' 0))
          continue
        }
        if ($status -eq 'dead-lettered') {
          $dispatch.Add((New-Dispatch $id $url $title $note $noteHash $tags $addedAt 'user-recovery-from-dead-letter' 0))
          continue
        }

        # Unknown status -> fail-open to dispatch (being in AI-Inbox is the trigger).
        $dispatch.Add((New-Dispatch $id $url $title $note $noteHash $tags $addedAt 'new' 0))
      }

      # Per-tick dispatch cap (dead-letter is uncapped).
      for ($i = 0; $i -lt $dispatch.Count; $i++) {
        if ($i -lt $maxDispatch) {
          $selected.Add($dispatch[$i])
        } else {
          $deferred.Add([pscustomobject][ordered]@{ raindropId = $dispatch[$i].raindropId; reason = 'max-dispatch-per-tick-reached' })
        }
      }

      [pscustomobject][ordered]@{
        selected          = @($selected.ToArray())
        skipped           = @($skipped.ToArray())
        deferred          = @($deferred.ToArray())
        deadLetter        = @($deadLetter.ToArray())
        stuckReclassified = @($stuck.ToArray())
      } | ConvertTo-Json -Depth 100 -Compress
    arguments:
      - "{{gate-empty.output}}"
      - "{{load-state.output}}"
      - "{{vars.maxDispatchPerTick}}"
      - "{{vars.maxAttempts}}"
      - "{{vars.stuckThresholdMinutes}}"
    timeoutSeconds: 300

  - name: mark-queued
    type: Prompt
    workingDirectory: "{{orchestration.tempDir}}"
    dependsOn: [select-dispatchable]
    systemPrompt: |
      You are a state-persistence assistant. You have Zakira.Exchange MCP tools.
      For each item in `selected`, write a memory record with status="queued",
      the noteHash, attempts incremented (priorAttempts+1), queuedAt timestamp,
      url, title, tags, and addedAt. Use create_memory for first-time entries
      and edit_memory when a record already exists (re-dispatch path).

      Always try create_memory first; if it fails because the key exists,
      fall back to edit_memory and merge fields (keep historical data such as
      `firstSeenAt` and `lastZakiraReplayRunId` if present).
    userPrompt: |
      Selection from previous step:
      {{select-dispatchable.output}}

      For every item in `selected`, persist its initial state record under
      key = raindropId (string). Tag the memory record with ["queued"].

      After saving all records, output a JSON object:
        { "ok": true, "queuedIds": ["..."] }
    mcps: [zakira]
    timeoutSeconds: 300

  - name: strip-workflow-tags
    type: Script
    shell: pwsh
    dependsOn: [select-dispatchable]
    script: |
      $ErrorActionPreference = 'Stop'
      $cli = $args[0]
      $selectionJson = $args[1]
      $selection = $null
      try { $selection = $selectionJson | ConvertFrom-Json } catch {}
      if (-not $selection -or -not $selection.selected) {
        @{ ok = $true; stripped = @(); note = 'no selected items' } | ConvertTo-Json -Compress
        return
      }
      # Strip the workflow tags processor + tracker add over the item's
      # lifetime. The tags don't gate any logic -- select-dispatchable is
      # state-based -- but they confuse the user if they linger on a
      # raindrop that is about to be re-processed. Best-effort: per-item
      # failures don't fail the tick; we just log them.
      $tagsToStrip = @('processed', 'dead-letter', 'failed', 'processing')
      $stripped = @()
      foreach ($item in @($selection.selected)) {
        $rid = "$($item.raindropId)"
        if (-not $rid) { continue }
        $perItem = [ordered]@{ raindropId = $rid; removed = @(); errors = @() }
        foreach ($tag in $tagsToStrip) {
          try {
            & dotnet run $cli -- remove-tag $rid $tag 2>$null | Out-Null
            if ($LASTEXITCODE -eq 0) {
              $perItem.removed += $tag
            }
            # Don't care about non-zero exit; the API is idempotent and a
            # missing tag is not an error.
          } catch {
            $perItem.errors += ("{0}: {1}" -f $tag, $_.Exception.Message)
          }
        }
        $stripped += [pscustomobject]$perItem
      }
      @{ ok = $true; stripped = $stripped } | ConvertTo-Json -Depth 5 -Compress
    arguments:
      - "{{vars.raindropCli}}"
      - "{{select-dispatchable.output}}"
    timeoutSeconds: 300

  - name: dead-letter-move
    type: Script
    shell: pwsh
    dependsOn: [bootstrap-config, select-dispatchable]
    scriptFile: "./tools/scripts/dead-letter-process.ps1"
    arguments:
      - "-RaindropCli"
      - "{{vars.raindropCli}}"
      - "-BootstrapJson"
      - "{{bootstrap-config.output}}"
      - "-SelectionJson"
      - "{{select-dispatchable.output}}"
      - "-ZakiraDb"
      - "{{env.XDG_CONFIG_HOME}}/orchestra/zakira.db"
      - "-ZakiraCategory"
      - "{{vars.zakiraCategory}}"
    timeoutSeconds: 900

  - name: dispatch
    type: Prompt
    workingDirectory: "{{orchestration.tempDir}}"
    dependsOn: [bootstrap-config, select-dispatchable, mark-queued, dead-letter-move, strip-workflow-tags]
    systemPrompt: |
      You are a fan-out dispatcher. You have the Orchestra control-plane MCP
      and you launch child orchestrations asynchronously. For every selected
      raindrop, invoke `invoke_orchestration` with these arguments:
        - orchestrationId: "{{vars.childOrchestrationName}}"
        - mode: "async"
        - parameters: {
            "raindropId":            "<raindropId>",
            "url":                   "<url>",
            "title":                 "<title>",
            "note":                  "<note>",
            "noteHash":              "<noteHash>",
            "tags":                  "<tags as JSON string>",
            "addedAt":               "<addedAt>",
            "priorAttempts":         "<priorAttempts as string>",
            "processedCollectionId": "<from bootstrap-config: processedCollectionId>",
            "recipesDirectory":      "{{vars.recipesDirectory}}"
          }

      Record the returned executionId for each child. Do NOT poll for
      completion -- this is fire-and-forget. The child orchestration will
      update Zakira.Exchange state on its own.

      Note: orchestration parameter values must be strings. Convert numbers
      and arrays accordingly. If `select-dispatchable.output.selected` is
      empty, output { "ok": true, "dispatched": [] } and finish; do not
      attempt to invoke anything.
    userPrompt: |
      Selection from earlier:
      {{select-dispatchable.output}}

      Bootstrap config (read processedCollectionId from here):
      {{bootstrap-config.output}}

      Dispatch async children for every item in `selected`.

      After all dispatches, output JSON:
        { "ok": true, "dispatched": [{ "raindropId": "...", "executionId": "..." }] }
    mcps: [orchestra]
    timeoutSeconds: 600

  - name: tracker-summary
    type: Prompt
    workingDirectory: "{{orchestration.tempDir}}"
    dependsOn: [bootstrap-config, select-dispatchable, dispatch, dead-letter-move]
    systemPrompt: |
      You are a reporting assistant. Produce a concise scheduler-log-friendly
      summary of this tick. One short paragraph plus a bullet list.
    userPrompt: |
      Inputs:
      - bootstrap:    {{bootstrap-config.output}}
      - selection:    {{select-dispatchable.output}}
      - dispatch:     {{dispatch.output}}
      - dead-letter:  {{dead-letter-move.output}}

      Output a small markdown report:
        - One-line headline like "raindrop-tracker: dispatched N, skipped M, deferred K, dead-lettered D (inbox=<id>, processed=<id>, deadLetter=<id>)".
        - Bullets for dispatched ids with their executionIds.
        - Bullets for skipped ids with reasons.
        - Bullets for stuck-reclassified ids (priorStatus, ageMinutes).
        - Bullets for dead-lettered ids with attempts + lastError.
        - Note if anything is deferred to the next tick.
    timeoutSeconds: 120

  - name: publish-rolling-status
    type: Script
    shell: pwsh
    dependsOn: [bootstrap-config, list-inbox, select-dispatchable, dispatch, dead-letter-move]
    scriptFile: "./tools/scripts/publish-rolling-status.ps1"
    arguments:
      - "-BootstrapJson"
      - "{{bootstrap-config.output}}"
      - "-ListInboxJson"
      - "{{list-inbox.output}}"
      - "-SelectionJson"
      - "{{select-dispatchable.output}}"
      - "-DispatchJson"
      - "{{dispatch.output}}"
      - "-DeadLetterJson"
      - "{{dead-letter-move.output}}"
    timeoutSeconds: 120

trigger:
  type: scheduler
  enabled: true
  intervalSeconds: 300
