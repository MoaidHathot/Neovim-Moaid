# yaml-language-server: $schema=https://raw.githubusercontent.com/MoaidHathot/orchestra/main/schemas/orchestration.schema.json
name: inbox-triage
description: |
  Cross-source inbox triage. Every 2h (gated by the ZTS profile) it
  scans recent mail (Inbox + Focused + @-mentions across all folders)
  and Teams (DMs + allowlisted channels), classifies each message into
  one of needs-action / wait-reply / fyi / noise / meeting-prep, diffs
  against the prior triage-state in Zakira, and surfaces a single
  ActionView entry with a stable id so each run updates the same card
  instead of stacking notifications.

  Only NEW or escalated items trigger the ActionView update (gate-prompt
  pattern). New needs-action items aged > staleHoursForTodo are pushed
  to the "Orchestra: Inbox" Microsoft To Do list. Per-item Mark-handled
  and Dismiss buttons on the ActionView entry call
  Shared/scripts/mark-ledger-item.ps1 against the triage-state ledger.

  Out of scope for v1: auto-reply, auto-archive, any mutation in mail
  or Teams itself. The orchestration is strictly read-only against
  Microsoft 365.

version: 1.1.0
tags: ["ZTS", "triage", "mail", "teams", "auto", "track", "inbox"]
defaultModel: claude-opus-4.8

metadata:
  owner: Moaid Hathot
  ownerAlias: moaid
  domain: productivity
  sla: best-effort
  schedule: "every 2h within ZTS profile window"
  documentation: |
    Reusable utilities used:
      - Shared/todo-upsert.yaml          (per-item Microsoft To Do tasks)
      - ActionView/actionview-submit.yaml(ActionView entry submission)
      - Shared/scripts/mark-ledger-item.ps1 (per-item ActionView buttons)
    Zakira categories written:
      - triage-state                     (per-message records, key = msg:<src>:<hash>)
      - triage-state:daily-summary       (daily roll-up, key = YYYY-MM-DD + 'latest')
      - triage-state:last-run            (cursor for self-extending lookback window)

inputs:
  lookbackHoursDefault:
    type: string
    description: |
      Minimum lookback window in hours. The effective lookback is
      max(lookbackHoursDefault, time-since-last-completed-run + 30min
      buffer), capped at 168h (1 week) to avoid runaway backfills on
      first-run / post-PTO bootstrapping.
    required: false
    default: "2"
  teamsChannelAllowlist:
    type: string
    description: |
      Comma-separated list of Teams channel names or channel ids to
      scan in addition to DMs. Empty by default - DMs only. Use channel
      display names like "ZTS Team / General" or canonical Graph channel
      ids; the LLM resolves either form.
    required: false
    default: ""
  mailFolderAllowlist:
    type: string
    description: |
      Comma-separated list of mail folder names to scan. The orchestration
      always also queries the Focused inbox and any folder where I am
      @-mentioned (regardless of this allowlist).
    required: false
    default: "Inbox"
  staleHoursForTodo:
    type: string
    description: |
      Only push a needs-action item to Microsoft To Do once it has been
      classified needs-action for at least this many hours. Prevents
      tasks for messages you might handle instantly.
    required: false
    default: "24"
  forceSurface:
    type: boolean
    description: |
      When true, post the ActionView entry even if nothing changed since
      the prior run.
    required: false
    default: "false"
  pushToTodo:
    type: boolean
    description: |
      When true, sync aging needs-action items to Microsoft To Do.
      Disable to suppress the To Do side-effect entirely.
      Default is false: Microsoft Graph To Do auth is currently disabled
      (todo-upsert was returning 401 Unauthorized). Re-enable by passing
      true once `az login` / Tasks.ReadWrite consent is restored.
    required: false
    default: "false"
  dryRun:
    type: boolean
    description: |
      When true, run discovery + classify + diff but skip all writes
      (Zakira, To Do, ActionView). Used for safe testing.
    required: false
    default: "false"

variables:
  # Identity is resolved dynamically per run via resolve-me (Shared/
  # scripts/resolve-user-identity.ps1: az account show + Graph /me,
  # cached in Zakira for 24h). No hardcoded UPN here.
  zakiraCategory: triage-state
  zakiraSummaryCategory: "triage-state:daily-summary"
  zakiraLastRunCategory: "triage-state:last-run"
  zakiraScanCursorCategory: "triage-state:scan-cursor"
  zakiraIdentityCategory: "user-identity:cache"
  todoListName: "Orchestra: Inbox"
  actionViewGroupId: "inbox-triage-{{orchestration.runId}}"
  # Stable id - re-publishing under the same id updates the existing
  # ActionView card rather than creating a duplicate.
  actionViewEntryId: "inbox-triage-latest"
  sharedScriptsDir: "{{orchestration.sourceDirectory}}/../Shared/scripts"

defaultRetryPolicy:
  maxRetries: 2
  backoffSeconds: 10
  backoffMultiplier: 2.0
  retryOnTimeout: true

defaultStepTimeoutSeconds: 600
timeoutSeconds: 10800

trigger:
  type: scheduler
  enabled: true
  intervalSeconds: 7200

steps:
  - name: resolve-me
    type: Script
    shell: pwsh
    scriptFile: "./../Shared/scripts/resolve-user-identity.ps1"
    arguments:
      - "{{env.XDG_CONFIG_HOME}}/orchestra/zakira.db"
      - "{{vars.zakiraIdentityCategory}}"
      - "default"
      - "24"
      - "false"
    timeoutSeconds: 60

  - name: compute-lookback-window
    type: Script
    shell: pwsh
    script: |
      # Self-extending lookback. Reads the triage-state:last-run cursor;
      # if missing, uses the default. If present, the effective window
      # covers everything since that timestamp plus a 30-minute buffer
      # (to absorb clock skew + the partial trailing minute we may have
      # already processed). Cap at 168h so a long PTO does not trigger
      # a multi-week backfill that overwhelms classify.
      $ErrorActionPreference = 'Stop'
      $PSNativeCommandArgumentPassing = 'Standard'

      $dbPath            = $args[0]
      $lastRunCategory   = $args[1]
      $defaultLookbackHrs= [int]$args[2]

      function Get-DataJsonFromCliOutput {
        param([string[]]$Lines)
        if ($null -eq $Lines -or $Lines.Count -eq 0) { return $null }
        $dataIdx = -1
        for ($i = 0; $i -lt $Lines.Count; $i++) {
          if ([string]$Lines[$i] -match '^\s*Data:\s*') { $dataIdx = $i; break }
        }
        if ($dataIdx -lt 0) { return $null }
        $endIdx = $Lines.Count
        for ($j = $dataIdx + 1; $j -lt $Lines.Count; $j++) {
          if ([string]$Lines[$j] -match '^\s*(Author|Reason|Tags|Custom|Created|Last Modified):\s*') {
            $endIdx = $j; break
          }
        }
        $span = ($Lines[$dataIdx..($endIdx - 1)] | ForEach-Object { [string]$_ }) -join "`n"
        return ($span -replace '^\s*Data:\s*', '').Trim()
      }

      $lastRunIso = $null
      $cursorOut = & dnx Zakira.Exchange --yes -- --db $dbPath get $lastRunCategory 'last-run' 2>&1
      if ($LASTEXITCODE -eq 0) {
        $dataJson = Get-DataJsonFromCliOutput -Lines $cursorOut
        if ($dataJson) {
          try {
            $cursor = ConvertFrom-Json -InputObject $dataJson -ErrorAction Stop
            $lastRunIso = [string]$cursor.completedAt
          } catch { }
        }
      }

      $now = (Get-Date).ToUniversalTime()
      $effectiveHrs = $defaultLookbackHrs
      $hoursSinceLast = $null

      if (-not [string]::IsNullOrWhiteSpace($lastRunIso)) {
        try {
          $lastRunUtc = [datetimeoffset]::Parse($lastRunIso, [System.Globalization.CultureInfo]::InvariantCulture).UtcDateTime
          $delta = $now - $lastRunUtc
          $hoursSinceLast = [math]::Round($delta.TotalHours, 2)
          $candidate = [math]::Ceiling($delta.TotalHours + 0.5)
          if ($candidate -gt $effectiveHrs) { $effectiveHrs = [int]$candidate }
        } catch { }
      }

      if ($effectiveHrs -gt 168) { $effectiveHrs = 168 }
      if ($effectiveHrs -lt 1)   { $effectiveHrs = 1 }

      $windowStart = $now.AddHours(-$effectiveHrs)

      [pscustomobject]@{
        nowUtc                   = $now.ToString('o')
        lastRunAt                = $lastRunIso
        hoursSinceLastRun        = $hoursSinceLast
        defaultLookbackHours     = $defaultLookbackHrs
        effectiveLookbackHours   = $effectiveHrs
        windowStartUtc           = $windowStart.ToString('o')
      } | ConvertTo-Json -Compress
    arguments:
      - "{{env.XDG_CONFIG_HOME}}/orchestra/zakira.db"
      - "{{vars.zakiraLastRunCategory}}"
      - "{{param.lookbackHoursDefault}}"
    timeoutSeconds: 60

  - name: read-scan-cursor
    type: Script
    dependsOn: [compute-lookback-window]
    shell: pwsh
    script: |
      # Reads the per-channel / per-folder scan high-water marks from the
      # triage-state:scan-cursor category. Each record's key is the
      # source-scoped channel id (Teams chatId or "folder:<name>" for mail)
      # and its data carries { newestProcessedUtc, lastMessageId }. Discovery
      # uses these marks to pull only messages newer than what a prior run
      # already ingested, so partial runs still make forward progress and a
      # stuck 168h window drains incrementally instead of re-scanning the
      # whole week every run.
      #
      # This step NEVER fails the run: a missing category, empty ledger, or
      # a Zakira hiccup just yields an empty cursor map (full-window scan).
      $ErrorActionPreference = 'Stop'
      $PSNativeCommandArgumentPassing = 'Standard'

      $dbPath        = $args[0]
      $cursorCategory= $args[1]
      $floorUtc      = $args[2]   # windowStartUtc from compute-lookback-window

      function Get-DataJsonFromCliOutput {
        param([string[]]$Lines)
        if ($null -eq $Lines -or $Lines.Count -eq 0) { return $null }
        $dataIdx = -1
        for ($i = 0; $i -lt $Lines.Count; $i++) {
          if ([string]$Lines[$i] -match '^\s*Data:\s*') { $dataIdx = $i; break }
        }
        if ($dataIdx -lt 0) { return $null }
        $endIdx = $Lines.Count
        for ($j = $dataIdx + 1; $j -lt $Lines.Count; $j++) {
          if ([string]$Lines[$j] -match '^\s*(Author|Reason|Tags|Custom|Created|Last Modified):\s*') {
            $endIdx = $j; break
          }
        }
        $span = ($Lines[$dataIdx..($endIdx - 1)] | ForEach-Object { [string]$_ }) -join "`n"
        return ($span -replace '^\s*Data:\s*', '').Trim()
      }

      $cursors = @{}

      try {
        # 1) Enumerate keys via `list`. The list view truncates the data
        #    preview, so we only harvest keys here and `get` each for full
        #    data. Key column format: "  [<category>] <key>  (by <author>, <date>)".
        $listOut = & dnx Zakira.Exchange --yes -- --db $dbPath list --cat $cursorCategory -n 500 2>&1
        $keys = New-Object System.Collections.Generic.List[string]
        if ($LASTEXITCODE -eq 0 -and $listOut) {
          $escapedCat = [regex]::Escape($cursorCategory)
          foreach ($line in $listOut) {
            $s = [string]$line
            $m = [regex]::Match($s, "^\s*\[$escapedCat\]\s+(?<key>.+?)\s+\(by\s")
            if ($m.Success) {
              $k = $m.Groups['key'].Value.Trim()
              if (-not [string]::IsNullOrWhiteSpace($k)) { [void]$keys.Add($k) }
            }
          }
        }

        # 2) Fetch full data per key.
        foreach ($key in $keys) {
          $getOut = & dnx Zakira.Exchange --yes -- --db $dbPath get $cursorCategory $key 2>&1
          if ($LASTEXITCODE -ne 0) { continue }
          $dataJson = Get-DataJsonFromCliOutput -Lines $getOut
          if ([string]::IsNullOrWhiteSpace($dataJson)) { continue }
          try {
            $data = ConvertFrom-Json -InputObject $dataJson -Depth 20 -DateKind String -ErrorAction Stop
          } catch { continue }
          $newest = if ($data.PSObject.Properties['newestProcessedUtc']) { [string]$data.newestProcessedUtc } else { $null }
          $lastId = if ($data.PSObject.Properties['lastMessageId']) { [string]$data.lastMessageId } else { $null }
          if ([string]::IsNullOrWhiteSpace($newest)) { continue }
          $cursors[$key] = [pscustomobject]@{
            newestProcessedUtc = $newest
            lastMessageId      = $lastId
          }
        }
      } catch { }

      # Emit a compact, easy-to-index map keyed by channel/folder id. The
      # effective floor for any channel is max(windowStart, its cursor).
      $entries = New-Object System.Collections.Generic.List[object]
      foreach ($k in $cursors.Keys) {
        $entries.Add([pscustomobject]@{
          channelId          = $k
          newestProcessedUtc = $cursors[$k].newestProcessedUtc
          lastMessageId      = $cursors[$k].lastMessageId
        }) | Out-Null
      }

      [pscustomobject]@{
        readAt       = (Get-Date).ToUniversalTime().ToString('o')
        windowFloorUtc = $floorUtc
        cursorCount  = $entries.Count
        cursors      = $entries.ToArray()
      } | ConvertTo-Json -Depth 20 -Compress
    arguments:
      - "{{env.XDG_CONFIG_HOME}}/orchestra/zakira.db"
      - "{{vars.zakiraScanCursorCategory}}"
      - "{{compute-lookback-window.output}}"
    timeoutSeconds: 120

  - name: discover-mail
    type: Prompt
    dependsOn: [compute-lookback-window, resolve-me, read-scan-cursor]
    systemPrompt: |
      You are a mail discovery agent using ONLY the `mail` MCP. Your job is
      to FETCH raw message pages and SAVE them verbatim for a downstream
      deterministic reducer. You do NOT dedupe, assemble, interpret, or act
      on messages.

      === ABSOLUTE TOOL RULES (violating these causes the step to time out) ===
        - Use ONLY the `mail` MCP tools plus `orchestra_save_file` to persist
          each raw page. NOTHING ELSE.
        - Do NOT use the `sql` tool, a database, or CREATE/INSERT/SELECT.
        - Do NOT use `powershell`, `bash`, or any shell.
        - Do NOT `view`, `grep`, or otherwise open/parse tool-output temp
          files. Do NOT try to merge, dedupe, window-filter, or hand-copy
          message fields. A separate Script step does ALL of that
          deterministically from the files you save.
        - Your job is: call the MCP -> save the raw JSON page -> repeat ->
          emit a tiny manifest. That is the entire task.

      === WHAT TO FETCH ===
      For each mail folder in the allowlist (default 'Inbox'), query messages
      received in the lookback window, newest first is not required. Use a
      minimal `$select` and a SMALL `$top` so no single response is rejected
      for exceeding the ~51,200-byte MCP cap.

      Recommended first call (SearchMessagesQueryParameters, preferTextBody=true):
        ?$filter=parentFolderId eq 'inbox' and receivedDateTime ge <effectiveFloorUtc>
        &$select=id,subject,from,receivedDateTime,conversationId,webLink,importance,isRead,hasAttachments,bodyPreview,toRecipients,parentFolderId
        &$top=10
      Do NOT combine `$orderby` with `$filter`.

      === INCREMENTAL FLOOR (use the scan cursor) ===
        - The user prompt includes a scan-cursor payload with per-folder
          `newestProcessedUtc` marks from prior runs.
        - For each folder, the effective floor is the LATER of
          windowStartUtc and that folder's `newestProcessedUtc`. Filter
          `receivedDateTime ge <effective floor>` so you do not re-fetch
          messages a prior run already ingested.
        - If a folder has no cursor, use windowStartUtc.

      === SAVING PAGES ===
        - After EACH successful page call, immediately persist the raw,
          unmodified page JSON via `orchestra_save_file` with extension
          "json". Do not edit it, do not pretty-print it, do not strip
          fields. One save call per page.
        - Page via the returned `@odata.nextLink`, but at MOST 5 pages per
          folder. Stop a folder early as soon as a page's messages are all
          older than the effective floor.

      === BUDGET / GRACEFUL DEGRADATION (REQUIRED) ===
        - Hard budget: aim for <= ~12 MCP calls total and <= ~15 turns.
        - If a tool errors, try at most ONE alternative `mail` tool, then
          move on. Do NOT retry a failing call repeatedly or invent
          workarounds.
        - If you approach the budget, STOP fetching and emit the manifest
          with whatever you saved so far. A fast partial result is REQUIRED;
          never keep going until the step is force-timed-out.
        - MCP UNAVAILABLE = SUCCEED EMPTY, DO NOT FAIL. If the `mail` MCP is
          not connected / exposes no tools / every call errors, do NOT call
          orchestra_set_status and do NOT fail the step. Instead emit the
          manifest with pagesSaved=0 and a note explaining mail was
          unavailable, then finish successfully. Mail being down must not
          sink the whole triage run - the pipeline tolerates an empty
          source. Return within a couple of turns; never wait/hang.

      === OUTPUT (manifest ONLY - not the messages) ===
      Emit a single JSON object. The saved page files carry the actual
      messages; this manifest is just bookkeeping:
        {
          "source":            "mail",
          "windowStartUtc":    "...",
          "windowEndUtc":      "...",
          "foldersScanned":    ["Inbox", ...],
          "pagesSaved":        <int>,           // == number of orchestra_save_file calls
          "usedCursor":        <true|false>,
          "notes":             [ "any caveats, throttling, early-stop, errors" ]
        }
      Do NOT put the messages themselves in this object.

      Sources to query, each scoped to the lookback window:
        1. The mail folder allowlist (default 'Inbox'); query unread and
           read messages received in the window. Caller may pass a
           comma-separated list.
        2. The Focused inbox (Outlook's Focused/Other split). Query the
           Focused side specifically when the MCP exposes that toggle;
           otherwise rely on the Inbox query and let downstream classify
           decide.
        3. Do NOT try to filter on `mentionsPreview` / `mentions`
           server-side — those properties are not queryable and the call
           WILL error. @-mention detection happens downstream from the
           saved page fields; do not add a mentions sub-query here.

      The saved pages should preserve whatever fields Graph returns for
      each message (id, subject, from, receivedDateTime, conversationId,
      webLink, importance, isRead, hasAttachments, bodyPreview,
      toRecipients, parentFolderId). Do NOT trim them; the reducer projects
      the fields it needs.
    userPrompt: |
      Lookback window context (from compute-lookback-window):
      {{compute-lookback-window.output}}

      My identity (used downstream for @-mention / TO detection):
      {{resolve-me.output}}

      Per-folder scan cursor (only fetch messages newer than each folder's
      newestProcessedUtc; fall back to windowStartUtc when a folder has no
      cursor):
      {{read-scan-cursor.output}}

      Mail folder allowlist: "{{param.mailFolderAllowlist}}"

      Fetch recent message pages via the `mail` MCP and save each raw page
      with orchestra_save_file per your system prompt. Return ONLY the
      bookkeeping manifest object (not the messages).
    outputHandlerPrompt: |
      Extract one valid JSON object only - the bookkeeping manifest with
      fields source, windowStartUtc, windowEndUtc, foldersScanned,
      pagesSaved, usedCursor, notes. Strip markdown fences, prose, and
      trailing whitespace. Output only the JSON object.
    mcps: [mail]
    timeoutSeconds: 2400
    retry:
      # Discovery is a long agentic MCP step. Retrying a TIMEOUT just
      # repeats the full ~600s budget (this run burned 4x600s + backoffs =
      # ~41m before failing), and a timeout almost always means the MCP is
      # slow/broken - a retry won't fix that. Only retry genuine transient
      # (non-timeout) errors, once.
      maxRetries: 1
      backoffSeconds: 15
      backoffMultiplier: 2.0
      retryOnTimeout: false

  - name: reduce-mail
    type: Script
    dependsOn: [discover-mail, compute-lookback-window]
    shell: pwsh
    script: |
      # Deterministic mail reducer. Reads the raw Graph message pages that
      # discover-mail saved (paths arrive as a JSON array), then dedups by
      # message id, filters to the lookback window, projects the fields the
      # triage pipeline needs, and emits the same envelope shape the old
      # LLM-driven discover-mail used to produce. All the work the model was
      # doing turn-by-turn (SQLite inserts, window deletes, json_group_array,
      # file juggling) happens here in one pass, in milliseconds.
      $ErrorActionPreference = 'Stop'

      $filesJson   = $args[0]   # JSON array of saved page file paths ({{discover-mail.files}})
      $windowJson  = $args[1]   # compute-lookback-window output
      $myIdJson    = $args[2]   # resolve-me output (for inToRecipients/isMention)

      $window = ConvertFrom-Json -InputObject $windowJson -Depth 20 -DateKind String -ErrorAction Stop
      $windowStart = [datetimeoffset]::Parse([string]$window.windowStartUtc, [System.Globalization.CultureInfo]::InvariantCulture)
      $windowEnd   = [datetimeoffset]::Parse([string]$window.nowUtc,          [System.Globalization.CultureInfo]::InvariantCulture)

      $myUpn = ''
      $myName = ''
      try {
        $me = ConvertFrom-Json -InputObject $myIdJson -Depth 20 -DateKind String -ErrorAction Stop
        $myUpn  = ([string]$me.uniqueName).ToLowerInvariant()
        $myName = ([string]$me.displayName).ToLowerInvariant()
      } catch { }

      $paths = @()
      try {
        if (-not [string]::IsNullOrWhiteSpace($filesJson)) {
          $paths = @(ConvertFrom-Json -InputObject $filesJson -Depth 10 -DateKind String -ErrorAction Stop)
        }
      } catch { $paths = @() }

      $seen   = New-Object System.Collections.Generic.HashSet[string]
      $out    = New-Object System.Collections.Generic.List[object]
      $notes  = New-Object System.Collections.Generic.List[string]
      $rawSeen = 0

      function Get-Prop { param($Obj, [string]$Name)
        if ($null -eq $Obj) { return $null }
        $p = $Obj.PSObject.Properties[$Name]
        if ($null -eq $p) { return $null }
        return $p.Value
      }

      foreach ($path in $paths) {
        if ([string]::IsNullOrWhiteSpace([string]$path) -or -not (Test-Path -LiteralPath $path)) {
          [void]$notes.Add("missing page file: $path"); continue
        }
        $raw = Get-Content -LiteralPath $path -Raw
        if ([string]::IsNullOrWhiteSpace($raw)) { continue }
        # The saved page may be the tool's spill wrapper or a raw Graph body.
        # Extract the first JSON object/array present.
        $start = -1
        for ($i = 0; $i -lt $raw.Length; $i++) { $c = $raw[$i]; if ($c -eq '{' -or $c -eq '[') { $start = $i; break } }
        if ($start -lt 0) { continue }
        try { $page = ConvertFrom-Json -InputObject $raw.Substring($start) -Depth 40 -DateKind String -ErrorAction Stop }
        catch { [void]$notes.Add("unparseable page file: $([System.IO.Path]::GetFileName($path))"); continue }

        # The `mail` MCP wraps the Graph body in a { "rawResponse": "<json string>" }
        # envelope. Unwrap it (possibly more than once) so we reach value[].
        $depthGuard = 0
        while ($null -ne (Get-Prop $page 'rawResponse') -and $depthGuard -lt 4) {
          $inner = [string](Get-Prop $page 'rawResponse')
          if ([string]::IsNullOrWhiteSpace($inner)) { break }
          try { $page = ConvertFrom-Json -InputObject $inner -Depth 40 -DateKind String -ErrorAction Stop }
          catch { break }
          $depthGuard++
        }

        $items = $null
        if ($page -is [System.Array]) { $items = $page }
        elseif (Get-Prop $page 'value')    { $items = @((Get-Prop $page 'value')) }
        elseif (Get-Prop $page 'messages') { $items = @((Get-Prop $page 'messages')) }
        else { $items = @($page) }

        foreach ($m in $items) {
          if ($null -eq $m) { continue }
          $rawSeen++
          $id = [string](Get-Prop $m 'id')
          if ([string]::IsNullOrWhiteSpace($id)) { continue }
          if (-not $seen.Add($id)) { continue }

          $recvRaw = [string](Get-Prop $m 'receivedDateTime')
          $recv = $null
          if (-not [string]::IsNullOrWhiteSpace($recvRaw)) {
            try { $recv = [datetimeoffset]::Parse($recvRaw, [System.Globalization.CultureInfo]::InvariantCulture) } catch { }
          }
          if ($null -ne $recv -and ($recv -lt $windowStart -or $recv -gt $windowEnd)) { continue }

          $webLink = [string](Get-Prop $m 'webLink')
          if ([string]::IsNullOrWhiteSpace($webLink)) { continue }  # webLink is REQUIRED

          $from = Get-Prop $m 'from'
          $emailAddr = if ($from) { Get-Prop $from 'emailAddress' } else { $null }
          $senderName = if ($emailAddr) { [string](Get-Prop $emailAddr 'name') } else { '' }
          $senderAddr = if ($emailAddr) { [string](Get-Prop $emailAddr 'address') } else { '' }

          # inToRecipients: am I in the TO line?
          $inTo = $false
          $toRecips = Get-Prop $m 'toRecipients'
          if ($toRecips) {
            foreach ($r in @($toRecips)) {
              $ra = Get-Prop $r 'emailAddress'
              if ($ra) {
                $addr = ([string](Get-Prop $ra 'address')).ToLowerInvariant()
                $nm   = ([string](Get-Prop $ra 'name')).ToLowerInvariant()
                if (($myUpn -and $addr -eq $myUpn) -or ($myName -and $nm -eq $myName)) { $inTo = $true; break }
              }
            }
          }

          $bodyPreview = [string](Get-Prop $m 'bodyPreview')
          if ($bodyPreview.Length -gt 400) { $bodyPreview = $bodyPreview.Substring(0, 400) }

          $folderName = [string](Get-Prop $m 'parentFolderId')

          $out.Add([pscustomobject]@{
            id              = $id
            subject         = [string](Get-Prop $m 'subject')
            sender          = [pscustomobject]@{ name = $senderName; address = $senderAddr }
            receivedDateTime= $recvRaw
            conversationId  = [string](Get-Prop $m 'conversationId')
            webLink         = $webLink
            importance      = [string](Get-Prop $m 'importance')
            isRead          = [bool]((Get-Prop $m 'isRead') -eq $true)
            hasAttachments  = [bool]((Get-Prop $m 'hasAttachments') -eq $true)
            isMention       = $false
            inToRecipients  = $inTo
            folderName      = $folderName
            bodyPreview     = $bodyPreview
          }) | Out-Null
        }
      }

      # Cap at 200, preferring in-TO then most recent.
      $ordered = $out | Sort-Object -Property `
        @{ Expression = { if ($_.inToRecipients) { 0 } else { 1 } } }, `
        @{ Expression = { $_.receivedDateTime }; Descending = $true }
      $capped = @($ordered | Select-Object -First 200)
      if ($out.Count -gt 200) { [void]$notes.Add("capped at 200 (had $($out.Count))") }

      [pscustomobject]@{
        windowStartUtc   = [string]$window.windowStartUtc
        windowEndUtc     = [string]$window.nowUtc
        sourceQueriesRan = @('inbox-folder')
        messages         = $capped
        messageCount     = $capped.Count
        rawSeen          = $rawSeen
        pageFiles        = $paths.Count
        notes            = $notes.ToArray()
      } | ConvertTo-Json -Depth 40 -Compress
    arguments:
      - "{{discover-mail.files}}"
      - "{{compute-lookback-window.output}}"
      - "{{resolve-me.output}}"
    timeoutSeconds: 120

  - name: discover-teams
    type: Prompt
    dependsOn: [compute-lookback-window, resolve-me, read-scan-cursor]
    systemPrompt: |
      You are a Teams discovery agent using ONLY the `teams` MCP. Your job
      is to FETCH raw chat-message pages and SAVE them verbatim for a
      downstream deterministic reducer. You do NOT dedupe, assemble,
      interpret, or act on messages.

      === ABSOLUTE TOOL RULES (violating these causes the step to time out) ===
        - Use ONLY the `teams` MCP tools plus `orchestra_save_file` to
          persist each raw page. NOTHING ELSE.
        - Do NOT use the `sql` tool, a database, or CREATE/INSERT/SELECT.
        - Do NOT use `powershell`, `bash`, or any shell.
        - Do NOT `view`, `grep`, or open/parse tool-output temp files. Do
          NOT merge, dedupe, window-filter, or hand-copy message fields. A
          separate Script step does ALL of that deterministically from the
          files you save.
        - Your job is: list chats -> for each in-scope chat, list its recent
          messages -> save that raw page -> repeat -> emit a tiny manifest.

      === WHAT TO FETCH (bounded) ===
        1. Call `teams_ListChats` ONCE to get the chat list.
        2. Consider only 1:1 and group DM chats. SKIP meeting chats: any
           chat whose id contains `meeting_` (they are meeting-bound noise
           and rarely triage-worthy). If `teamsChannelAllowlist` is empty,
           do DMs only — never crawl channels you are a member of.
        3. Rank the remaining chats by most-recent activity and take AT MOST
           the 15 most-recently-active. For each, call
           `teams_ListChatMessages` with a SMALL `top` (<= 8).
        4. Stop scanning a chat as soon as its returned messages are all
           older than that chat's effective floor (see cursor below). Do NOT
           page a chat deeply — one page per chat is the norm.

      === INCREMENTAL FLOOR (use the scan cursor) ===
        - The user prompt includes a scan-cursor payload with per-chat
          `newestProcessedUtc` marks from prior runs (keyed by chat id).
        - For each chat, the effective floor is the LATER of windowStartUtc
          and that chat's `newestProcessedUtc`. Skip a chat entirely when
          its last activity is at/older than that floor.

      === SAVING PAGES ===
        - After EACH successful `teams_ListChatMessages` call that returns
          messages, immediately persist the page via `orchestra_save_file`
          (extension "json"). CRITICAL: wrap the raw page in a small
          envelope that records which chat it came from, because the raw
          messages do NOT carry the chat id or a webLink. Save exactly this
          shape (the `page` value is the tool's raw JSON response, unmodified):
            { "chatId": "19:...@thread.v2", "chatName": "<display name>", "page": <raw tool response> }
          One save call per page. Do not edit the messages inside `page`.
        - The reducer builds each message's Teams deep-link from chatId +
          message id, so getting chatId right in the envelope is essential.

      === BUDGET / GRACEFUL DEGRADATION (REQUIRED) ===
        - Hard budget: aim for <= ~18 MCP calls total and <= ~22 turns.
        - If a tool errors, try at most ONE alternative `teams` tool, then
          move on. Do NOT fight the `ListChats` proxy bug or retry a failing
          call repeatedly.
        - If you approach the budget, STOP fetching and emit the manifest
          with whatever you saved so far. A fast partial result is REQUIRED;
          never keep going until the step is force-timed-out.
        - MCP UNAVAILABLE = SUCCEED EMPTY, DO NOT FAIL. If the `teams` MCP is
          not connected / exposes no tools / every call errors, do NOT call
          orchestra_set_status and do NOT fail the step. Instead emit the
          manifest with pagesSaved=0, chatsScanned=[], and a note explaining
          teams was unavailable, then finish successfully. Teams being down
          must not sink the whole triage run - the pipeline tolerates an
          empty source. Return within a couple of turns; never wait/hang.

      === OUTPUT (manifest ONLY - not the messages) ===
      Emit a single JSON object. The saved page files carry the actual
      messages; this manifest is bookkeeping plus the chat map the reducer
      needs:
        {
          "source":            "teams",
          "windowStartUtc":    "...",
          "windowEndUtc":      "...",
          "chatsScanned": [
            { "chatId": "19:...", "chatName": "...", "pageSaved": true }
          ],
          "pagesSaved":        <int>,        // == number of orchestra_save_file calls
          "meetingChatsSkipped": <int>,
          "usedCursor":        <true|false>,
          "notes":             [ "caveats, early-stop, errors" ]
        }
      Do NOT put the messages themselves in this object.
    userPrompt: |
      Lookback window context (from compute-lookback-window):
      {{compute-lookback-window.output}}

      My identity (used downstream for @-mention detection):
      {{resolve-me.output}}

      Per-chat scan cursor (skip chats whose newestProcessedUtc is at/after
      their last activity; otherwise only fetch messages newer than it,
      falling back to windowStartUtc):
      {{read-scan-cursor.output}}

      Teams channel allowlist (comma-separated names/ids; empty = DMs
      only): "{{param.teamsChannelAllowlist}}"

      Fetch recent chat-message pages via the `teams` MCP and save each raw
      page with orchestra_save_file per your system prompt. Return ONLY the
      bookkeeping manifest object (not the messages).
    outputHandlerPrompt: |
      Extract one valid JSON object only - the bookkeeping manifest with
      fields source, windowStartUtc, windowEndUtc, chatsScanned, pagesSaved,
      meetingChatsSkipped, usedCursor, notes. Strip markdown fences, prose,
      and trailing whitespace. Output only the JSON object.
    mcps: [teams]
    timeoutSeconds: 2400
    retry:
      # See discover-mail: do not retry on timeout (it just repeats the
      # full ~600s budget when the teams MCP is slow/broken). Retry only
      # genuine transient non-timeout errors, once.
      maxRetries: 1
      backoffSeconds: 15
      backoffMultiplier: 2.0
      retryOnTimeout: false

  - name: reduce-teams
    type: Script
    dependsOn: [discover-teams, compute-lookback-window]
    shell: pwsh
    script: |
      # Deterministic Teams reducer. Reads the per-chat page envelopes that
      # discover-teams saved (each is { chatId, chatName, page:<raw tool
      # response> }), extracts messages, dedups by id, filters to the
      # lookback window, synthesizes the canonical Teams deep-link from
      # chatId + message id, and emits the envelope shape the triage
      # pipeline consumes. Replaces the LLM's SQLite + PowerShell + file
      # juggling with one deterministic pass.
      $ErrorActionPreference = 'Stop'

      $filesJson  = $args[0]   # JSON array of saved envelope file paths ({{discover-teams.files}})
      $windowJson = $args[1]   # compute-lookback-window output

      $window = ConvertFrom-Json -InputObject $windowJson -Depth 20 -DateKind String -ErrorAction Stop
      $windowStart = [datetimeoffset]::Parse([string]$window.windowStartUtc, [System.Globalization.CultureInfo]::InvariantCulture)
      $windowEnd   = [datetimeoffset]::Parse([string]$window.nowUtc,          [System.Globalization.CultureInfo]::InvariantCulture)

      function Get-Prop { param($Obj, [string]$Name)
        if ($null -eq $Obj) { return $null }
        $p = $Obj.PSObject.Properties[$Name]
        if ($null -eq $p) { return $null }
        return $p.Value
      }

      $paths = @()
      try {
        if (-not [string]::IsNullOrWhiteSpace($filesJson)) {
          $paths = @(ConvertFrom-Json -InputObject $filesJson -Depth 10 -DateKind String -ErrorAction Stop)
        }
      } catch { $paths = @() }

      $seen  = New-Object System.Collections.Generic.HashSet[string]
      $out   = New-Object System.Collections.Generic.List[object]
      $notes = New-Object System.Collections.Generic.List[string]
      $rawSeen = 0

      foreach ($path in $paths) {
        if ([string]::IsNullOrWhiteSpace([string]$path) -or -not (Test-Path -LiteralPath $path)) {
          [void]$notes.Add("missing page file: $path"); continue
        }
        $raw = Get-Content -LiteralPath $path -Raw
        if ([string]::IsNullOrWhiteSpace($raw)) { continue }
        $start = -1
        for ($i = 0; $i -lt $raw.Length; $i++) { $c = $raw[$i]; if ($c -eq '{' -or $c -eq '[') { $start = $i; break } }
        if ($start -lt 0) { continue }
        try { $env = ConvertFrom-Json -InputObject $raw.Substring($start) -Depth 40 -DateKind String -ErrorAction Stop }
        catch { [void]$notes.Add("unparseable file: $([System.IO.Path]::GetFileName($path))"); continue }

        # Envelope is { chatId, chatName, page }. Tolerate a bare page too.
        $chatId   = [string](Get-Prop $env 'chatId')
        $chatName = [string](Get-Prop $env 'chatName')
        $page     = Get-Prop $env 'page'
        if ($null -eq $page) { $page = $env }  # bare page fallback (chatId may be empty)

        # The `teams` MCP may wrap the Graph body in { "rawResponse": "<json string>" }.
        # Unwrap it so we reach messages[].
        $depthGuard = 0
        while ($null -ne (Get-Prop $page 'rawResponse') -and $depthGuard -lt 4) {
          $inner = [string](Get-Prop $page 'rawResponse')
          if ([string]::IsNullOrWhiteSpace($inner)) { break }
          try { $page = ConvertFrom-Json -InputObject $inner -Depth 40 -DateKind String -ErrorAction Stop }
          catch { break }
          $depthGuard++
        }

        $items = $null
        if ($page -is [System.Array]) { $items = $page }
        elseif (Get-Prop $page 'messages') { $items = @((Get-Prop $page 'messages')) }
        elseif (Get-Prop $page 'value')    { $items = @((Get-Prop $page 'value')) }
        else { $items = @($page) }

        foreach ($m in $items) {
          if ($null -eq $m) { continue }
          $rawSeen++
          $id = [string](Get-Prop $m 'id')
          if ([string]::IsNullOrWhiteSpace($id)) { continue }

          $createdRaw = [string](Get-Prop $m 'createdDateTime')
          $created = $null
          if (-not [string]::IsNullOrWhiteSpace($createdRaw)) {
            try { $created = [datetimeoffset]::Parse($createdRaw, [System.Globalization.CultureInfo]::InvariantCulture) } catch { }
          }
          if ($null -ne $created -and ($created -lt $windowStart -or $created -gt $windowEnd)) { continue }

          # Skip control/system messages (joins, renames) that have empty bodies.
          $mtype = [string](Get-Prop $m 'messageType')
          if ($mtype -and $mtype -ne 'message') { continue }

          # Dedup across pages by message id.
          if (-not $seen.Add($id)) { continue }

          $from = Get-Prop $m 'from'
          $authorName = ''
          if ($from) {
            $user = Get-Prop $from 'user'
            if ($user) { $authorName = [string](Get-Prop $user 'displayName') }
            if ([string]::IsNullOrWhiteSpace($authorName)) { $authorName = [string](Get-Prop $from 'displayName') }
          }

          $body = Get-Prop $m 'body'
          $bodyContent = if ($body) { [string](Get-Prop $body 'content') } else { '' }
          # Strip HTML tags for a clean preview.
          $bodyText = [regex]::Replace($bodyContent, '<[^>]+>', ' ')
          $bodyText = [System.Net.WebUtility]::HtmlDecode($bodyText)
          $bodyText = ([regex]::Replace($bodyText, '\s+', ' ')).Trim()
          if ($bodyText.Length -gt 400) { $bodyText = $bodyText.Substring(0, 400) }

          # Synthesize the canonical Teams deep-link (webLink is REQUIRED).
          $webLink = ''
          if (-not [string]::IsNullOrWhiteSpace($chatId)) {
            $ctx = [uri]::EscapeDataString('{"contextType":"chat"}')
            $webLink = "https://teams.microsoft.com/l/message/${chatId}/${id}?context=${ctx}"
          } else {
            $wl = [string](Get-Prop $m 'webUrl'); if ($wl) { $webLink = $wl }
          }
          if ([string]::IsNullOrWhiteSpace($webLink)) { continue }  # drop items without a link

          $attachments = Get-Prop $m 'attachments'
          $hasAtt = ($null -ne $attachments -and @($attachments).Count -gt 0)

          $out.Add([pscustomobject]@{
            id                = $id
            source            = 'dm'
            chatOrChannelId   = $chatId
            chatOrChannelName = $chatName
            author            = [pscustomobject]@{ name = $authorName; address = $null }
            createdDateTime   = $createdRaw
            threadRootId      = $null
            webLink           = $webLink
            isMention         = $false
            bodyPreview       = $bodyText
            importance        = [string](Get-Prop $m 'importance')
            hasAttachments    = $hasAtt
          }) | Out-Null
        }
      }

      $ordered = $out | Sort-Object -Property @{ Expression = { $_.createdDateTime }; Descending = $true }
      $capped = @($ordered | Select-Object -First 150)
      if ($out.Count -gt 150) { [void]$notes.Add("capped at 150 (had $($out.Count))") }

      [pscustomobject]@{
        windowStartUtc   = [string]$window.windowStartUtc
        windowEndUtc     = [string]$window.nowUtc
        sourceQueriesRan = @('dms')
        messages         = $capped
        messageCount     = $capped.Count
        rawSeen          = $rawSeen
        pageFiles        = $paths.Count
        notes            = $notes.ToArray()
      } | ConvertTo-Json -Depth 40 -Compress
    arguments:
      - "{{discover-teams.files}}"
      - "{{compute-lookback-window.output}}"
    timeoutSeconds: 120

  - name: merge-and-dedupe
    type: Script
    dependsOn: [reduce-mail, reduce-teams]
    shell: pwsh
    script: |
      # Combine mail + teams discovery outputs into one normalized array.
      # Per-message zakiraKey = "msg:<source>:<sha1-first16-of-graph-id>"
      # so the key is bounded-length and shell-safe even when the Graph
      # id contains slashes / equals signs / pluses (which Graph ids
      # frequently do).
      $ErrorActionPreference = 'Stop'

      $mailJson  = $args[0]
      $teamsJson = $args[1]

      function Get-IdHash {
        param([string]$Source, [string]$Id)
        $bytes = [System.Text.Encoding]::UTF8.GetBytes("$Source|$Id")
        $sha = [System.Security.Cryptography.SHA1]::Create()
        try { $hashBytes = $sha.ComputeHash($bytes) } finally { $sha.Dispose() }
        $hex = ($hashBytes | ForEach-Object { $_.ToString('x2') }) -join ''
        return $hex.Substring(0, 16)
      }

      $merged = New-Object System.Collections.Generic.List[object]
      $seen   = New-Object System.Collections.Generic.HashSet[string]
      $errors = New-Object System.Collections.Generic.List[string]

      function Add-Messages {
        param(
          [string]$Json,
          [string]$Source
        )
        if ([string]::IsNullOrWhiteSpace($Json)) { return }
        try {
          $payload = ConvertFrom-Json -InputObject $Json -Depth 50 -ErrorAction Stop
        } catch {
          [void]$script:errors.Add("$($Source): failed to parse discovery JSON: $($_.Exception.Message)")
          return
        }
        if ($null -eq $payload.messages) { return }
        foreach ($msg in @($payload.messages)) {
          if ($null -eq $msg) { continue }
          $id = [string]$msg.id
          if ([string]::IsNullOrWhiteSpace($id)) { continue }
          $idHash = Get-IdHash -Source $Source -Id $id
          $zakiraKey = "msg:${Source}:${idHash}"
          if (-not $script:seen.Add($zakiraKey)) { continue }

          $enriched = [ordered]@{}
          foreach ($p in $msg.PSObject.Properties) { $enriched[$p.Name] = $p.Value }
          $enriched['source']       = $Source
          $enriched['idHash']       = $idHash
          $enriched['zakiraKey']    = $zakiraKey
          [void]$script:merged.Add([pscustomobject]$enriched)
        }
      }

      Add-Messages -Json $mailJson  -Source 'mail'
      Add-Messages -Json $teamsJson -Source 'teams'

      [pscustomobject]@{
        mergedAt     = (Get-Date).ToUniversalTime().ToString('o')
        messageCount = $merged.Count
        messages     = $merged.ToArray()
        sourceErrors = $errors.ToArray()
      } | ConvertTo-Json -Depth 50 -Compress
    arguments:
      - "{{reduce-mail.output}}"
      - "{{reduce-teams.output}}"
    timeoutSeconds: 60

  - name: advance-scan-cursor
    type: Script
    dependsOn: [reduce-mail, reduce-teams]
    shell: pwsh
    script: |
      # Advances the per-channel / per-folder scan high-water marks based on
      # what the reducers ACTUALLY produced this run. Runs independently of
      # classify / diff / noteworthy / ActionView, so scan progress is
      # persisted even when the run surfaces nothing or a later step fails -
      # this is what breaks the stuck-168h-window cycle: each run that
      # gathers anything permanently advances the frontier for those
      # channels, so subsequent runs only pull what is genuinely new.
      #
      # Skipped on dryRun (a dry run must not mutate the real cursor and
      # cause the next real run to skip messages it never actually saw).
      $ErrorActionPreference = 'Stop'
      $PSNativeCommandArgumentPassing = 'Standard'

      $mailJson       = $args[0]
      $teamsJson      = $args[1]
      $dbPath         = $args[2]
      $cursorCategory = $args[3]
      $dryRun         = $args[4]
      $runId          = $args[5]

      $dryRunBool = [string]::Equals($dryRun.Trim(), 'true', [System.StringComparison]::OrdinalIgnoreCase)
      if ($dryRunBool) {
        [pscustomobject]@{ status='dry-run-skipped'; advanced=0 } | ConvertTo-Json -Compress
        return
      }

      function Get-Prop { param($Obj, [string]$Name)
        if ($null -eq $Obj) { return $null }
        $p = $Obj.PSObject.Properties[$Name]
        if ($null -eq $p) { return $null }
        return $p.Value
      }

      # Fold messages into per-channel newest timestamps.
      # Teams key  = chatOrChannelId; Mail key = "folder:<folderName>".
      $marks = @{}   # key -> [pscustomobject]{ newestUtc=[datetimeoffset]; newestRaw; lastId }

      function Update-Mark {
        param([string]$Key, [string]$WhenRaw, [string]$Id)
        if ([string]::IsNullOrWhiteSpace($Key) -or [string]::IsNullOrWhiteSpace($WhenRaw)) { return }
        $when = $null
        try { $when = [datetimeoffset]::Parse($WhenRaw, [System.Globalization.CultureInfo]::InvariantCulture) } catch { return }
        if ($marks.ContainsKey($Key)) {
          if ($when -gt $marks[$Key].newestUtc) {
            $marks[$Key] = [pscustomobject]@{ newestUtc = $when; newestRaw = $WhenRaw; lastId = $Id }
          }
        } else {
          $marks[$Key] = [pscustomobject]@{ newestUtc = $when; newestRaw = $WhenRaw; lastId = $Id }
        }
      }

      try {
        $mail = ConvertFrom-Json -InputObject $mailJson -Depth 40 -DateKind String -ErrorAction Stop
        foreach ($m in @($mail.messages)) {
          if ($null -eq $m) { continue }
          $folder = [string](Get-Prop $m 'folderName')
          if ([string]::IsNullOrWhiteSpace($folder)) { $folder = 'inbox' }
          Update-Mark -Key ("folder:$folder") -WhenRaw ([string](Get-Prop $m 'receivedDateTime')) -Id ([string](Get-Prop $m 'id'))
        }
      } catch { }

      try {
        $teams = ConvertFrom-Json -InputObject $teamsJson -Depth 40 -DateKind String -ErrorAction Stop
        foreach ($m in @($teams.messages)) {
          if ($null -eq $m) { continue }
          $chatId = [string](Get-Prop $m 'chatOrChannelId')
          if ([string]::IsNullOrWhiteSpace($chatId)) { continue }
          Update-Mark -Key $chatId -WhenRaw ([string](Get-Prop $m 'createdDateTime')) -Id ([string](Get-Prop $m 'id'))
        }
      } catch { }

      $advanced = 0
      $errors = New-Object System.Collections.Generic.List[string]
      $nowIso = (Get-Date).ToUniversalTime().ToString('o')

      foreach ($key in $marks.Keys) {
        $mk = $marks[$key]
        $payload = [pscustomobject]@{
          channelKey         = $key
          newestProcessedUtc = $mk.newestRaw
          lastMessageId      = $mk.lastId
          updatedAt          = $nowIso
          runId              = $runId
        } | ConvertTo-Json -Compress

        # Only advance forward: read existing mark, skip if not newer.
        $shouldWrite = $true
        try {
          $existing = & dnx Zakira.Exchange --yes -- --db $dbPath get $cursorCategory $key 2>&1
          if ($LASTEXITCODE -eq 0 -and $existing) {
            $text = ($existing | ForEach-Object { [string]$_ }) -join "`n"
            if ($text -match '"newestProcessedUtc"\s*:\s*"([^"]+)"') {
              try {
                $prev = [datetimeoffset]::Parse($Matches[1], [System.Globalization.CultureInfo]::InvariantCulture)
                if ($prev -ge $mk.newestUtc) { $shouldWrite = $false }
              } catch { }
            }
          }
        } catch { }

        if (-not $shouldWrite) { continue }

        $out = & dnx Zakira.Exchange --yes -- --db $dbPath edit $cursorCategory $key `
          --data $payload --author "inbox-triage:$runId" --reason 'scan cursor advance' 2>&1
        if ($LASTEXITCODE -ne 0) {
          $out = & dnx Zakira.Exchange --yes -- --db $dbPath create $cursorCategory $key `
            --data $payload --author "inbox-triage:$runId" --reason 'scan cursor seed' 2>&1
        }
        if ($LASTEXITCODE -eq 0) { $advanced += 1 }
        else { [void]$errors.Add("cursor ${key}: $($out -join ' ')") }
      }

      [pscustomobject]@{
        status    = 'advanced'
        channels  = $marks.Count
        advanced  = $advanced
        errors    = $errors.ToArray()
      } | ConvertTo-Json -Depth 10 -Compress
    arguments:
      - "{{reduce-mail.output}}"
      - "{{reduce-teams.output}}"
      - "{{env.XDG_CONFIG_HOME}}/orchestra/zakira.db"
      - "{{vars.zakiraScanCursorCategory}}"
      - "{{param.dryRun}}"
      - "{{orchestration.runId}}"
    timeoutSeconds: 300

  - name: classify
    type: Prompt
    dependsOn: [merge-and-dedupe, resolve-me]
    systemPrompt: |
      You are a triage classifier. You receive a JSON array of recent
      mail + Teams messages. For EACH message you assign exactly one
      category from this fixed set:

      - needs-action  : The sender expects a response or an action from
                        me. Signals: direct question to me; @-mention
                        with an ask; I am in TO (not CC); explicit
                        request ("can you...", "please review",
                        "approve?", "any update?", "ping"); calendar
                        invite I have not responded to; approval gate;
                        review request.
      - wait-reply    : A thread I sent into that has now received a
                        reply requiring my follow-up. Use sparingly -
                        most "Re:" chains are needs-action; this bucket
                        is for cases where the only reasonable next step
                        is me sending a continued response.
      - meeting-prep  : Calendar invite, agenda doc, pre-read material,
                        or scheduling negotiation tied to an upcoming
                        meeting. Distinct from needs-action even when
                        an RSVP is implicit.
      - fyi           : Informational only. I am usually in CC or BCC,
                        or on a distribution list. No action expected.
      - noise         : Automated notifications (build/deploy alerts I
                        am not on-call for, monitoring digest, generic
                        newsletter, marketing, bounceback, calendar
                        ICS attachments without context).

      For EACH message also emit:
        - confidence  : float in [0.0, 1.0]
        - rationale   : ONE concise sentence justifying the category
        - tags        : optional array of short flags (e.g.
                        ["calendar-invite","approval","escalation","cc-only"]).

      Rules:
        1. Be conservative with needs-action - prefer fyi when in
           doubt and confidence would be < 0.6 for needs-action.
        2. Apply the same rules to mail and Teams uniformly. A Teams
           DM from a person is almost always needs-action unless it is
           clearly a status broadcast.
        3. Calendar invites without an explicit ask but with my
           attendance expected are meeting-prep, not needs-action.
        4. Do NOT call any tools. Do NOT use any MCPs.
        5. Output ONLY a JSON object with this shape:

           {
             "classifiedAt":  "<UTC iso>",
             "items": [
               {
                 "zakiraKey":  "msg:...",
                 "id":         "...",
                 "source":     "mail|teams",
                 "subject":    "...",
                 "category":   "needs-action|wait-reply|fyi|noise|meeting-prep",
                 "confidence": <float>,
                 "rationale":  "...",
                 "tags":       ["..."]
               }
             ],
             "counts": {
               "needs-action":  <int>,
               "wait-reply":    <int>,
               "fyi":           <int>,
               "noise":         <int>,
               "meeting-prep":  <int>
             }
           }

           One entry per supplied message - do not drop any.
    userPrompt: |
      Merged messages to classify:
      {{merge-and-dedupe.output}}

      My identity (use to distinguish "I'm in TO" from "I'm in CC"):
      {{resolve-me.output}}

      Classify every message and emit the JSON object specified in the
      system prompt. Output ONLY the JSON object.
    outputHandlerPrompt: |
      Output exactly one valid JSON object with the fields classifiedAt,
      items, and counts as specified. Strip markdown fences, prose, and
      trailing whitespace.

  - name: load-prior-state
    type: Script
    dependsOn: [merge-and-dedupe]
    shell: pwsh
    script: |
      # Loads existing triage-state records for the message ids in the
      # current window. We do not call `list` here because the ledger
      # can grow large (thousands of records); a per-key `get` against
      # only the current keys is cheaper.
      $ErrorActionPreference = 'Stop'
      $PSNativeCommandArgumentPassing = 'Standard'

      $mergedJson = $args[0]
      $dbPath     = $args[1]
      $category   = $args[2]

      $merged = ConvertFrom-Json -InputObject $mergedJson -Depth 50 -ErrorAction Stop

      function Get-DataJsonFromCliOutput {
        param([string[]]$Lines)
        if ($null -eq $Lines -or $Lines.Count -eq 0) { return $null }
        $dataIdx = -1
        for ($i = 0; $i -lt $Lines.Count; $i++) {
          if ([string]$Lines[$i] -match '^\s*Data:\s*') { $dataIdx = $i; break }
        }
        if ($dataIdx -lt 0) { return $null }
        $endIdx = $Lines.Count
        for ($j = $dataIdx + 1; $j -lt $Lines.Count; $j++) {
          if ([string]$Lines[$j] -match '^\s*(Author|Reason|Tags|Custom|Created|Last Modified):\s*') {
            $endIdx = $j; break
          }
        }
        $span = ($Lines[$dataIdx..($endIdx - 1)] | ForEach-Object { [string]$_ }) -join "`n"
        return ($span -replace '^\s*Data:\s*', '').Trim()
      }

      $prior = @{}
      foreach ($msg in @($merged.messages)) {
        if ($null -eq $msg) { continue }
        $key = [string]$msg.zakiraKey
        if ([string]::IsNullOrWhiteSpace($key)) { continue }
        $out = & dnx Zakira.Exchange --yes -- --db $dbPath get $category $key 2>&1
        if ($LASTEXITCODE -ne 0) { continue }
        $dataJson = Get-DataJsonFromCliOutput -Lines $out
        if (-not $dataJson) { continue }
        try {
          $data = ConvertFrom-Json -InputObject $dataJson -ErrorAction Stop
          $prior[$key] = $data
        } catch { }
      }

      # Emit a JSON object that's easy to consume from the next script.
      $entries = New-Object System.Collections.Generic.List[object]
      foreach ($k in $prior.Keys) {
        $entries.Add([pscustomobject]@{
          zakiraKey = $k
          data      = $prior[$k]
        }) | Out-Null
      }

      [pscustomobject]@{
        loadedAt = (Get-Date).ToUniversalTime().ToString('o')
        category = $category
        count    = $entries.Count
        records  = $entries.ToArray()
      } | ConvertTo-Json -Depth 50 -Compress
    arguments:
      - "{{merge-and-dedupe.output}}"
      - "{{env.XDG_CONFIG_HOME}}/orchestra/zakira.db"
      - "{{vars.zakiraCategory}}"
    timeoutSeconds: 600

  - name: diff-and-plan-upserts
    type: Script
    dependsOn: [merge-and-dedupe, classify, load-prior-state]
    shell: pwsh
    script: |
      # Joins merged messages with their classification and existing
      # ledger state. Produces the bulk upsert plan plus a change-rollup
      # that the gate uses to decide whether the run is noteworthy.
      #
      # Status semantics:
      #   active     - we have not seen the user mark it handled
      #   resolved   - mark-ledger-item.ps1 set status=completed
      #   dismissed  - mark-ledger-item.ps1 set status=dismissed
      #   archived   - mark-ledger-item.ps1 set status=archived
      #
      # Manual-closed entries are sticky: a re-classified item that the
      # user already resolved stays resolved (we just refresh lastSeenAt).
      $ErrorActionPreference = 'Stop'

      $mergedJson    = $args[0]
      $classifyJson  = $args[1]
      $priorJson     = $args[2]
      $runId         = $args[3]

      $merged   = ConvertFrom-Json -InputObject $mergedJson  -Depth 50 -ErrorAction Stop
      $classify = ConvertFrom-Json -InputObject $classifyJson -Depth 50 -ErrorAction Stop
      $prior    = ConvertFrom-Json -InputObject $priorJson    -Depth 50 -ErrorAction Stop

      $now = (Get-Date).ToUniversalTime()
      $nowIso = $now.ToString('o')

      # Maps for joining.
      $classMap = @{}
      foreach ($c in @($classify.items)) {
        if ($null -eq $c) { continue }
        $classMap[[string]$c.zakiraKey] = $c
      }
      $priorMap = @{}
      foreach ($p in @($prior.records)) {
        if ($null -eq $p) { continue }
        $priorMap[[string]$p.zakiraKey] = $p.data
      }

      $upserts = New-Object System.Collections.Generic.List[object]
      $rollup = [ordered]@{
        new = 0; escalated = 0; reclassified = 0; unchanged = 0;
        manualClosed = 0
      }

      foreach ($msg in @($merged.messages)) {
        if ($null -eq $msg) { continue }
        $key = [string]$msg.zakiraKey
        $cls = if ($classMap.ContainsKey($key)) { $classMap[$key] } else { $null }
        $priorData = if ($priorMap.ContainsKey($key)) { $priorMap[$key] } else { $null }
        $isNew = ($null -eq $priorData)

        # Pull through fields from the message + classifier.
        $newCategory = if ($cls) { [string]$cls.category } else { 'fyi' }
        $newConfidence = if ($cls) { [double]($cls.confidence -as [double]) } else { 0.0 }
        $newRationale = if ($cls) { [string]$cls.rationale } else { '' }
        $newTags = @()
        if ($cls -and $cls.PSObject.Properties['tags']) {
          $newTags = @($cls.tags | ForEach-Object { [string]$_ })
        }

        # Manual-closed sticky path: preserve status, just refresh lastSeenAt.
        if (-not $isNew -and $priorData.PSObject.Properties['status']) {
          $priorStatus = [string]$priorData.status
          if ($priorStatus -eq 'resolved' -or $priorStatus -eq 'dismissed' -or $priorStatus -eq 'archived') {
            $rollup['manualClosed'] += 1
            $refresh = [ordered]@{}
            foreach ($p in $priorData.PSObject.Properties) { $refresh[$p.Name] = $p.Value }
            $refresh['lastSeenAt']    = $nowIso
            # Update classification metadata even on sticky entries so
            # the historical record reflects the latest reasoning.
            $refresh['category']      = $newCategory
            $refresh['confidence']    = $newConfidence
            $refresh['rationale']     = $newRationale
            $refresh['tags']          = $newTags
            $upserts.Add([pscustomobject]@{
              op        = 'edit'
              zakiraKey = $key
              data      = [pscustomobject]$refresh
              classify  = 'manual-closed'
            }) | Out-Null
            continue
          }
        }

        # Compose the data payload.
        $createdAt = if ($isNew) { $nowIso } elseif ($priorData.PSObject.Properties['firstSeenAt']) { [string]$priorData.firstSeenAt } else { $nowIso }
        $newAt = if ($isNew) { $nowIso } elseif ($priorData.PSObject.Properties['firstClassifiedAt']) { [string]$priorData.firstClassifiedAt } else { $nowIso }
        $priorCategory = if ($priorData -and $priorData.PSObject.Properties['category']) { [string]$priorData.category } else { $null }

        $bodyPreview = if ($msg.PSObject.Properties['bodyPreview']) { [string]$msg.bodyPreview } else { '' }
        if ($bodyPreview.Length -gt 1000) { $bodyPreview = $bodyPreview.Substring(0, 1000) + '...' }

        $data = [ordered]@{
          zakiraKey         = $key
          messageId         = [string]$msg.id
          source            = [string]$msg.source
          subject           = [string]$msg.subject
          sender            = $msg.sender
          author            = $msg.author
          receivedAt        = [string]$msg.receivedDateTime
          createdDateTime   = [string]$msg.createdDateTime
          conversationId    = [string]$msg.conversationId
          threadRootId      = [string]$msg.threadRootId
          chatOrChannelId   = [string]$msg.chatOrChannelId
          chatOrChannelName = [string]$msg.chatOrChannelName
          webLink           = [string]$msg.webLink
          importance        = [string]$msg.importance
          isMention         = [bool]($msg.isMention -eq $true)
          inToRecipients    = [bool]($msg.inToRecipients -eq $true)
          hasAttachments    = [bool]($msg.hasAttachments -eq $true)
          folderName        = [string]$msg.folderName
          bodyPreview       = $bodyPreview
          category          = $newCategory
          confidence        = $newConfidence
          rationale         = $newRationale
          tags              = $newTags
          status            = 'active'
          firstSeenAt       = $createdAt
          firstClassifiedAt = $newAt
          lastSeenAt        = $nowIso
          closedAt          = $null
          closeReason       = $null
          runIdLastTouched  = $runId
        }
        if (-not $isNew -and $null -ne $priorCategory -and $priorCategory -ne $newCategory) {
          $data['priorCategory'] = $priorCategory
          if ($priorCategory -in @('fyi','noise') -and $newCategory -in @('needs-action','wait-reply','meeting-prep')) {
            $data['escalated'] = $true
          }
        }

        $classifyTag = if ($isNew) { 'new' }
                       elseif (-not $isNew -and $data.PSObject.Properties['escalated'] -and $data['escalated'] -eq $true) { 'escalated' }
                       elseif ($null -ne $priorCategory -and $priorCategory -ne $newCategory) { 'reclassified' }
                       else { 'unchanged' }
        $rollup[$classifyTag] += 1

        $upserts.Add([pscustomobject]@{
          op        = if ($isNew) { 'create' } else { 'edit' }
          zakiraKey = $key
          data      = [pscustomobject]$data
          classify  = $classifyTag
        }) | Out-Null
      }

      [pscustomobject]@{
        diffedAt    = $nowIso
        runId       = $runId
        upsertCount = $upserts.Count
        upserts     = $upserts.ToArray()
        rollup      = $rollup
        countsByCategory = $classify.counts
      } | ConvertTo-Json -Depth 100 -Compress
    arguments:
      - "{{merge-and-dedupe.output}}"
      - "{{classify.output}}"
      - "{{load-prior-state.output}}"
      - "{{orchestration.runId}}"
    timeoutSeconds: 120

  - name: gate-noteworthy-activity
    type: Script
    dependsOn: [diff-and-plan-upserts]
    shell: pwsh
    script: |
      # ActionView submission is noteworthy when ANY of:
      #   - new needs-action items appeared
      #   - any item was escalated into needs-action / wait-reply
      #   - meeting-prep items appeared
      #   - forceSurface is true
      # AND dryRun is false. Pure fyi / noise volume by itself is NOT
      # noteworthy. dryRun=true forces noteworthy=false so the
      # ActionView submission branch is skipped entirely.
      $ErrorActionPreference = 'Stop'

      $diffJson  = $args[0]
      $forceRaw  = $args[1]
      $dryRunRaw = $args[2]

      $diff = ConvertFrom-Json -InputObject $diffJson -Depth 100 -ErrorAction Stop
      $forceBool  = [string]::Equals($forceRaw.Trim(),  'true', [System.StringComparison]::OrdinalIgnoreCase)
      $dryRunBool = [string]::Equals($dryRunRaw.Trim(), 'true', [System.StringComparison]::OrdinalIgnoreCase)

      $newNeedsAction = 0
      $newMeetingPrep = 0
      $escalations = 0
      foreach ($u in @($diff.upserts)) {
        if ($null -eq $u) { continue }
        $cat = [string]$u.data.category
        $cls = [string]$u.classify
        if ($cls -eq 'new') {
          if ($cat -eq 'needs-action') { $newNeedsAction += 1 }
          if ($cat -eq 'meeting-prep') { $newMeetingPrep += 1 }
        } elseif ($cls -eq 'escalated') {
          $escalations += 1
        }
      }

      $noteworthy = (-not $dryRunBool) -and ($forceBool -or ($newNeedsAction -gt 0) -or ($escalations -gt 0) -or ($newMeetingPrep -gt 0))

      $reason = if ($dryRunBool) {
        "dry-run: ActionView submission suppressed (newNeedsAction=$newNeedsAction, escalations=$escalations, newMeetingPrep=$newMeetingPrep would otherwise surface)"
      } elseif ($noteworthy) {
        "noteworthy: newNeedsAction=$newNeedsAction, escalations=$escalations, newMeetingPrep=$newMeetingPrep, force=$forceBool"
      } else {
        "no-op: newNeedsAction=0, escalations=0, newMeetingPrep=0, force=false"
      }

      [pscustomobject]@{
        noteworthy      = $noteworthy
        forceSurface    = $forceBool
        dryRun          = $dryRunBool
        newNeedsAction  = $newNeedsAction
        newMeetingPrep  = $newMeetingPrep
        escalations     = $escalations
        reason          = $reason
      } | ConvertTo-Json -Compress
    arguments:
      - "{{diff-and-plan-upserts.output}}"
      - "{{param.forceSurface}}"
      - "{{param.dryRun}}"
    timeoutSeconds: 30

  - name: noteworthy-gate-prompt
    type: Prompt
    dependsOn: [gate-noteworthy-activity]
    systemPrompt: |
      You read a JSON object that contains a `noteworthy` boolean. Your
      ONLY job is to gate downstream ActionView submission.

      Rules:
      1. If `noteworthy` is exactly `true`, output the JSON object
         verbatim with no prose, fences, or alterations.
      2. If `noteworthy` is `false`, call the engine tool
         `orchestra_set_status` with status `no_action` and a reason
         that includes the supplied `reason` field. After calling the
         tool, output the JSON object verbatim.
      3. Do not call any other tools.
      4. Do not add prose, markdown fences, or commentary.
    userPrompt: |
      Gate decision input:
      {{gate-noteworthy-activity.output}}
    outputHandlerPrompt: |
      Output exactly one JSON object - the gate decision verbatim.
      Strip any markdown fences, prose, or trailing whitespace.

  - name: update-zakira
    type: Script
    dependsOn: [diff-and-plan-upserts]
    shell: pwsh
    script: |
      # Bulk persist the upsert plan to Zakira. Also stamps a new
      # last-run cursor so the next run extends the lookback window
      # automatically (even if this run skipped ActionView submission).
      $ErrorActionPreference = 'Stop'
      $PSNativeCommandArgumentPassing = 'Standard'

      $diffJson      = $args[0]
      $dbPath        = $args[1]
      $category      = $args[2]
      $lastRunCat    = $args[3]
      $dryRun        = $args[4]
      $runId         = $args[5]

      $dryRunBool = [string]::Equals($dryRun.Trim(), 'true', [System.StringComparison]::OrdinalIgnoreCase)
      if ($dryRunBool) {
        [pscustomobject]@{ status='dry-run-skipped'; created=0; updated=0 } | ConvertTo-Json -Compress
        return
      }

      $diff = ConvertFrom-Json -InputObject $diffJson -Depth 100 -ErrorAction Stop

      $created = 0; $updated = 0
      $errors = New-Object System.Collections.Generic.List[string]

      foreach ($u in @($diff.upserts)) {
        if ($null -eq $u) { continue }
        $key = [string]$u.zakiraKey
        $payload = $u.data | ConvertTo-Json -Depth 50 -Compress
        $reason = "$($u.classify); runId=$runId"
        $author = "inbox-triage:$runId"

        if ($u.op -eq 'create') {
          $out = & dnx Zakira.Exchange --yes -- --db $dbPath create $category $key `
            --data $payload --author $author --reason $reason 2>&1
          if ($LASTEXITCODE -eq 0) { $created += 1 }
          else {
            $out = & dnx Zakira.Exchange --yes -- --db $dbPath edit $category $key `
              --data $payload --author $author --reason $reason 2>&1
            if ($LASTEXITCODE -eq 0) { $updated += 1 }
            else { $errors.Add("upsert ${key}: $($out -join ' ')") | Out-Null }
          }
        } else {
          $out = & dnx Zakira.Exchange --yes -- --db $dbPath edit $category $key `
            --data $payload --author $author --reason $reason 2>&1
          if ($LASTEXITCODE -eq 0) { $updated += 1 }
          else { $errors.Add("edit ${key}: $($out -join ' ')") | Out-Null }
        }
      }

      # Stamp the last-run cursor so the next run's lookback extends
      # from here automatically.
      $cursorPayload = @{
        completedAt = (Get-Date).ToUniversalTime().ToString('o')
        runId       = $runId
        upserts     = $created + $updated
      } | ConvertTo-Json -Compress
      $cursorOut = & dnx Zakira.Exchange --yes -- --db $dbPath edit $lastRunCat 'last-run' `
        --data $cursorPayload --author $author --reason 'last-run cursor refresh' 2>&1
      if ($LASTEXITCODE -ne 0) {
        $cursorOut = & dnx Zakira.Exchange --yes -- --db $dbPath create $lastRunCat 'last-run' `
          --data $cursorPayload --author $author --reason 'last-run cursor seed' 2>&1
        if ($LASTEXITCODE -ne 0) {
          $errors.Add("cursor write: $($cursorOut -join ' ')") | Out-Null
        }
      }

      [pscustomobject]@{
        status   = 'persisted'
        created  = $created
        updated  = $updated
        errors   = $errors.ToArray()
      } | ConvertTo-Json -Depth 10 -Compress
    arguments:
      - "{{diff-and-plan-upserts.output}}"
      - "{{env.XDG_CONFIG_HOME}}/orchestra/zakira.db"
      - "{{vars.zakiraCategory}}"
      - "{{vars.zakiraLastRunCategory}}"
      - "{{param.dryRun}}"
      - "{{orchestration.runId}}"
    timeoutSeconds: 900

  - name: build-todo-payloads
    type: Script
    dependsOn: [diff-and-plan-upserts]
    shell: pwsh
    script: |
      # Push to To Do only items that:
      #   - have category needs-action
      #   - have status active
      #   - have been seen for >= staleHoursForTodo
      # The first time a message is classified needs-action it does NOT
      # immediately get a task; the user has a grace window to handle it
      # inline. After the window expires it becomes a task.
      $ErrorActionPreference = 'Stop'

      $diffJson          = $args[0]
      $listName          = $args[1]
      $pushEnabledRaw    = $args[2]
      $dryRunRaw         = $args[3]
      $staleHoursForTodo = [int]$args[4]

      $pushEnabled = [string]::Equals($pushEnabledRaw.Trim(), 'true', [System.StringComparison]::OrdinalIgnoreCase)
      $dryRunBool  = [string]::Equals($dryRunRaw.Trim(), 'true', [System.StringComparison]::OrdinalIgnoreCase)

      if (-not $pushEnabled -or $dryRunBool) {
        [pscustomobject]@{ items = @() } | ConvertTo-Json -Compress
        return
      }

      $diff = ConvertFrom-Json -InputObject $diffJson -Depth 100 -ErrorAction Stop
      $now = (Get-Date).ToUniversalTime()
      $cutoff = $now.AddHours(-$staleHoursForTodo)

      $items = New-Object System.Collections.Generic.List[object]
      foreach ($u in @($diff.upserts)) {
        if ($null -eq $u) { continue }
        $d = $u.data
        if ([string]$d.status -ne 'active') { continue }
        if ([string]$d.category -ne 'needs-action') { continue }

        $firstSeenAt = [string]$d.firstSeenAt
        if ([string]::IsNullOrWhiteSpace($firstSeenAt)) { continue }
        try {
          $firstSeenUtc = [datetimeoffset]::Parse($firstSeenAt, [System.Globalization.CultureInfo]::InvariantCulture).UtcDateTime
        } catch { continue }
        if ($firstSeenUtc -gt $cutoff) { continue }

        # Title - keep the source visible at a glance.
        $sourceTag = if ([string]$d.source -eq 'mail') { '[Mail]' } else { '[Teams]' }
        $subj = [string]$d.subject
        if ([string]::IsNullOrWhiteSpace($subj) -and [string]$d.source -eq 'teams') {
          $subj = "DM/channel: $([string]$d.chatOrChannelName)"
        }
        if ($subj.Length -gt 120) { $subj = $subj.Substring(0, 117) + '...' }
        $title = "$sourceTag $subj"

        $senderText = ''
        if ($d.sender -and $d.sender.name)  { $senderText = [string]$d.sender.name }
        elseif ($d.author -and $d.author.name) { $senderText = [string]$d.author.name }

        $bodyLines = @()
        if (-not [string]::IsNullOrWhiteSpace($senderText)) { $bodyLines += "From: $senderText" }
        if (-not [string]::IsNullOrWhiteSpace([string]$d.receivedAt)) { $bodyLines += "Received: $($d.receivedAt)" }
        if (-not [string]::IsNullOrWhiteSpace([string]$d.rationale)) { $bodyLines += "Why: $($d.rationale)" }
        if (-not [string]::IsNullOrWhiteSpace([string]$d.bodyPreview)) {
          $bodyLines += ''
          $bodyLines += [string]$d.bodyPreview
        }
        if (-not [string]::IsNullOrWhiteSpace([string]$d.webLink)) {
          $bodyLines += ''
          $bodyLines += "Open: $($d.webLink)"
        }
        $body = ($bodyLines -join "`n").TrimEnd()

        $importance = if ([string]$d.importance -eq 'high') { 'high' }
                      elseif ($d.isMention -eq $true) { 'high' }
                      elseif ($d.inToRecipients -eq $true) { 'normal' }
                      else { 'normal' }

        $items.Add([pscustomobject]@{
          externalId = $d.zakiraKey
          title      = $title
          body       = $body
          dueDate    = ''
          importance = $importance
          status     = 'notStarted'
          listName   = $listName
        }) | Out-Null
      }

      [pscustomobject]@{ items = $items.ToArray(); count = $items.Count } | ConvertTo-Json -Depth 20 -Compress
    arguments:
      - "{{diff-and-plan-upserts.output}}"
      - "{{vars.todoListName}}"
      - "{{param.pushToTodo}}"
      - "{{param.dryRun}}"
      - "{{param.staleHoursForTodo}}"
    timeoutSeconds: 60

  - name: push-to-todo
    type: Orchestration
    dependsOn: [build-todo-payloads]
    orchestration: todo-upsert
    forEach: "{{build-todo-payloads.output}}"
    forEachPath: items
    itemParameter: todoItem
    parameters:
      listName: "{{vars.todoListName}}"
      externalId: ""
      title: ""
      body: ""
      dueDate: ""
      importance: normal
      status: notStarted
    inputHandlerPrompt: |
      Return ONLY a valid JSON object mapping todo-upsert parameter
      names (listName, externalId, title, body, dueDate, importance,
      status) to string values pulled from the supplied item. Preserve
      listName, externalId, importance, status, and dueDate verbatim.
      The body must be a single plain-text string with newlines escaped
      for valid JSON.
    mode: sync
    maxConcurrency: 3
    continueOnItemFailure: true
    timeoutSeconds: 1800

  - name: build-actionview-entry
    type: Script
    dependsOn: [diff-and-plan-upserts, noteworthy-gate-prompt, update-zakira, push-to-todo]
    shell: pwsh
    script: |
      # Deterministic ActionView entry. Uses a stable entry id so each
      # run updates the same card instead of stacking new ones. Per-item
      # Mark-handled / Dismiss buttons call mark-ledger-item.ps1 with
      # the resolved absolute path.
      $ErrorActionPreference = 'Stop'

      $diffJson         = $args[0]
      $sharedScriptsDir = $args[1]
      $dbPath           = $args[2]
      $category         = $args[3]
      $entryId          = $args[4]
      $groupId          = $args[5]
      $dryRun           = $args[6]
      $forceSurface     = $args[7]
      $runId            = $args[8]

      $diff = ConvertFrom-Json -InputObject $diffJson -Depth 100 -ErrorAction Stop
      $forceBool = [string]::Equals($forceSurface.Trim(), 'true', [System.StringComparison]::OrdinalIgnoreCase)
      $dryRunBool = [string]::Equals($dryRun.Trim(), 'true', [System.StringComparison]::OrdinalIgnoreCase)

      $resolvedSharedDir = [System.IO.Path]::GetFullPath($sharedScriptsDir)
      $markScriptPath = Join-Path $resolvedSharedDir 'mark-ledger-item.ps1'

      $upserts = @($diff.upserts)
      $active  = $upserts | Where-Object { [string]$_.data.status -eq 'active' } | ForEach-Object { $_.data }
      $byCat = @{
        'needs-action' = @($active | Where-Object { [string]$_.category -eq 'needs-action' })
        'wait-reply'   = @($active | Where-Object { [string]$_.category -eq 'wait-reply'   })
        'meeting-prep' = @($active | Where-Object { [string]$_.category -eq 'meeting-prep' })
        'fyi'          = @($active | Where-Object { [string]$_.category -eq 'fyi'          })
        'noise'        = @($active | Where-Object { [string]$_.category -eq 'noise'        })
      }

      $mentions = @($active | Where-Object { $_.isMention -eq $true })

      $newCount = @($upserts | Where-Object { $_.classify -eq 'new' }).Count
      $escalatedCount = @($upserts | Where-Object { $_.classify -eq 'escalated' }).Count
      $manualClosedCount = @($upserts | Where-Object { $_.classify -eq 'manual-closed' }).Count
      $totalActive = $active.Count

      $severity = if ($byCat['needs-action'].Count -gt 0) { 'high' } elseif ($byCat['meeting-prep'].Count -gt 0) { 'medium' } else { 'low' }
      $pinned   = ($byCat['needs-action'].Count -gt 0)
      $title    = "Inbox: $($byCat['needs-action'].Count) needs action, $($mentions.Count) mention(s), $totalActive active"
      $subtitle = "$newCount new since last run, $escalatedCount escalated, $manualClosedCount handled"

      function New-ItemActions {
        param([string]$ItemKey)
        return @(
          [ordered]@{
            label = 'Mark handled'
            style = 'success'
            onSuccess = 'keep'
            command = [ordered]@{
              type    = 'cli'
              program = 'pwsh'
              args    = @(
                '-NoProfile', '-NoLogo', '-File', $markScriptPath,
                '-Category', $category,
                '-Key',      $ItemKey,
                '-Action',   'completed',
                '-DatabasePath', $dbPath
              )
            }
          },
          [ordered]@{
            label = 'Dismiss'
            style = 'default'
            onSuccess = 'keep'
            command = [ordered]@{
              type    = 'cli'
              program = 'pwsh'
              args    = @(
                '-NoProfile', '-NoLogo', '-File', $markScriptPath,
                '-Category', $category,
                '-Key',      $ItemKey,
                '-Action',   'dismissed',
                '-DatabasePath', $dbPath
              )
            }
          }
        )
      }

      function New-MessageSection {
        param([pscustomobject]$Data)
        $sourceTag = if ([string]$Data.source -eq 'mail') { 'Mail' } else { 'Teams' }
        $subj = [string]$Data.subject
        if ([string]::IsNullOrWhiteSpace($subj)) { $subj = [string]$Data.chatOrChannelName }
        if ([string]::IsNullOrWhiteSpace($subj)) { $subj = '(no subject)' }
        $titleText = "[$sourceTag] $subj"
        if ($titleText.Length -gt 140) { $titleText = $titleText.Substring(0, 137) + '...' }

        $senderText = ''
        if ($Data.sender -and $Data.sender.name) { $senderText = [string]$Data.sender.name }
        elseif ($Data.author -and $Data.author.name) { $senderText = [string]$Data.author.name }

        $kvPairs = [ordered]@{}
        if (-not [string]::IsNullOrWhiteSpace($senderText)) { $kvPairs['From'] = $senderText }
        $when = if (-not [string]::IsNullOrWhiteSpace([string]$Data.receivedAt)) { [string]$Data.receivedAt } else { [string]$Data.createdDateTime }
        if (-not [string]::IsNullOrWhiteSpace($when)) { $kvPairs['When'] = $when }
        if ([string]$Data.source -eq 'teams' -and -not [string]::IsNullOrWhiteSpace([string]$Data.chatOrChannelName)) {
          $kvPairs['Channel/Chat'] = [string]$Data.chatOrChannelName
        }
        if (-not [string]::IsNullOrWhiteSpace([string]$Data.folderName)) { $kvPairs['Folder'] = [string]$Data.folderName }
        $flags = @()
        if ($Data.isMention -eq $true) { $flags += '@mention' }
        if ($Data.inToRecipients -eq $true) { $flags += 'in TO' }
        if ([string]$Data.importance -eq 'high') { $flags += 'high importance' }
        if ($Data.hasAttachments -eq $true) { $flags += 'has attachments' }
        if ($flags.Count -gt 0) { $kvPairs['Flags'] = ($flags -join ', ') }
        if (-not [string]::IsNullOrWhiteSpace([string]$Data.rationale)) { $kvPairs['Why'] = [string]$Data.rationale }
        if (-not [string]::IsNullOrWhiteSpace([string]$Data.webLink)) {
          $kvPairs['Open'] = [ordered]@{ type='link'; url=[string]$Data.webLink; label="open in $sourceTag" }
        }

        $content = @( [ordered]@{ type='keyValue'; pairs=$kvPairs } )
        if (-not [string]::IsNullOrWhiteSpace([string]$Data.bodyPreview)) {
          $content += [ordered]@{ type='markdown'; body="> $([string]$Data.bodyPreview)" }
        }

        return [ordered]@{
          type    = 'section'
          title   = $titleText
          defaultCollapsed = $false
          content = $content
          actions = New-ItemActions -ItemKey ([string]$Data.zakiraKey)
        }
      }

      function New-MessageListSection {
        param([string]$Heading, [object[]]$Items, [bool]$Collapsed = $false)
        if ($Items.Count -eq 0) { return $null }
        $cap = 15
        $shown = $Items | Sort-Object -Property {
          # Surface mentions first, then high-importance, then most recent.
          $score = 0
          if ($_.isMention -eq $true) { $score -= 100 }
          if ([string]$_.importance -eq 'high') { $score -= 50 }
          $when = [string]$_.receivedAt
          if ([string]::IsNullOrWhiteSpace($when)) { $when = [string]$_.createdDateTime }
          try { $score -= [int]([datetimeoffset]::Parse($when, [System.Globalization.CultureInfo]::InvariantCulture).ToUnixTimeSeconds() / 60) } catch { }
          $score
        } | Select-Object -First $cap
        $nestedContent = @()
        foreach ($d in $shown) { $nestedContent += New-MessageSection -Data $d }
        if ($Items.Count -gt $cap) {
          $more = $Items.Count - $cap
          $nestedContent += [ordered]@{ type='markdown'; body="_Plus $more more in this bucket not shown._" }
        }
        return [ordered]@{
          type    = 'section'
          title   = "$Heading ($($Items.Count))"
          defaultCollapsed = $Collapsed
          content = $nestedContent
        }
      }

      $content = New-Object System.Collections.Generic.List[object]

      if ($byCat['needs-action'].Count -gt 0) {
        $alertBody = "**$($byCat['needs-action'].Count) item(s) need your attention:**`n`n"
        foreach ($d in ($byCat['needs-action'] | Select-Object -First 5)) {
          $sourceTag = if ([string]$d.source -eq 'mail') { 'Mail' } else { 'Teams' }
          $subj = if (-not [string]::IsNullOrWhiteSpace([string]$d.subject)) { [string]$d.subject } else { [string]$d.chatOrChannelName }
          $alertBody += "- **[$sourceTag]** $subj"
          if (-not [string]::IsNullOrWhiteSpace([string]$d.rationale)) { $alertBody += " - $([string]$d.rationale)" }
          $alertBody += "`n"
        }
        if ($byCat['needs-action'].Count -gt 5) {
          $alertBody += "- _...and $($byCat['needs-action'].Count - 5) more below._"
        }
        $content.Add([ordered]@{
          type  = 'alert'
          level = 'warning'
          label = 'Needs action'
          body  = $alertBody.TrimEnd()
        }) | Out-Null
      }

      $content.Add([ordered]@{
        type  = 'keyValue'
        label = 'Run Overview'
        pairs = [ordered]@{
          'Active items'  = "$totalActive"
          'Needs action'  = "$($byCat['needs-action'].Count)"
          'Mentions'      = "$($mentions.Count)"
          'Wait reply'    = "$($byCat['wait-reply'].Count)"
          'Meeting prep'  = "$($byCat['meeting-prep'].Count)"
          'FYI'           = "$($byCat['fyi'].Count)"
          'Noise'         = "$($byCat['noise'].Count)"
          'New since run' = "$newCount"
          'Escalated'     = "$escalatedCount"
          'Handled'       = "$manualClosedCount"
        }
      }) | Out-Null

      $sections = @(
        (New-MessageListSection -Heading 'Needs action' -Items $byCat['needs-action']),
        (New-MessageListSection -Heading '@Mentions'    -Items $mentions),
        (New-MessageListSection -Heading 'Wait reply'   -Items $byCat['wait-reply']),
        (New-MessageListSection -Heading 'Meeting prep' -Items $byCat['meeting-prep']),
        (New-MessageListSection -Heading 'FYI'          -Items $byCat['fyi']   -Collapsed $true),
        (New-MessageListSection -Heading 'Noise'        -Items $byCat['noise'] -Collapsed $true)
      )
      foreach ($s in $sections) { if ($null -ne $s) { $content.Add($s) | Out-Null } }

      $content.Add([ordered]@{
        type = 'markdown'
        body = "Run id: ``$runId``  -  Dry run: ``$dryRunBool``  -  Force surface: ``$forceBool``"
      }) | Out-Null

      $entry = [ordered]@{
        schemaVersion = '1'
        id            = $entryId
        type          = 'inbox-triage'
        source        = 'inbox-triage'
        title         = $title
        subtitle      = $subtitle
        severity      = $severity
        icon          = 'inbox'
        tags          = @('inbox','mail','teams','productivity','triage','ZTS')
        groupId       = $groupId
        pinned        = $pinned
        content       = $content.ToArray()
      }

      $entry | ConvertTo-Json -Depth 100 -Compress
    arguments:
      - "{{diff-and-plan-upserts.output}}"
      - "{{vars.sharedScriptsDir}}"
      - "{{env.XDG_CONFIG_HOME}}/orchestra/zakira.db"
      - "{{vars.zakiraCategory}}"
      - "{{vars.actionViewEntryId}}"
      - "{{vars.actionViewGroupId}}"
      - "{{param.dryRun}}"
      - "{{param.forceSurface}}"
      - "{{orchestration.runId}}"
    timeoutSeconds: 180

  - name: submit-actionview-entry
    type: Orchestration
    dependsOn: [build-actionview-entry]
    orchestration: actionview-submit
    parameters:
      entryJson: "{{build-actionview-entry.output}}"
      template: inbox-triage
      groupId: "{{vars.actionViewGroupId}}"
    inputHandlerPrompt: |
      Return ONLY a valid JSON object mapping actionview-submit parameter
      names (entryJson, template, groupId) to string values. entryJson
      is the canonical entry JSON serialized as a string. No sentinel
      handling needed - noteworthy-gate-prompt already skipped this
      branch via orchestra_set_status('no_action') on no-op runs.
    mode: sync
    timeoutSeconds: 600

  - name: emit-daily-summary
    type: Script
    dependsOn: [diff-and-plan-upserts, update-zakira, push-to-todo, gate-noteworthy-activity]
    shell: pwsh
    script: |
      # Always-on summary writer. Writes the daily snapshot under
      # triage-state:daily-summary/<YYYY-MM-DD> and the rolling pointer
      # 'latest' for the future daily-morning-digest composer to read
      # without computing dates.
      $ErrorActionPreference = 'Stop'
      $PSNativeCommandArgumentPassing = 'Standard'

      $diffJson      = $args[0]
      $gateJson      = $args[1]
      $dbPath        = $args[2]
      $category      = $args[3]
      $dryRun        = $args[4]
      $runId         = $args[5]

      $dryRunBool = [string]::Equals($dryRun.Trim(), 'true', [System.StringComparison]::OrdinalIgnoreCase)
      if ($dryRunBool) {
        [pscustomobject]@{ status='dry-run-skipped' } | ConvertTo-Json -Compress
        return
      }

      $diff = ConvertFrom-Json -InputObject $diffJson -Depth 100 -ErrorAction Stop
      $gate = ConvertFrom-Json -InputObject $gateJson -Depth 50 -ErrorAction Stop

      $active = @($diff.upserts | Where-Object { [string]$_.data.status -eq 'active' } | ForEach-Object { $_.data })

      $needsAction = @($active | Where-Object { [string]$_.category -eq 'needs-action' })
      $hotItems = @($needsAction | Select-Object -First 10 | ForEach-Object {
        [ordered]@{
          zakiraKey = $_.zakiraKey
          source    = $_.source
          subject   = $_.subject
          sender    = if ($_.sender -and $_.sender.name) { [string]$_.sender.name } elseif ($_.author -and $_.author.name) { [string]$_.author.name } else { '' }
          webLink   = $_.webLink
          rationale = $_.rationale
        }
      })

      $summary = [ordered]@{
        summaryDate   = (Get-Date).ToString('yyyy-MM-dd')
        rolledAt      = (Get-Date).ToUniversalTime().ToString('o')
        runId         = $runId
        activeCount   = $active.Count
        countsByCategory = $diff.countsByCategory
        rollup        = $diff.rollup
        hotItems      = $hotItems
        noteworthy    = $gate.noteworthy
      }
      $payload = $summary | ConvertTo-Json -Depth 20 -Compress

      function Write-SummaryKey {
        param([string]$Key)
        $out = & dnx Zakira.Exchange --yes -- --db $dbPath edit $category $Key `
          --data $payload --author "inbox-triage:$runId" --reason 'daily summary' 2>&1
        if ($LASTEXITCODE -ne 0) {
          $out = & dnx Zakira.Exchange --yes -- --db $dbPath create $category $Key `
            --data $payload --author "inbox-triage:$runId" --reason 'daily summary' 2>&1
          if ($LASTEXITCODE -ne 0) {
            throw "Zakira write failed for $category/${Key}: $($out -join ' ')"
          }
        }
      }

      $dayKey = $summary.summaryDate
      Write-SummaryKey -Key $dayKey
      Write-SummaryKey -Key 'latest'

      [pscustomobject]@{
        status   = 'persisted'
        keys     = @($dayKey, 'latest')
        category = $category
      } | ConvertTo-Json -Compress
    arguments:
      - "{{diff-and-plan-upserts.output}}"
      - "{{gate-noteworthy-activity.output}}"
      - "{{env.XDG_CONFIG_HOME}}/orchestra/zakira.db"
      - "{{vars.zakiraSummaryCategory}}"
      - "{{param.dryRun}}"
      - "{{orchestration.runId}}"
    timeoutSeconds: 300

  - name: generate-summary
    type: Transform
    dependsOn:
      - compute-lookback-window
      - discover-mail
      - discover-teams
      - reduce-mail
      - reduce-teams
      - advance-scan-cursor
      - merge-and-dedupe
      - classify
      - diff-and-plan-upserts
      - update-zakira
      - push-to-todo
      - submit-actionview-entry
      - emit-daily-summary
    template: |
      # inbox-triage Run Summary

      **Run ID:** {{orchestration.runId}}
      **Started:** {{orchestration.startedAt}}
      **Dry run:** {{param.dryRun}}
      **Force surface:** {{param.forceSurface}}
      **Push to To Do:** {{param.pushToTodo}}
      **Mail folder allowlist:** {{param.mailFolderAllowlist}}
      **Teams channel allowlist:** {{param.teamsChannelAllowlist}}

      ## Lookback window
      ```json
      {{compute-lookback-window.output}}
      ```

      ## Mail discovery (gather manifest)
      ```json
      {{discover-mail.output}}
      ```

      ## Mail reduce (messages)
      ```json
      {{reduce-mail.output}}
      ```

      ## Teams discovery (gather manifest)
      ```json
      {{discover-teams.output}}
      ```

      ## Teams reduce (messages)
      ```json
      {{reduce-teams.output}}
      ```

      ## Scan cursor advance
      ```json
      {{advance-scan-cursor.output}}
      ```

      ## Merged + dedup
      ```json
      {{merge-and-dedupe.output}}
      ```

      ## Classification
      ```json
      {{classify.output}}
      ```

      ## Diff + upsert plan
      ```json
      {{diff-and-plan-upserts.output}}
      ```

      ## Zakira persistence
      ```json
      {{update-zakira.output}}
      ```

      ## To Do push
      ```text
      {{push-to-todo.output}}
      ```

      ## ActionView submission
      ```text
      {{submit-actionview-entry.output}}
      ```

      ## Daily summary
      ```text
      {{emit-daily-summary.output}}
      ```
    contentType: text/markdown
