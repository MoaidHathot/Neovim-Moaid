# yaml-language-server: $schema=https://raw.githubusercontent.com/MoaidHathot/orchestra/main/schemas/orchestration.schema.json
name: zts-official-pipeline-dispatcher
description: reusable dispatcher for tracking Azure DevOps CI/CD runs
version: 1.0.0
tags: ["ZTS", "pipelines", "MSFT", "Azure-DevOps", "Pipeline", "Tracking", "Dispatcher"]
defaultModel: gpt-5.4
timeoutSeconds: 9200

trigger:
  type: manual

inputs:
  pipelineUrl:
    type: string
    description: Full Azure DevOps CI build or CD release URL to normalize and track.
    required: false
  trackedRunJson:
    type: string
    description: Pre-fetched tracked-run JSON to normalize, enrich, and persist instead of resolving from a URL.
    required: false
    default: ""
    multiline: true
  source:
    type: string
    description: Whether this dispatch was triggered automatically or manually.
    required: true
    enum: [auto, manual]
  forceTrack:
    type: boolean
    description: When true, persist and dispatch tracking even if the run is already tracked or not relevant to the user.
    required: false
    default: "false"
  trackReason:
    type: string
    description: Optional human-readable reason for tracking or re-tracking this run.
    required: false
    default: ""

defaultRetryPolicy:
  maxRetries: 2
  backoffSeconds: 5
  backoffMultiplier: 2.0
  retryOnTimeout: true

defaultStepTimeoutSeconds: 1300

variables:
  trackedRunsIndexKey: tracked-runs-index
  targetUserDisplayName: Moaid Hathot

mcps:
  - name: zakira
    type: local
    command: dnx
    arguments:
      - Zakira.Exchange
      - --yes
      - --
      - --db
      - "{{env.XDG_CONFIG_HOME}}/orchestra/zakira.db"
      - mcp
      - --category
      - zts-official-pipeline-tracker

steps:
  - name: normalize-tracked-run
    type: Prompt
    systemPrompt: |
      You are an Azure DevOps pipeline tracking normalizer.

      Your job is to normalize either:
      1. a manually supplied Azure DevOps pipeline URL, or
      2. a pre-fetched trackedRunJson document

      into a single canonical tracked-run record for downstream persistence.

      Requirements:
      - Support both dev.azure.com and visualstudio.com URLs.
      - Support CI build URLs and CD/release URLs, including:
        - definition URLs
        - run/result URLs
        - summary/detail URLs that still identify the build or release
      - If the user provided only a definition URL, resolve it to:
        1. the most recent active run if one exists
        2. otherwise the latest recent run
      - If trackedRunJson is provided, treat it as the authoritative seed, but still use Azure DevOps tools to fill missing details or canonicalize links when needed.
      - Preserve the ability to track non-default CI/CD links; do not hardcode any ZTS-only assumptions.
      - Gather enough Azure DevOps data to populate:
        kind, runId, definitionId, definitionName, pipelineUrl, queuedBy, associatedPullRequests, associatedChanges, status, terminalState
      - Also include a resolved recordKey using:
        - ci:<runId> for CI/build runs
        - cd:<runId> for CD/release runs
      - Set source from the orchestration input.
      - Set trackReason from the orchestration input.
      - Set discoveredAt and lastCheckedAt to the current timestamp in ISO-8601 UTC.
      - Set investigationStatus to "pending".
      - Set actionViewGroupId to "pipeline-<kind>-<runId>".
      - If both pipelineUrl and trackedRunJson are empty or cannot be resolved into a run, call orchestra_set_status with status "failed" and explain why.

      Output ONLY valid JSON with this shape:
      {
        "inputKind": "pipeline-url" | "tracked-run-json",
        "resolvedFrom": "build-run-url" | "release-run-url" | "build-definition-url" | "release-definition-url" | "tracked-run-json",
        "canonicalRecord": {
          "kind": "ci" | "cd",
          "runId": "<string>",
          "definitionId": "<string>",
          "definitionName": "<string>",
          "pipelineUrl": "<canonical full url>",
          "source": "auto" | "manual",
          "trackReason": "<string>",
          "relevantToUser": false,
          "relevanceReason": "",
          "queuedBy": {
            "displayName": "<string>",
            "uniqueName": "<string>",
            "id": "<string>"
          },
          "associatedPullRequests": [],
          "associatedChanges": [],
          "status": "<string>",
          "discoveredAt": "<iso-utc>",
          "lastCheckedAt": "<iso-utc>",
          "terminalState": true,
          "investigationStatus": "pending",
          "actionViewGroupId": "<string>"
        },
        "recordKey": "ci:<runId>|cd:<runId>"
      }
    userPrompt: |
      Normalize this run for tracking.

      pipelineUrl:
      {{param.pipelineUrl}}

      trackedRunJson:
      {{param.trackedRunJson}}

      source:
      {{param.source}}

      trackReason:
      {{param.trackReason}}

      forceTrack:
      {{param.forceTrack}}

      Use Azure DevOps tools to resolve whichever input is available into one canonical tracked-run record. Return only the JSON object.
    outputHandlerPrompt: |
      Ensure the output is valid JSON matching the requested object shape. Remove markdown fences and commentary. If the model returned malformed JSON, repair it without changing the intended values.
    mcps: [azdo]
    timeoutSeconds: 1200

  - name: assess-relevance
    type: Prompt
    dependsOn: [normalize-tracked-run]
    systemPrompt: |
      You are a pipeline relevance evaluator.

      Determine whether the normalized Azure DevOps run is relevant to the user '{{vars.targetUserDisplayName}}'.

      Relevance rules:
      - Check requester / queuedBy identity
      - Check commit authorship
      - Check associated PR authorship
      - Use Azure DevOps tools to fetch additional build/release/PR/change details as needed
      - A run is relevant when any strong signal ties it to '{{vars.targetUserDisplayName}}'
      - In manual mode, retain the discovered relevance result, but downstream logic may still force tracking
      - Explain the strongest reason in a short machine-friendly sentence

      Output ONLY valid JSON:
      {
        "relevantToUser": true,
        "relevanceReason": "<short reason>",
        "queuedBy": { ...normalized identity... },
        "associatedPullRequests": [
          {
            "id": "<string>",
            "title": "<string>",
            "url": "<string>",
            "author": "<string>",
            "status": "<string>"
          }
        ],
        "associatedChanges": [
          {
            "id": "<string>",
            "message": "<string>",
            "author": "<string>",
            "timestamp": "<string>"
          }
        ],
        "status": "<current pipeline status>",
        "terminalState": true
      }
    userPrompt: |
      Evaluate whether this normalized run is relevant to '{{vars.targetUserDisplayName}}'.

      Normalized run:
      {{normalize-tracked-run.output}}

      Return only the JSON object.
    outputHandlerPrompt: |
      Ensure the output is valid JSON only. Preserve arrays and objects exactly, remove markdown fences, and repair minor formatting issues if needed.
    mcps: [azdo]
    timeoutSeconds: 1200

  - name: check-existing-tracking-state
    type: Prompt
    dependsOn: [normalize-tracked-run]
    systemPrompt: |
      You are a Zakira tracking-state checker.

      Use Zakira memory tools to inspect:
      1. the index document at key '{{vars.trackedRunsIndexKey}}'
      2. the per-run record using the normalized recordKey

      If the index does not exist, treat it as:
      { "key": "{{vars.trackedRunsIndexKey}}", "records": [] }

      Output ONLY valid JSON:
      {
        "indexKey": "{{vars.trackedRunsIndexKey}}",
        "recordKey": "<record key>",
        "indexExists": true,
        "recordExists": true,
        "indexDocument": {
          "key": "{{vars.trackedRunsIndexKey}}",
          "records": [
            {
              "recordKey": "<string>",
              "kind": "ci|cd",
              "runId": "<string>",
              "definitionId": "<string>",
              "definitionName": "<string>",
              "pipelineUrl": "<string>",
              "status": "<string>",
              "terminalState": true,
              "lastCheckedAt": "<string>",
              "actionViewGroupId": "<string>"
            }
          ]
        },
        "existingRecord": null
      }

      Do not mutate memory in this step.
    userPrompt: |
      Check whether this run is already tracked.

      Normalized run:
      {{normalize-tracked-run.output}}

      Read the tracked-runs index and the per-run record. Return only the JSON object.
    outputHandlerPrompt: |
      Ensure the result is valid JSON only. If memory is missing, represent it using the requested fallback structure.
    mcps: [zakira]
    timeoutSeconds: 180

  - name: decide-dispatch
    type: Prompt
    dependsOn: [normalize-tracked-run, assess-relevance, check-existing-tracking-state]
    systemPrompt: |
      You compile the normalized record, relevance analysis, and existing
      tracking state into a single dispatch decision JSON. You are NOT a gate
      and you do NOT call orchestra_set_status or orchestra_complete. The
      deterministic Script step `gate-dispatch` that follows you decides
      whether to proceed; your job is only to produce a complete decision
      object so that the gate has everything it needs.

      Decision rules to encode in the output:
      - decision = "track" when (source == "manual") OR (relevantToUser == true) OR (forceTrack == true)
      - decision = "skip-irrelevant" when source == "auto" AND relevantToUser == false AND forceTrack == false
      - decision = "skip-already-tracked" when existingRecord is non-null AND forceTrack == false
      - Carry forward all enriched fields from the relevance step.
      - Set investigationStatus:
        - "pending" for new or forced tracking dispatch
        - "already-tracked" for duplicate-skip decisions
      - Keep terminal runs trackable; do not reject them just because terminalState is true.

      Output ONLY valid JSON:
      {
        "decision": "track" | "skip-irrelevant" | "skip-already-tracked",
        "reason": "<short reason>",
        "recordKey": "<string>",
        "indexKey": "{{vars.trackedRunsIndexKey}}",
        "finalRecord": {
          "kind": "ci|cd",
          "runId": "<string>",
          "definitionId": "<string>",
          "definitionName": "<string>",
          "pipelineUrl": "<string>",
          "source": "auto|manual",
          "trackReason": "<string>",
          "relevantToUser": true,
          "relevanceReason": "<string>",
          "queuedBy": {},
          "associatedPullRequests": [],
          "associatedChanges": [],
          "status": "<string>",
          "discoveredAt": "<string>",
          "lastCheckedAt": "<string>",
          "terminalState": true,
          "investigationStatus": "<string>",
          "actionViewGroupId": "<string>"
        },
        "existingRecord": null
      }
    userPrompt: |
      Compile the dispatch decision JSON.

      Normalized run:
      {{normalize-tracked-run.output}}

      Relevance:
      {{assess-relevance.output}}

      Existing tracking state:
      {{check-existing-tracking-state.output}}

      Source: {{param.source}}
      Force track: {{param.forceTrack}}
      Track reason: {{param.trackReason}}

      Return only the JSON object. Do not call any orchestra_* tools.
    outputHandlerPrompt: |
      Ensure the result is valid JSON only. Remove markdown fences and normalize booleans, strings, arrays, and objects to valid JSON.
    timeoutSeconds: 900

  - name: gate-dispatch
    type: Prompt
    dependsOn: [decide-dispatch]
    parameters:
      - source
      - forceTrack
    systemPrompt: |
      You are a deterministic DAG gate for the pipeline dispatcher. You receive
      a single dispatch decision JSON object plus the orchestration's `source`
      and `forceTrack` parameters. You apply mechanical rules; you do not
      reason.

      Mechanical rules:
        1. If decision == "skip-irrelevant":
             - Call orchestra_set_status with status "no_action" and a short
               reason of "Run is not relevant to the user; auto dispatch
               suppressed."
             - Return strict JSON: {"proceed": false, "reason": "skip-irrelevant"}
        2. Else if decision == "skip-already-tracked":
             - Call orchestra_set_status with status "no_action" and a short
               reason of "Run is already tracked; duplicate dispatch
               suppressed."
             - Return strict JSON: {"proceed": false, "reason": "skip-already-tracked"}
        3. Otherwise (decision == "track"):
             - Return strict JSON: {"proceed": true, "reason": "dispatch"}

      Do NOT call any other tools. Do NOT add commentary. Output strict JSON
      only.
    userPrompt: |
      Apply the gate rules.

      Source: {{param.source}}
      ForceTrack: {{param.forceTrack}}

      Dispatch decision:
      {{decide-dispatch.output}}
    outputHandlerPrompt: |
      Ensure the output is a single JSON object with exactly the keys `proceed` (boolean) and `reason` (string).
    timeoutSeconds: 160

  - name: persist-tracking-state
    type: Prompt
    dependsOn: [gate-dispatch, decide-dispatch, check-existing-tracking-state]
    systemPrompt: |
      You are a Zakira persistence agent for tracked pipeline runs.

      Use Zakira memory tools to create or update:
      1. the per-run record at the provided recordKey
      2. the index document at '{{vars.trackedRunsIndexKey}}'

      Persistence rules:
      - The per-run record key must remain exactly ci:<runId> or cd:<runId>
      - The index document must remain a single object with:
        {
          "key": "{{vars.trackedRunsIndexKey}}",
          "records": [ ... ]
        }
      - Ensure the index contains exactly one summary entry per recordKey
      - For the index summary entry, keep:
        recordKey, kind, runId, definitionId, definitionName, pipelineUrl, status, terminalState, lastCheckedAt, actionViewGroupId
      - When the record already exists, update it in place
      - Preserve that already-terminal runs are still persisted
      - Use a clear reason describing whether this is initial tracking or a refresh

      Output ONLY valid JSON:
      {
        "indexKey": "{{vars.trackedRunsIndexKey}}",
        "recordKey": "<string>",
        "action": "created" | "updated",
        "persistedRecord": { ...full tracked record... },
        "indexSummaryEntry": { ...summary entry... }
      }
    userPrompt: |
      Persist this tracking decision to Zakira.

      Dispatch decision:
      {{decide-dispatch.output}}

      Existing tracking state:
      {{check-existing-tracking-state.output}}

      Create or update the per-run record and the tracked-runs index. Return only the JSON object.
    outputHandlerPrompt: |
      Ensure the output is valid JSON only. Preserve the persisted record and summary entry as JSON objects.
    mcps: [zakira]
    timeoutSeconds: 900

  - name: finalize-tracked-record
    type: Prompt
    dependsOn: [persist-tracking-state]
    systemPrompt: |
      You are a Zakira finalizer for pipeline tracking records.

      Update the persisted per-run record so the scheduled tracker picks it up
      on its next sweep. No ActionView submission happens in this orchestration
      anymore — ActionView entries are produced only by the tracker on terminal
      transition (success) or by the investigator (failure), each via the
      shared actionview-submit child orchestration.

      Rules:
      - Keep all existing tracked record fields.
      - Set investigationStatus to "queued" so the tracker knows it is owned
        by the lifecycle pipeline.
      - Update lastCheckedAt to the current ISO-8601 UTC timestamp.
      - Preserve actionViewGroupId exactly as persisted.
      - Keep terminal runs persisted and marked for later handling.
      - Do not change the recordKey format.

      Output ONLY valid JSON:
      {
        "recordKey": "<string>",
        "finalRecord": { ...full tracked record... }
      }
    userPrompt: |
      Finalize the tracked record after persistence.

      Persisted state:
      {{persist-tracking-state.output}}

      Update the per-run record and return only the JSON object.
    outputHandlerPrompt: |
      Ensure the output is valid JSON only. Preserve the final tracked record as a JSON object.
    mcps: [zakira]
    timeoutSeconds: 900

  - name: generate-summary
    type: Prompt
    dependsOn: [finalize-tracked-record, gate-dispatch]
    systemPrompt: |
      You are a reporting assistant. Produce a concise polished markdown summary for a pipeline tracking dispatch.
    userPrompt: |
      Create the final human-facing summary for this pipeline tracking dispatch.

      Final tracked record:
      {{finalize-tracked-record.output}}

      Gate result:
      {{gate-dispatch.output}}

      Produce polished markdown with:
      1. Header: '## Pipeline Tracking Dispatch Summary'
      2. The pipeline kind, run ID, and definition name
      3. The canonical pipeline URL
      4. Whether tracking was auto or manual
      5. Whether the run is relevant to the user, and the reason
      6. Whether the run is already terminal
      7. Confirmation that the tracked state was recorded and queued for the scheduled tracker
      8. A note that ActionView entries are emitted by the tracker on terminal transition (success) or by the investigator (failure)
    timeoutSeconds: 120
