# yaml-language-server: $schema=https://raw.githubusercontent.com/MoaidHathot/orchestra/main/schemas/orchestration.schema.json
name: zts-official-pipeline-tracker
description: scheduled tracker for active Azure DevOps pipeline runs
version: 1.0.0
tags: ["ZTS", "pipelines", "MSFT", "Azure-DevOps", "Pipeline", "Tracker", "auto"]
defaultModel: claude-opus-4.8
timeoutSeconds: 7200
variables:
  pollIntervalSeconds: "300"
  organization: msazure
trigger:
  type: scheduler
  intervalSeconds: 1200
mcps:
  - name: zakira
    type: local
    command: dnx
    arguments:
      - Zakira.Exchange
      - --yes
      - --
      - --db
      - "{{env.XDG_CONFIG_HOME}}/orchestra/zakira.db"
      - mcp
      - --category
      - zts-official-pipeline-tracker
  - name: orchestra
    type: remote
    endpoint: "http://localhost:5100/mcp/data"
steps:
  - name: ensure-tracked-runs-index
    type: Prompt
    mcps: [zakira]
    systemPrompt: |
      You manage persistent tracker state in Zakira for Azure DevOps pipeline runs.

      Rules:
      - Use Zakira only.
      - Explicitly manage one index document and separate per-run documents because listing support may not exist.
      - The index document key is `tracked-runs-index`.
      - The index document must be JSON with this shape:
        {
          "key": "tracked-runs-index",
          "updatedAt": "<iso8601>",
          "runs": [
            {
              "runKey": "<stable unique key>",
              "definitionId": "<string>",
              "runId": "<string>",
              "project": "<string>",
              "status": "<string>",
              "result": "<string or empty>",
              "isActive": true,
              "groupId": "<stable actionview group id>",
              "recordKey": "<per-run record key>",
              "lastCheckedAt": "<iso8601 or empty>"
            }
          ]
        }
      - Each per-run document key must be the `recordKey` stored in the index.
      - If the index document does not exist, create it with an empty `runs` array and the current timestamp.
      - Read every per-run document referenced by active index entries so the caller receives the freshest persisted state.
      - Return JSON only with this shape:
        {
          "indexKey": "tracked-runs-index",
          "index": { ... },
          "activeRuns": [ ... per-run records ... ]
        }
      - Do not include prose, markdown, or comments.
    userPrompt: |
      Load or create the Zakira tracked-runs index document and return all currently active tracked run records.

  - name: gate-active-runs
    type: Prompt
    dependsOn: [ensure-tracked-runs-index]
    systemPrompt: |
      You are a scheduler gate for the pipeline tracker.

      Read the provided JSON. If there are zero active runs, call orchestra_set_status with:
      - status: no_action
      - reason: No active tracked pipeline runs

      If active runs exist, return JSON only:
      { "activeCount": <number>, "proceed": true }

      Do not add prose.
    userPrompt: |
      Decide whether this tracker run should continue.

      {{ensure-tracked-runs-index.output}}

  - name: refresh-active-run-statuses
    type: Script
    dependsOn: [gate-active-runs]
    shell: pwsh
    script: |
      # Deterministic refresh via az CLI (replaces the prior azdo MCP prompt).
      # Inputs come from `ensure-tracked-runs-index.output` and contain both the index
      # document and the per-run records for currently active runs. For each active
      # run we call `az pipelines runs show` and classify terminal state by the same
      # rules previously encoded in the prompt:
      #   completed+succeeded                                 => "success"
      #   completed+(failed|canceled|partiallySucceeded)      => "failure"
      #   any other status                                    => "active"
      # The output JSON contract matches what `shape-run-updates` expects.
      $ErrorActionPreference = 'Stop'
      try { Get-Command az -ErrorAction Stop | Out-Null } catch {
        throw "az CLI is not available on PATH; cannot refresh tracked pipeline runs."
      }

      function ConvertTo-IsoUtcString {
        param($value)
        if ($null -eq $value) { return "" }
        if ($value -is [datetime]) { return ([datetime]$value).ToUniversalTime().ToString("o") }
        if ($value -is [datetimeoffset]) { return ([datetimeoffset]$value).UtcDateTime.ToString("o") }
        return [string]$value
      }

      $organization = '{{vars.organization}}'
      $orgUrl = "https://dev.azure.com/$organization"

      $state = @'
      {{ensure-tracked-runs-index.output}}
      '@ | ConvertFrom-Json -Depth 100

      $indexRuns = @()
      if ($null -ne $state.index -and $null -ne $state.index.runs) {
        $indexRuns = @(@($state.index.runs) | Where-Object { $_.isActive -eq $true })
      }

      $activeRecords = @()
      if ($null -ne $state.activeRuns) { $activeRecords = @($state.activeRuns) }

      $out = New-Object System.Collections.Generic.List[object]
      foreach ($indexEntry in $indexRuns) {
        if ($null -eq $indexEntry) { continue }

        $runKey = [string]$indexEntry.runKey
        $project = [string]$indexEntry.project
        $definitionId = [string]$indexEntry.definitionId
        $runId = [string]$indexEntry.runId
        $previousStatus = [string]$indexEntry.status
        $previousResult = [string]$indexEntry.result
        $recordKey = [string]$indexEntry.recordKey
        $groupId = [string]$indexEntry.groupId

        $matchingRecord = $null
        if ($activeRecords.Count -gt 0) {
          $matchingRecord = $activeRecords | Where-Object { [string]$_.runKey -eq $runKey } | Select-Object -First 1
        }
        if ($null -ne $matchingRecord) {
          if ([string]::IsNullOrWhiteSpace($recordKey) -and $matchingRecord.recordKey) { $recordKey = [string]$matchingRecord.recordKey }
          if ([string]::IsNullOrWhiteSpace($groupId) -and $matchingRecord.groupId) { $groupId = [string]$matchingRecord.groupId }
          if ([string]::IsNullOrWhiteSpace($previousStatus) -and $matchingRecord.currentStatus) { $previousStatus = [string]$matchingRecord.currentStatus }
          if ([string]::IsNullOrWhiteSpace($previousResult) -and $matchingRecord.currentResult) { $previousResult = [string]$matchingRecord.currentResult }
          if ([string]::IsNullOrWhiteSpace($project) -and $matchingRecord.project) { $project = [string]$matchingRecord.project }
          if ([string]::IsNullOrWhiteSpace($definitionId) -and $matchingRecord.definitionId) { $definitionId = [string]$matchingRecord.definitionId }
          if ([string]::IsNullOrWhiteSpace($runId) -and $matchingRecord.runId) { $runId = [string]$matchingRecord.runId }
        }

        $currentStatus = ""
        $currentResult = ""
        $terminalState = "active"
        $summary = ""
        $finishTime = ""
        $checkedAt = (Get-Date).ToUniversalTime().ToString("o")

        if ([string]::IsNullOrWhiteSpace($runId)) {
          $terminalState = "failure"
          $currentResult = "unavailable"
          $summary = "Tracked run missing runId; cannot resolve via az CLI."
        } elseif ([string]::IsNullOrWhiteSpace($project)) {
          $terminalState = "failure"
          $currentResult = "unavailable"
          $summary = "Tracked run missing project; cannot resolve via az CLI."
        } else {
          $azArgs = @(
            'pipelines','runs','show',
            '--org', $orgUrl,
            '--project', $project,
            '--id', $runId,
            '-o','json'
          )
          # Route stderr to a temp file rather than merging it into stdout with
          # 2>&1. az ignores $env:PYTHONIOENCODING on Windows and unconditionally
          # emits `WARNING: Unable to encode the output with cp1252 encoding...`
          # whenever the HTTP response contains a non-ASCII character (e.g. a
          # build queued by an identity with a diacritic). With 2>&1 that
          # warning contaminates the JSON parser's input ('W' is invalid JSON).
          # Keeping the streams separate gives us clean stdout for parsing and
          # preserves stderr for the failure branch so real errors still surface
          # with full context in the per-run summary.
          $stderrFile = [System.IO.Path]::GetTempFileName()
          try {
            $raw = & az @azArgs 2>$stderrFile
            if ($LASTEXITCODE -ne 0) {
              $stderr = Get-Content -Raw -LiteralPath $stderrFile -ErrorAction SilentlyContinue
              $terminalState = "failure"
              $currentResult = "unavailable"
              $summary = "az pipelines runs show failed for $project run $runId (exit $LASTEXITCODE). stderr: $stderr"
            } else {
              $jsonString = ($raw | ForEach-Object { [string]$_ }) -join "`n"
              $build = $jsonString | ConvertFrom-Json -Depth 100
              $currentStatus = [string]$build.status
              $currentResult = [string]$build.result
              $finishTime = ConvertTo-IsoUtcString $build.finishTime
              if ($currentStatus -eq "completed") {
                switch -Regex ($currentResult) {
                  '^succeeded$'              { $terminalState = "success"; break }
                  '^(failed|canceled|partiallySucceeded)$' { $terminalState = "failure"; break }
                  default                    { $terminalState = "failure" }
                }
              } else {
                $terminalState = "active"
              }
              $summary = "Build $runId $currentStatus/$currentResult finished=$finishTime"
            }
          } finally {
            Remove-Item -LiteralPath $stderrFile -ErrorAction SilentlyContinue
          }
        }

        $entry = [ordered]@{
          runKey         = $runKey
          recordKey      = $recordKey
          groupId        = $groupId
          project        = $project
          definitionId   = $definitionId
          runId          = $runId
          previousStatus = $previousStatus
          previousResult = $previousResult
          currentStatus  = $currentStatus
          currentResult  = $currentResult
          terminalState  = $terminalState
          checkedAt      = $checkedAt
          summary        = $summary
        }
        [void]$out.Add($entry)
      }

      [ordered]@{
        runs = $out.ToArray()
      } | ConvertTo-Json -Depth 100 -Compress

  - name: shape-run-updates
    type: Script
    dependsOn: [ensure-tracked-runs-index, refresh-active-run-statuses]
    shell: pwsh
    script: |
      $state = @'
      {{ensure-tracked-runs-index.output}}
      '@ | ConvertFrom-Json -Depth 100

      $refresh = @'
      {{refresh-active-run-statuses.output}}
      '@ | ConvertFrom-Json -Depth 100

      $index = $state.index
      $refreshRuns = @($refresh.runs)

      $active = New-Object System.Collections.Generic.List[object]
      $succeeded = New-Object System.Collections.Generic.List[object]
      $failed = New-Object System.Collections.Generic.List[object]

      foreach ($run in $refreshRuns) {
        # Compute every value into a local variable first to avoid the
        # PowerShell 7.6.1 codegen path that throws "Argument types do not
        # match" when a hash literal contains `if`-as-value entries together
        # with `@($listOfObject)` references. See the matching note in
        # `enumerate-runs` above.
        $indexEntry = $null
        if ($index -and $index.runs) {
          $indexEntry = @($index.runs) | Where-Object { $_.runKey -eq $run.runKey } | Select-Object -First 1
        }

        $existingRecord = $null
        if ($null -ne $state.activeRuns) {
          $existingRecord = @($state.activeRuns) | Where-Object { $_.runKey -eq $run.runKey } | Select-Object -First 1
        }

        $groupId = if ($run.groupId) { [string]$run.groupId } elseif ($existingRecord -and $existingRecord.groupId) { [string]$existingRecord.groupId } else { "zts-official-pipeline-tracker:$($run.project):$($run.definitionId):$($run.runId)" }

        $recordKey = if ($run.recordKey) { [string]$run.recordKey } elseif ($existingRecord -and $existingRecord.recordKey) { [string]$existingRecord.recordKey } else { "tracked-run-$($run.runKey)" }

        $actionViewSubmittedAt = ""
        if ($null -ne $existingRecord -and $existingRecord.actionViewSubmittedAt) {
          $actionViewSubmittedAt = [string]$existingRecord.actionViewSubmittedAt
        }

        $runKey = [string]$run.runKey
        $project = [string]$run.project
        $definitionId = [string]$run.definitionId
        $runId = [string]$run.runId
        $previousStatus = [string]$run.previousStatus
        $previousResult = [string]$run.previousResult
        $currentStatus = [string]$run.currentStatus
        $currentResult = [string]$run.currentResult
        $terminalState = [string]$run.terminalState
        $checkedAt = [string]$run.checkedAt
        $summary = [string]$run.summary

        $normalized = [ordered]@{
          runKey = $runKey
          recordKey = $recordKey
          groupId = $groupId
          project = $project
          definitionId = $definitionId
          runId = $runId
          previousStatus = $previousStatus
          previousResult = $previousResult
          currentStatus = $currentStatus
          currentResult = $currentResult
          terminalState = $terminalState
          checkedAt = $checkedAt
          summary = $summary
          actionViewSubmittedAt = $actionViewSubmittedAt
          indexEntry = $indexEntry
          existingRecord = $existingRecord
        }

        switch ($normalized.terminalState) {
          'success' { $succeeded.Add($normalized) | Out-Null }
          'failure' { $failed.Add($normalized) | Out-Null }
          default { $active.Add($normalized) | Out-Null }
        }
      }

      $checkedRunsCount = [int]$refreshRuns.Count
      $activeArr = $active.ToArray()
      $succeededArr = $succeeded.ToArray()
      $failedArr = $failed.ToArray()

      [ordered]@{
        checkedRuns = $checkedRunsCount
        active = $activeArr
        succeeded = $succeededArr
        failed = $failedArr
      } | ConvertTo-Json -Depth 100 -Compress

  - name: persist-nonterminal-runs
    type: Prompt
    dependsOn: [shape-run-updates]
    mcps: [zakira]
    systemPrompt: |
      You persist non-terminal tracker state in Zakira.

      Requirements:
      - Read the JSON payload.
      - For every item in `active`, update that per-run document so it remains active.
      - Update only current status/result fields, `lastCheckedAt`, `groupId`, and any normalized tracking fields needed for future checks.
      - Do not create or submit any ActionView entry.
      - Update the `tracked-runs-index` document so each active run remains present with isActive=true and refreshed status/result/lastCheckedAt metadata.
      - Leave succeeded and failed runs untouched in this step.
      - Return JSON only:
        { "updatedActiveCount": <number> }
      - No markdown or prose.
    userPrompt: |
      Persist the non-terminal tracked run updates.

      {{shape-run-updates.output}}

  - name: build-success-entries
    type: Script
    dependsOn: [shape-run-updates]
    shell: pwsh
    script: |
      $shape = @'
      {{shape-run-updates.output}}
      '@ | ConvertFrom-Json -Depth 100

      $entries = New-Object System.Collections.Generic.List[object]
      $skipped = New-Object System.Collections.Generic.List[object]

      foreach ($run in @($shape.succeeded)) {
        if (-not [string]::IsNullOrWhiteSpace([string]$run.actionViewSubmittedAt)) {
          [void]$skipped.Add([ordered]@{
            runKey = [string]$run.runKey
            reason = "already-submitted"
            existingSubmittedAt = [string]$run.actionViewSubmittedAt
          })
          continue
        }

        $project = [string]$run.project
        $definitionId = [string]$run.definitionId
        $runId = [string]$run.runId
        $groupId = if (-not [string]::IsNullOrWhiteSpace([string]$run.groupId)) { [string]$run.groupId } else { "pipeline-success-$runId" }
        $title = "Pipeline succeeded: $project run $runId"
        $subtitle = [string]$run.summary
        if ([string]::IsNullOrWhiteSpace($subtitle)) { $subtitle = "Terminal status: $($run.currentStatus) ($($run.currentResult))" }

        $tagsList = New-Object System.Collections.Generic.List[string]
        [void]$tagsList.Add("ZTS")
        [void]$tagsList.Add("Pipeline")
        [void]$tagsList.Add("Tracker")
        [void]$tagsList.Add("Success")
        if (-not [string]::IsNullOrWhiteSpace($project)) { [void]$tagsList.Add($project) }

        $detailsPairs = [ordered]@{
          Project = $project
          DefinitionId = $definitionId
          RunId = $runId
          Status = [string]$run.currentStatus
          Result = [string]$run.currentResult
          CheckedAt = [string]$run.checkedAt
        }

        $contentBlocks = New-Object System.Collections.Generic.List[object]
        [void]$contentBlocks.Add([ordered]@{
          type  = "keyValue"
          label = "Run"
          pairs = $detailsPairs
        })
        if (-not [string]::IsNullOrWhiteSpace([string]$run.existingRecord.pipelineUrl)) {
          [void]$contentBlocks.Add([ordered]@{
            type  = "link"
            label = "Open pipeline run"
            url   = [string]$run.existingRecord.pipelineUrl
          })
        }

        $entry = [ordered]@{
          schemaVersion = "1"
          type          = "azdo-pipeline-success"
          source        = "zts-official-pipeline-tracker"
          title         = $title
          subtitle      = $subtitle
          severity      = "low"
          icon          = "check-circle"
          tags          = $tagsList.ToArray()
          groupId       = $groupId
          content       = $contentBlocks.ToArray()
        }

        [void]$entries.Add([ordered]@{
          runKey    = [string]$run.runKey
          recordKey = [string]$run.recordKey
          groupId   = $groupId
          entryJson = ($entry | ConvertTo-Json -Depth 100 -Compress)
        })
      }

      [ordered]@{
        entries = @($entries)
        skipped = @($skipped)
        count   = $entries.Count
      } | ConvertTo-Json -Depth 100 -Compress

  - name: process-terminal-runs
    type: Prompt
    dependsOn: [shape-run-updates, build-success-entries]
    mcps: [zakira, orchestra]
    systemPrompt: |
      You finalize terminal tracked runs. ActionView entries for successes are
      pre-built deterministically by the upstream `build-success-entries`
      step; ActionView entries for failures are produced and submitted by the
      `zts-official-pipeline-investigator` child orchestration. You never
      author ActionView entry JSON yourself.

      Inputs:
        - shape: the JSON produced by `shape-run-updates` (active / succeeded
          / failed run buckets).
        - prebuilt: the JSON produced by `build-success-entries` (one
          pre-validated entryJson per success run that has not yet been
          submitted).

      For each `entry` in `prebuilt.entries`:
        1. Invoke the child orchestration `actionview-submit` through the
           Orchestra MCP with parameters:
             - entryJson: the entry's `entryJson` string verbatim
             - groupId:   the entry's `groupId`
           Wait for the child orchestration to finish.
        2. Update the per-run Zakira document at `entry.recordKey` with:
             currentStatus, currentResult (from the matching shape.succeeded
             item), terminalState="success", isActive=false,
             lastCheckedAt=current ISO-8601 UTC,
             actionViewSubmittedAt=current ISO-8601 UTC,
             actionViewGroupId=entry.groupId.
        3. Update the `tracked-runs-index` document so the matching run entry
           reflects isActive=false and the new status/result.

      For each `run` in `shape.failed` where
      `actionViewSubmittedAt` is empty:
        1. Invoke the child orchestration `zts-official-pipeline-investigator`
           through the Orchestra MCP with parameters:
             - pipelineUrl: the run's pipelineUrl (use
               run.existingRecord.pipelineUrl when available, otherwise
               derive from project/definitionId/runId)
             - pipelineKind: "ci" or "cd" inferred from the run; empty string
               if unknown
             - trackedRecordJson: the run.existingRecord serialized as a JSON
               string (or "" when absent)
             - existingActionViewGroupId: the run's groupId
           Wait for the child orchestration to finish. It submits its own
           ActionView entry.
        2. Capture a concise investigation summary string from the child's
           final result.
        3. Update the per-run Zakira document with:
             currentStatus, currentResult (from the shape.failed item),
             terminalState="failure", isActive=false,
             lastCheckedAt=current ISO-8601 UTC,
             actionViewSubmittedAt=current ISO-8601 UTC,
             actionViewGroupId=run.groupId,
             investigationStatus="investigated",
             investigationSummary=<the captured summary>.
        4. Update the `tracked-runs-index` document so the matching run entry
           reflects isActive=false and the new status/result.

      Do not invoke actionview-submit for failed runs. Do not invoke the
      investigator for succeeded runs. Do not emit duplicate ActionView
      submissions for any run that already has `actionViewSubmittedAt`
      populated; record those in `skipped`.

      Return strict JSON only with this shape:
      {
        "succeededProcessed": <number>,
        "failedProcessed": <number>,
        "investigationsTriggered": <number>,
        "skipped": [
          { "runKey": "<string>", "reason": "<string>" }
        ],
        "results": [
          {
            "runKey": "<string>",
            "terminalState": "success" | "failure",
            "groupId": "<string>",
            "investigationSummary": "<string>",
            "actionViewSubmitted": true
          }
        ]
      }
      No prose or markdown.
    userPrompt: |
      Finalize all terminal tracked runs.

      shape:
      {{shape-run-updates.output}}

      prebuilt:
      {{build-success-entries.output}}

  - name: build-final-summary
    type: Script
    dependsOn: [shape-run-updates, persist-nonterminal-runs, process-terminal-runs, build-success-entries]
    shell: pwsh
    script: |
      $shape = @'
      {{shape-run-updates.output}}
      '@ | ConvertFrom-Json -Depth 100

      $activePersist = @'
      {{persist-nonterminal-runs.output}}
      '@ | ConvertFrom-Json -Depth 100

      $terminal = @'
      {{process-terminal-runs.output}}
      '@ | ConvertFrom-Json -Depth 100

      $prebuilt = @'
      {{build-success-entries.output}}
      '@ | ConvertFrom-Json -Depth 100

      [ordered]@{
        checked = [int]$shape.checkedRuns
        succeeded = [int]$terminal.succeededProcessed
        failed = [int]$terminal.failedProcessed
        remainedActive = [int]$activePersist.updatedActiveCount
        investigationsTriggered = [int]$terminal.investigationsTriggered
        successEntriesPrebuilt = [int]$prebuilt.count
        skippedSuccessEntries = @($prebuilt.skipped).Count
      } | ConvertTo-Json -Depth 20 -Compress
