# yaml-language-server: $schema=https://raw.githubusercontent.com/MoaidHathot/orchestra/main/schemas/orchestration.schema.json
name: zts-official-pipeline-manual-tracker
description: |
  On-demand manual tracker for Azure DevOps CI/CD pipeline runs. Thin wrapper
  that hands a user-supplied pipeline URL to zts-official-pipeline-dispatcher
  with `source=manual` and `forceTrack=true`. The dispatcher does the real
  work (normalize, relevance, dedup, persistence) and its own `generate-summary`
  step produces the final markdown.
version: 3.0.0
tags: ["ZTS", "pipelines", "MSFT", "Pipeline", "Tracker", "on-demand", "favorite"]
defaultModel: claude-opus-4.8
timeoutSeconds: 7200

trigger:
  type: manual

inputs:
  pipelineUrl:
    type: string
    required: true
    description: Full Azure DevOps CI or CD pipeline URL to track, including dev.azure.com and visualstudio.com links.
  trackReason:
    type: string
    required: false
    default: "Manual tracking request"
    description: Optional human-readable reason for manually tracking this pipeline run.
  forceTrack:
    type: boolean
    required: false
    default: "true"
    description: When true, forces tracking even if the run is already known or not normally considered relevant.

steps:
  - name: dispatch-track
    type: Orchestration
    orchestration: zts-official-pipeline-dispatcher
    parameters:
      pipelineUrl: "{{param.pipelineUrl}}"
      trackReason: "{{param.trackReason}}"
      forceTrack: "{{param.forceTrack}}"
      source: manual
    mode: sync
    timeoutSeconds: 7100
