# yaml-language-server: $schema=https://raw.githubusercontent.com/MoaidHathot/orchestra/main/schemas/orchestration.schema.json
name: zts-official-pipeline-auto-discoverer
description: |
  Scheduled discovery of recent ZTS official pipeline runs. Fetches the most
  recent runs from the CI and CD definitions, flattens them into a single
  list, and hands each run to `zts-official-pipeline-dispatcher`. The
  dispatcher is the sole authority on relevance, deduplication, and Zakira
  persistence; this orchestration neither writes Zakira state nor submits
  ActionView entries. ActionView entries are emitted only by the
  scheduled tracker on terminal transition (success) or by the investigator
  (failure).
version: 2.0.1
tags: ["ZTS", "pipelines", "MSFT", "Azure-DevOps", "Pipeline", "auto-discovery", "auto"]
defaultModel: gpt-5.4
timeoutSeconds: 7200
trigger:
  type: scheduler
  intervalSeconds: 900
variables:
  pollIntervalSeconds: "900"
  organization: msazure
  project: One
  ciDefinitionId: "384921"
  ciDefinitionName: ZTS-Official
  cdDefinitionId: "388576"
  cdDefinitionName: ZTS-Official-Release
mcps:
  - name: orchestra
    type: remote
    endpoint: "http://localhost:5100/mcp/data"
steps:
  - name: discover-ci-runs
    type: Prompt
    mcps: [azdo]
    systemPrompt: |
      You discover recent Azure DevOps pipeline runs for a single build definition.

      Use the azdo MCP to inspect recent runs for the specified organization, project, and definition.
      Gather only recent runs that are useful for downstream tracking. Do NOT decide relevance here;
      the downstream dispatcher orchestration will do that.

      For each run, produce a JSON object with these fields when available:
      - pipelineType: "ci"
      - definitionId
      - definitionName
      - runId
      - buildNumber
      - status
      - result
      - queueTime
      - startTime
      - finishTime
      - requestedFor
      - requestedBy
      - reason
      - sourceBranch
      - sourceVersion
      - triggeredByBuild
      - triggeredByRelease
      - pullRequests
      - commits
      - webUrl
      - rawEvidence

      If PRs exist, include author/display names and PR identifiers.
      If commits exist, include commit ids, author/display names, and commit messages.

      Return strict JSON only with this shape:
      {
        "pipelineType": "ci",
        "definitionId": <number>,
        "definitionName": "<string>",
        "runs": [ ... ]
      }
    userPrompt: |
      Discover recent runs for:
      - organization: {{vars.organization}}
      - project: {{vars.project}}
      - definitionId: {{vars.ciDefinitionId}}
      - definitionName: {{vars.ciDefinitionName}}

      Focus on the most recent runs likely to still matter for automated tracking.
      Return strict JSON only.

  - name: discover-cd-runs
    type: Prompt
    mcps: [azdo]
    systemPrompt: |
      You discover recent Azure DevOps release or deployment pipeline runs for a single definition.

      Use the azdo MCP to inspect recent runs for the specified organization, project, and definition.
      Gather only recent runs that are useful for downstream tracking. Do NOT decide relevance here;
      the downstream dispatcher orchestration will do that.

      For each run, produce a JSON object with these fields when available:
      - pipelineType: "cd"
      - definitionId
      - definitionName
      - runId
      - buildNumber
      - status
      - result
      - queueTime
      - startTime
      - finishTime
      - requestedFor
      - requestedBy
      - reason
      - sourceBranch
      - sourceVersion
      - triggeredByBuild
      - triggeredByRelease
      - pullRequests
      - commits
      - webUrl
      - rawEvidence

      If PRs exist, include author/display names and PR identifiers.
      If commits exist, include commit ids, author/display names, and commit messages.

      Return strict JSON only with this shape:
      {
        "pipelineType": "cd",
        "definitionId": <number>,
        "definitionName": "<string>",
        "runs": [ ... ]
      }
    userPrompt: |
      Discover recent runs for:
      - organization: {{vars.organization}}
      - project: {{vars.project}}
      - definitionId: {{vars.cdDefinitionId}}
      - definitionName: {{vars.cdDefinitionName}}

      Focus on the most recent runs likely to still matter for automated tracking.
      Return strict JSON only.

  - name: enumerate-runs
    type: Script
    dependsOn: [discover-ci-runs, discover-cd-runs]
    shell: pwsh
    script: |
      # NOTE: the body deliberately avoids the PowerShell 7.6.1 codegen path that
      # throws "Argument types do not match" when a hash literal contains
      # `if`-as-value entries together with `@($listOfObject)`. We compute every
      # value into a local variable first and assign primitives/arrays into the
      # hash. See run dbbadcb778b8 for the failing form.
      $ci = @'
      {{discover-ci-runs.output}}
      '@ | ConvertFrom-Json -Depth 100

      $cd = @'
      {{discover-cd-runs.output}}
      '@ | ConvertFrom-Json -Depth 100

      $runs = New-Object System.Collections.Generic.List[object]

      foreach ($source in @($ci, $cd)) {
        if ($null -eq $source -or $null -eq $source.runs) { continue }
        foreach ($run in @($source.runs)) {
          if ($null -eq $run) { continue }
          [void]$runs.Add($run)
        }
      }

      $ciCount = if ($null -ne $ci -and $null -ne $ci.runs) { @($ci.runs).Count } else { 0 }
      $cdCount = if ($null -ne $cd -and $null -ne $cd.runs) { @($cd.runs).Count } else { 0 }
      $totalCount = $runs.Count
      $runsArr = $runs.ToArray()

      [ordered]@{
        ciCount = $ciCount
        cdCount = $cdCount
        totalCount = $totalCount
        runs = $runsArr
      } | ConvertTo-Json -Depth 100 -Compress

  - name: gate-discovery
    type: Prompt
    dependsOn: [enumerate-runs]
    systemPrompt: |
      You are a deterministic DAG gate. You receive a JSON object with a
      `totalCount` field. Apply the mechanical rule below.

      If totalCount is zero:
        - Call orchestra_set_status with status "no_action" and reason
          "No recent pipeline runs discovered."
        - Return strict JSON: {"proceed": false}

      Otherwise:
        - Return strict JSON: {"proceed": true, "totalCount": <number>}

      Do not add commentary. Do not call any other tools.
    userPrompt: |
      Decide whether discovery should proceed.

      {{enumerate-runs.output}}
    outputHandlerPrompt: |
      Ensure the output is a single JSON object with the required keys.
    timeoutSeconds: 120

  - name: dispatch-runs
    type: Prompt
    dependsOn: [gate-discovery, enumerate-runs]
    mcps: [orchestra]
    systemPrompt: |
      You dispatch discovered Azure DevOps runs to the child orchestration
      `zts-official-pipeline-dispatcher` for tracking. The dispatcher is the
      sole authority on relevance and deduplication, so you do not filter or
      decide here.

      Process each entry in `enumerated.runs` SEQUENTIALLY (one at a time) so
      that AzDO is not hammered with simultaneous invocations:
        1. Invoke the child orchestration `zts-official-pipeline-dispatcher`
           through the Orchestra MCP with parameters:
             - trackedRunJson: the run object serialized as a JSON string
             - source: "auto"
             - forceTrack: "false"
        2. Wait for the child orchestration to finish.
        3. The child may complete with status "no_action" when the run is not
           relevant to the user or is already tracked. Treat that as a
           successful skip (NOT an error) and continue to the next run.
        4. Record the outcome on the run object.

      If `enumerated.runs` is empty, return immediately with empty arrays.

      Return strict JSON only with this shape:
      {
        "dispatched": [
          { "pipelineType": "ci|cd", "runId": "<string>", "executionId": "<string>", "result": "succeeded|no_action|failed" }
        ],
        "counts": {
          "totalRuns": <number>,
          "dispatched": <number>,
          "noAction": <number>,
          "failed": <number>
        }
      }
      No prose or markdown.
    userPrompt: |
      Dispatch each discovered run through the dispatcher.

      enumerated:
      {{enumerate-runs.output}}

  - name: output-summary
    type: Transform
    dependsOn: [dispatch-runs]
    contentType: application/json
    template: |
      {{dispatch-runs.output}}
