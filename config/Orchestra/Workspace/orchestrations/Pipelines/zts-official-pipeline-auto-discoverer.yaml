# yaml-language-server: $schema=https://raw.githubusercontent.com/MoaidHathot/orchestra/main/schemas/orchestration.schema.json
name: zts-official-pipeline-auto-discoverer
description: |
  Scheduled discovery of recent ZTS official pipeline runs. Fetches the most
  recent runs from the CI and CD definitions, flattens them into a single
  list, and hands each run to `zts-official-pipeline-dispatcher`. The
  dispatcher is the sole authority on relevance, deduplication, and Zakira
  persistence; this orchestration neither writes Zakira state nor submits
  ActionView entries. ActionView entries are emitted only by the
  scheduled tracker on terminal transition (success) or by the investigator
  (failure).
version: 2.0.1
tags: ["ZTS", "pipelines", "MSFT", "Azure-DevOps", "Pipeline", "auto-discovery", "auto"]
defaultModel: gpt-5.4
timeoutSeconds: 7200
trigger:
  type: scheduler
  intervalSeconds: 900
variables:
  pollIntervalSeconds: "900"
  organization: msazure
  project: One
  ciDefinitionId: "384921"
  ciDefinitionName: ZTS-Official
  cdDefinitionId: "388576"
  cdDefinitionName: ZTS-Official-Release
mcps:
  - name: orchestra
    type: remote
    endpoint: "http://localhost:5100/mcp/data"
steps:
  - name: discover-ci-runs
    type: Script
    shell: pwsh
    script: |
      # Deterministic discovery via az CLI (replaces the prior azdo MCP prompt).
      # Emits the same JSON contract the downstream `enumerate-runs` step expects:
      #   { "pipelineType":"ci", "definitionId":<num>, "definitionName":"<string>", "runs":[ ... ] }
      # NOTE: assemble every hash value into a local variable first to avoid the
      # PowerShell 7.6.1 codegen quirk documented in `enumerate-runs`.
      $ErrorActionPreference = 'Stop'
      try { Get-Command az -ErrorAction Stop | Out-Null } catch {
        throw "az CLI is not available on PATH; cannot discover CI pipeline runs."
      }

      function ConvertTo-IsoUtcString {
        param($value)
        if ($null -eq $value) { return "" }
        if ($value -is [datetime]) { return ([datetime]$value).ToUniversalTime().ToString("o") }
        if ($value -is [datetimeoffset]) { return ([datetimeoffset]$value).UtcDateTime.ToString("o") }
        return [string]$value
      }

      $organization = '{{vars.organization}}'
      $project = '{{vars.project}}'
      $definitionIdRaw = '{{vars.ciDefinitionId}}'
      $definitionName = '{{vars.ciDefinitionName}}'
      $orgUrl = "https://dev.azure.com/$organization"
      $definitionIdInt = [int]$definitionIdRaw

      $raw = & az pipelines runs list `
        --org $orgUrl `
        --project $project `
        --pipeline-ids $definitionIdRaw `
        --top 25 `
        --query-order QueueTimeDesc `
        -o json 2>&1
      if ($LASTEXITCODE -ne 0) {
        $errText = if ($raw -is [array]) { ($raw | ForEach-Object { [string]$_ }) -join "`n" } else { [string]$raw }
        throw "az pipelines runs list (CI def $definitionIdRaw) failed with exit $LASTEXITCODE`: $errText"
      }
      $jsonString = if ($raw -is [array]) { ($raw | ForEach-Object { [string]$_ }) -join "`n" } else { [string]$raw }
      $list = $jsonString | ConvertFrom-Json -Depth 100

      $runs = New-Object System.Collections.Generic.List[object]
      foreach ($b in @($list)) {
        if ($null -eq $b) { continue }

        $resolvedDefId = $definitionIdInt
        if ($null -ne $b.definition -and $null -ne $b.definition.id) {
          $resolvedDefId = [int]$b.definition.id
        }
        $resolvedDefName = $definitionName
        if ($null -ne $b.definition -and $b.definition.name) {
          $resolvedDefName = [string]$b.definition.name
        }

        $requestedForObj = $null
        if ($null -ne $b.requestedFor) {
          $requestedForObj = [ordered]@{
            displayName = [string]$b.requestedFor.displayName
            uniqueName = [string]$b.requestedFor.uniqueName
            id = [string]$b.requestedFor.id
          }
        }
        $requestedByObj = $null
        if ($null -ne $b.requestedBy) {
          $requestedByObj = [ordered]@{
            displayName = [string]$b.requestedBy.displayName
            uniqueName = [string]$b.requestedBy.uniqueName
            id = [string]$b.requestedBy.id
          }
        }

        $pullRequests = @()
        $triggerInfo = $b.triggerInfo
        if ($null -ne $triggerInfo) {
          $prNumber = $null
          try { $prNumber = $triggerInfo.'pr.number' } catch { $prNumber = $null }
          if (-not $prNumber) {
            try { $prNumber = $triggerInfo.'pr.id' } catch { $prNumber = $null }
          }
          if ($prNumber) {
            $prAuthor = [ordered]@{
              displayName = [string]$triggerInfo.'pr.senderName'
              uniqueName = [string]$triggerInfo.'pr.senderEmail'
            }
            $prEntry = [ordered]@{
              id = [string]$prNumber
              title = [string]$triggerInfo.'pr.title'
              sourceBranch = [string]$triggerInfo.'pr.sourceBranch'
              targetBranch = [string]$triggerInfo.'pr.targetBranch'
              draft = [string]$triggerInfo.'pr.draft'
              providerName = [string]$triggerInfo.'pr.providerName'
              author = $prAuthor
            }
            $pullRequests = @($prEntry)
          }
        }

        $webUrl = "https://dev.azure.com/$organization/$project/_build/results?buildId=$($b.id)"
        $queueTimeIso = ConvertTo-IsoUtcString $b.queueTime
        $finishTimeIso = ConvertTo-IsoUtcString $b.finishTime
        $rawEvidence = "build $($b.id) $($b.status)/$($b.result) queued=$queueTimeIso finished=$finishTimeIso reason=$($b.reason)"

        $entry = [ordered]@{
          pipelineType = 'ci'
          definitionId = $resolvedDefId
          definitionName = $resolvedDefName
          runId = [string]$b.id
          buildNumber = [string]$b.buildNumber
          status = [string]$b.status
          result = [string]$b.result
          queueTime = ConvertTo-IsoUtcString $b.queueTime
          startTime = ConvertTo-IsoUtcString $b.startTime
          finishTime = ConvertTo-IsoUtcString $b.finishTime
          requestedFor = $requestedForObj
          requestedBy = $requestedByObj
          reason = [string]$b.reason
          sourceBranch = [string]$b.sourceBranch
          sourceVersion = [string]$b.sourceVersion
          triggeredByBuild = $null
          triggeredByRelease = $null
          pullRequests = $pullRequests
          commits = @()
          webUrl = $webUrl
          rawEvidence = $rawEvidence
        }
        [void]$runs.Add($entry)
      }

      $runsArr = $runs.ToArray()

      [ordered]@{
        pipelineType = 'ci'
        definitionId = $definitionIdInt
        definitionName = $definitionName
        runs = $runsArr
      } | ConvertTo-Json -Depth 100 -Compress

  - name: discover-cd-runs
    type: Script
    shell: pwsh
    script: |
      # Deterministic discovery via az CLI (replaces the prior azdo MCP prompt).
      # Emits the same JSON contract the downstream `enumerate-runs` step expects:
      #   { "pipelineType":"cd", "definitionId":<num>, "definitionName":"<string>", "runs":[ ... ] }
      # cdDefinitionId is a YAML/build-style pipeline (Build REST API). Classic Release
      # Management URLs are intentionally out of scope today.
      $ErrorActionPreference = 'Stop'
      try { Get-Command az -ErrorAction Stop | Out-Null } catch {
        throw "az CLI is not available on PATH; cannot discover CD pipeline runs."
      }

      function ConvertTo-IsoUtcString {
        param($value)
        if ($null -eq $value) { return "" }
        if ($value -is [datetime]) { return ([datetime]$value).ToUniversalTime().ToString("o") }
        if ($value -is [datetimeoffset]) { return ([datetimeoffset]$value).UtcDateTime.ToString("o") }
        return [string]$value
      }

      $organization = '{{vars.organization}}'
      $project = '{{vars.project}}'
      $definitionIdRaw = '{{vars.cdDefinitionId}}'
      $definitionName = '{{vars.cdDefinitionName}}'
      $orgUrl = "https://dev.azure.com/$organization"
      $definitionIdInt = [int]$definitionIdRaw

      $raw = & az pipelines runs list `
        --org $orgUrl `
        --project $project `
        --pipeline-ids $definitionIdRaw `
        --top 25 `
        --query-order QueueTimeDesc `
        -o json 2>&1
      if ($LASTEXITCODE -ne 0) {
        $errText = if ($raw -is [array]) { ($raw | ForEach-Object { [string]$_ }) -join "`n" } else { [string]$raw }
        throw "az pipelines runs list (CD def $definitionIdRaw) failed with exit $LASTEXITCODE`: $errText"
      }
      $jsonString = if ($raw -is [array]) { ($raw | ForEach-Object { [string]$_ }) -join "`n" } else { [string]$raw }
      $list = $jsonString | ConvertFrom-Json -Depth 100

      $runs = New-Object System.Collections.Generic.List[object]
      foreach ($b in @($list)) {
        if ($null -eq $b) { continue }

        $resolvedDefId = $definitionIdInt
        if ($null -ne $b.definition -and $null -ne $b.definition.id) {
          $resolvedDefId = [int]$b.definition.id
        }
        $resolvedDefName = $definitionName
        if ($null -ne $b.definition -and $b.definition.name) {
          $resolvedDefName = [string]$b.definition.name
        }

        $requestedForObj = $null
        if ($null -ne $b.requestedFor) {
          $requestedForObj = [ordered]@{
            displayName = [string]$b.requestedFor.displayName
            uniqueName = [string]$b.requestedFor.uniqueName
            id = [string]$b.requestedFor.id
          }
        }
        $requestedByObj = $null
        if ($null -ne $b.requestedBy) {
          $requestedByObj = [ordered]@{
            displayName = [string]$b.requestedBy.displayName
            uniqueName = [string]$b.requestedBy.uniqueName
            id = [string]$b.requestedBy.id
          }
        }

        $pullRequests = @()
        $triggerInfo = $b.triggerInfo
        if ($null -ne $triggerInfo) {
          $prNumber = $null
          try { $prNumber = $triggerInfo.'pr.number' } catch { $prNumber = $null }
          if (-not $prNumber) {
            try { $prNumber = $triggerInfo.'pr.id' } catch { $prNumber = $null }
          }
          if ($prNumber) {
            $prAuthor = [ordered]@{
              displayName = [string]$triggerInfo.'pr.senderName'
              uniqueName = [string]$triggerInfo.'pr.senderEmail'
            }
            $prEntry = [ordered]@{
              id = [string]$prNumber
              title = [string]$triggerInfo.'pr.title'
              sourceBranch = [string]$triggerInfo.'pr.sourceBranch'
              targetBranch = [string]$triggerInfo.'pr.targetBranch'
              draft = [string]$triggerInfo.'pr.draft'
              providerName = [string]$triggerInfo.'pr.providerName'
              author = $prAuthor
            }
            $pullRequests = @($prEntry)
          }
        }

        $webUrl = "https://dev.azure.com/$organization/$project/_build/results?buildId=$($b.id)"
        $queueTimeIso = ConvertTo-IsoUtcString $b.queueTime
        $finishTimeIso = ConvertTo-IsoUtcString $b.finishTime
        $rawEvidence = "build $($b.id) $($b.status)/$($b.result) queued=$queueTimeIso finished=$finishTimeIso reason=$($b.reason)"

        $entry = [ordered]@{
          pipelineType = 'cd'
          definitionId = $resolvedDefId
          definitionName = $resolvedDefName
          runId = [string]$b.id
          buildNumber = [string]$b.buildNumber
          status = [string]$b.status
          result = [string]$b.result
          queueTime = ConvertTo-IsoUtcString $b.queueTime
          startTime = ConvertTo-IsoUtcString $b.startTime
          finishTime = ConvertTo-IsoUtcString $b.finishTime
          requestedFor = $requestedForObj
          requestedBy = $requestedByObj
          reason = [string]$b.reason
          sourceBranch = [string]$b.sourceBranch
          sourceVersion = [string]$b.sourceVersion
          triggeredByBuild = $null
          triggeredByRelease = $null
          pullRequests = $pullRequests
          commits = @()
          webUrl = $webUrl
          rawEvidence = $rawEvidence
        }
        [void]$runs.Add($entry)
      }

      $runsArr = $runs.ToArray()

      [ordered]@{
        pipelineType = 'cd'
        definitionId = $definitionIdInt
        definitionName = $definitionName
        runs = $runsArr
      } | ConvertTo-Json -Depth 100 -Compress

  - name: enumerate-runs
    type: Script
    dependsOn: [discover-ci-runs, discover-cd-runs]
    shell: pwsh
    script: |
      # NOTE: the body deliberately avoids the PowerShell 7.6.1 codegen path that
      # throws "Argument types do not match" when a hash literal contains
      # `if`-as-value entries together with `@($listOfObject)`. We compute every
      # value into a local variable first and assign primitives/arrays into the
      # hash. See run dbbadcb778b8 for the failing form.
      $ci = @'
      {{discover-ci-runs.output}}
      '@ | ConvertFrom-Json -Depth 100

      $cd = @'
      {{discover-cd-runs.output}}
      '@ | ConvertFrom-Json -Depth 100

      $runs = New-Object System.Collections.Generic.List[object]

      foreach ($source in @($ci, $cd)) {
        if ($null -eq $source -or $null -eq $source.runs) { continue }
        foreach ($run in @($source.runs)) {
          if ($null -eq $run) { continue }
          [void]$runs.Add($run)
        }
      }

      $ciCount = if ($null -ne $ci -and $null -ne $ci.runs) { @($ci.runs).Count } else { 0 }
      $cdCount = if ($null -ne $cd -and $null -ne $cd.runs) { @($cd.runs).Count } else { 0 }
      $totalCount = $runs.Count
      $runsArr = $runs.ToArray()

      [ordered]@{
        ciCount = $ciCount
        cdCount = $cdCount
        totalCount = $totalCount
        runs = $runsArr
      } | ConvertTo-Json -Depth 100 -Compress

  - name: gate-discovery
    type: Prompt
    dependsOn: [enumerate-runs]
    systemPrompt: |
      You are a deterministic DAG gate. You receive a JSON object with a
      `totalCount` field. Apply the mechanical rule below.

      If totalCount is zero:
        - Call orchestra_set_status with status "no_action" and reason
          "No recent pipeline runs discovered."
        - Return strict JSON: {"proceed": false}

      Otherwise:
        - Return strict JSON: {"proceed": true, "totalCount": <number>}

      Do not add commentary. Do not call any other tools.
    userPrompt: |
      Decide whether discovery should proceed.

      {{enumerate-runs.output}}
    outputHandlerPrompt: |
      Ensure the output is a single JSON object with the required keys.
    timeoutSeconds: 120

  - name: dispatch-runs
    type: Prompt
    dependsOn: [gate-discovery, enumerate-runs]
    mcps: [orchestra]
    systemPrompt: |
      You dispatch discovered Azure DevOps runs to the child orchestration
      `zts-official-pipeline-dispatcher` for tracking. The dispatcher is the
      sole authority on relevance and deduplication, so you do not filter or
      decide here.

      FIRE-AND-FORGET semantics. You MUST NOT wait for the child orchestration
      to finish. Use the Orchestra MCP's async / fire-and-forget invocation
      tool (or pass the equivalent async / non-blocking mode parameter to the
      invocation tool). As soon as the invocation is accepted, immediately
      move on to the next run.

      For each entry in `enumerated.runs`:
        1. Invoke `zts-official-pipeline-dispatcher` via the Orchestra MCP in
           fire-and-forget / async mode with parameters:
             - trackedRunJson: the run object serialized as a JSON string
             - source: "auto"
             - forceTrack: "false"
        2. Capture whatever handle the tool returns (e.g. executionId,
           jobId, runId) into the per-run output when available. If the tool
           returns no handle, leave executionId as an empty string.
        3. Record `dispatched: true` when the async invocation was accepted
           by Orchestra. Record `dispatched: false` only if the tool itself
           rejected the call before submission.
        4. Do NOT wait for the child to complete. Do NOT report `result`,
           `succeeded`, `no_action`, or `failed` — you have no way to know
           those outcomes here.

      If `enumerated.runs` is empty, return immediately with empty arrays.

      Return strict JSON only with this shape:
      {
        "dispatched": [
          {
            "pipelineType": "ci|cd",
            "runId": "<string>",
            "executionId": "<string-or-empty>",
            "dispatched": true
          }
        ],
        "counts": {
          "totalRuns": <number>,
          "dispatched": <number>,
          "rejected": <number>
        }
      }
      No prose or markdown.
    userPrompt: |
      Dispatch each discovered run through the dispatcher (fire-and-forget).

      enumerated:
      {{enumerate-runs.output}}
    timeoutSeconds: 900

  - name: output-summary
    type: Script
    dependsOn: [enumerate-runs, dispatch-runs]
    shell: pwsh
    script: |
      # Render a human-friendly markdown summary listing the run IDs that were
      # fire-and-forget dispatched to `zts-official-pipeline-dispatcher`.
      # Reads dispatch-runs.output for the dispatched list and joins against
      # enumerate-runs.output to enrich with definitionName / buildNumber /
      # webUrl / status fields that the dispatch-runs prompt deliberately does
      # not echo back.
      $dispatchPayload = @'
      {{dispatch-runs.output}}
      '@ | ConvertFrom-Json -Depth 100

      $enumerated = @'
      {{enumerate-runs.output}}
      '@ | ConvertFrom-Json -Depth 100

      $runsByRunId = @{}
      if ($null -ne $enumerated -and $null -ne $enumerated.runs) {
        foreach ($r in @($enumerated.runs)) {
          if ($null -eq $r) { continue }
          $key = [string]$r.runId
          if (-not [string]::IsNullOrWhiteSpace($key)) { $runsByRunId[$key] = $r }
        }
      }

      $dispatchedItems = @()
      if ($null -ne $dispatchPayload -and $null -ne $dispatchPayload.dispatched) {
        $dispatchedItems = @($dispatchPayload.dispatched)
      }

      $totalRuns = 0
      $dispatchedCount = 0
      $rejectedCount = 0
      if ($null -ne $dispatchPayload -and $null -ne $dispatchPayload.counts) {
        if ($null -ne $dispatchPayload.counts.totalRuns)  { $totalRuns       = [int]$dispatchPayload.counts.totalRuns }
        if ($null -ne $dispatchPayload.counts.dispatched) { $dispatchedCount = [int]$dispatchPayload.counts.dispatched }
        if ($null -ne $dispatchPayload.counts.rejected)   { $rejectedCount   = [int]$dispatchPayload.counts.rejected }
      }
      if ($totalRuns -le 0) { $totalRuns = $dispatchedItems.Count }
      if ($dispatchedCount -le 0 -and $rejectedCount -le 0) {
        $dispatchedCount = ($dispatchedItems | Where-Object { $_.dispatched -eq $true } | Measure-Object).Count
        $rejectedCount   = $dispatchedItems.Count - $dispatchedCount
      }

      $lines = New-Object System.Collections.Generic.List[string]
      [void]$lines.Add("# ZTS-Official Pipeline Auto-Discoverer Summary")
      [void]$lines.Add("")
      [void]$lines.Add("Fire-and-forget dispatched **$dispatchedCount** of **$totalRuns** discovered run(s) to ``zts-official-pipeline-dispatcher`` (rejected: **$rejectedCount**).")
      [void]$lines.Add("")

      if ($dispatchedItems.Count -gt 0) {
        [void]$lines.Add("| Kind | Definition | Run ID | Build Number | Dispatched | Execution ID |")
        [void]$lines.Add("| --- | --- | --- | --- | --- | --- |")
        foreach ($d in $dispatchedItems) {
          if ($null -eq $d) { continue }
          $kind = [string]$d.pipelineType
          $runId = [string]$d.runId
          $execId = [string]$d.executionId
          $dispatched = if ($d.dispatched -eq $true) { 'yes' } else { 'no' }
          $defName = ''
          $buildNumber = ''
          if ($runsByRunId.ContainsKey($runId)) {
            $src = $runsByRunId[$runId]
            $defName = [string]$src.definitionName
            $buildNumber = [string]$src.buildNumber
          }
          [void]$lines.Add("| $kind | $defName | $runId | $buildNumber | $dispatched | $execId |")
        }
      } else {
        [void]$lines.Add("_No runs were dispatched._")
      }

      $lines -join "`n"
